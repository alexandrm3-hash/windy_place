<title>WINDCHILL</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060c18;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
  }
  #wrapper {
    position: relative;
    isolation: isolate;
    width: 900px;
    transform-origin: center center;
    flex-shrink: 0;
  }
  #game-title { display: none; }
  canvas {
    display: block;
    width: 900px;
    height: 520px;
  }
  #hint {
    margin-top: 6px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(180,215,240,0.20);
    text-align: center;
    text-transform: uppercase;
  }
</style>

<div id="wrapper">
  <div id="game-title">Windchill</div>
  <canvas id="game" width="900" height="520"></canvas>
  <div id="hint">Arrow keys / WASD &nbsp;·&nbsp; Space to jump &nbsp;·&nbsp; Left Shift to sprint &nbsp;·&nbsp; E to enter/exit house &nbsp;·&nbsp; R to restart</div>
</div>

<style>
#test-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  font-family: 'Courier New', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  padding: 4px 10px;
  background: rgba(0,0,0,0.55);
  color: rgba(180,215,240,0.70);
  border: 1px solid rgba(180,215,240,0.22);
  border-radius: 4px;
  cursor: pointer;
  z-index: 10;
}
#test-btn:hover { background: rgba(0,0,0,0.75); }
#test-menu {
  display: none;
  position: absolute;
  top: 34px;
  right: 10px;
  background: rgba(6,12,24,0.92);
  border: 1px solid rgba(180,215,240,0.18);
  border-radius: 5px;
  overflow: hidden;
  z-index: 10;
}
#test-menu.open { display: block; }
#test-menu button {
  display: block;
  width: 100%;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  padding: 6px 16px;
  background: none;
  color: rgba(180,215,240,0.80);
  border: none;
  border-bottom: 1px solid rgba(180,215,240,0.08);
  cursor: pointer;
  text-align: left;
  white-space: nowrap;
}
#test-menu button:last-child { border-bottom: none; }
#test-menu button:hover { background: rgba(255,255,255,0.08); }
#test-menu button.hyper { color: #cc44ff; }
#test-menu button.void  { color: #cc44ff; text-shadow: 0 0 8px #aa00ff; }
</style>

<div id="test-btn" onclick="toggleTestMenu()">⚡ WIND</div>
<div id="test-menu">
  <button onclick="forceWind(0);closeTestMenu()">CALM</button>
  <button onclick="forceWind(5);closeTestMenu()">TAILWIND</button>
  <button onclick="forceWind(8);closeTestMenu()">STRONG TAILWIND</button>
  <button onclick="forceWind(9);closeTestMenu()">TAILWIND TORNADO</button>
  <button onclick="forceWind(1);closeTestMenu()">LIGHT HEADWIND</button>
  <button onclick="forceWind(2);closeTestMenu()">STRONG HEADWIND</button>
  <button onclick="forceWind(3);closeTestMenu()">GALE FORCE</button>
  <button onclick="forceWind(4);closeTestMenu()">STORM</button>
  <button onclick="forceWind(6);closeTestMenu()">TORNADO</button>
  <button class="hyper" onclick="forceWind(7);closeTestMenu()">HYPERCANE</button>
  <button class="void" onclick="forceWind(10);closeTestMenu()">VOID STORM</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = 900, H = 520;

// ── Palette ──────────────────────────────────────────────
// Arrays for lrp(); strings for direct fillStyle use
const C = {
  skyTop:    [8,  14, 28],
  skyStorm:  [5,   8, 16],
  skyTail:   [12, 22, 42],
  skyVoid:   [ 4,  4,  4],   // near-black — void storm sky top
  horizCalm: [45, 82,118],
  horizStorm:[18, 30, 44],
  horizTail: [55, 98,140],
  horizVoid: [30, 30, 30],   // dark grey horizon under void storm

  mtFar:  'rgba(100,138,172,0.27)',
  mtMid:  'rgba(58,90,130,0.52)',
  mtNear: 'rgba(28,52,84,0.84)',

  windC: 'rgba(205,230,252,0.72)',
  windW: 'rgba(238,212,138,0.65)',
  snow:  '#ddeeff',
  text:  '#c8e4f5',
  dim:   'rgba(200,228,245,0.38)',
  skin:  '#d4907a',
};

// ── Wind states ───────────────────────────────────────────
const WIND_STATES = [
  { tgt:  0.00, label:'CALM',            lvl:0, dMin:140, dMax:260 },  // [0]
  { tgt: -0.20, label:'LIGHT HEADWIND',  lvl:1, dMin:110, dMax:200 },  // [1]
  { tgt: -0.40, label:'STRONG HEADWIND', lvl:2, dMin: 90, dMax:170 },  // [2]
  { tgt: -0.65, label:'GALE FORCE',      lvl:3, dMin: 70, dMax:130 },  // [3]
  { tgt: -0.90, label:'STORM',           lvl:4, dMin: 55, dMax: 95 },  // [4]
  { tgt:  0.28, label:'TAILWIND',         lvl:1, dMin:100, dMax:180 },  // [5]
  { tgt: -1.40, label:'TORNADO',          lvl:5, dMin: 70, dMax:110 },  // [6]
  { tgt: -2.00, label:'HYPERCANE',        lvl:6, dMin:220, dMax:380 },  // [7]
  { tgt:  0.65, label:'STRONG TAILWIND',  lvl:3, dMin: 80, dMax:150 },  // [8]
  { tgt:  1.40, label:'TAILWIND TORNADO', lvl:5, dMin: 70, dMax:110 },  // [9]
  { tgt: -4.20, label:'VOID STORM',       lvl:7, dMin:300, dMax:520 },  // [10] — secret tier 7
];

function getWindTier() {
  const m = Math.floor(maxReach / 12);
  if (m >= 2500) return 7; // secret tier — VOID STORM
  if (m >= 1500) return 6;
  return Math.min(5, Math.floor(maxReach / (12 * 200)));
}

function pickWindState() {
  const tier = getWindTier(), r = Math.random();
  if (tier === 0) {
    if (r < 0.18) return WIND_STATES[0]; if (r < 0.38) return WIND_STATES[1];
    if (r < 0.56) return WIND_STATES[2]; if (r < 0.70) return WIND_STATES[3];
    if (r < 0.80) return WIND_STATES[4]; return WIND_STATES[5];
  }
  if (tier === 1) {
    if (r < 0.08) return WIND_STATES[0]; if (r < 0.26) return WIND_STATES[1];
    if (r < 0.50) return WIND_STATES[2]; if (r < 0.70) return WIND_STATES[3];
    if (r < 0.82) return WIND_STATES[4]; if (r < 0.94) return WIND_STATES[5];
    return WIND_STATES[8];
  }
  if (tier === 2) {
    if (r < 0.10) return WIND_STATES[1]; if (r < 0.32) return WIND_STATES[2];
    if (r < 0.56) return WIND_STATES[3]; if (r < 0.76) return WIND_STATES[4];
    if (r < 0.88) return WIND_STATES[5]; return WIND_STATES[8];
  }
  if (tier === 3) {
    if (r < 0.06) return WIND_STATES[2]; if (r < 0.24) return WIND_STATES[3];
    if (r < 0.60) return WIND_STATES[4]; if (r < 0.74) return WIND_STATES[5];
    if (r < 0.90) return WIND_STATES[8]; return WIND_STATES[9];
  }
  if (tier === 4) {
    if (r < 0.08) return WIND_STATES[3]; if (r < 0.46) return WIND_STATES[4];
    if (r < 0.58) return WIND_STATES[5]; if (r < 0.72) return WIND_STATES[8];
    if (r < 0.86) return WIND_STATES[6]; return WIND_STATES[9];
  }
  if (tier === 5) {
    if (r < 0.04) return WIND_STATES[3]; if (r < 0.34) return WIND_STATES[4];
    if (r < 0.46) return WIND_STATES[5]; if (r < 0.58) return WIND_STATES[8];
    if (r < 0.80) return WIND_STATES[6]; return WIND_STATES[9];
  }
  if (tier === 6) {
    if (r < 0.04) return WIND_STATES[4];
    if (r < 0.14) return WIND_STATES[5]; if (r < 0.22) return WIND_STATES[8];
    if (r < 0.36) return WIND_STATES[9]; if (r < 0.56) return WIND_STATES[6];
    return WIND_STATES[7]; // 44% hypercane
  }
  // tier 7 — VOID STORM. Almost no breaks.
  if (r < 0.02) return WIND_STATES[4];
  if (r < 0.06) return WIND_STATES[7]; // brief hypercane
  return WIND_STATES[10];              // 94% VOID STORM
}

function windInfo() {
  const f = wind.force;
  if (Math.abs(f) < 0.04) return WIND_STATES[0];
  if (f < -2.60)           return WIND_STATES[10]; // VOID STORM
  if (f < -1.80)           return WIND_STATES[7];  // HYPERCANE
  if (f < -1.00)           return WIND_STATES[6];  // TORNADO
  if (f < -0.72)           return WIND_STATES[4]; // STORM
  if (f < -0.48)           return WIND_STATES[3]; // GALE
  if (f < -0.26)           return WIND_STATES[2];
  if (f < -0.08)           return WIND_STATES[1];
  if (f >  1.00)           return WIND_STATES[9]; // TAILWIND TORNADO
  if (f >  0.44)           return WIND_STATES[8]; // STRONG TAILWIND
  return WIND_STATES[5];
}

// ── Terrain ──────────────────────────────────────────────
let terrainSeed = 0; // re-rolled on every init() for a fresh path each run

function baseGroundY(wx) {
  const s = terrainSeed;

  // Smoothly ramp terrain drama in from the safe starting zone
  const ramp   = Math.min(1, Math.max(0, (wx - 300) / 2200));   // 0→1 over first ~2.5 km
  const mtRamp = Math.min(1, Math.max(0, (wx - 2800) / 3500));  // mountains appear later

  // Broad slow undulation — big valley / climb waves (up AND down)
  const longWave = Math.sin(wx * 0.00019 + s * 0.0013 + 1.0) * 130 * ramp;

  // Medium rolling hills
  const hill1 = Math.sin(wx * 0.0015 + s * 0.0031 + 0.3) * 50 * ramp;
  const hill2 = Math.sin(wx * 0.0050 + s * 0.0072 + 2.1) * 25 * ramp;

  // Abrupt steep ridges
  const ridge = Math.pow(Math.max(0, Math.sin(wx * 0.0009 + s * 0.0021 + 0.7)), 3) * 85 * ramp;

  // Surface ripple (always present, mild)
  const ripple = Math.sin(wx * 0.022 + s * 0.011) * 5;

  // Big mountains — rare narrow peaks, scale with distance so they only appear mid/late game
  const bigMt1 = Math.pow(Math.max(0, Math.sin(wx * 0.000086 + s * 0.00052 + 1.4)), 7) * 255 * mtRamp;
  const bigMt2 = Math.pow(Math.max(0, Math.sin(wx * 0.000053 + s * 0.00083 + 4.1)), 9) * 295 * mtRamp;

  return Math.min(460, Math.max(55, 420 + longWave + hill1 + hill2 - ridge + ripple - bigMt1 - bigMt2));
}

// ── Global state ─────────────────────────────────────────
let gState, player, wind, cam, particles, snowflakes, frame;
let secretTierTimer = 0;   // frames to show the secret tier unlock message
let windDebris = [];
let platforms = [];
let genFrontier = 0;
let maxReach    = 0;
let bestScore   = 0;
let freezing    = 0;   // 0–1
let deathReason = '';
let houses      = [];
let decorations = [];
let tornado     = null;
let stamina          = 1;    // 0–1
let staminaDepleted  = false;
let staminaCooldown  = 0;    // frames remaining before regen starts

// ── Platform generation ───────────────────────────────────
function initPlatforms() {
  platforms    = [];
  decorations  = [];
  genFrontier  = 0;
  maxReach     = 0;

  platforms.push({ x: 0,   y: 420, w: 680, h: 500 }); // starting ground

  genFrontier = 680;
}

function extendMap() {
  while (genFrontier < player.x + W + 600) {
    const diff    = Math.min(1, player.x / 7000);
    const chunkW  = Math.max(110, (290 - diff * 140) + Math.random() * Math.max(50, 190 - diff * 140));
    const chunkX  = genFrontier;
    const groundY = baseGroundY(chunkX + chunkW * 0.4);

    // Subdivide chunk into narrow steps that follow baseGroundY, creating walkable slopes
    const stepW = 5;
    const steps = Math.ceil(chunkW / stepW);
    for (let si = 0; si < steps; si++) {
      const sx = chunkX + si * stepW;
      const sw = (si === steps - 1) ? chunkW - si * stepW : stepW;
      const sy = baseGroundY(sx + sw * 0.5);
      platforms.push({ x: sx, y: sy, w: sw, h: 500 });
    }

    // Maybe place a house on this chunk — metal bunker chance rises 20% per tier
    if (chunkW > 120 && Math.random() < 0.50) {
      const hx    = chunkX + 18 + Math.random() * Math.max(0, chunkW - 120);
      const tier  = getWindTier();
      const bunkerChance = tier >= 6 ? 0.30 : 0.01;
      const metalChance  = Math.min(1, 0.10 + tier * 0.20);
      const r = Math.random();
      const type = r < bunkerChance ? 'bunker' : r < bunkerChance + metalChance ? 'metal' : 'normal';
      const isBunker = type === 'bunker';
      const count = 1; // fortresses always spawn alone
      for (let ci = 0; ci < count; ci++) {
        const bx = hx + ci * (600 + Math.random() * 400); // wide gap if ever multiple
        const hw2 = isBunker ? 90 : 55;
        const hGroundY = baseGroundY(bx + hw2); // ground exactly under this house
        const hYOffset = isBunker ? 175 : 120;  // body-bottom offset from h.y
        houses.push({ x:bx, y:hGroundY - hYOffset, w:isBunker?180:110,
                      type,
                      flying:false, flyTimer: 40 + Math.floor(Math.random() * 160),
                      flyDelay: 40 + Math.floor(Math.random() * 160),
                      vy:0, vx:0, angle:0, alpha:1 });
      }
    }

    // Maybe place a decoration (snowman or pine tree)
    if (chunkW > 60 && Math.random() < 0.45) {
      const dx = chunkX + 20 + Math.random() * Math.max(0, chunkW - 40);
      decorations.push({ x: dx, y: baseGroundY(dx), type: Math.random() < 0.5 ? 'snowman' : 'pinetree' });
    }

    genFrontier = chunkX + chunkW;
  }
}

function trimPlatforms() {
  const cut = player.x - 6000;  // keep terrain far behind so backtracking works
  platforms   = platforms.filter(p => p.x + p.w >= cut);
  houses      = houses.filter(h => h.alpha > 0.02 && h.x + h.w >= cut - 400);
  decorations = decorations.filter(d => d.x >= cut - 100);
}

// ── Init ─────────────────────────────────────────────────
function init() {
  gState = 'playing';
  frame  = 0;

  player = { x:80, y:376, vx:0, vy:0, w:26, h:44,
             onGround:false, facing:1, walkF:0, walkT:0, inHouse:null };

  wind = { force:0, target:0, timer:0, duration:200, strength:0 };

  // Initialize camera so player appears at 60% down immediately
  cam = { x: 0, y: 376 - H * 0.60 };

  terrainSeed      = Math.random() * 9999;
  secretTierTimer  = 0;
  freezing         = 0;
  deathReason      = '';
  houses           = [];
  particles        = [];
  snowflakes       = [];
  windDebris       = [];
  tornado          = null;
  challenge        = null;
  stamina          = 1;
  staminaDepleted  = false;
  staminaCooldown  = 0;
  initPlatforms();
}

// ── Input ─────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  WindAudio.init();
  keys[e.code] = true;
  if (e.code === 'KeyR') init();
  if (e.code === 'KeyE' && gState === 'playing' && !e.repeat) handleEnterExit();
  if (gState === 'playing' && !e.repeat) handleChallengeKey(e.code);
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))
    e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('click', () => WindAudio.init(), { once: true });
const goLeft  = () => keys['ArrowLeft']  || keys['KeyA'];
const goRight = () => keys['ArrowRight'] || keys['KeyD'];
const doJump  = () => keys['ArrowUp']    || keys['KeyW'] || keys['Space'];

// ── Wind update ───────────────────────────────────────────
function updateWind() {
  if (++wind.timer >= wind.duration) {
    wind.timer = 0;
    const ws      = pickWindState();
    wind.target   = ws.tgt + (Math.random() - 0.5) * 0.05;
    wind.duration = ws.dMin + Math.floor(Math.random() * (ws.dMax - ws.dMin));
  }
  wind.force    += (wind.target - wind.force) * 0.022;
  wind.strength  = Math.min(1, Math.abs(wind.force) / 0.90);
}

// ── Player update ─────────────────────────────────────────
function updatePlayer() {
  const chalActive = challenge && challenge.result === null;

  // When sheltered: hold position in the house, skip all physics
  if (player.inHouse) {
    if (player.inHouse.flying || player.inHouse.alpha < 0.5) {
      player.inHouse = null; // ejected by storm — fall through
    } else {
      player.vx = 0; player.vy = 0;
      player.x = player.inHouse.x + player.inHouse.w / 2 - player.w / 2;
      const hFloor = player.inHouse.type === 'bunker' ? player.inHouse.y + 175 : player.inHouse.y + 120;
      player.y = hFloor - player.h;
      player.onGround = true;
      cam.x += (player.x - W * 0.35 - cam.x) * 0.11;
      if (cam.x < 0) cam.x = 0;
      cam.y += (player.y - H * 0.60 - cam.y) * 0.09;
      if (player.x > maxReach) maxReach = player.x;
      // Regen stamina while sheltered in a house
      player.sprinting = false;
      if (staminaDepleted) {
        if (--staminaCooldown <= 0) { staminaDepleted = false; staminaCooldown = 0; }
      } else {
        stamina = Math.min(1, stamina + 0.0018);
      }
      return;
    }
  }
  // sprintKey known early — needed for movement multipliers
  const sprintKey = !chalActive && keys['ShiftLeft'] && !staminaDepleted && stamina > 0;
  // Use previous-frame onGround for movement so downhill steps feel smooth
  const sprintingMove = sprintKey && player.onGround;
  player.sprinting = sprintingMove;
  const sm    = sprintingMove ? 1.65 : 1;
  const smCap = sprintKey     ? 1.65 : 1;

  if (!chalActive && goLeft())  { player.vx -= 0.90 * sm; player.facing = -1; }
  if (!chalActive && goRight()) { player.vx += 0.90 * sm; player.facing =  1; }
  if (chalActive || (!goLeft() && !goRight())) player.vx *= 0.76;

  // Cap wind pull so hypercane doesn't instantly drag the player
  const cappedForce = Math.max(-0.90, Math.min(0.90, wind.force));
  if (!chalActive) player.vx += cappedForce * (player.onGround ? 0.75 : 1.5);
  player.vx  = Math.max(-5.5 * smCap, Math.min(5.5 * smCap, player.vx));

  if (!chalActive && doJump() && player.onGround) { player.vy = -12.5; player.onGround = false; }

  if (chalActive) { player.vx = 0; player.vy = 0; }
  player.vy = Math.min(player.vy + (chalActive ? 0 : 0.50), 14);
  player.x += player.vx;
  player.y += player.vy;

  // Top collisions — after this, player.onGround is current-frame accurate
  player.onGround = false;
  for (const p of platforms) {
    const prevBot = player.y + player.h - player.vy;
    const currBot = player.y + player.h;
    // Allow a generous snap-down tolerance so downhill steps don't snag the player
    const snapTol = Math.abs(player.vx) > 1 ? 18 : 5;
    if (player.x + player.w > p.x && player.x < p.x + p.w &&
        currBot >= p.y && prevBot <= p.y + snapTol && player.vy >= 0) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  }

  // Stamina — drain while shift held (ground or air); regen only when grounded and not sprinting
  const sprinting = sprintKey && player.onGround;
  player.sprinting = sprinting;
  if (sprintKey) {
    // drain whether on ground or airborne — holding shift always costs stamina
    stamina = Math.max(0, stamina - 0.0038);
    if (stamina <= 0) { stamina = 0; staminaDepleted = true; staminaCooldown = 120; }
  } else if (player.onGround) {
    // regen only when standing still or walking (not holding shift) on the ground
    if (staminaDepleted) {
      if (--staminaCooldown <= 0) { staminaDepleted = false; staminaCooldown = 0; }
    } else {
      stamina = Math.min(1, stamina + 0.0018);
    }
  }
  // airborne + no shift = stamina frozen (no regen, no drain)

  const walkStep = sprinting ? 8 : 9;                   // frames between footstep sfx
  if (Math.abs(player.vx) > 0.5 && player.onGround) {
    if (++player.walkT >= walkStep) {
      player.walkT = 0; player.walkF = (player.walkF + 1) % 6;
      WindAudio.footstep(sprinting);
    }
  } else if (player.onGround) { player.walkF = 0; }

  if (player.x < 0) { player.x = 0; player.vx = 0; } // don't go left of start
  const prevReach = maxReach;
  if (player.x > maxReach) maxReach = player.x;
  // Secret tier unlock at 2500m — show dramatic message once
  if (Math.floor(prevReach / 12) < 2500 && Math.floor(maxReach / 12) >= 2500)
    secretTierTimer = 280;
  if (secretTierTimer > 0) secretTierTimer--;

  // Camera — follow both X and Y smoothly
  cam.x += (player.x - W * 0.35 - cam.x) * 0.11;
  if (cam.x < 0) cam.x = 0;
  cam.y += (player.y - H * 0.60 - cam.y) * 0.09;

  // Death: player fell far below the current mountain slope (world-space check,
  // so the camera chasing them doesn't keep pushing the threshold out of reach)
  if (player.y + player.h > baseGroundY(player.x) + 400) {
    const s = Math.floor(maxReach / 12);
    if (s > bestScore) bestScore = s;
    deathReason = 'fall';
    gState = 'dead';
  }
}

// ── House helpers ─────────────────────────────────────────
// True when player is standing close enough to the door to press E
function nearHouse(h) {
  if (h.flying || h.alpha < 0.5) return false;
  const hCx = h.x + h.w / 2, pCx = player.x + player.w / 2;
  const hH = h.type === 'bunker' ? 180 : 120;
  const hBottom = h.y + hH, pBottom = player.y + player.h;
  const reach = h.type === 'bunker' ? 100 : 68;
  return Math.abs(pCx - hCx) < reach && pBottom < hBottom + 38 && pBottom > hBottom - 70;
}

function handleEnterExit() {
  if (player.inHouse) {
    player.inHouse = null;
  } else {
    for (const h of houses) {
      if (nearHouse(h)) {
        player.inHouse = h;
        if (h.type === 'bunker') challenge = null; // cancel any active challenge
        break;
      }
    }
  }
}

function updateHouses() {
  const isStorm     = wind.force < -0.68;
  const isTornado   = wind.force < -1.00 || wind.force > 1.00;
  const isHypercane = wind.force < -1.80;
  const isVoidStorm = wind.force < -2.60; // VOID STORM — fortress bunkers also torn apart
  const liftMult    = isVoidStorm ? 8.0 : isHypercane ? 2.8 : isTornado ? 1.6 : 1.0;
  for (const h of houses) {
    if (h.flying) {
      h.vy  = Math.max(-28, h.vy  - 0.30 * liftMult);
      h.vx  = Math.max(-32, h.vx  + wind.force * 0.6 * liftMult);
      h.x  += h.vx;
      h.y  += h.vy;
      h.angle += h.vx * 0.015;
      if (h.y - cam.y < -80) h.alpha -= 0.025;
    } else if (isVoidStorm ||
               (isHypercane && h.type === 'metal') ||
               (isStorm && h.type !== 'metal' && h.type !== 'bunker')) {
      h.flyTimer--;
      if (h.flyTimer <= 0) {
        h.flying = true;
        if (player.inHouse === h) player.inHouse = null;
      }
    } else if (!isStorm || (h.type !== 'normal' && !isHypercane) || (h.type === 'bunker' && !isVoidStorm)) {
      h.flyTimer = h.flyDelay;
    }
  }
}

// ── Tornado update ────────────────────────────────────────
function updateTornado() {
  const isTornado   = wind.force < -1.00 || wind.force > 1.00;
  const isHypercane = wind.force < -1.80;
  const isVoidStorm = wind.force < -2.60;
  const torScale    = isVoidStorm ? 4.50 : isHypercane ? 1.85 : 1.0;

  if (isTornado && !tornado) {
    const side = wind.force > 0 ? -1 : 1;
    const spawnX = player.x + side * 900;
    const spawnY = baseGroundY(spawnX);
    const debrisTypes = ['car','car','rock','rock','rock','roof','roof','tree','barrel','plank','plank','rock'];
    if (isHypercane) debrisTypes.push('car','truck','rock','rock','roof','tree','barrel','plank');
    if (isVoidStorm) debrisTypes.push('car','truck','car','truck','rock','rock','roof','roof','tree','barrel','plank','rock');
    const debris = [];
    const debrisCount = isVoidStorm ? 38 : isHypercane ? 14 : 8;
    for (let i = 0; i < debrisCount; i++) {
      const kind = debrisTypes[i % debrisTypes.length];
      debris.push({
        angle:    Math.random() * Math.PI * 2,
        fracH:    0.05 + Math.random() * 0.88,
        speed:    (0.030 + Math.random() * 0.060) * (isVoidStorm ? 3.2 : isHypercane ? 1.5 : 1),
        rotSpeed: (Math.random() < 0.5 ? 1 : -1) * (0.8 + Math.random() * 2.2),
        kind,
        x: spawnX, y: spawnY,
      });
    }
    const startAngle = side > 0 ? 0 : Math.PI;
    tornado = { x: spawnX, y: spawnY, angle: 0, alpha: 0, debris, scale: torScale,
                orbitAngle: startAngle, orbitDir: Math.random() < 0.5 ? 1 : -1 };
  }

  if (!tornado) return;

  // Grow/shrink tornado scale dynamically as wind changes
  const targetScale = isVoidStorm ? 4.50 : isHypercane ? 1.85 : 1.0;
  tornado.scale = (tornado.scale || 1.0) + (targetScale - (tornado.scale || 1.0)) * 0.025;

  const tScale = tornado.scale;
  tornado.angle += isVoidStorm ? 0.28 : isHypercane ? 0.12 : 0.07;

  if (isTornado) {
    tornado.alpha = Math.min(1, tornado.alpha + (isVoidStorm ? 0.055 : isHypercane ? 0.028 : 0.016));

    const orbitSpeed = (isVoidStorm ? 0.034 : isHypercane ? 0.012 : 0.007) * (tornado.orbitDir || 1);
    tornado.orbitAngle = (tornado.orbitAngle || 0) + orbitSpeed;
    const baseRadius  = isVoidStorm ? 120 : tScale > 1.2 ? 260 : 340;
    const orbitRadius = baseRadius + Math.sin(tornado.orbitAngle * 1.7) * (isVoidStorm ? 80 : 120);
    const targetX = player.x + Math.cos(tornado.orbitAngle) * orbitRadius;
    const chaseSpeed = isVoidStorm ? 0.072 : tScale > 1.2 ? 0.030 : 0.018;
    tornado.x += (targetX - tornado.x) * chaseSpeed;
    tornado.y  = baseGroundY(tornado.x);
  } else {
    tornado.alpha = Math.max(0, tornado.alpha - 0.013);
    tornado.x += wind.force * 10;
    tornado.y  = baseGroundY(tornado.x);
  }

  // Update orbiting debris
  const TW_d = 100 * tScale, BW_d = 10 * tScale, TH_d = 185 * tScale;
  for (const d of tornado.debris) {
    d.angle += d.speed;
    const bandW = TW_d * (1 - d.fracH) + BW_d * d.fracH;
    d.x = tornado.x + Math.cos(d.angle) * bandW;
    d.y = tornado.y - TH_d * d.fracH + Math.sin(d.angle * 1.4) * 14 * tScale;
  }

  // Proximity kill — void storm kills through everything, no shelter
  const killRadius = 58 * tScale;
  const sheltered  = !isVoidStorm && player.inHouse && (player.inHouse.type === 'bunker' || !isHypercane);
  if (tornado.alpha > 0.75 && !sheltered) {
    const dist = Math.abs((player.x + player.w / 2) - tornado.x);
    const dangerRadius = killRadius * 2.8;

    if (dist < killRadius) {
      // Only die if the tornado challenge was failed or not triggered
      if (!challenge || challenge.result === 'fail') {
        const s = Math.floor(maxReach / 12);
        if (s > bestScore) bestScore = s;
        deathReason = 'tornado';
        gState = 'dead';
      }
    } else if (dist < dangerRadius && !challenge) {
      // Proximity — spawn escape challenge
      spawnTornadoChallenge();
    }

    // Win: blast player away from tornado
    if (challenge && challenge.result === 'win' && challenge.isTornadoEscape) {
      const escapeDir = (player.x + player.w / 2) < tornado.x ? -1 : 1;
      player.vx += escapeDir * 8;
      // Tornado briefly retreats
      const retreatAngle = tornado.orbitAngle + Math.PI;
      tornado.orbitAngle = retreatAngle;
    }
  }

  if (tornado.alpha <= 0) tornado = null;
}

// ── Freeze update ────────────────────────────────────────
// Rate scales with wind strength — calm is nearly safe, storm is lethal over time.
// Being inside a house warms the player.
function updateFreezing() {
  if (challenge && challenge.result === null) return;
  if (player.inHouse) {
    const warmRate = player.inHouse.type === 'metal' ? 0.0010 : 0.0045;
    freezing = Math.max(0, freezing - warmRate);
    return;
  }
  const tornadoBonus = wind.force < -2.60 ? 0.0085 : wind.force < -1.80 ? 0.00130 : (wind.force < -1.00 || wind.force > 1.00) ? 0.00045 : 0;
  const rate = 0.00008 + wind.strength * 0.00055 + tornadoBonus;
  freezing = Math.min(1, freezing + rate);
  if (freezing >= 1) {
    const s = Math.floor(maxReach / 12);
    if (s > bestScore) bestScore = s;
    deathReason = 'freeze';
    gState = 'dead';
  }
}

// ── Snow update ───────────────────────────────────────────
function updateSnow() {
  const rate = 0.30 + getWindTier() * 0.08 + wind.strength * 0.35;
  if (Math.random() < rate) {
    const size = 0.8 + Math.random() * 2.2;
    snowflakes.push({
      x: cam.x + Math.random() * (W + 60) - 30,
      y: cam.y - 10 + Math.random() * 20,
      vx: wind.force * (1.5 + Math.random() * 2),
      vy: 0.6 + size * 0.45 + Math.random() * 0.7,
      size, alpha: 0.35 + Math.random() * 0.55,
      life: 1, decay: 0.0022 + Math.random() * 0.004,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.022,
    });
  }
  snowflakes = snowflakes.filter(s => {
    s.vx += (wind.force * 3 - s.vx) * 0.04;
    s.x  += s.vx; s.y += s.vy; s.life -= s.decay;
    s.rot = (s.rot || 0) + (s.rotV || 0);
    return s.life > 0 && s.y - cam.y < H + 20;
  });
}

function updateWindDebris() {
  const f = wind.force;
  const str = wind.strength;
  const active = Math.abs(f) >= 0.44 || f <= -0.48;
  if (!active) { windDebris = []; return; }

  const KINDS = ['rock','plank','plank','barrel','roof'];
  const spd = Math.abs(f);
  if (windDebris.length < 10 && Math.random() < 0.10 * str) {
    const fromLeft = f > 0;
    const kind = KINDS[Math.floor(Math.random() * KINDS.length)];
    const spawnX = fromLeft ? cam.x - 80 : cam.x + W + 80;
    const gy = baseGroundY(spawnX);
    // Spawn across a wide vertical range — some near ground, some mid-air, some high
    const heightFrac = Math.random();
    const spawnY = gy - 30 - heightFrac * (H * 0.75);
    // Fast horizontal speed; slight upward kick so they arc, not drop immediately
    const vx = (fromLeft ? 1 : -1) * (spd * 8 + Math.random() * spd * 6);
    const vy = -spd * (1.5 + Math.random() * 3); // launched upward
    windDebris.push({
      x: spawnX, y: spawnY,
      vx, vy,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() < 0.5 ? 1 : -1) * (0.10 + Math.random() * 0.22),
      kind,
      alpha: 0,
    });
  }

  windDebris = windDebris.filter(d => {
    d.vx  += (f * 1.2 - d.vx) * 0.04; // accelerate toward wind speed
    d.vy  += 0.09;                      // very light gravity — stays airborne
    d.x   += d.vx;
    d.y   += d.vy;
    d.rot += d.rotV;
    d.alpha = Math.min(1, d.alpha + 0.08);
    const sx = d.x - cam.x, sy = d.y - cam.y;
    return sx > -140 && sx < W + 140 && sy < H + 80;
  });
}

// ── Main update ───────────────────────────────────────────
function update() {
  frame++;
  const _lf = tornado && tornado.alpha > 0.60 && (frame % 38 === 0 || frame % 55 === 0 || frame % 71 === 0);
  WindAudio.update(wind.strength, wind.force, tornado ? tornado.alpha : 0, freezing, _lf);
  if (gState !== 'playing') return;
  updateWind();
  updatePlayer();
  extendMap();
  trimPlatforms();
  updateSnow();
  updateWindDebris();
  updateHouses();
  updateTornado();
  updateFreezing();
  updateChallenge();

  // Wind streak particles (blizzard streaks in strong wind)
  if (Math.abs(wind.force) > 0.20 && Math.random() < Math.abs(wind.force) * 3) {
    const toLeft = wind.force < 0;
    particles.push({
      x:    toLeft ? cam.x + W + 40 : cam.x - 40,
      y:    cam.y + 30 + Math.random() * (H - 60),
      vx:   (toLeft ? -1 : 1) * (4 + Math.random() * 5) * Math.abs(wind.force) * 2.5,
      vy:   (Math.random() - 0.5) * 0.6,
      len:  18 + Math.random() * 65,
      a:    0.08 + Math.random() * 0.38,
      life: 1, decay: 0.005 + Math.random() * 0.007,
    });
  }
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    const sx = p.x - cam.x;
    return p.life > 0 && sx > -80 && sx < W + 80;
  });
}

// ── Draw helpers ──────────────────────────────────────────
function lrp(a, b, t) {
  t = Math.max(0, Math.min(1, t));
  return [a[0]+(b[0]-a[0])*t|0, a[1]+(b[1]-a[1])*t|0, a[2]+(b[2]-a[2])*t|0];
}
function rgb(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

// ── Draw: Winter sky ──────────────────────────────────────
function drawSky() {
  const s = wind.strength, f = wind.force;
  const isVoid = f < -2.60;
  const voidT  = isVoid ? Math.min(1, (-f - 2.60) / 0.60) : 0; // 0→1 as force drops -2.6→-3.2
  let top, bot;
  if (f > 0.04) {
    top = lrp(C.skyTop,   C.skyTail,   f * 3);
    bot = lrp(C.horizCalm,C.horizTail, f * 3);
  } else {
    top = lrp(C.skyTop,   C.skyStorm,  s * 0.8);
    bot = lrp(C.horizCalm,C.horizStorm,s);
  }
  // Blend toward void storm palette
  if (voidT > 0) {
    top = lrp(top, C.skyVoid,  voidT);
    bot = lrp(bot, C.horizVoid, voidT);
  }
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0,    rgb(top));
  g.addColorStop(0.55, rgb(lrp(top, bot, 0.5)));
  g.addColorStop(0.88, rgb(bot));
  g.addColorStop(1,    rgb(lrp(bot, isVoid ? C.skyVoid : C.skyStorm, 0.4)));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Void storm — pulsing white static veil over entire sky
  if (voidT > 0) {
    const pulse = 0.5 + 0.5 * Math.sin(frame * 0.06);
    ctx.save();
    ctx.globalAlpha = voidT * (0.18 + pulse * 0.10);
    ctx.fillStyle = 'rgba(255,255,255,1)';
    ctx.fillRect(0, 0, W, H);
    // Pale grey glow at horizon
    ctx.globalAlpha = voidT * (0.22 + pulse * 0.12);
    const vg = ctx.createLinearGradient(0, H * 0.55, 0, H);
    vg.addColorStop(0, 'rgba(200,200,200,0)');
    vg.addColorStop(1, 'rgba(240,240,240,0.55)');
    ctx.fillStyle = vg; ctx.fillRect(0, H * 0.55, W, H * 0.45);
    ctx.restore();
  }

  // Stars — fade in calm weather, fade out in storms and tailwind
  const starFade = Math.max(0, 1 - s * 1.2 - (f > 0.04 ? f * 4 : 0));
  if (starFade > 0.02) {
    ctx.save();
    for (let i = 0; i < 80; i++) {
      const px = (i * 7919 + 2039) % 900;
      const py = (i * 3461 +  829) % 240;
      const sz = 0.5 + (i % 4) * 0.32;
      const twinkle = 0.38 + 0.32 * Math.sin(frame * 0.019 + i * 1.73);
      ctx.globalAlpha = twinkle * starFade * 0.62;
      ctx.fillStyle = i % 9 === 0 ? '#ffe8c0' : '#ddeeff';
      ctx.beginPath();
      ctx.arc(px, py, sz, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Moon — crescent upper-right, fades in storms
  const moonFade = Math.max(0, 0.72 - s * 0.55 - (f > 0.04 ? f * 3 : 0));
  if (moonFade > 0.04) {
    const mx = W * 0.82, my = H * 0.11;
    ctx.save();
    ctx.globalAlpha = moonFade;
    const mgrd = ctx.createRadialGradient(mx, my, 0, mx, my, 42);
    mgrd.addColorStop(0, 'rgba(210,218,188,0.14)');
    mgrd.addColorStop(1, 'rgba(210,218,188,0)');
    ctx.fillStyle = mgrd;
    ctx.beginPath(); ctx.arc(mx, my, 42, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e0dac8';
    ctx.beginPath(); ctx.arc(mx, my, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(${top[0]},${top[1]},${top[2]},0.84)`;
    ctx.beginPath(); ctx.arc(mx + 6, my - 1, 11, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

// ── Draw: Mountain silhouette layers ─────────────────────
// Three parallax layers — abs(sin) creates natural peak shapes
function mountainSample(wx, seed) {
  return (
    0.52 * Math.abs(Math.sin(wx * 0.00046 + seed))        +
    0.30 * Math.abs(Math.sin(wx * 0.00098 + seed * 2.1))  +
    0.18 * Math.abs(Math.sin(wx * 0.0022  + seed * 3.8))
  );
}

function drawMountainLayer(px, py, color, amp, baseY, seed) {
  const offX = cam.x * px;
  const offY = cam.y * py;

  // Silhouette fill
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(-5, H + 10);
  for (let sx = -5; sx <= W + 5; sx += 7) {
    const h = mountainSample(sx + offX, seed);
    ctx.lineTo(sx, baseY + offY - h * amp);
  }
  ctx.lineTo(W + 5, H + 10);
  ctx.closePath();
  ctx.fill();

  // Snow cap: gradient overlay whiting out the top 38% of each peak
  const capTop = baseY + offY - amp;
  const capBot = baseY + offY - amp * 0.62;
  const snowG = ctx.createLinearGradient(0, capTop, 0, capBot);
  snowG.addColorStop(0, 'rgba(218,238,255,0.48)');
  snowG.addColorStop(1, 'rgba(218,238,255,0)');
  ctx.fillStyle = snowG;
  ctx.beginPath();
  ctx.moveTo(-5, H + 10);
  for (let sx = -5; sx <= W + 5; sx += 7) {
    const h = mountainSample(sx + offX, seed);
    ctx.lineTo(sx, baseY + offY - h * amp);
  }
  ctx.lineTo(W + 5, H + 10);
  ctx.closePath();
  ctx.fill();
}

function drawMountains() {
  drawMountainLayer(0.04, 0.06, C.mtFar,               235, H * 0.60, 0.0);
  drawMountainLayer(0.13, 0.14, C.mtMid,               178, H * 0.72, 1.6);
  drawMountainLayer(0.26, 0.28, C.mtNear,              130, H * 0.86, 3.3);
  drawMountainLayer(0.42, 0.44, 'rgba(14,28,50,0.72)',  80, H * 0.93, 5.1);
}

// ── Draw: Storm clouds ────────────────────────────────────
function drawClouds() {
  const s = wind.strength;
  if (s < 0.18) return;
  const alpha = Math.min(1, (s - 0.18) / 0.52);
  ctx.save();
  // Clouds drift slowly with wind direction
  const scroll = ((frame * 0.22 + cam.x * 0.038) % (W + 280) + W + 280) % (W + 280);
  const clouds = [
    { ox: 0,   y: 40,  rx: 135, ry: 56 },
    { ox: 210, y: 24,  rx: 108, ry: 46 },
    { ox: 390, y: 46,  rx: 148, ry: 66 },
    { ox: 590, y: 30,  rx: 118, ry: 52 },
    { ox: 765, y: 44,  rx: 130, ry: 58 },
    { ox: 130, y: 74,  rx:  98, ry: 40 },
    { ox: 460, y: 70,  rx: 112, ry: 44 },
    { ox: 690, y: 76,  rx: 104, ry: 42 },
  ];
  for (const c of clouds) {
    const cx = ((c.ox - scroll) % (W + 280) + W + 280) % (W + 280) - 100;
    const cg = ctx.createRadialGradient(cx, c.y, 0, cx, c.y, c.rx);
    cg.addColorStop(0,    `rgba(10,16,30,${(alpha*0.82).toFixed(3)})`);
    cg.addColorStop(0.40, `rgba(14,22,40,${(alpha*0.52).toFixed(3)})`);
    cg.addColorStop(0.72, `rgba(8,14,28,${(alpha*0.20).toFixed(3)})`);
    cg.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(cx, c.y, c.rx, c.ry, 0, 0, Math.PI * 2);
    ctx.fill();
    // Wrap to fill gap at the seam
    if (cx < c.rx) {
      ctx.beginPath();
      ctx.ellipse(cx + W + 280, c.y, c.rx, c.ry, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

// ── Draw: Atmospheric haze band ───────────────────────────
function drawAtmosphere() {
  const offY = cam.y * 0.30;
  const hazeY = H * 0.79 + offY;
  const ha = 0.06 + wind.strength * 0.10;
  const hg = ctx.createLinearGradient(0, hazeY - 18, 0, hazeY + 52);
  hg.addColorStop(0,   'rgba(115,162,208,0)');
  hg.addColorStop(0.35,`rgba(115,162,208,${ha.toFixed(3)})`);
  hg.addColorStop(0.62,`rgba(95,140,192,${(ha*0.5).toFixed(3)})`);
  hg.addColorStop(1,   'rgba(75,118,178,0)');
  ctx.fillStyle = hg;
  ctx.fillRect(0, hazeY - 18, W, 70);
}

// ── Draw: Snow ────────────────────────────────────────────
function drawSnow() {
  ctx.save();
  for (const s of snowflakes) {
    const sx = s.x - cam.x, sy = s.y - cam.y;
    if (sx < -14 || sx > W + 14 || sy < -14 || sy > H + 14) continue;
    const alpha = s.alpha * s.life;

    if (wind.strength > 0.45) {
      // Driven snow — angled dash
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = C.snow;
      ctx.lineWidth   = s.size * 0.65;
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + wind.force * -10 * s.size, sy - s.size);
      ctx.stroke();
    } else if (s.size > 1.5) {
      // Large calm flake — 6-arm crystal
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(sx, sy);
      ctx.rotate(s.rot || 0);
      ctx.strokeStyle = 'rgba(220,240,255,0.88)';
      ctx.lineWidth = 0.7; ctx.lineCap = 'round';
      const r = s.size * 2.7;
      for (let arm = 0; arm < 6; arm++) {
        ctx.save(); ctx.rotate(arm * Math.PI / 3);
        ctx.beginPath(); ctx.moveTo(0, 0);    ctx.lineTo(0, -r);        ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -r*0.42); ctx.lineTo(-r*0.28, -r*0.66); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -r*0.42); ctx.lineTo( r*0.28, -r*0.66); ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    } else if (s.size > 0.9) {
      // Medium flake — 4-arm cross
      ctx.save();
      ctx.globalAlpha = alpha * 0.82;
      ctx.translate(sx, sy); ctx.rotate(s.rot || 0);
      ctx.strokeStyle = 'rgba(210,235,255,0.80)';
      ctx.lineWidth = 0.7; ctx.lineCap = 'round';
      const r = s.size * 1.9;
      for (let arm = 0; arm < 4; arm++) {
        ctx.save(); ctx.rotate(arm * Math.PI / 2);
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -r); ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    } else {
      // Tiny — soft dot
      ctx.globalAlpha = alpha;
      ctx.fillStyle = C.snow;
      ctx.beginPath();
      ctx.arc(sx, sy, s.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

function drawWindDebris() {
  if (!windDebris.length) return;
  ctx.save();
  for (const d of windDebris) {
    const dx = d.x - cam.x, dy = d.y - cam.y;
    ctx.save();
    ctx.translate(dx, dy);
    ctx.rotate(d.rot);
    ctx.globalAlpha = d.alpha * 0.88;

    if (d.kind === 'rock') {
      ctx.fillStyle = '#7a7060';
      ctx.beginPath();
      ctx.moveTo(-7, 4); ctx.lineTo(-5, -8); ctx.lineTo(6, -7);
      ctx.lineTo(8, 3);  ctx.lineTo(3, 8);
      ctx.closePath(); ctx.fill();
      ctx.globalAlpha = d.alpha * 0.35;
      ctx.fillStyle = '#b0a890';
      ctx.beginPath(); ctx.ellipse(-2, -3, 3, 1.5, -0.4, 0, Math.PI*2); ctx.fill();

    } else if (d.kind === 'plank') {
      ctx.fillStyle = '#8a6a3a';
      ctx.fillRect(-20, -3, 40, 6);
      ctx.strokeStyle = '#5a3a0a'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(-14,-3); ctx.lineTo(-14,3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo( 14,-3); ctx.lineTo( 14,3); ctx.stroke();

    } else if (d.kind === 'barrel') {
      ctx.fillStyle = '#6a4a1a';
      ctx.beginPath(); ctx.ellipse(0,-5,6,2.5,0,0,Math.PI*2); ctx.fill();
      ctx.fillRect(-6,-5,12,10);
      ctx.beginPath(); ctx.ellipse(0,5,6,2.5,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#3a2a0a'; ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.ellipse(0,-2,6.5,2,0,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(0, 2,6.5,2,0,0,Math.PI*2); ctx.stroke();

    } else if (d.kind === 'roof') {
      ctx.fillStyle = '#8b3a2a';
      ctx.beginPath();
      ctx.moveTo(0,-10); ctx.lineTo(-16,5); ctx.lineTo(16,5);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#5a1a0a'; ctx.lineWidth = 1;
      for (let ti = -12; ti < 12; ti += 5) {
        ctx.beginPath();
        const ty = 5 - (Math.abs(ti)/16)*15;
        ctx.moveTo(ti, ty); ctx.lineTo(ti+3, ty-4); ctx.stroke();
      }
    }
    ctx.restore();
  }
  ctx.restore();
}

// ── Draw: Ground snow drift ───────────────────────────────
function drawGroundDrift() {
  if (wind.force >= -0.28) return;
  const driftStr = Math.min(1, (-wind.force - 0.28) / 0.62);
  ctx.save();
  ctx.lineCap = 'round';
  for (const p of platforms) {
    const psx = p.x - cam.x, psy = p.y - cam.y;
    if (psx + p.w < -10 || psx > W + 10 || psy < -8 || psy > H + 8) continue;
    const cnt = Math.floor(p.w / 13) + 1;
    for (let d = 0; d < cnt; d++) {
      const spd = 2.2 + (d % 3) * 0.9;
      const phase = (frame * spd + d * 97 + p.x * 0.1) % (p.w + 55);
      const dx = psx + p.w + 28 - phase;
      if (dx < psx - 28 || dx > psx + p.w + 28) continue;
      const dy = psy + (d % 2) * 1.5;
      const len = 7 + (d % 4) * 3;
      ctx.globalAlpha = driftStr * (0.22 + (d % 3) * 0.10);
      ctx.strokeStyle = '#ddeeff';
      ctx.lineWidth = 0.5 + (d % 2) * 0.25;
      ctx.beginPath();
      ctx.moveTo(Math.min(dx, psx + p.w), dy);
      ctx.lineTo(Math.max(dx - len, psx), dy);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ── Draw: Wind streaks ────────────────────────────────────
function drawParticles() {
  const toLeft = wind.force < 0;
  const col = toLeft ? [205,230,252] : [238,212,138];
  for (const p of particles) {
    const sx = p.x - cam.x, sy = p.y - cam.y;
    const ex = sx + p.len * (toLeft ? -1 : 1), ey = sy + p.vy * 9;
    ctx.save();
    const grd = ctx.createLinearGradient(sx, sy, ex, ey);
    const a = p.a * p.life;
    grd.addColorStop(0,    `rgba(${col[0]},${col[1]},${col[2]},0)`);
    grd.addColorStop(0.22, `rgba(${col[0]},${col[1]},${col[2]},${a.toFixed(3)})`);
    grd.addColorStop(0.80, `rgba(${col[0]},${col[1]},${col[2]},${(a*0.35).toFixed(3)})`);
    grd.addColorStop(1,    `rgba(${col[0]},${col[1]},${col[2]},0)`);
    ctx.strokeStyle = grd;
    ctx.lineWidth = 0.9 + wind.strength * 0.8;
    ctx.lineCap = 'butt';
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.restore();
  }
}

// ── Draw: Platforms (snowy rock) ──────────────────────────
function drawTerrain() {
  const gp = platforms.filter(p => p.h > 20).sort((a, b) => a.x - b.x);
  if (!gp.length) return;

  // Group into connected runs
  const segs = [];
  let cur = [gp[0]];
  for (let i = 1; i < gp.length; i++) {
    if (gp[i].x <= gp[i-1].x + gp[i-1].w + 2) cur.push(gp[i]);
    else { segs.push(cur); cur = [gp[i]]; }
  }
  segs.push(cur);

  const bot = H + 22;

  for (const s of segs) {
    const screenL = s[0].x - cam.x;
    const screenR = s[s.length-1].x + s[s.length-1].w - cam.x;
    if (screenR < -10 || screenL > W + 10) continue;

    // Build slope polyline: top-left of each platform → diagonal to next
    const pts = s.map(p => ({ x: p.x - cam.x, y: p.y - cam.y }));
    const last = s[s.length-1];
    pts.push({ x: last.x + last.w - cam.x, y: last.y - cam.y });

    const topY = Math.min(...pts.map(p => p.y));
    const cv = ((s[0].x * 17 + 137) % 7) - 3;
    const r0 = 26 + cv*2, g0 = 42 + cv, b0 = 54 + cv;

    ctx.save();

    // Terrain polygon
    ctx.beginPath();
    ctx.moveTo(pts[0].x, bot);
    ctx.lineTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.lineTo(pts[pts.length-1].x, bot);
    ctx.closePath();

    // Rock body
    const bg = ctx.createLinearGradient(0, topY, 0, bot);
    bg.addColorStop(0,    `rgb(${r0},${g0},${b0})`);
    bg.addColorStop(0.10, `rgb(${r0-8},${g0-10},${b0-6})`);
    bg.addColorStop(1,    `rgb(${8+cv},${14+cv},${22+cv})`);
    ctx.fillStyle = bg;
    ctx.fill();

    // Clip for inner textures
    ctx.clip();

    // Strata
    const sv = (n) => Math.abs(Math.sin((s[0].x * 7 + s[0].y * 3) * 0.005 + n * 1.618));
    const nStrata = Math.min(4, Math.floor((bot - topY) / 28));
    const segW = screenR - screenL;
    for (let st = 0; st < nStrata; st++) {
      const stY = topY + 20 + sv(st*3) * (bot - topY - 30);
      ctx.strokeStyle = `rgba(0,0,0,${0.08 + sv(st*3+1)*0.09})`; ctx.lineWidth = 1 + sv(st*3+2);
      ctx.beginPath(); ctx.moveTo(screenL, stY);
      for (let bx = 0; bx <= segW; bx += 12) ctx.lineTo(screenL + bx, stY + Math.sin((s[0].x + bx) * 0.09 + st) * 2.5);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(100,160,200,0.07)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(screenL, stY - 1);
      for (let bx = 0; bx <= segW; bx += 12) ctx.lineTo(screenL + bx, stY - 1 + Math.sin((s[0].x + bx) * 0.09 + st) * 2.5);
      ctx.stroke();
    }

    // Cracks
    const crR = (n) => Math.abs(Math.sin((s[0].x * 13 + s[0].y * 7) * 0.008 + n * 2.399));
    const nc = Math.min(12, Math.floor(segW / 28) + 2);
    ctx.lineCap = 'round';
    for (let c = 0; c < nc; c++) {
      ctx.strokeStyle = `rgba(0,0,0,${0.12 + crR(c*9+8)*0.12})`; ctx.lineWidth = 0.7;
      const cx = screenL + crR(c*9+1) * segW, cy = topY + 8 + crR(c*9+2) * Math.min(bot - topY - 12, 90);
      const cx2 = cx + crR(c*9+3)*24-12,      cy2 = cy + crR(c*9+4)*11-2;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx2, cy2); ctx.stroke();
      if (crR(c*9+5) > 0.30) {
        ctx.beginPath(); ctx.moveTo(cx2, cy2);
        ctx.lineTo(cx2 + crR(c*9+6)*15-7.5, cy2 + crR(c*9+7)*8); ctx.stroke();
      }
    }

    // Pebbles
    const pr = (n) => Math.abs(Math.sin((s[0].x * 19 + s[0].y * 11) * 0.009 + n * 1.732));
    const np = Math.min(18, Math.floor(segW / 22));
    for (let i = 0; i < np; i++) {
      const px = screenL + 4 + pr(i*5) * (segW - 8), py = topY + 14 + pr(i*5+1) * Math.min(bot - topY - 18, 80);
      const prad = 1.2 + pr(i*5+2)*2.8;
      ctx.fillStyle = `rgba(${pr(i*5+3) > 0.5 ? 55 : 12},${pr(i*5+3) > 0.5 ? 85 : 22},${pr(i*5+3) > 0.5 ? 105 : 32},0.30)`;
      ctx.beginPath(); ctx.ellipse(px, py, prad, prad*(0.55+pr(i*5+4)*0.5), pr(i*5+4)*Math.PI, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(140,200,240,0.13)'; ctx.lineWidth = 0.5; ctx.stroke();
    }

    ctx.restore();

    // Snow cap stroked along slope
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.strokeStyle = '#d8eef8'; ctx.lineWidth = 5; ctx.stroke();

    // Snow depth fade below cap
    const sfg = ctx.createLinearGradient(0, topY, 0, topY + 18);
    sfg.addColorStop(0, 'rgba(210,235,250,0.50)'); sfg.addColorStop(1, 'rgba(210,235,250,0)');
    ctx.strokeStyle = sfg; ctx.lineWidth = 14; ctx.stroke();

    // Snow sparkles
    const sr = (n) => Math.abs(Math.sin((s[0].x * 31 + s[0].y * 5) * 0.011 + n * 2.718));
    const ns = Math.min(8, Math.floor(segW / 35));
    ctx.fillStyle = 'rgba(255,255,255,0.90)';
    for (let i = 0; i < ns; i++) {
      const sx2 = screenL + 4 + sr(i*3) * (segW - 8);
      const t = (sx2 - pts[0].x) / Math.max(1, pts[pts.length-1].x - pts[0].x);
      const idx = Math.min(pts.length-2, Math.floor(t * (pts.length-1)));
      const lt = (sx2 - pts[idx].x) / Math.max(1, pts[idx+1].x - pts[idx].x);
      const sy2 = pts[idx].y + (pts[idx+1].y - pts[idx].y) * lt - sr(i*3+1)*3;
      ctx.beginPath(); ctx.arc(sx2, sy2, 0.5 + sr(i*3+2)*0.9, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

function drawSnowman(x, y) {
  const lean = Math.max(-0.28, Math.min(0.28, wind.force * 0.14));
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(lean);

  // Bottom ball
  ctx.fillStyle = '#e8f4fc'; ctx.strokeStyle = 'rgba(140,190,220,0.5)'; ctx.lineWidth = 0.6;
  ctx.beginPath(); ctx.arc(0, -7, 7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // Middle ball
  ctx.beginPath(); ctx.arc(0, -18, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // Head
  ctx.beginPath(); ctx.arc(0, -27, 3.8, 0, Math.PI*2); ctx.fill(); ctx.stroke();

  // Eyes
  ctx.fillStyle = '#152030';
  ctx.beginPath(); ctx.arc(-1.3, -28.2, 0.65, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(1.3,  -28.2, 0.65, 0, Math.PI*2); ctx.fill();

  // Carrot nose
  ctx.fillStyle = '#e06818';
  ctx.beginPath(); ctx.moveTo(3.5, -27.3); ctx.lineTo(0, -27.8); ctx.lineTo(0, -26.8); ctx.closePath(); ctx.fill();

  // Mouth (small dots)
  ctx.fillStyle = '#152030';
  for (let m = -1; m <= 1; m++) {
    ctx.beginPath(); ctx.arc(m * 1.1, -25.8 + Math.abs(m) * 0.4, 0.45, 0, Math.PI*2); ctx.fill();
  }

  // Buttons on middle ball
  for (let b = 0; b < 3; b++) {
    ctx.beginPath(); ctx.arc(0, -20.5 + b * 2.5, 0.55, 0, Math.PI*2); ctx.fill();
  }

  // Stick arms
  ctx.strokeStyle = '#5a3a18'; ctx.lineWidth = 1.1; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-5, -19); ctx.lineTo(-12, -14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-12, -14); ctx.lineTo(-14, -11.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-12, -14); ctx.lineTo(-14, -15.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5, -19); ctx.lineTo(12, -14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(12, -14); ctx.lineTo(14, -11.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(12, -14); ctx.lineTo(14, -15.5); ctx.stroke();

  // Hat
  ctx.fillStyle = '#152030';
  ctx.fillRect(-4.5, -35, 9, 8);    // hat body
  ctx.fillRect(-6.5, -27.5, 13, 2); // brim
  // Hat band
  ctx.fillStyle = '#8b1a1a';
  ctx.fillRect(-4.5, -29.5, 9, 1.5);

  // Scarf
  ctx.strokeStyle = '#cc3030'; ctx.lineWidth = 2; ctx.lineCap = 'butt';
  ctx.beginPath(); ctx.arc(0, -23, 5.2, -0.7, Math.PI + 0.7); ctx.stroke();
  ctx.strokeStyle = '#ee5050'; ctx.lineWidth = 0.7;
  ctx.beginPath(); ctx.arc(0, -23, 5.2, -0.7, Math.PI + 0.7); ctx.stroke();
  // Scarf tail
  ctx.fillStyle = '#cc3030';
  ctx.fillRect(4, -23.8, 1.8, 5);

  ctx.restore();
}

function drawPineTree(x, y) {
  const lean = Math.max(-0.18, Math.min(0.18, wind.force * 0.08));
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(lean);

  // Trunk
  ctx.fillStyle = '#4a2e10';
  ctx.fillRect(-2, -9, 4, 9);

  // Three layered triangles
  const layers = [
    { y: -8,  hw: 14, h: 11 },
    { y: -16, hw: 10, h: 10 },
    { y: -23, hw:  7, h:  9 },
  ];
  for (const l of layers) {
    // Dark green body
    ctx.fillStyle = '#183018';
    ctx.beginPath(); ctx.moveTo(0, l.y - l.h); ctx.lineTo(-l.hw, l.y); ctx.lineTo(l.hw, l.y); ctx.closePath(); ctx.fill();
    // Lighter inner face
    ctx.fillStyle = '#285028';
    ctx.beginPath(); ctx.moveTo(0, l.y - l.h + 2); ctx.lineTo(-l.hw + 3, l.y); ctx.lineTo(l.hw - 3, l.y); ctx.closePath(); ctx.fill();
    // Snow on top half of each layer
    ctx.fillStyle = 'rgba(216,238,252,0.82)';
    ctx.beginPath(); ctx.moveTo(0, l.y - l.h); ctx.lineTo(-l.hw * 0.45, l.y - l.h * 0.45); ctx.lineTo(l.hw * 0.45, l.y - l.h * 0.45); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawDecorations() {
  for (const d of decorations) {
    const sx = d.x - cam.x, sy = d.y - cam.y;
    if (sx < -80 || sx > W + 80 || sy > H + 10) continue;
    if (d.type === 'snowman') drawSnowman(sx, sy);
    else drawPineTree(sx, sy);
  }
}

function drawPlatform(p) {
  const sx = p.x - cam.x, sy = p.y - cam.y;
  if (sx + p.w < -4 || sx > W + 4 || sy > H + 4) return;
  const ground = p.h > 20;
  const drawH  = Math.min(p.h, Math.max(4, H - sy + 20));

  // Per-chunk color variation keeps adjacent platforms visually distinct
  const cv = ((p.x * 17 + 137) % 7) - 3;   // −3..+3
  const r0 = 26 + cv * 2, g0 = 42 + cv, b0 = 54 + cv;

  // Rock body
  const bg = ctx.createLinearGradient(0, sy, 0, sy + drawH);
  if (ground) {
    bg.addColorStop(0,    `rgb(${r0},${g0},${b0})`);
    bg.addColorStop(0.12, `rgb(${r0-8},${g0-10},${b0-6})`);
    bg.addColorStop(1,    `rgb(${8+cv},${14+cv},${22+cv})`);
  } else {
    bg.addColorStop(0, `rgb(${34+cv*2},${56+cv},${74+cv})`);
    bg.addColorStop(1, '#0f1e2c');
  }
  ctx.fillStyle = bg;
  ctx.fillRect(sx, sy, p.w, drawH);

  // Rock strata — wavy geological layer lines
  ctx.save();
  const sv = (n) => Math.abs(Math.sin((p.x * 7 + p.y * 3) * 0.005 + n * 1.618));
  const nStrata = Math.min(3, Math.floor(drawH / 28));
  for (let s = 0; s < nStrata; s++) {
    const stY = sy + 18 + sv(s * 3) * Math.min(drawH - 26, 70);
    ctx.strokeStyle = `rgba(0,0,0,${0.09 + sv(s*3+1)*0.09})`; ctx.lineWidth = 1 + sv(s*3+2);
    ctx.beginPath(); ctx.moveTo(sx, stY);
    for (let bx = 0; bx <= p.w; bx += 10)
      ctx.lineTo(sx + bx, stY + Math.sin((p.x + bx) * 0.09 + s) * 2.5);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(100,160,200,0.07)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(sx, stY - 1);
    for (let bx = 0; bx <= p.w; bx += 10)
      ctx.lineTo(sx + bx, stY - 1 + Math.sin((p.x + bx) * 0.09 + s) * 2.5);
    ctx.stroke();
  }
  ctx.restore();

  // Rock crack texture — more cracks with deeper branching
  ctx.save();
  ctx.lineCap = 'round';
  const crR = (n) => Math.abs(Math.sin((p.x * 13 + p.y * 7) * 0.008 + n * 2.399));
  const nc = Math.min(9, Math.floor(p.w / 28) + 2);
  for (let c = 0; c < nc; c++) {
    const alpha = 0.12 + crR(c*9+8) * 0.12;
    ctx.strokeStyle = `rgba(0,0,0,${alpha})`; ctx.lineWidth = 0.7;
    const cx  = sx + crR(c*9+1) * p.w;
    const cy  = sy + 7 + crR(c*9+2) * Math.min(drawH - 10, 85);
    const cx2 = cx + crR(c*9+3) * 24 - 12;
    const cy2 = cy + crR(c*9+4) * 11 - 2;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx2, cy2); ctx.stroke();
    if (crR(c*9+5) > 0.30) {
      const cx3 = cx2 + crR(c*9+6)*15 - 7.5;
      const cy3 = cy2 + crR(c*9+7)*8;
      ctx.beginPath(); ctx.moveTo(cx2, cy2); ctx.lineTo(cx3, cy3); ctx.stroke();
      if (crR(c*9+9) > 0.50) {
        ctx.lineWidth = 0.45;
        ctx.beginPath(); ctx.moveTo(cx3, cy3);
        ctx.lineTo(cx3 + crR(c*9+10)*9 - 4.5, cy3 + crR(c*9+11)*5); ctx.stroke();
      }
    }
  }
  ctx.restore();

  // Embedded pebbles/stones
  ctx.save();
  const pr = (n) => Math.abs(Math.sin((p.x * 19 + p.y * 11) * 0.009 + n * 1.732));
  const np = Math.min(14, Math.floor(p.w / 22));
  for (let i = 0; i < np; i++) {
    const px2 = sx + 3 + pr(i*5) * (p.w - 6);
    const py2 = sy + 12 + pr(i*5+1) * Math.min(drawH - 16, 75);
    const pr2 = 1.2 + pr(i*5+2) * 2.8;
    const pa  = pr(i*5+3);
    ctx.fillStyle = `rgba(${pa > 0.5 ? 55 : 12},${pa > 0.5 ? 85 : 22},${pa > 0.5 ? 105 : 32},0.30)`;
    ctx.beginPath();
    ctx.ellipse(px2, py2, pr2, pr2 * (0.55 + pr(i*5+4)*0.5), pr(i*5+4)*Math.PI, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(140,200,240,0.13)'; ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  ctx.restore();

  // Snow cap — bumpy surface
  const snowH = ground ? 5 : 4;
  const bumpSeed = (p.x * 23 + 41) * 0.007;
  ctx.save();
  ctx.fillStyle = ground ? '#d8eef8' : '#e4f4ff';
  ctx.beginPath();
  ctx.moveTo(sx, sy + snowH);
  for (let bx = 0; bx <= p.w; bx += 5)
    ctx.lineTo(sx + bx, sy + Math.abs(Math.sin(bumpSeed + bx * 0.20)) * 2.8);
  ctx.lineTo(sx + p.w, sy + snowH);
  ctx.closePath(); ctx.fill();

  // Snow sparkles
  ctx.fillStyle = 'rgba(255,255,255,0.90)';
  const ns = Math.min(7, Math.floor(p.w / 35));
  const sr = (n) => Math.abs(Math.sin((p.x * 31 + p.y * 5) * 0.011 + n * 2.718));
  for (let i = 0; i < ns; i++) {
    ctx.beginPath();
    ctx.arc(sx + 4 + sr(i*3)*(p.w-8), sy + sr(i*3+1)*2.5, 0.5 + sr(i*3+2)*0.9, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // Snow depth fade
  const sg = ctx.createLinearGradient(0, sy + snowH, 0, sy + snowH + 14);
  sg.addColorStop(0, 'rgba(210,235,250,0.50)');
  sg.addColorStop(1, 'rgba(210,235,250,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(sx, sy + snowH, p.w, 14);

  // Lit left face
  ctx.fillStyle = 'rgba(140,200,240,0.09)';
  ctx.fillRect(sx, sy + snowH, 3, drawH - snowH);

  if (ground) {
    // Right cliff-face shadow — the key visual separator between chunks
    const cg = ctx.createLinearGradient(sx + p.w - 20, sy, sx + p.w, sy);
    cg.addColorStop(0, 'rgba(0,0,0,0)');
    cg.addColorStop(1, 'rgba(0,0,0,0.58)');
    ctx.fillStyle = cg;
    ctx.fillRect(sx + p.w - 20, sy + snowH, 20, drawH - snowH);
    // Hard pixel edge
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(sx + p.w - 2, sy, 2, drawH);

    // Vertical rock striations near cliff edge
    ctx.save();
    const vseed = (p.x * 41 + 7) * 0.003;
    const nv = Math.min(5, Math.floor(p.w / 70));
    for (let v = 0; v < nv; v++) {
      const vx = sx + Math.abs(Math.sin(vseed + v * 2.1)) * p.w;
      const vy1 = sy + snowH + 4;
      const vy2 = vy1 + 14 + Math.abs(Math.sin(vseed + v * 3.3)) * 28;
      const vg = ctx.createLinearGradient(vx - 2, 0, vx + 3, 0);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(0.5, 'rgba(0,0,0,0.13)');
      vg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = vg;
      ctx.fillRect(vx - 2, vy1, 5, vy2 - vy1);
    }
    ctx.restore();
  } else {
    // Icicles on floating platforms
    const irR = (n) => Math.abs(Math.sin((p.x * 17 + p.y * 11) * 0.006 + n * 3.141));
    const cnt = Math.floor((p.w - 8) / 9);
    for (let i = 0; i < cnt; i++) {
      const ix = sx + 4 + i * 9 + irR(i*4) * 5;
      if (ix < sx || ix > sx + p.w || ix < -4 || ix > W + 4) continue;
      const ilen = 4 + irR(i*4+1) * 10;
      const iw   = 1.4 + irR(i*4+2) * 1.8;
      const ig   = ctx.createLinearGradient(ix, sy + drawH, ix, sy + drawH + ilen);
      ig.addColorStop(0,   'rgba(185,228,248,0.88)');
      ig.addColorStop(0.7, 'rgba(200,238,255,0.55)');
      ig.addColorStop(1,   'rgba(215,245,255,0)');
      ctx.fillStyle = ig;
      ctx.beginPath();
      ctx.moveTo(ix - iw, sy + drawH);
      ctx.lineTo(ix + iw, sy + drawH);
      ctx.lineTo(ix, sy + drawH + ilen);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(240,252,255,0.58)';
      ctx.fillRect(ix - 0.4, sy + drawH, 0.8, ilen * 0.44);
    }
  }
}

// ── Draw: Stickman in window (when sheltered) ────────────
function drawStickmanInWindow() {
  const h = player.inHouse;
  if (!h || h.flying || h.alpha < 0.05) return;

  const hw = h.w / 2; // 55
  const BH = 72;
  const cx = h.x - cam.x + hw;
  const cy = h.y - cam.y + 84;

  // Window bounds depend on house type
  // Normal: fillRect(-hw+10, -BH/2+14, 20, 16)  → screen (cx-45, cy-22, 20, 16)
  // Metal : fillRect(-hw+10, -BH/2+14, 22,  8)  → screen (cx-45, cy-22, 22,  8)
  const isMetal = h.type === 'metal';
  const winX = cx - hw + 10;
  const winY = cy - BH / 2 + 14;
  const winW = isMetal ? 22 : 20;
  const winH = isMetal ? 8  : 16;

  if (winX + winW < 0 || winX > W || winY + winH < 0 || winY > H) return;

  ctx.save();
  ctx.beginPath();
  ctx.rect(winX, winY, winW, winH);
  ctx.clip();

  const ox = winX + winW / 2;
  const oy = winY + winH;          // feet at window sill
  const bob = Math.sin(frame * 0.05) * 0.6;

  ctx.globalAlpha = h.alpha;
  ctx.strokeStyle = '#3a1204';
  ctx.fillStyle   = '#3a1204';
  ctx.lineWidth   = 1.8;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  // Legs
  ctx.beginPath(); ctx.moveTo(ox, oy - 5 + bob); ctx.lineTo(ox - 3, oy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox, oy - 5 + bob); ctx.lineTo(ox + 3, oy); ctx.stroke();
  // Body
  ctx.beginPath(); ctx.moveTo(ox, oy - 12 + bob); ctx.lineTo(ox, oy - 5 + bob); ctx.stroke();
  // Arms (relaxed, hanging)
  const armSway = Math.sin(frame * 0.04) * 0.15;
  ctx.save(); ctx.translate(ox, oy - 10 + bob); ctx.rotate(-0.35 + armSway);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-5, 4); ctx.stroke(); ctx.restore();
  ctx.save(); ctx.translate(ox, oy - 10 + bob); ctx.rotate(0.35 - armSway);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(5, 4); ctx.stroke(); ctx.restore();
  // Head
  ctx.beginPath(); ctx.arc(ox, oy - 15.5 + bob, 3.2, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ── Draw: Stickman ────────────────────────────────────────
function drawStickman() {
  if (player.inHouse) { drawStickmanInWindow(); return; }
  const sx  = (player.x - cam.x + player.w / 2) | 0;
  const sy  = (player.y - cam.y + player.h / 2) | 0;
  const air = !player.onGround;
  const f   = player.facing;

  const run = player.sprinting && !air;

  ctx.save();
  ctx.translate(sx, sy);
  // Wind tilt + extra forward lean when sprinting
  ctx.rotate((wind.force * -13 * (air ? 1.6 : 0.7) + (run ? -9 : 0)) * Math.PI / 180);
  if (f < 0) ctx.scale(-1, 1);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  // Ground shadow (wider when sprinting)
  if (!air) {
    ctx.save(); ctx.globalAlpha = 0.12; ctx.fillStyle = '#000';
    ctx.scale(1, 0.22);
    ctx.beginPath(); ctx.ellipse(0, 110, run ? 17 : 14, 6, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  const moving = Math.abs(player.vx) > 0.5 && player.onGround;
  const phase  = moving ? (player.walkF / 6) * Math.PI * 2 : 0;
  const bob    = moving ? Math.abs(Math.sin(phase * 2)) * (run ? 2.8 : 1.6) : 0;

  // Body anchor points (Y, positive = down from origin)
  const NY = -11 - bob * (run ? 0.5 : 0.3);   // neck
  const SY =  -4 + bob * (run ? 0.5 : 0.3);   // shoulders
  const HY =   7 + bob * (run ? 0.7 : 0.5);   // hips

  // Two-segment limb helper — a1: upper angle from +Y axis (positive = forward/+x)
  //                            a2: bend added to a1 for lower segment direction
  const seg = (ox, oy, a1, l1, a2, l2, lw) => {
    ctx.lineWidth = lw;
    const jx = ox + Math.sin(a1) * l1,       jy = oy + Math.cos(a1) * l1;
    const ex = jx + Math.sin(a1 + a2) * l2,  ey = jy + Math.cos(a1 + a2) * l2;
    ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(jx, jy); ctx.lineTo(ex, ey); ctx.stroke();
  };

  ctx.strokeStyle = C.text;
  const UL = 10, LL = 9;   // upper/lower leg lengths
  const UA =  9, LA = 8;   // upper/lower arm lengths

  // ── Leg angles ─────────────────────────────────────────────
  let rH, lH, rK, lK;
  if (air) {
    rH =  0.28; rK = -0.85;
    lH = -0.08; lK = -0.72;
  } else if (moving && run) {
    // Running: wide hip swing + aggressive heel-kick
    rH =  Math.sin(phase)           * 0.80;
    lH =  Math.sin(phase + Math.PI) * 0.80;
    rK = -Math.max(0, -Math.sin(phase))           * 1.05;
    lK = -Math.max(0, -Math.sin(phase + Math.PI)) * 1.05;
  } else if (moving) {
    // Walking: moderate swing
    rH =  Math.sin(phase)           * 0.52;
    lH =  Math.sin(phase + Math.PI) * 0.52;
    rK = -Math.max(0, -Math.sin(phase))           * 0.74;
    lK = -Math.max(0, -Math.sin(phase + Math.PI)) * 0.74;
  } else {
    rH =  0.04; rK = -0.09;
    lH = -0.04; lK = -0.09;
  }

  // ── Arm angles ─────────────────────────────────────────────
  let rA, lA, rE, lE;
  if (air) {
    rA = -0.70; rE = 0.60;
    lA =  0.45; lE = 0.50;
  } else if (moving && run) {
    // Running: tight pumping arms, elbows sharply bent
    rA = Math.sin(phase + Math.PI) * 0.70 - 0.05;
    lA = Math.sin(phase)           * 0.70 + 0.15;
    rE = 0.40 + Math.abs(Math.sin(phase + Math.PI)) * 0.42;
    lE = 0.40 + Math.abs(Math.sin(phase))           * 0.42;
  } else if (moving) {
    // Walking: relaxed swing
    rA = Math.sin(phase + Math.PI) * 0.38 - 0.15;
    lA = Math.sin(phase)           * 0.38 + 0.30;
    rE = 0.16 + Math.abs(Math.sin(phase + Math.PI)) * 0.22;
    lE = 0.16 + Math.abs(Math.sin(phase))           * 0.22;
  } else {
    rA = -0.15; rE = 0.18;
    lA =  0.30; lE = 0.18;
  }

  // Draw order: back side → spine → front side  (creates depth illusion)
  seg(0, HY, rH, UL, rK, LL, 2.4);   // right leg  (back)
  seg(0, SY, rA, UA, rE, LA, 2.3);   // right arm  (back)

  ctx.lineWidth = 2.9;
  ctx.beginPath(); ctx.moveTo(0, NY); ctx.lineTo(0, HY); ctx.stroke(); // spine

  seg(0, HY, lH, UL, lK, LL, 2.4);   // left leg   (front)
  seg(0, SY, lA, UA, lE, LA, 2.3);   // left arm   (front)

  // Torus head — donut ring sitting above the neck
  const HCY = NY - 8;   // head centre
  ctx.fillStyle = C.text;
  ctx.beginPath();
  ctx.arc(0, HCY, 8,   0, Math.PI * 2, false);  // outer disc
  ctx.arc(0, HCY, 3.5, 0, Math.PI * 2, true);   // hole punched CCW
  ctx.fill('evenodd');
  ctx.strokeStyle = C.text; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.arc(0, HCY, 8,   0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, HCY, 3.5, 0, Math.PI * 2); ctx.stroke();

  // Breath puff — small white wisp from mouth area, brighter when freezing
  const bT  = (frame % 52) / 52;
  const bOp = Math.max(0, 0.20 - bT * 0.20) * (0.45 + freezing * 0.50);
  if (bOp > 0.005) {
    ctx.globalAlpha = bOp;
    ctx.fillStyle = '#c8e2f4';
    ctx.beginPath();
    ctx.arc(9 + bT * 6, HCY + 2 - bT * 2, 1.5 + bT * 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Scarf — blows in world wind direction, anchored at neck
  const scarfLocal = wind.force * 16 * f;
  ctx.strokeStyle = '#cc2020'; ctx.lineWidth = 3.5;
  ctx.beginPath(); ctx.moveTo(-2, NY);
  ctx.quadraticCurveTo(scarfLocal * 0.5, NY + 3, scarfLocal, NY + 9);
  ctx.stroke();

  ctx.restore();
}

// ── Draw: Houses ─────────────────────────────────────────
function drawHouse(h) {
  const isBunker = h.type === 'bunker';
  const cx = h.x - cam.x + h.w / 2;
  const cy = h.y - cam.y + (isBunker ? 120 : 84);
  if (cx < -200 || cx > W + 200 || cy < -200 || cy > H + 200) return;

  const RH = isBunker ? 28 : 48;
  const BH = isBunker ? 110 : 72;
  const hw = h.w / 2;

  const isStorm = wind.force < -0.68;
  // Bunkers and metal bunkers never shake
  const shaking = isStorm && !h.flying && h.flyTimer < 60 && h.type === 'normal';
  const shakeX  = shaking ? Math.sin(frame * 0.8) * 4 : 0;

  ctx.save();
  ctx.translate(cx + shakeX, cy);
  ctx.rotate(h.angle);
  ctx.globalAlpha = h.alpha;

  const warm    = player.inHouse === h;
  const isMetal = h.type === 'metal';

  if (isBunker) {
    // ══════════════════════════════════════════════════
    // ── FORTRESS BUNKER ───────────────────────────────
    // ══════════════════════════════════════════════════
    // Layout (origin = cx,cy):
    //   Roof slab top  : y = -BH/2 - RH  = -83
    //   Wall top       : y = -BH/2        = -55
    //   Wall bottom    : y =  BH/2        =  55
    //   Foundation     : y =  BH/2..+12
    //   Tower tops     : y = -BH/2 - RH - 30 (well above crenellations)

    const roofTop   = -BH/2 - RH;       // -83
    const wallTop   = -BH/2;            // -55
    const wallBot   = BH/2;             //  55
    const towerW    = 28;               // full width of each corner tower
    const towerH    = BH + RH + 22;     // taller than the main roof
    const towerTop  = wallTop - RH - 22;
    const crenH     = 14, crenW = 12, crenGap = 9;

    // ── Warm/occupied glow ────────────────────────────
    if (warm) {
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, hw * 3.0);
      grd.addColorStop(0, 'rgba(255,160,50,0.28)');
      grd.addColorStop(0.5,'rgba(255,140,30,0.10)');
      grd.addColorStop(1, 'rgba(255,120,20,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(-hw * 3, towerTop - 30, hw * 6, towerH + 80);
    }

    // ═══════════════════════════════════════════════════
    // LAYER 1 — DEEP SHADOW / FOUNDATION
    // ═══════════════════════════════════════════════════

    // Wide concrete foundation slab
    ctx.fillStyle = '#1e1c16';
    ctx.fillRect(-hw - 14, wallBot, h.w + 28, 14);
    // Foundation bevelled top edge
    ctx.fillStyle = '#2e2c24';
    ctx.fillRect(-hw - 14, wallBot, h.w + 28, 4);
    // Foundation drain slots
    ctx.fillStyle = '#0e0c0a';
    for (let di = 0; di < 5; di++) {
      const dx = -hw + 18 + di * (h.w - 16) / 4;
      ctx.fillRect(dx - 4, wallBot + 4, 8, 5);
      // Grate bars
      ctx.strokeStyle = '#3a3828'; ctx.lineWidth = 0.8;
      for (let gi = 0; gi < 3; gi++) {
        ctx.beginPath(); ctx.moveTo(dx - 3 + gi * 3, wallBot + 4); ctx.lineTo(dx - 3 + gi * 3, wallBot + 9); ctx.stroke();
      }
    }

    // ═══════════════════════════════════════════════════
    // LAYER 2 — CORNER GUARD TOWERS
    // ═══════════════════════════════════════════════════
    for (const side of [-1, 1]) {
      const tx = side > 0 ? hw - towerW + 2 : -hw - 2;

      // Tower body — slightly darker than main wall
      const tGrd = ctx.createLinearGradient(tx, 0, tx + towerW, 0);
      tGrd.addColorStop(0,   side > 0 ? '#383630' : '#424038');
      tGrd.addColorStop(0.5, side > 0 ? '#3e3c34' : '#3e3c34');
      tGrd.addColorStop(1,   side > 0 ? '#2c2a22' : '#32302a');
      ctx.fillStyle = tGrd;
      ctx.fillRect(tx, towerTop, towerW, towerH);

      // Horizontal masonry courses on tower
      ctx.strokeStyle = 'rgba(0,0,0,0.32)'; ctx.lineWidth = 1.2;
      const courses = 8;
      for (let co = 1; co < courses; co++) {
        const cy3 = towerTop + co * (towerH / courses);
        ctx.beginPath(); ctx.moveTo(tx, cy3); ctx.lineTo(tx + towerW, cy3); ctx.stroke();
      }
      // Vertical stone joints (alternating per course)
      for (let co = 0; co < courses; co++) {
        const cy3 = towerTop + co * (towerH / courses);
        const jx = tx + (co % 2 === 0 ? towerW * 0.5 : towerW * 0.33);
        ctx.beginPath(); ctx.moveTo(jx, cy3); ctx.lineTo(jx, cy3 + towerH / courses); ctx.stroke();
      }

      // Tower narrow window slit (mid-height)
      const slitY = towerTop + towerH * 0.38;
      ctx.fillStyle = '#0a0806';
      ctx.fillRect(tx + towerW * 0.32, slitY, towerW * 0.36, 18);
      ctx.fillStyle = warm ? '#bb8820' : '#080604';
      ctx.fillRect(tx + towerW * 0.36, slitY + 2, towerW * 0.28, 14);
      // Cross bars on slit
      ctx.strokeStyle = '#2a2420'; ctx.lineWidth = 1.2;
      const slitMx = tx + towerW * 0.5;
      ctx.beginPath(); ctx.moveTo(slitMx, slitY + 2); ctx.lineTo(slitMx, slitY + 16); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(tx + towerW * 0.36, slitY + 9); ctx.lineTo(tx + towerW * 0.64, slitY + 9); ctx.stroke();

      // Second lower slit
      const slit2Y = towerTop + towerH * 0.65;
      ctx.fillStyle = '#0a0806';
      ctx.fillRect(tx + towerW * 0.32, slit2Y, towerW * 0.36, 14);
      ctx.fillStyle = warm ? '#bb8820' : '#080604';
      ctx.fillRect(tx + towerW * 0.36, slit2Y + 2, towerW * 0.28, 10);

      // Tower top parapet — crenellated
      const tCrenCount = 3;
      const tCrenW = Math.floor(towerW / (tCrenCount * 2 - 1));
      for (let ci = 0; ci < tCrenCount; ci++) {
        const cx3 = tx + ci * (tCrenW + tCrenW * 0.8);
        ctx.fillStyle = '#2e2c24';
        ctx.fillRect(cx3, towerTop - crenH, tCrenW, crenH);
        // Merlon snow cap
        ctx.fillStyle = 'rgba(218,240,255,0.65)';
        ctx.fillRect(cx3, towerTop - crenH, tCrenW, 4);
      }
      // Tower roof slab (between crenellations)
      ctx.fillStyle = '#1e1c16';
      ctx.fillRect(tx - 1, towerTop - 4, towerW + 2, 5);
      // Snow on tower roof
      ctx.fillStyle = 'rgba(218,240,255,0.55)';
      ctx.fillRect(tx, towerTop - 4, towerW, 3);

      // Tower lit face (bright side)
      ctx.fillStyle = side > 0 ? 'rgba(0,0,0,0.18)' : 'rgba(255,255,255,0.04)';
      ctx.fillRect(tx, towerTop, towerW, towerH);

      // Searchlight on right tower — sweeps slowly
      if (side > 0) {
        const lightAngle = Math.sin(frame * 0.018) * 0.55 - 0.2;
        const lx = tx + towerW * 0.5;
        const ly = towerTop - crenH - 4;
        // Light beam (fan shape)
        const beamAlpha = 0.10 + Math.abs(Math.sin(frame * 0.018)) * 0.08;
        ctx.save();
        ctx.globalAlpha = h.alpha * beamAlpha;
        const beamGrd = ctx.createConicalGradient
          ? null : null; // fallback: triangle
        ctx.fillStyle = 'rgba(255,240,180,0.55)';
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(lx + Math.cos(lightAngle - 0.22) * 120, ly + Math.sin(lightAngle - 0.22) * 120);
        ctx.lineTo(lx + Math.cos(lightAngle + 0.22) * 120, ly + Math.sin(lightAngle + 0.22) * 120);
        ctx.closePath(); ctx.fill();
        ctx.globalAlpha = h.alpha;
        ctx.restore();
        // Searchlight housing
        ctx.fillStyle = '#3a3830';
        ctx.beginPath(); ctx.arc(lx, ly, 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#e8d880';
        ctx.beginPath(); ctx.arc(lx, ly, 3, 0, Math.PI * 2); ctx.fill();
      }
    }

    // ═══════════════════════════════════════════════════
    // LAYER 3 — MAIN WALL BODY
    // ═══════════════════════════════════════════════════

    // Main wall (between the two towers)
    const wallGrd = ctx.createLinearGradient(-hw, 0, hw, 0);
    wallGrd.addColorStop(0,    '#424038');
    wallGrd.addColorStop(0.06, '#4e4c42');
    wallGrd.addColorStop(0.50, '#484640');
    wallGrd.addColorStop(0.94, '#3e3c34');
    wallGrd.addColorStop(1,    '#302e28');
    ctx.fillStyle = wallGrd;
    ctx.fillRect(-hw, wallTop, h.w, BH);

    // Concrete block courses — 6 horizontal seams
    ctx.strokeStyle = 'rgba(0,0,0,0.30)'; ctx.lineWidth = 1.4;
    const courses = 6;
    for (let sl = 1; sl < courses; sl++) {
      const sy2 = wallTop + sl * (BH / courses);
      ctx.beginPath(); ctx.moveTo(-hw, sy2); ctx.lineTo(hw, sy2); ctx.stroke();
    }
    // Staggered vertical joints per course
    ctx.strokeStyle = 'rgba(0,0,0,0.22)'; ctx.lineWidth = 1;
    for (let sl = 0; sl < courses; sl++) {
      const rowTop = wallTop + sl * (BH / courses);
      const cols = sl % 2 === 0 ? 4 : 3;
      for (let vc = 1; vc < cols; vc++) {
        const vx2 = -hw + vc * (h.w / cols);
        ctx.beginPath(); ctx.moveTo(vx2, rowTop); ctx.lineTo(vx2, rowTop + BH / courses); ctx.stroke();
      }
    }

    // Concrete surface imperfections — darker stain patches
    ctx.fillStyle = 'rgba(0,0,0,0.09)';
    ctx.fillRect(-hw + 28, wallTop + 10, 18, 14);
    ctx.fillRect(hw  - 52, wallTop + 38, 20, 20);
    ctx.fillRect(-hw + 60, wallTop + 60, 14, 16);
    // Hairline cracks
    ctx.strokeStyle = 'rgba(0,0,0,0.20)'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(-hw + 35, wallTop + 18); ctx.lineTo(-hw + 42, wallTop + 30); ctx.lineTo(-hw + 38, wallTop + 38); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hw - 40, wallTop + 5);  ctx.lineTo(hw - 36, wallTop + 18); ctx.stroke();

    // Left face highlight
    ctx.fillStyle = 'rgba(255,255,255,0.035)';
    ctx.fillRect(-hw, wallTop, 6, BH);
    // Top-edge ledge shadow
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(-hw, wallTop, h.w, 5);

    // ═══════════════════════════════════════════════════
    // LAYER 4 — GATEHOUSE (raised block above the door)
    // ═══════════════════════════════════════════════════
    const ghW = 56, ghH = 28;
    const ghTop = wallTop - ghH;
    ctx.fillStyle = '#3a3830';
    ctx.fillRect(-ghW/2, ghTop, ghW, ghH);
    // Gatehouse side bevels
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.fillRect(ghW/2 - 5, ghTop, 5, ghH);
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(-ghW/2, ghTop, 5, ghH);
    // Gatehouse masonry seams
    ctx.strokeStyle = 'rgba(0,0,0,0.28)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-ghW/2, ghTop + ghH * 0.5); ctx.lineTo(ghW/2, ghTop + ghH * 0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, ghTop); ctx.lineTo(0, ghTop + ghH * 0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-ghW/4, ghTop + ghH * 0.5); ctx.lineTo(-ghW/4, ghTop + ghH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( ghW/4, ghTop + ghH * 0.5); ctx.lineTo( ghW/4, ghTop + ghH); ctx.stroke();
    // Gatehouse crenellations (3 merlons)
    for (let ci = 0; ci < 3; ci++) {
      const cx3 = -ghW/2 + ci * (ghW / 2.5) + 2;
      ctx.fillStyle = '#2e2c24';
      ctx.fillRect(cx3, ghTop - 10, 14, 10);
      ctx.fillStyle = 'rgba(218,240,255,0.60)';
      ctx.fillRect(cx3, ghTop - 10, 14, 4);
    }
    // Gatehouse warning sign
    ctx.fillStyle = 'rgba(200,160,20,0.70)';
    ctx.font = 'bold 6px Courier New'; ctx.textAlign = 'center';
    ctx.fillText('SHELTER', 0, ghTop + 11);
    ctx.fillText('WINDCHILL', 0, ghTop + 20);

    // ═══════════════════════════════════════════════════
    // LAYER 5 — MAIN ROOF SLAB + PARAPET
    // ═══════════════════════════════════════════════════

    // Roof slab
    const roofGrd = ctx.createLinearGradient(0, roofTop, 0, wallTop);
    roofGrd.addColorStop(0,   '#1a1814');
    roofGrd.addColorStop(0.3, '#222018');
    roofGrd.addColorStop(1,   '#1e1c16');
    ctx.fillStyle = roofGrd;
    ctx.fillRect(-hw - 5, roofTop, h.w + 10, RH + 5);
    // Roof surface ridges / panel lines
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
    for (let ri = 0; ri < 3; ri++) {
      const ry2 = roofTop + 5 + ri * 7;
      ctx.beginPath(); ctx.moveTo(-hw - 3, ry2); ctx.lineTo(hw + 3, ry2); ctx.stroke();
    }
    // Roof edge ridge bar
    ctx.strokeStyle = '#545248'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-hw - 5, wallTop); ctx.lineTo(hw + 5, wallTop); ctx.stroke();

    // Main parapet crenellations
    const crenCount = Math.floor((h.w - 10) / (crenW + crenGap));
    const crenStart = -((crenCount * (crenW + crenGap) - crenGap) / 2);
    for (let ci = 0; ci < crenCount; ci++) {
      const cx2 = crenStart + ci * (crenW + crenGap);
      ctx.fillStyle = '#222018';
      ctx.fillRect(cx2, roofTop - crenH, crenW, crenH);
      // Merlon top snow
      ctx.fillStyle = 'rgba(218,240,255,0.65)';
      ctx.fillRect(cx2, roofTop - crenH, crenW, 4);
      // Merlon side shadow
      ctx.fillStyle = 'rgba(0,0,0,0.20)';
      ctx.fillRect(cx2 + crenW - 2, roofTop - crenH, 2, crenH);
    }
    // Snow on flat roof surface
    ctx.fillStyle = 'rgba(218,240,255,0.60)';
    ctx.fillRect(-hw - 5, roofTop, h.w + 10, 5);

    // ═══════════════════════════════════════════════════
    // LAYER 6 — ROOFTOP EQUIPMENT
    // ═══════════════════════════════════════════════════

    const equipBase = roofTop - crenH; // top of crenellations

    // Main radar / comms mast (left-center)
    const mastX = -hw * 0.45;
    ctx.strokeStyle = '#606058'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(mastX, equipBase); ctx.lineTo(mastX, equipBase - 36); ctx.stroke();
    // Mast cross-arms (3 levels)
    ctx.lineWidth = 1.8;
    for (let arm = 0; arm < 3; arm++) {
      const ay = equipBase - 12 - arm * 10;
      const aw = 12 - arm * 3;
      ctx.strokeStyle = arm === 0 ? '#585050' : '#504848';
      ctx.beginPath(); ctx.moveTo(mastX - aw, ay); ctx.lineTo(mastX + aw, ay); ctx.stroke();
      // Diagonal braces
      ctx.strokeStyle = 'rgba(80,76,72,0.60)'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(mastX - aw, ay); ctx.lineTo(mastX, ay - 8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(mastX + aw, ay); ctx.lineTo(mastX, ay - 8); ctx.stroke();
    }
    // Blinking red beacon
    const blinkOn = Math.sin(frame * 0.055) > 0;
    const blinkGlow = Math.max(0, Math.sin(frame * 0.055));
    if (blinkOn) {
      const bg2 = ctx.createRadialGradient(mastX, equipBase - 38, 0, mastX, equipBase - 38, 12);
      bg2.addColorStop(0, 'rgba(255,40,40,0.55)'); bg2.addColorStop(1, 'rgba(255,40,40,0)');
