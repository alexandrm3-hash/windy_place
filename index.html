<title>WINDCHILL</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060c18;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
  }
  #wrapper {
    position: relative;
    isolation: isolate;
    width: 900px;
    transform-origin: center center;
    flex-shrink: 0;
  }
  #game-title { display: none; }
  canvas {
    display: block;
    width: 900px;
    height: 520px;
  }
  #hint {
    margin-top: 6px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(180,215,240,0.20);
    text-align: center;
    text-transform: uppercase;
  }
</style>

<div id="wrapper">
  <div id="game-title">Windchill</div>
  <canvas id="game" width="900" height="520"></canvas>
  <div id="hint">Arrow keys / WASD &nbsp;·&nbsp; Space to jump &nbsp;·&nbsp; Left Shift to sprint &nbsp;·&nbsp; E to enter/exit house &nbsp;·&nbsp; R to restart</div>
</div>

<style>
#test-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  font-family: 'Courier New', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  padding: 4px 10px;
  background: rgba(0,0,0,0.55);
  color: rgba(180,215,240,0.70);
  border: 1px solid rgba(180,215,240,0.22);
  border-radius: 4px;
  cursor: pointer;
  z-index: 10;
}
#test-btn:hover { background: rgba(0,0,0,0.75); }
#test-menu {
  display: none;
  position: absolute;
  top: 34px;
  right: 10px;
  background: rgba(6,12,24,0.92);
  border: 1px solid rgba(180,215,240,0.18);
  border-radius: 5px;
  overflow: hidden;
  z-index: 10;
}
#test-menu.open { display: block; }
#test-menu button {
  display: block;
  width: 100%;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  padding: 6px 16px;
  background: none;
  color: rgba(180,215,240,0.80);
  border: none;
  border-bottom: 1px solid rgba(180,215,240,0.08);
  cursor: pointer;
  text-align: left;
  white-space: nowrap;
}
#test-menu button:last-child { border-bottom: none; }
#test-menu button:hover { background: rgba(255,255,255,0.08); }
#test-menu button.hyper { color: #cc44ff; }
</style>

<div id="test-btn" onclick="toggleTestMenu()">⚡ WIND</div>
<div id="test-menu">
  <button onclick="forceWind(0);closeTestMenu()">CALM</button>
  <button onclick="forceWind(5);closeTestMenu()">TAILWIND</button>
  <button onclick="forceWind(8);closeTestMenu()">STRONG TAILWIND</button>
  <button onclick="forceWind(9);closeTestMenu()">TAILWIND TORNADO</button>
  <button onclick="forceWind(1);closeTestMenu()">LIGHT HEADWIND</button>
  <button onclick="forceWind(2);closeTestMenu()">STRONG HEADWIND</button>
  <button onclick="forceWind(3);closeTestMenu()">GALE FORCE</button>
  <button onclick="forceWind(4);closeTestMenu()">STORM</button>
  <button onclick="forceWind(6);closeTestMenu()">TORNADO</button>
  <button class="hyper" onclick="forceWind(7);closeTestMenu()">HYPERCANE</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = 900, H = 520;

// ── Palette ──────────────────────────────────────────────
// Arrays for lrp(); strings for direct fillStyle use
const C = {
  skyTop:    [8,  14, 28],
  skyStorm:  [5,   8, 16],
  skyTail:   [12, 22, 42],
  horizCalm: [45, 82,118],
  horizStorm:[18, 30, 44],
  horizTail: [55, 98,140],

  mtFar:  'rgba(100,138,172,0.27)',
  mtMid:  'rgba(58,90,130,0.52)',
  mtNear: 'rgba(28,52,84,0.84)',

  windC: 'rgba(205,230,252,0.72)',
  windW: 'rgba(238,212,138,0.65)',
  snow:  '#ddeeff',
  text:  '#c8e4f5',
  dim:   'rgba(200,228,245,0.38)',
  skin:  '#d4907a',
};

// ── Wind states ───────────────────────────────────────────
const WIND_STATES = [
  { tgt:  0.00, label:'CALM',            lvl:0, dMin:140, dMax:260 },  // [0]
  { tgt: -0.20, label:'LIGHT HEADWIND',  lvl:1, dMin:110, dMax:200 },  // [1]
  { tgt: -0.40, label:'STRONG HEADWIND', lvl:2, dMin: 90, dMax:170 },  // [2]
  { tgt: -0.65, label:'GALE FORCE',      lvl:3, dMin: 70, dMax:130 },  // [3]
  { tgt: -0.90, label:'STORM',           lvl:4, dMin: 55, dMax: 95 },  // [4]
  { tgt:  0.28, label:'TAILWIND',         lvl:1, dMin:100, dMax:180 },  // [5]
  { tgt: -1.40, label:'TORNADO',          lvl:5, dMin: 70, dMax:110 },  // [6]
  { tgt: -2.00, label:'HYPERCANE',        lvl:6, dMin:220, dMax:380 },  // [7]
  { tgt:  0.65, label:'STRONG TAILWIND',  lvl:3, dMin: 80, dMax:150 },  // [8]
  { tgt:  1.40, label:'TAILWIND TORNADO', lvl:5, dMin: 70, dMax:110 },  // [9]
];

function getWindTier() {
  const m = Math.floor(maxReach / 12);
  if (m >= 1500) return 6;
  return Math.min(5, Math.floor(maxReach / (12 * 200)));
}

function pickWindState() {
  const tier = getWindTier(), r = Math.random();
  if (tier === 0) {
    if (r < 0.18) return WIND_STATES[0]; if (r < 0.38) return WIND_STATES[1];
    if (r < 0.56) return WIND_STATES[2]; if (r < 0.70) return WIND_STATES[3];
    if (r < 0.80) return WIND_STATES[4]; return WIND_STATES[5];
  }
  if (tier === 1) {
    if (r < 0.08) return WIND_STATES[0]; if (r < 0.26) return WIND_STATES[1];
    if (r < 0.50) return WIND_STATES[2]; if (r < 0.70) return WIND_STATES[3];
    if (r < 0.82) return WIND_STATES[4]; if (r < 0.94) return WIND_STATES[5];
    return WIND_STATES[8]; // strong tailwind
  }
  if (tier === 2) {
    if (r < 0.10) return WIND_STATES[1]; if (r < 0.32) return WIND_STATES[2];
    if (r < 0.56) return WIND_STATES[3]; if (r < 0.76) return WIND_STATES[4];
    if (r < 0.88) return WIND_STATES[5]; return WIND_STATES[8];
  }
  if (tier === 3) {
    if (r < 0.06) return WIND_STATES[2]; if (r < 0.24) return WIND_STATES[3];
    if (r < 0.60) return WIND_STATES[4]; if (r < 0.74) return WIND_STATES[5];
    if (r < 0.90) return WIND_STATES[8]; return WIND_STATES[9]; // 10% tailwind tornado
  }
  if (tier === 4) {
    if (r < 0.08) return WIND_STATES[3]; if (r < 0.46) return WIND_STATES[4];
    if (r < 0.58) return WIND_STATES[5]; if (r < 0.72) return WIND_STATES[8];
    if (r < 0.86) return WIND_STATES[6]; return WIND_STATES[9]; // 14% tailwind tornado
  }
  if (tier === 5) {
    if (r < 0.04) return WIND_STATES[3]; if (r < 0.34) return WIND_STATES[4];
    if (r < 0.46) return WIND_STATES[5]; if (r < 0.58) return WIND_STATES[8];
    if (r < 0.78) return WIND_STATES[6]; if (r < 0.90) return WIND_STATES[9];
    return WIND_STATES[7]; // 10% hypercane
  }
  // tier 6
  if (r < 0.04) return WIND_STATES[4];
  if (r < 0.14) return WIND_STATES[5]; if (r < 0.22) return WIND_STATES[8];
  if (r < 0.36) return WIND_STATES[9]; if (r < 0.56) return WIND_STATES[6];
  return WIND_STATES[7]; // 44% hypercane
}

function windInfo() {
  const f = wind.force;
  if (Math.abs(f) < 0.04) return WIND_STATES[0];
  if (f < -1.80)           return WIND_STATES[7]; // HYPERCANE
  if (f < -1.00)           return WIND_STATES[6]; // TORNADO
  if (f < -0.72)           return WIND_STATES[4]; // STORM
  if (f < -0.48)           return WIND_STATES[3]; // GALE
  if (f < -0.26)           return WIND_STATES[2];
  if (f < -0.08)           return WIND_STATES[1];
  if (f >  1.00)           return WIND_STATES[9]; // TAILWIND TORNADO
  if (f >  0.44)           return WIND_STATES[8]; // STRONG TAILWIND
  return WIND_STATES[5];
}

// ── Terrain ──────────────────────────────────────────────
// Mountain slope: ground rises steadily as x increases
function baseGroundY(wx) {
  const rise   = Math.min(360, wx / 22);
  const ripple = Math.sin(wx * 0.0028) * 14 + Math.sin(wx * 0.007) * 7;
  return Math.max(60, 420 - rise + ripple);
}

// ── Global state ─────────────────────────────────────────
let gState, player, wind, cam, particles, snowflakes, frame;
let platforms = [];
let genFrontier = 0;
let maxReach    = 0;
let bestScore   = 0;
let freezing    = 0;   // 0–1
let deathReason = '';
let houses      = [];
let tornado     = null;
let stamina          = 1;    // 0–1
let staminaDepleted  = false;
let staminaCooldown  = 0;    // frames remaining before regen starts

// ── Platform generation ───────────────────────────────────
function initPlatforms() {
  platforms    = [];
  genFrontier  = 0;
  maxReach     = 0;

  platforms.push({ x: 0,   y: 420, w: 680, h: 500 }); // starting ground

  genFrontier = 680;
}

function extendMap() {
  while (genFrontier < player.x + W + 600) {
    const diff    = Math.min(1, player.x / 7000);
    const chunkW  = Math.max(110, (290 - diff * 140) + Math.random() * Math.max(50, 190 - diff * 140));
    const chunkX  = genFrontier;
    const groundY = baseGroundY(chunkX + chunkW * 0.4);

    // Subdivide chunk into narrow steps that follow baseGroundY, creating walkable slopes
    const stepW = 14;
    const steps = Math.ceil(chunkW / stepW);
    for (let si = 0; si < steps; si++) {
      const sx = chunkX + si * stepW;
      const sw = (si === steps - 1) ? chunkW - si * stepW : stepW;
      const sy = baseGroundY(sx + sw * 0.5);
      platforms.push({ x: sx, y: sy, w: sw, h: 500 });
    }

    // Maybe place a house on this chunk — metal bunker chance rises 20% per tier
    if (chunkW > 120 && Math.random() < 0.50) {
      const hx    = chunkX + 18 + Math.random() * Math.max(0, chunkW - 120);
      const tier  = getWindTier();
      const bunkerChance = tier >= 6 ? 0.60 : 0.01;
      const metalChance  = Math.min(1, 0.10 + tier * 0.20);
      const r = Math.random();
      const type = r < bunkerChance ? 'bunker' : r < bunkerChance + metalChance ? 'metal' : 'normal';
      const isBunker = type === 'bunker';
      const count = isBunker ? 2 + Math.floor(Math.random() * 2) : 1; // 2–3 fortresses in a cluster
      for (let ci = 0; ci < count; ci++) {
        const bx = hx + ci * (180 + 4); // pack them right next to each other
        const hw2 = isBunker ? 90 : 55;
        const hGroundY = baseGroundY(bx + hw2); // ground exactly under this house
        const hYOffset = isBunker ? 175 : 120;  // body-bottom offset from h.y
        houses.push({ x:bx, y:hGroundY - hYOffset, w:isBunker?180:110,
                      type,
                      flying:false, flyTimer: 40 + Math.floor(Math.random() * 160),
                      flyDelay: 40 + Math.floor(Math.random() * 160),
                      vy:0, vx:0, angle:0, alpha:1 });
      }
    }

    genFrontier = chunkX + chunkW;
  }
}

function trimPlatforms() {
  const cut = player.x - 750;
  platforms = platforms.filter(p => p.x + p.w >= cut);
  houses    = houses.filter(h => h.alpha > 0.02 && h.x + h.w >= cut - 400);
}

// ── Init ─────────────────────────────────────────────────
function init() {
  gState = 'playing';
  frame  = 0;

  player = { x:80, y:376, vx:0, vy:0, w:26, h:44,
             onGround:false, facing:1, walkF:0, walkT:0, inHouse:null };

  wind = { force:0, target:0, timer:0, duration:200, strength:0 };

  // Initialize camera so player appears at 60% down immediately
  cam = { x: 0, y: 376 - H * 0.60 };

  freezing         = 0;
  deathReason      = '';
  houses           = [];
  particles        = [];
  snowflakes       = [];
  tornado          = null;
  challenge        = null;
  stamina          = 1;
  staminaDepleted  = false;
  staminaCooldown  = 0;
  initPlatforms();
}

// ── Input ─────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  WindAudio.init();
  keys[e.code] = true;
  if (e.code === 'KeyR') init();
  if (e.code === 'KeyE' && gState === 'playing' && !e.repeat) handleEnterExit();
  if (gState === 'playing' && !e.repeat) handleChallengeKey(e.code);
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))
    e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('click', () => WindAudio.init(), { once: true });
const goLeft  = () => keys['ArrowLeft']  || keys['KeyA'];
const goRight = () => keys['ArrowRight'] || keys['KeyD'];
const doJump  = () => keys['ArrowUp']    || keys['KeyW'] || keys['Space'];

// ── Wind update ───────────────────────────────────────────
function updateWind() {
  if (++wind.timer >= wind.duration) {
    wind.timer = 0;
    const ws      = pickWindState();
    wind.target   = ws.tgt + (Math.random() - 0.5) * 0.05;
    wind.duration = ws.dMin + Math.floor(Math.random() * (ws.dMax - ws.dMin));
  }
  wind.force    += (wind.target - wind.force) * 0.022;
  wind.strength  = Math.min(1, Math.abs(wind.force) / 0.90);
}

// ── Player update ─────────────────────────────────────────
function updatePlayer() {
  const chalActive = challenge && challenge.result === null;

  // When sheltered: hold position in the house, skip all physics
  if (player.inHouse) {
    if (player.inHouse.flying || player.inHouse.alpha < 0.5) {
      player.inHouse = null; // ejected by storm — fall through
    } else {
      player.vx = 0; player.vy = 0;
      player.x = player.inHouse.x + player.inHouse.w / 2 - player.w / 2;
      const hFloor = player.inHouse.type === 'bunker' ? player.inHouse.y + 175 : player.inHouse.y + 120;
      player.y = hFloor - player.h;
      player.onGround = true;
      cam.x += (player.x - W * 0.35 - cam.x) * 0.11;
      if (cam.x < 0) cam.x = 0;
      cam.y += (player.y - H * 0.60 - cam.y) * 0.09;
      if (player.x > maxReach) maxReach = player.x;
      return;
    }
  }
  // Sprint — Left Shift drains stamina; 2-second cooldown before regen
  const sprinting = !chalActive && keys['ShiftLeft'] && !staminaDepleted && stamina > 0 && player.onGround;
  player.sprinting = sprinting;
  if (sprinting) {
    stamina = Math.max(0, stamina - 0.0038);          // ~4.4 s to fully drain
    if (stamina <= 0) { stamina = 0; staminaDepleted = true; staminaCooldown = 120; }
  } else {
    if (staminaDepleted) {
      if (--staminaCooldown <= 0) { staminaDepleted = false; staminaCooldown = 0; }
    } else {
      stamina = Math.min(1, stamina + 0.0018);         // ~9 s to fully regen
    }
  }
  const sm = sprinting ? 1.65 : 1;                     // speed multiplier

  if (!chalActive && goLeft())  { player.vx -= 0.90 * sm; player.facing = -1; }
  if (!chalActive && goRight()) { player.vx += 0.90 * sm; player.facing =  1; }
  if (chalActive || (!goLeft() && !goRight())) player.vx *= 0.76;

  // Cap wind pull so hypercane doesn't instantly drag the player
  const cappedForce = Math.max(-0.90, Math.min(0.90, wind.force));
  if (!chalActive) player.vx += cappedForce * (player.onGround ? 0.75 : 1.5);
  player.vx  = Math.max(-5.5 * sm, Math.min(5.5 * sm, player.vx));

  if (!chalActive && doJump() && player.onGround) { player.vy = -12.5; player.onGround = false; }

  if (chalActive) { player.vx = 0; player.vy = 0; }
  player.vy = Math.min(player.vy + (chalActive ? 0 : 0.50), 14);
  player.x += player.vx;
  player.y += player.vy;

  const walkStep = sprinting ? 4 : 7;                  // faster legs when running
  if (Math.abs(player.vx) > 0.5 && player.onGround) {
    if (++player.walkT >= walkStep) { player.walkT = 0; player.walkF = (player.walkF + 1) % 6; }
  } else if (player.onGround) { player.walkF = 0; }

  // Top collisions
  player.onGround = false;
  for (const p of platforms) {
    const prevBot = player.y + player.h - player.vy;
    const currBot = player.y + player.h;
    if (player.x + player.w > p.x && player.x < p.x + p.w &&
        currBot >= p.y && prevBot <= p.y + 5 && player.vy >= 0) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  }

  if (player.x < 0) { player.x = 0; player.vx = 0; }
  if (player.x > maxReach) maxReach = player.x;

  // Camera — follow both X and Y smoothly
  cam.x += (player.x - W * 0.35 - cam.x) * 0.11;
  if (cam.x < 0) cam.x = 0;
  cam.y += (player.y - H * 0.60 - cam.y) * 0.09;

  // Death: player fell far below the current mountain slope (world-space check,
  // so the camera chasing them doesn't keep pushing the threshold out of reach)
  if (player.y + player.h > baseGroundY(player.x) + 400) {
    const s = Math.floor(maxReach / 12);
    if (s > bestScore) bestScore = s;
    deathReason = 'fall';
    gState = 'dead';
  }
}

// ── House helpers ─────────────────────────────────────────
// True when player is standing close enough to the door to press E
function nearHouse(h) {
  if (h.flying || h.alpha < 0.5) return false;
  const hCx = h.x + h.w / 2, pCx = player.x + player.w / 2;
  const hH = h.type === 'bunker' ? 180 : 120;
  const hBottom = h.y + hH, pBottom = player.y + player.h;
  const reach = h.type === 'bunker' ? 100 : 68;
  return Math.abs(pCx - hCx) < reach && pBottom < hBottom + 38 && pBottom > hBottom - 70;
}

function handleEnterExit() {
  if (player.inHouse) {
    player.inHouse = null;
  } else {
    for (const h of houses) {
      if (nearHouse(h)) {
        player.inHouse = h;
        if (h.type === 'bunker') challenge = null; // cancel any active challenge
        break;
      }
    }
  }
}

function updateHouses() {
  const isStorm = wind.force < -0.68; // gale+ lifts normal houses
  const isTornado   = wind.force < -1.00 || wind.force > 1.00;
  const isHypercane = wind.force < -1.80; // tier 6 — metal bunkers are no longer safe
  // hypercane lifts houses violently
  const liftMult = isHypercane ? 2.8 : isTornado ? 1.6 : 1.0;
  for (const h of houses) {
    if (h.flying) {
      h.vy  = Math.max(-20, h.vy  - 0.22 * liftMult);
      h.vx  = Math.max(-24, h.vx  + wind.force * 0.5 * liftMult);
      h.x  += h.vx;
      h.y  += h.vy;
      h.angle += h.vx * 0.015;
      if (h.y - cam.y < -80) h.alpha -= 0.025;
    } else if ((isStorm && h.type !== 'metal' && h.type !== 'bunker') || (isHypercane && h.type === 'metal')) {
      h.flyTimer--;
      if (h.flyTimer <= 0) {
        h.flying = true;
        if (player.inHouse === h) player.inHouse = null; // eject player
      }
    } else if (!isStorm || (h.type !== 'normal' && !isHypercane) || h.type === 'bunker') {
      h.flyTimer = h.flyDelay; // reset if storm passes (or immune)
    }
  }
}

// ── Tornado update ────────────────────────────────────────
function updateTornado() {
  const isTornado = wind.force < -1.00 || wind.force > 1.00;

  const isHypercane = wind.force < -1.80;
  const torScale = isHypercane ? 1.85 : 1.0;

  if (isTornado && !tornado) {
    // Tailwind tornado comes from the left, headwind tornado from the right
    const side = wind.force > 0 ? -1 : 1;
    const spawnX = player.x + side * 900;
    const spawnY = baseGroundY(spawnX);
    const colors = ['#6a7a5a','#8a9a6a','#5a6a4a','#7a8070','#aaa090','#554433'];
    const debris = [];
    const debrisCount = isHypercane ? 34 : 18;
    for (let i = 0; i < debrisCount; i++) {
      debris.push({
        angle:    Math.random() * Math.PI * 2,
        radius:   (35 + Math.random() * 75) * torScale,
        fracH:    0.15 + Math.random() * 0.70,
        speed:    (0.035 + Math.random() * 0.055) * (isHypercane ? 1.5 : 1),
        rotSpeed: 1 + Math.random() * 2,
        color:    colors[Math.floor(Math.random() * colors.length)],
        w: (3 + Math.random() * 9) * torScale, h: (2 + Math.random() * 5) * torScale,
        x: spawnX, y: spawnY,
      });
    }
    // orbitAngle drives the circular roaming; orbitDir sets clockwise/counter
    const startAngle = side > 0 ? 0 : Math.PI;
    tornado = { x: spawnX, y: spawnY, angle: 0, alpha: 0, debris, scale: torScale,
                orbitAngle: startAngle, orbitDir: Math.random() < 0.5 ? 1 : -1 };
  }

  if (!tornado) return;

  // Dynamically grow/shrink tornado when wind escalates to hypercane or back
  const targetScale = isHypercane ? 1.85 : 1.0;
  tornado.scale = (tornado.scale || 1.0) + (targetScale - (tornado.scale || 1.0)) * 0.025;

  const tScale = tornado.scale;
  tornado.angle += isHypercane ? 0.12 : 0.07;

  if (isTornado) {
    tornado.alpha = Math.min(1, tornado.alpha + (isHypercane ? 0.028 : 0.016));

    // Orbit around the player — angle rotates slowly, radius pulses in/out
    const orbitSpeed = (isHypercane ? 0.012 : 0.007) * (tornado.orbitDir || 1);
    tornado.orbitAngle = (tornado.orbitAngle || 0) + orbitSpeed;
    const baseRadius  = tScale > 1.2 ? 260 : 340;
    const orbitRadius = baseRadius + Math.sin(tornado.orbitAngle * 1.7) * 120; // swoops in/out
    const targetX = player.x + Math.cos(tornado.orbitAngle) * orbitRadius;
    const chaseSpeed = tScale > 1.2 ? 0.030 : 0.018;
    tornado.x += (targetX - tornado.x) * chaseSpeed;
    tornado.y  = baseGroundY(tornado.x);
  } else {
    tornado.alpha = Math.max(0, tornado.alpha - 0.013);
    tornado.x += wind.force * 10;
    tornado.y  = baseGroundY(tornado.x);
  }

  // Update orbiting debris
  const TW_d = 100 * tScale, BW_d = 10 * tScale, TH_d = 185 * tScale;
  for (const d of tornado.debris) {
    d.angle += d.speed;
    const bandW = TW_d * (1 - d.fracH) + BW_d * d.fracH;
    d.x = tornado.x + Math.cos(d.angle) * bandW;
    d.y = tornado.y - TH_d * d.fracH + Math.sin(d.angle * 1.4) * 14 * tScale;
  }

  // Proximity kill — hypercane kills through metal bunkers too
  const killRadius = 58 * tScale;
  const sheltered  = player.inHouse && (player.inHouse.type === 'bunker' || !isHypercane);
  if (tornado.alpha > 0.75 && !sheltered) {
    const dist = Math.abs((player.x + player.w / 2) - tornado.x);
    const dangerRadius = killRadius * 2.8;

    if (dist < killRadius) {
      // Only die if the tornado challenge was failed or not triggered
      if (!challenge || challenge.result === 'fail') {
        const s = Math.floor(maxReach / 12);
        if (s > bestScore) bestScore = s;
        deathReason = 'tornado';
        gState = 'dead';
      }
    } else if (dist < dangerRadius && !challenge) {
      // Proximity — spawn escape challenge
      spawnTornadoChallenge();
    }

    // Win: blast player away from tornado
    if (challenge && challenge.result === 'win' && challenge.isTornadoEscape) {
      const escapeDir = (player.x + player.w / 2) < tornado.x ? -1 : 1;
      player.vx += escapeDir * 8;
      // Tornado briefly retreats
      const retreatAngle = tornado.orbitAngle + Math.PI;
      tornado.orbitAngle = retreatAngle;
    }
  }

  if (tornado.alpha <= 0) tornado = null;
}

// ── Freeze update ────────────────────────────────────────
// Rate scales with wind strength — calm is nearly safe, storm is lethal over time.
// Being inside a house warms the player.
function updateFreezing() {
  if (challenge && challenge.result === null) return;
  if (player.inHouse) {
    const warmRate = player.inHouse.type === 'metal' ? 0.0010 : 0.0045;
    freezing = Math.max(0, freezing - warmRate);
    return;
  }
  const tornadoBonus = wind.force < -1.80 ? 0.00130 : (wind.force < -1.00 || wind.force > 1.00) ? 0.00045 : 0;
  const rate = 0.00008 + wind.strength * 0.00055 + tornadoBonus;
  freezing = Math.min(1, freezing + rate);
  if (freezing >= 1) {
    const s = Math.floor(maxReach / 12);
    if (s > bestScore) bestScore = s;
    deathReason = 'freeze';
    gState = 'dead';
  }
}

// ── Snow update ───────────────────────────────────────────
function updateSnow() {
  const rate = 0.30 + getWindTier() * 0.08 + wind.strength * 0.35;
  if (Math.random() < rate) {
    const size = 0.8 + Math.random() * 2.2;
    snowflakes.push({
      x: cam.x + Math.random() * (W + 60) - 30,
      y: cam.y - 10 + Math.random() * 20,
      vx: wind.force * (1.5 + Math.random() * 2),
      vy: 0.6 + size * 0.45 + Math.random() * 0.7,
      size, alpha: 0.35 + Math.random() * 0.55,
      life: 1, decay: 0.0022 + Math.random() * 0.004,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.022,
    });
  }
  snowflakes = snowflakes.filter(s => {
    s.vx += (wind.force * 3 - s.vx) * 0.04;
    s.x  += s.vx; s.y += s.vy; s.life -= s.decay;
    s.rot = (s.rot || 0) + (s.rotV || 0);
    return s.life > 0 && s.y - cam.y < H + 20;
  });
}

// ── Main update ───────────────────────────────────────────
function update() {
  frame++;
  const _lf = tornado && tornado.alpha > 0.60 && frame % 215 === 0;
  WindAudio.update(wind.strength, wind.force, tornado ? tornado.alpha : 0, freezing, _lf);
  if (gState !== 'playing') return;
  updateWind();
  updatePlayer();
  extendMap();
  trimPlatforms();
  updateSnow();
  updateHouses();
  updateTornado();
  updateFreezing();
  updateChallenge();

  // Wind streak particles (blizzard streaks in strong wind)
  if (Math.abs(wind.force) > 0.20 && Math.random() < Math.abs(wind.force) * 3) {
    const toLeft = wind.force < 0;
    particles.push({
      x:    toLeft ? cam.x + W + 40 : cam.x - 40,
      y:    cam.y + 30 + Math.random() * (H - 60),
      vx:   (toLeft ? -1 : 1) * (4 + Math.random() * 5) * Math.abs(wind.force) * 2.5,
      vy:   (Math.random() - 0.5) * 0.6,
      len:  18 + Math.random() * 65,
      a:    0.08 + Math.random() * 0.38,
      life: 1, decay: 0.005 + Math.random() * 0.007,
    });
  }
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    const sx = p.x - cam.x;
    return p.life > 0 && sx > -80 && sx < W + 80;
  });
}

// ── Draw helpers ──────────────────────────────────────────
function lrp(a, b, t) {
  t = Math.max(0, Math.min(1, t));
  return [a[0]+(b[0]-a[0])*t|0, a[1]+(b[1]-a[1])*t|0, a[2]+(b[2]-a[2])*t|0];
}
function rgb(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

// ── Draw: Winter sky ──────────────────────────────────────
function drawSky() {
  const s = wind.strength, f = wind.force;
  let top, bot;
  if (f > 0.04) {
    top = lrp(C.skyTop,   C.skyTail,   f * 3);
    bot = lrp(C.horizCalm,C.horizTail, f * 3);
  } else {
    top = lrp(C.skyTop,   C.skyStorm,  s * 0.8);
    bot = lrp(C.horizCalm,C.horizStorm,s);
  }
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0,    rgb(top));
  g.addColorStop(0.55, rgb(lrp(top, bot, 0.5)));
  g.addColorStop(0.88, rgb(bot));
  g.addColorStop(1,    rgb(lrp(bot, C.skyStorm, 0.4)));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Stars — fade in calm weather, fade out in storms and tailwind
  const starFade = Math.max(0, 1 - s * 1.2 - (f > 0.04 ? f * 4 : 0));
  if (starFade > 0.02) {
    ctx.save();
    for (let i = 0; i < 80; i++) {
      const px = (i * 7919 + 2039) % 900;
      const py = (i * 3461 +  829) % 240;
      const sz = 0.5 + (i % 4) * 0.32;
      const twinkle = 0.38 + 0.32 * Math.sin(frame * 0.019 + i * 1.73);
      ctx.globalAlpha = twinkle * starFade * 0.62;
      ctx.fillStyle = i % 9 === 0 ? '#ffe8c0' : '#ddeeff';
      ctx.beginPath();
      ctx.arc(px, py, sz, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Moon — crescent upper-right, fades in storms
  const moonFade = Math.max(0, 0.72 - s * 0.55 - (f > 0.04 ? f * 3 : 0));
  if (moonFade > 0.04) {
    const mx = W * 0.82, my = H * 0.11;
    ctx.save();
    ctx.globalAlpha = moonFade;
    const mgrd = ctx.createRadialGradient(mx, my, 0, mx, my, 42);
    mgrd.addColorStop(0, 'rgba(210,218,188,0.14)');
    mgrd.addColorStop(1, 'rgba(210,218,188,0)');
    ctx.fillStyle = mgrd;
    ctx.beginPath(); ctx.arc(mx, my, 42, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e0dac8';
    ctx.beginPath(); ctx.arc(mx, my, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(${top[0]},${top[1]},${top[2]},0.84)`;
    ctx.beginPath(); ctx.arc(mx + 6, my - 1, 11, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

// ── Draw: Mountain silhouette layers ─────────────────────
// Three parallax layers — abs(sin) creates natural peak shapes
function mountainSample(wx, seed) {
  return (
    0.52 * Math.abs(Math.sin(wx * 0.00046 + seed))        +
    0.30 * Math.abs(Math.sin(wx * 0.00098 + seed * 2.1))  +
    0.18 * Math.abs(Math.sin(wx * 0.0022  + seed * 3.8))
  );
}

function drawMountainLayer(px, py, color, amp, baseY, seed) {
  const offX = cam.x * px;
  const offY = cam.y * py;

  // Silhouette fill
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(-5, H + 10);
  for (let sx = -5; sx <= W + 5; sx += 7) {
    const h = mountainSample(sx + offX, seed);
    ctx.lineTo(sx, baseY + offY - h * amp);
  }
  ctx.lineTo(W + 5, H + 10);
  ctx.closePath();
  ctx.fill();

  // Snow cap: gradient overlay whiting out the top 38% of each peak
  const capTop = baseY + offY - amp;
  const capBot = baseY + offY - amp * 0.62;
  const snowG = ctx.createLinearGradient(0, capTop, 0, capBot);
  snowG.addColorStop(0, 'rgba(218,238,255,0.48)');
  snowG.addColorStop(1, 'rgba(218,238,255,0)');
  ctx.fillStyle = snowG;
  ctx.beginPath();
  ctx.moveTo(-5, H + 10);
  for (let sx = -5; sx <= W + 5; sx += 7) {
    const h = mountainSample(sx + offX, seed);
    ctx.lineTo(sx, baseY + offY - h * amp);
  }
  ctx.lineTo(W + 5, H + 10);
  ctx.closePath();
  ctx.fill();
}

function drawMountains() {
  drawMountainLayer(0.04, 0.06, C.mtFar,               235, H * 0.60, 0.0);
  drawMountainLayer(0.13, 0.14, C.mtMid,               178, H * 0.72, 1.6);
  drawMountainLayer(0.26, 0.28, C.mtNear,              130, H * 0.86, 3.3);
  drawMountainLayer(0.42, 0.44, 'rgba(14,28,50,0.72)',  80, H * 0.93, 5.1);
}

// ── Draw: Storm clouds ────────────────────────────────────
function drawClouds() {
  const s = wind.strength;
  if (s < 0.18) return;
  const alpha = Math.min(1, (s - 0.18) / 0.52);
  ctx.save();
  // Clouds drift slowly with wind direction
  const scroll = ((frame * 0.22 + cam.x * 0.038) % (W + 280) + W + 280) % (W + 280);
  const clouds = [
    { ox: 0,   y: 40,  rx: 135, ry: 56 },
    { ox: 210, y: 24,  rx: 108, ry: 46 },
    { ox: 390, y: 46,  rx: 148, ry: 66 },
    { ox: 590, y: 30,  rx: 118, ry: 52 },
    { ox: 765, y: 44,  rx: 130, ry: 58 },
    { ox: 130, y: 74,  rx:  98, ry: 40 },
    { ox: 460, y: 70,  rx: 112, ry: 44 },
    { ox: 690, y: 76,  rx: 104, ry: 42 },
  ];
  for (const c of clouds) {
    const cx = ((c.ox - scroll) % (W + 280) + W + 280) % (W + 280) - 100;
    const cg = ctx.createRadialGradient(cx, c.y, 0, cx, c.y, c.rx);
    cg.addColorStop(0,    `rgba(10,16,30,${(alpha*0.82).toFixed(3)})`);
    cg.addColorStop(0.40, `rgba(14,22,40,${(alpha*0.52).toFixed(3)})`);
    cg.addColorStop(0.72, `rgba(8,14,28,${(alpha*0.20).toFixed(3)})`);
    cg.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(cx, c.y, c.rx, c.ry, 0, 0, Math.PI * 2);
    ctx.fill();
    // Wrap to fill gap at the seam
    if (cx < c.rx) {
      ctx.beginPath();
      ctx.ellipse(cx + W + 280, c.y, c.rx, c.ry, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

// ── Draw: Atmospheric haze band ───────────────────────────
function drawAtmosphere() {
  const offY = cam.y * 0.30;
  const hazeY = H * 0.79 + offY;
  const ha = 0.06 + wind.strength * 0.10;
  const hg = ctx.createLinearGradient(0, hazeY - 18, 0, hazeY + 52);
  hg.addColorStop(0,   'rgba(115,162,208,0)');
  hg.addColorStop(0.35,`rgba(115,162,208,${ha.toFixed(3)})`);
  hg.addColorStop(0.62,`rgba(95,140,192,${(ha*0.5).toFixed(3)})`);
  hg.addColorStop(1,   'rgba(75,118,178,0)');
  ctx.fillStyle = hg;
  ctx.fillRect(0, hazeY - 18, W, 70);
}

// ── Draw: Snow ────────────────────────────────────────────
function drawSnow() {
  ctx.save();
  for (const s of snowflakes) {
    const sx = s.x - cam.x, sy = s.y - cam.y;
    if (sx < -14 || sx > W + 14 || sy < -14 || sy > H + 14) continue;
    const alpha = s.alpha * s.life;

    if (wind.strength > 0.45) {
      // Driven snow — angled dash
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = C.snow;
      ctx.lineWidth   = s.size * 0.65;
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + wind.force * -10 * s.size, sy - s.size);
      ctx.stroke();
    } else if (s.size > 1.5) {
      // Large calm flake — 6-arm crystal
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(sx, sy);
      ctx.rotate(s.rot || 0);
      ctx.strokeStyle = 'rgba(220,240,255,0.88)';
      ctx.lineWidth = 0.7; ctx.lineCap = 'round';
      const r = s.size * 2.7;
      for (let arm = 0; arm < 6; arm++) {
        ctx.save(); ctx.rotate(arm * Math.PI / 3);
        ctx.beginPath(); ctx.moveTo(0, 0);    ctx.lineTo(0, -r);        ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -r*0.42); ctx.lineTo(-r*0.28, -r*0.66); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -r*0.42); ctx.lineTo( r*0.28, -r*0.66); ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    } else if (s.size > 0.9) {
      // Medium flake — 4-arm cross
      ctx.save();
      ctx.globalAlpha = alpha * 0.82;
      ctx.translate(sx, sy); ctx.rotate(s.rot || 0);
      ctx.strokeStyle = 'rgba(210,235,255,0.80)';
      ctx.lineWidth = 0.7; ctx.lineCap = 'round';
      const r = s.size * 1.9;
      for (let arm = 0; arm < 4; arm++) {
        ctx.save(); ctx.rotate(arm * Math.PI / 2);
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -r); ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    } else {
      // Tiny — soft dot
      ctx.globalAlpha = alpha;
      ctx.fillStyle = C.snow;
      ctx.beginPath();
      ctx.arc(sx, sy, s.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

// ── Draw: Ground snow drift ───────────────────────────────
function drawGroundDrift() {
  if (wind.force >= -0.28) return;
  const driftStr = Math.min(1, (-wind.force - 0.28) / 0.62);
  ctx.save();
  ctx.lineCap = 'round';
  for (const p of platforms) {
    const psx = p.x - cam.x, psy = p.y - cam.y;
    if (psx + p.w < -10 || psx > W + 10 || psy < -8 || psy > H + 8) continue;
    const cnt = Math.floor(p.w / 13) + 1;
    for (let d = 0; d < cnt; d++) {
      const spd = 2.2 + (d % 3) * 0.9;
      const phase = (frame * spd + d * 97 + p.x * 0.1) % (p.w + 55);
      const dx = psx + p.w + 28 - phase;
      if (dx < psx - 28 || dx > psx + p.w + 28) continue;
      const dy = psy + (d % 2) * 1.5;
      const len = 7 + (d % 4) * 3;
      ctx.globalAlpha = driftStr * (0.22 + (d % 3) * 0.10);
      ctx.strokeStyle = '#ddeeff';
      ctx.lineWidth = 0.5 + (d % 2) * 0.25;
      ctx.beginPath();
      ctx.moveTo(Math.min(dx, psx + p.w), dy);
      ctx.lineTo(Math.max(dx - len, psx), dy);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ── Draw: Wind streaks ────────────────────────────────────
function drawParticles() {
  const toLeft = wind.force < 0;
  const col = toLeft ? [205,230,252] : [238,212,138];
  for (const p of particles) {
    const sx = p.x - cam.x, sy = p.y - cam.y;
    const ex = sx + p.len * (toLeft ? -1 : 1), ey = sy + p.vy * 9;
    ctx.save();
    const grd = ctx.createLinearGradient(sx, sy, ex, ey);
    const a = p.a * p.life;
    grd.addColorStop(0,    `rgba(${col[0]},${col[1]},${col[2]},0)`);
    grd.addColorStop(0.22, `rgba(${col[0]},${col[1]},${col[2]},${a.toFixed(3)})`);
    grd.addColorStop(0.80, `rgba(${col[0]},${col[1]},${col[2]},${(a*0.35).toFixed(3)})`);
    grd.addColorStop(1,    `rgba(${col[0]},${col[1]},${col[2]},0)`);
    ctx.strokeStyle = grd;
    ctx.lineWidth = 0.9 + wind.strength * 0.8;
    ctx.lineCap = 'butt';
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.restore();
  }
}

// ── Draw: Platforms (snowy rock) ──────────────────────────
function drawPlatform(p) {
  const sx = p.x - cam.x, sy = p.y - cam.y;
  if (sx + p.w < -4 || sx > W + 4 || sy > H + 4) return;
  const ground = p.h > 20;
  const drawH  = Math.min(p.h, Math.max(4, H - sy + 20));

  // Per-chunk color variation keeps adjacent platforms visually distinct
  const cv = ((p.x * 17 + 137) % 7) - 3;   // −3..+3
  const r0 = 26 + cv * 2, g0 = 42 + cv, b0 = 54 + cv;

  // Rock body
  const bg = ctx.createLinearGradient(0, sy, 0, sy + drawH);
  if (ground) {
    bg.addColorStop(0,    `rgb(${r0},${g0},${b0})`);
    bg.addColorStop(0.12, `rgb(${r0-8},${g0-10},${b0-6})`);
    bg.addColorStop(1,    `rgb(${8+cv},${14+cv},${22+cv})`);
  } else {
    bg.addColorStop(0, `rgb(${34+cv*2},${56+cv},${74+cv})`);
    bg.addColorStop(1, '#0f1e2c');
  }
  ctx.fillStyle = bg;
  ctx.fillRect(sx, sy, p.w, drawH);

  // Rock crack texture (deterministic per platform, near-top only)
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 0.8; ctx.lineCap = 'round';
  const crR = (n) => Math.abs(Math.sin((p.x * 13 + p.y * 7) * 0.008 + n * 2.399));
  const nc = Math.min(4, Math.floor(p.w / 55) + 1);
  for (let c = 0; c < nc; c++) {
    const cx  = sx + crR(c*6+1) * p.w;
    const cy  = sy + 5 + crR(c*6+2) * Math.min(drawH - 8, 60);
    const cx2 = cx + crR(c*6+3) * 18 - 9;
    const cy2 = cy + crR(c*6+4) * 7 - 1;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx2, cy2); ctx.stroke();
    if (crR(c*6+5) > 0.45) {
      ctx.beginPath(); ctx.moveTo(cx2, cy2);
      ctx.lineTo(cx2 + crR(c*6+6)*11-5.5, cy2 + crR(c*6+7)*5); ctx.stroke();
    }
  }
  ctx.restore();

  // Snow cap
  ctx.fillStyle = ground ? '#d8eef8' : '#e4f4ff';
  ctx.fillRect(sx, sy, p.w, ground ? 5 : 4);

  // Snow depth fade
  const sg = ctx.createLinearGradient(0, sy + 4, 0, sy + 14);
  sg.addColorStop(0, 'rgba(210,235,250,0.45)');
  sg.addColorStop(1, 'rgba(210,235,250,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(sx, sy + 4, p.w, 10);

  // Lit left face
  ctx.fillStyle = 'rgba(140,200,240,0.09)';
  ctx.fillRect(sx, sy + 4, 3, drawH - 4);

  if (ground) {
    // Right cliff-face shadow — the key visual separator between chunks
    const cg = ctx.createLinearGradient(sx + p.w - 20, sy, sx + p.w, sy);
    cg.addColorStop(0, 'rgba(0,0,0,0)');
    cg.addColorStop(1, 'rgba(0,0,0,0.58)');
    ctx.fillStyle = cg;
    ctx.fillRect(sx + p.w - 20, sy + 4, 20, drawH - 4);
    // Hard pixel edge
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(sx + p.w - 2, sy, 2, drawH);
  } else {
    // Icicles on floating platforms
    const irR = (n) => Math.abs(Math.sin((p.x * 17 + p.y * 11) * 0.006 + n * 3.141));
    const cnt = Math.floor((p.w - 8) / 9);
    for (let i = 0; i < cnt; i++) {
      const ix = sx + 4 + i * 9 + irR(i*4) * 5;
      if (ix < sx || ix > sx + p.w || ix < -4 || ix > W + 4) continue;
      const ilen = 4 + irR(i*4+1) * 10;
      const iw   = 1.4 + irR(i*4+2) * 1.8;
      const ig   = ctx.createLinearGradient(ix, sy + drawH, ix, sy + drawH + ilen);
      ig.addColorStop(0,   'rgba(185,228,248,0.88)');
      ig.addColorStop(0.7, 'rgba(200,238,255,0.55)');
      ig.addColorStop(1,   'rgba(215,245,255,0)');
      ctx.fillStyle = ig;
      ctx.beginPath();
      ctx.moveTo(ix - iw, sy + drawH);
      ctx.lineTo(ix + iw, sy + drawH);
      ctx.lineTo(ix, sy + drawH + ilen);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(240,252,255,0.58)';
      ctx.fillRect(ix - 0.4, sy + drawH, 0.8, ilen * 0.44);
    }
  }
}

// ── Draw: Stickman in window (when sheltered) ────────────
function drawStickmanInWindow() {
  const h = player.inHouse;
  if (!h || h.flying || h.alpha < 0.05) return;

  const hw = h.w / 2; // 55
  const BH = 72;
  const cx = h.x - cam.x + hw;
  const cy = h.y - cam.y + 84;

  // Window bounds depend on house type
  // Normal: fillRect(-hw+10, -BH/2+14, 20, 16)  → screen (cx-45, cy-22, 20, 16)
  // Metal : fillRect(-hw+10, -BH/2+14, 22,  8)  → screen (cx-45, cy-22, 22,  8)
  const isMetal = h.type === 'metal';
  const winX = cx - hw + 10;
  const winY = cy - BH / 2 + 14;
  const winW = isMetal ? 22 : 20;
  const winH = isMetal ? 8  : 16;

  if (winX + winW < 0 || winX > W || winY + winH < 0 || winY > H) return;

  ctx.save();
  ctx.beginPath();
  ctx.rect(winX, winY, winW, winH);
  ctx.clip();

  const ox = winX + winW / 2;
  const oy = winY + winH;          // feet at window sill
  const bob = Math.sin(frame * 0.05) * 0.6;

  ctx.globalAlpha = h.alpha;
  ctx.strokeStyle = '#3a1204';
  ctx.fillStyle   = '#3a1204';
  ctx.lineWidth   = 1.8;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  // Legs
  ctx.beginPath(); ctx.moveTo(ox, oy - 5 + bob); ctx.lineTo(ox - 3, oy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox, oy - 5 + bob); ctx.lineTo(ox + 3, oy); ctx.stroke();
  // Body
  ctx.beginPath(); ctx.moveTo(ox, oy - 12 + bob); ctx.lineTo(ox, oy - 5 + bob); ctx.stroke();
  // Arms (relaxed, hanging)
  const armSway = Math.sin(frame * 0.04) * 0.15;
  ctx.save(); ctx.translate(ox, oy - 10 + bob); ctx.rotate(-0.35 + armSway);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-5, 4); ctx.stroke(); ctx.restore();
  ctx.save(); ctx.translate(ox, oy - 10 + bob); ctx.rotate(0.35 - armSway);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(5, 4); ctx.stroke(); ctx.restore();
  // Head
  ctx.beginPath(); ctx.arc(ox, oy - 15.5 + bob, 3.2, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ── Draw: Stickman ────────────────────────────────────────
function drawStickman() {
  if (player.inHouse) { drawStickmanInWindow(); return; }
  const sx  = (player.x - cam.x + player.w / 2) | 0;
  const sy  = (player.y - cam.y + player.h / 2) | 0;
  const air = !player.onGround;
  const f   = player.facing;

  const run = player.sprinting && !air;

  ctx.save();
  ctx.translate(sx, sy);
  // Wind tilt + extra forward lean when sprinting
  ctx.rotate((wind.force * -13 * (air ? 1.6 : 0.7) + (run ? -9 : 0)) * Math.PI / 180);
  if (f < 0) ctx.scale(-1, 1);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  // Ground shadow (wider when sprinting)
  if (!air) {
    ctx.save(); ctx.globalAlpha = 0.12; ctx.fillStyle = '#000';
    ctx.scale(1, 0.22);
    ctx.beginPath(); ctx.ellipse(0, 110, run ? 17 : 14, 6, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  const moving = Math.abs(player.vx) > 0.5 && player.onGround;
  const phase  = moving ? (player.walkF / 6) * Math.PI * 2 : 0;
  const bob    = moving ? Math.abs(Math.sin(phase * 2)) * (run ? 2.8 : 1.6) : 0;

  // Body anchor points (Y, positive = down from origin)
  const NY = -11 - bob * (run ? 0.5 : 0.3);   // neck
  const SY =  -4 + bob * (run ? 0.5 : 0.3);   // shoulders
  const HY =   7 + bob * (run ? 0.7 : 0.5);   // hips

  // Two-segment limb helper — a1: upper angle from +Y axis (positive = forward/+x)
  //                            a2: bend added to a1 for lower segment direction
  const seg = (ox, oy, a1, l1, a2, l2, lw) => {
    ctx.lineWidth = lw;
    const jx = ox + Math.sin(a1) * l1,       jy = oy + Math.cos(a1) * l1;
    const ex = jx + Math.sin(a1 + a2) * l2,  ey = jy + Math.cos(a1 + a2) * l2;
    ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(jx, jy); ctx.lineTo(ex, ey); ctx.stroke();
  };

  ctx.strokeStyle = C.text;
  const UL = 10, LL = 9;   // upper/lower leg lengths
  const UA =  9, LA = 8;   // upper/lower arm lengths

  // ── Leg angles ─────────────────────────────────────────────
  let rH, lH, rK, lK;
  if (air) {
    rH =  0.28; rK = -0.85;
    lH = -0.08; lK = -0.72;
  } else if (moving && run) {
    // Running: wide hip swing + aggressive heel-kick
    rH =  Math.sin(phase)           * 0.80;
    lH =  Math.sin(phase + Math.PI) * 0.80;
    rK = -Math.max(0, -Math.sin(phase))           * 1.05;
    lK = -Math.max(0, -Math.sin(phase + Math.PI)) * 1.05;
  } else if (moving) {
    // Walking: moderate swing
    rH =  Math.sin(phase)           * 0.52;
    lH =  Math.sin(phase + Math.PI) * 0.52;
    rK = -Math.max(0, -Math.sin(phase))           * 0.74;
    lK = -Math.max(0, -Math.sin(phase + Math.PI)) * 0.74;
  } else {
    rH =  0.04; rK = -0.09;
    lH = -0.04; lK = -0.09;
  }

  // ── Arm angles ─────────────────────────────────────────────
  let rA, lA, rE, lE;
  if (air) {
    rA = -0.70; rE = 0.60;
    lA =  0.45; lE = 0.50;
  } else if (moving && run) {
    // Running: tight pumping arms, elbows sharply bent
    rA = Math.sin(phase + Math.PI) * 0.70 - 0.05;
    lA = Math.sin(phase)           * 0.70 + 0.15;
    rE = 0.40 + Math.abs(Math.sin(phase + Math.PI)) * 0.42;
    lE = 0.40 + Math.abs(Math.sin(phase))           * 0.42;
  } else if (moving) {
    // Walking: relaxed swing
    rA = Math.sin(phase + Math.PI) * 0.38 - 0.15;
    lA = Math.sin(phase)           * 0.38 + 0.30;
    rE = 0.16 + Math.abs(Math.sin(phase + Math.PI)) * 0.22;
    lE = 0.16 + Math.abs(Math.sin(phase))           * 0.22;
  } else {
    rA = -0.15; rE = 0.18;
    lA =  0.30; lE = 0.18;
  }

  // Draw order: back side → spine → front side  (creates depth illusion)
  seg(0, HY, rH, UL, rK, LL, 2.4);   // right leg  (back)
  seg(0, SY, rA, UA, rE, LA, 2.3);   // right arm  (back)

  ctx.lineWidth = 2.9;
  ctx.beginPath(); ctx.moveTo(0, NY); ctx.lineTo(0, HY); ctx.stroke(); // spine

  seg(0, HY, lH, UL, lK, LL, 2.4);   // left leg   (front)
  seg(0, SY, lA, UA, lE, LA, 2.3);   // left arm   (front)

  // Torus head — donut ring sitting above the neck
  const HCY = NY - 8;   // head centre
  ctx.fillStyle = C.text;
  ctx.beginPath();
  ctx.arc(0, HCY, 8,   0, Math.PI * 2, false);  // outer disc
  ctx.arc(0, HCY, 3.5, 0, Math.PI * 2, true);   // hole punched CCW
  ctx.fill('evenodd');
  ctx.strokeStyle = C.text; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.arc(0, HCY, 8,   0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, HCY, 3.5, 0, Math.PI * 2); ctx.stroke();

  // Breath puff — small white wisp from mouth area, brighter when freezing
  const bT  = (frame % 52) / 52;
  const bOp = Math.max(0, 0.20 - bT * 0.20) * (0.45 + freezing * 0.50);
  if (bOp > 0.005) {
    ctx.globalAlpha = bOp;
    ctx.fillStyle = '#c8e2f4';
    ctx.beginPath();
    ctx.arc(9 + bT * 6, HCY + 2 - bT * 2, 1.5 + bT * 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Scarf — blows in world wind direction, anchored at neck
  const scarfLocal = wind.force * 16 * f;
  ctx.strokeStyle = '#cc2020'; ctx.lineWidth = 3.5;
  ctx.beginPath(); ctx.moveTo(-2, NY);
  ctx.quadraticCurveTo(scarfLocal * 0.5, NY + 3, scarfLocal, NY + 9);
  ctx.stroke();

  ctx.restore();
}

// ── Draw: Houses ─────────────────────────────────────────
function drawHouse(h) {
  const isBunker = h.type === 'bunker';
  const cx = h.x - cam.x + h.w / 2;
  const cy = h.y - cam.y + (isBunker ? 120 : 84);
  if (cx < -200 || cx > W + 200 || cy < -200 || cy > H + 200) return;

  const RH = isBunker ? 28 : 48;
  const BH = isBunker ? 110 : 72;
  const hw = h.w / 2;

  const isStorm = wind.force < -0.68;
  // Bunkers and metal bunkers never shake
  const shaking = isStorm && !h.flying && h.flyTimer < 60 && h.type === 'normal';
  const shakeX  = shaking ? Math.sin(frame * 0.8) * 4 : 0;

  ctx.save();
  ctx.translate(cx + shakeX, cy);
  ctx.rotate(h.angle);
  ctx.globalAlpha = h.alpha;

  const warm    = player.inHouse === h;
  const isMetal = h.type === 'metal';

  if (isBunker) {
    // ── Fortress Bunker ───────────────────────────────
    // Warm glow when occupied
    if (warm) {
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, hw * 2.2);
      grd.addColorStop(0, 'rgba(255,180,60,0.22)');
      grd.addColorStop(1, 'rgba(255,180,60,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(-hw * 2.2, -RH - BH, hw * 4.4, RH + BH * 2);
    }

    // Sandbag base
    ctx.fillStyle = '#5a4a2a';
    ctx.fillRect(-hw - 6, BH/2 - 14, h.w + 12, 16);
    for (let sb = 0; sb < Math.floor(h.w / 18) + 1; sb++) {
      ctx.fillStyle = sb % 2 === 0 ? '#6a5a34' : '#504228';
      ctx.beginPath();
      ctx.ellipse(-hw + sb * 18 + 9 - 6, BH/2 - 8, 10, 7, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Massive concrete walls
    const wallGrd = ctx.createLinearGradient(-hw, -BH/2, hw, -BH/2);
    wallGrd.addColorStop(0,   '#3a3830');
    wallGrd.addColorStop(0.5, '#4a4840');
    wallGrd.addColorStop(1,   '#2e2c26');
    ctx.fillStyle = wallGrd;
    ctx.fillRect(-hw, -BH/2, h.w, BH);

    // Horizontal concrete seams
    ctx.strokeStyle = 'rgba(0,0,0,0.30)'; ctx.lineWidth = 1.5;
    for (let sl = 1; sl < 5; sl++) {
      const sy2 = -BH/2 + sl * (BH / 5);
      ctx.beginPath(); ctx.moveTo(-hw, sy2); ctx.lineTo(hw, sy2); ctx.stroke();
    }
    // Vertical seams
    for (let vl = 1; vl < 4; vl++) {
      const vx2 = -hw + vl * (h.w / 4);
      ctx.beginPath(); ctx.moveTo(vx2, -BH/2); ctx.lineTo(vx2, BH/2 - 14); ctx.stroke();
    }

    // Left blast wall
    ctx.fillStyle = '#2e2c26';
    ctx.fillRect(-hw - 14, -BH/2 + 10, 14, BH - 24);
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(-hw - 14, -BH/2 + 10, 4, BH - 24);

    // Right blast wall
    ctx.fillStyle = '#2e2c26';
    ctx.fillRect(hw, -BH/2 + 10, 14, BH - 24);
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.fillRect(hw + 8, -BH/2 + 10, 6, BH - 24);

    // Flat armoured roof
    ctx.fillStyle = '#1e1c18';
    ctx.fillRect(-hw - 4, -BH/2 - RH, h.w + 8, RH + 4);
    // Roof edge ridge
    ctx.strokeStyle = '#5a5848'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-hw - 4, -BH/2); ctx.lineTo(hw + 4, -BH/2); ctx.stroke();
    // Snow on roof
    ctx.fillStyle = 'rgba(210,235,252,0.60)';
    ctx.fillRect(-hw - 4, -BH/2 - RH, h.w + 8, 6);
    // Rooftop antenna
    ctx.strokeStyle = '#6a6860'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-hw * 0.5, -BH/2 - RH); ctx.lineTo(-hw * 0.5, -BH/2 - RH - 22); ctx.stroke();
    ctx.fillStyle = '#e84040'; ctx.beginPath(); ctx.arc(-hw * 0.5, -BH/2 - RH - 24, 3, 0, Math.PI * 2); ctx.fill();
    // Vent pipes
    for (const vp of [hw * 0.2, hw * 0.55]) {
      ctx.fillStyle = '#3a3830';
      ctx.fillRect(vp - 5, -BH/2 - RH - 8, 10, 12);
      ctx.fillStyle = '#1e1c18';
      ctx.fillRect(vp - 7, -BH/2 - RH - 12, 14, 6);
    }

    // Vault door (center, massive)
    const dw = 36, dh = 58;
    ctx.fillStyle = '#1a1814';
    ctx.fillRect(-dw/2, BH/2 - dh - 14, dw, dh);
    ctx.strokeStyle = '#5a5040'; ctx.lineWidth = 3;
    ctx.strokeRect(-dw/2, BH/2 - dh - 14, dw, dh);
    // Door bolts
    ctx.fillStyle = '#706858';
    for (const bx2 of [-dw/2 + 5, dw/2 - 5]) {
      for (const by3 of [BH/2 - dh - 8, BH/2 - dh/2 - 14, BH/2 - 22]) {
        ctx.beginPath(); ctx.arc(bx2, by3, 3.5, 0, Math.PI * 2); ctx.fill();
      }
    }
    // Wheel lock
    ctx.strokeStyle = '#908878'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(0, BH/2 - dh/2 - 14, 8, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-8, BH/2 - dh/2 - 14); ctx.lineTo(8, BH/2 - dh/2 - 14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, BH/2 - dh/2 - 22); ctx.lineTo(0, BH/2 - dh/2 - 6); ctx.stroke();

    // Tiny arrow-slit windows
    ctx.fillStyle = warm ? '#ffcc44' : '#080806';
    for (const wx2 of [-hw + 16, -hw + 44, hw - 44, hw - 16]) {
      ctx.fillRect(wx2 - 3, -BH/2 + 20, 6, 14);
      ctx.strokeStyle = '#5a5040'; ctx.lineWidth = 1;
      ctx.strokeRect(wx2 - 3, -BH/2 + 20, 6, 14);
    }
    if (warm) {
      const wg = ctx.createRadialGradient(0, -BH/2 + 27, 0, 0, -BH/2 + 27, 55);
      wg.addColorStop(0, 'rgba(255,200,60,0.22)'); wg.addColorStop(1, 'rgba(255,200,60,0)');
      ctx.fillStyle = wg; ctx.fillRect(-hw, -BH/2, h.w, BH);
    }

  } else if (isMetal) {
    // ── Metal bunker ──────────────────────────────────
    // Subtle cold glow when occupied
    if (warm) {
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, hw * 1.8);
      grd.addColorStop(0, 'rgba(140,180,220,0.18)');
      grd.addColorStop(1, 'rgba(140,180,220,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(-hw * 2, -RH - BH, hw * 4, RH + BH * 2);
    }

    // Flat angular roof (low pitch — sheds snow, storm-proof)
    ctx.fillStyle = '#1e2830';
    ctx.beginPath();
    ctx.moveTo(-hw - 3, -BH/2);
    ctx.lineTo(-hw * 0.3, -(RH * 0.55 + BH/2));
    ctx.lineTo( hw * 0.3, -(RH * 0.55 + BH/2));
    ctx.lineTo( hw + 3, -BH/2);
    ctx.closePath();
    ctx.fill();
    // Roof edge lip
    ctx.strokeStyle = '#3a4a58'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-hw - 3, -BH/2); ctx.lineTo(hw + 3, -BH/2); ctx.stroke();
    // Snow on roof (less — angular sheds it)
    ctx.fillStyle = 'rgba(210,235,252,0.55)';
    ctx.fillRect(-hw - 3, -BH/2 - 3, h.w + 6, 5);

    // Body — corrugated steel
    ctx.fillStyle = '#2e3d4e';
    ctx.fillRect(-hw, -BH/2, h.w, BH);
    // Corrugated lines (horizontal ridges)
    ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1;
    for (let rl = 0; rl < 6; rl++) {
      const ry = -BH/2 + (rl + 0.5) * (BH / 6);
      ctx.beginPath(); ctx.moveTo(-hw, ry); ctx.lineTo(hw, ry); ctx.stroke();
    }
    // Metallic sheen (left bevel)
    ctx.fillStyle = 'rgba(180,210,240,0.08)';
    ctx.fillRect(-hw, -BH/2, 8, BH);
    // Rivet dots
    ctx.fillStyle = 'rgba(100,140,170,0.55)';
    for (const rvx of [-hw + 4, hw - 4]) {
      for (let rvy = -BH/2 + 8; rvy < BH/2; rvy += 16) {
        ctx.beginPath(); ctx.arc(rvx, rvy, 2, 0, Math.PI*2); ctx.fill();
      }
    }
    // Side shadow
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.fillRect(hw - 12, -BH/2, 12, BH);

    // Heavy steel door (center, reinforced)
    ctx.fillStyle = '#1a252e';
    const dw = 22, dh = 38;
    ctx.fillRect(-dw/2, BH/2 - dh, dw, dh);
    ctx.strokeStyle = '#3a5060'; ctx.lineWidth = 2;
    ctx.strokeRect(-dw/2, BH/2 - dh, dw, dh);
    // Door hinges
    ctx.fillStyle = '#506070';
    ctx.fillRect(-dw/2 + 1, BH/2 - dh + 6, 4, 5);
    ctx.fillRect(-dw/2 + 1, BH/2 - 12, 4, 5);
    // Wheel-lock handle
    ctx.strokeStyle = '#708090'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(dw/2 - 5, BH/2 - dh/2, 5, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(dw/2 - 10, BH/2 - dh/2); ctx.lineTo(dw/2, BH/2 - dh/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(dw/2 - 5, BH/2 - dh/2 - 5); ctx.lineTo(dw/2 - 5, BH/2 - dh/2 + 5); ctx.stroke();

    // Slot windows (narrow horizontal, bulletproof-looking)
    ctx.fillStyle = warm ? '#6ab0d0' : '#0c1820';
    ctx.fillRect(-hw + 10, -BH/2 + 14, 22, 8);
    ctx.fillRect( hw - 32, -BH/2 + 14, 22, 8);
    ctx.strokeStyle = '#3a5060'; ctx.lineWidth = 1.5;
    ctx.strokeRect(-hw + 10, -BH/2 + 14, 22, 8);
    ctx.strokeRect( hw - 32, -BH/2 + 14, 22, 8);

    // Vent pipe (instead of chimney)
    ctx.fillStyle = '#2a3a48';
    ctx.fillRect(-hw * 0.4 - 4, -(RH * 0.55 + BH/2) - 10, 8, 14);
    ctx.fillStyle = '#1a2a38';
    ctx.fillRect(-hw * 0.4 - 6, -(RH * 0.55 + BH/2) - 14, 12, 6);

  } else {
    // ── Normal wooden house ───────────────────────────
    if (warm) {
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, hw * 2.2);
      grd.addColorStop(0, 'rgba(255,160,40,0.28)');
      grd.addColorStop(1, 'rgba(255,160,40,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(-hw * 2.2, -RH - BH, hw * 4.4, RH + BH * 2);
    }

    // Chimney
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(hw * 0.22, -(RH + BH/2) - 20, 13, RH * 0.56);

    // Roof
    ctx.fillStyle = '#2e2014';
    ctx.beginPath();
    ctx.moveTo(-hw - 6, -BH/2); ctx.lineTo(0, -(RH + BH/2)); ctx.lineTo(hw + 6, -BH/2);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-hw - 4, -BH/2); ctx.lineTo(0, -(RH + BH/2) + 3); ctx.lineTo(hw + 4, -BH/2);
    ctx.stroke();

    // Snow on roof
    ctx.fillStyle = '#ddeeff';
    ctx.beginPath();
    ctx.moveTo(-hw - 6, -BH/2); ctx.lineTo(0, -(RH + BH/2));
    ctx.lineTo(hw + 6, -BH/2); ctx.lineTo(-hw - 6, -BH/2 + 7);
    ctx.closePath(); ctx.fill();

    // Body
    ctx.fillStyle = '#4e3828';
    ctx.fillRect(-hw, -BH/2, h.w, BH);
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(hw - 14, -BH/2, 14, BH);

    // Door
    ctx.fillStyle = '#1e1008';
    const dw = 22, dh = 36;
    ctx.fillRect(-dw/2, BH/2 - dh, dw, dh);
    ctx.strokeStyle = '#6a4828'; ctx.lineWidth = 2;
    ctx.strokeRect(-dw/2, BH/2 - dh, dw, dh);
    ctx.fillStyle = '#c8a060';
    ctx.beginPath(); ctx.arc(dw/2 - 5, BH/2 - dh/2, 3, 0, Math.PI*2); ctx.fill();

    // Windows
    ctx.fillStyle = warm ? '#ffcc44' : '#1e3048';
    ctx.fillRect(-hw + 10, -BH/2 + 14, 20, 16);
    ctx.fillRect( hw - 30, -BH/2 + 14, 20, 16);
    ctx.strokeStyle = warm ? 'rgba(255,200,80,0.6)' : 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1.5;
    for (const wx of [-hw + 10, hw - 30]) {
      ctx.beginPath(); ctx.moveTo(wx + 10, -BH/2 + 14); ctx.lineTo(wx + 10, -BH/2 + 30); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(wx, -BH/2 + 22); ctx.lineTo(wx + 20, -BH/2 + 22); ctx.stroke();
    }
    if (warm) {
      const wg = ctx.createRadialGradient(0, -BH/2 + 22, 0, 0, -BH/2 + 22, 40);
      wg.addColorStop(0, 'rgba(255,200,60,0.30)'); wg.addColorStop(1, 'rgba(255,200,60,0)');
      ctx.fillStyle = wg; ctx.fillRect(-hw, -BH/2, h.w, BH);
    }

    // Chimney smoke — more puffs, blown by wind
    const smokeDir = wind.force * -18;
    for (let i = 0; i < 5; i++) {
      const t = ((frame * 0.013 + i * 0.22) % 1);
      const drift = smokeDir * t;
      ctx.globalAlpha = h.alpha * (0.38 - t * 0.38);
      const sg = t < 0.4 ? '#b8b8b8' : '#949494';
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.arc(hw * 0.22 + 6 + drift + Math.sin(t * 4.5 + i * 1.2) * 4,
              -(RH + BH/2) - 18 - t * 46, 4 + t * 9, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();
  ctx.globalAlpha = 1;

  // E-key prompts (screen-space, outside rotation/alpha)
  const promptX = h.x - cam.x + h.w / 2;
  const promptY = h.y - cam.y - 18;
  if (promptX > -60 && promptX < W + 60 && h.alpha > 0.5) {
    if (warm) {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.60)';
      rrect(promptX - 42, promptY - 15, 84, 19, 4); ctx.fill();
      ctx.fillStyle = isBunker ? '#ffd700' : isMetal ? '#8ac8e8' : '#c8e4f5';
      ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('[ E ]  EXIT', promptX, promptY); ctx.restore();
    } else if (!player.inHouse && nearHouse(h)) {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.60)';
      const label = isBunker ? '[ E ]  FORTRESS' : isMetal ? '[ E ]  BUNKER' : '[ E ]  SHELTER';
      const pColor = isBunker ? '#ffd700' : isMetal ? '#8ac8e8' : '#e8c84a';
      rrect(promptX - 52, promptY - 15, 104, 19, 4); ctx.fill();
      ctx.fillStyle = pColor; ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'center';
      ctx.fillText(label, promptX, promptY); ctx.restore();
    }
  }
}

// ── Draw: Lightning (during tornado) ─────────────────────
function drawLightning() {
  if (!tornado || tornado.alpha < 0.60) return;
  const fp = frame % 215;
  if (fp > 14) return;
  const flashT = Math.max(0, 1 - fp / 14);
  // Screen-wide flash
  ctx.save();
  ctx.globalAlpha = flashT * tornado.alpha * 0.13;
  ctx.fillStyle = '#c4dcff';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
  if (fp > 7) return;
  // Bolt
  const boltT = Math.max(0, 1 - fp / 7);
  const tx = tornado.x - cam.x;
  ctx.save();
  ctx.globalAlpha = boltT * tornado.alpha * 0.82;
  ctx.lineCap = 'round';
  let bx = tx + Math.sin(frame * 3.9) * 28, by = 0;
  // Glow pass
  ctx.strokeStyle = 'rgba(160,200,255,0.50)';
  ctx.lineWidth = 6;
  ctx.beginPath(); ctx.moveTo(bx, by);
  for (let i = 1; i <= 7; i++) {
    bx += Math.sin(frame * 5.3 + i * 1.9) * 24;
    by  = (i / 7) * (tornado.y - cam.y - 35);
    ctx.lineTo(bx, by);
  }
  ctx.stroke();
  // Core pass
  bx = tx + Math.sin(frame * 3.9) * 28; by = 0;
  ctx.strokeStyle = '#eef6ff';
  ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.moveTo(bx, by);
  for (let i = 1; i <= 7; i++) {
    bx += Math.sin(frame * 5.3 + i * 1.9) * 24;
    by  = (i / 7) * (tornado.y - cam.y - 35);
    ctx.lineTo(bx, by);
  }
  ctx.stroke();
  ctx.restore();
}

// ── Draw: Tornado ─────────────────────────────────────────
function drawTornado() {
  if (!tornado || tornado.alpha < 0.01) return;
  const sx = tornado.x - cam.x;
  const sy = tornado.y - cam.y;
  if (sx < -400 || sx > W + 400) return;

  const tScale = tornado.scale || 1.0;
  const isHyper = tScale > 1.2;
  const TH = 185 * tScale, TW = 100 * tScale, BW = 10 * tScale;
  const a  = tornado.alpha;
  const ang = tornado.angle;

  ctx.save();

  // ── 1. Outer storm halo ───────────────────────────────────
  ctx.globalAlpha = a * 0.22;
  const haloGrd = ctx.createRadialGradient(sx, sy - TH * 0.5, 0, sx, sy - TH * 0.5, TW * 3.2);
  haloGrd.addColorStop(0,   isHyper ? 'rgba(80,20,120,0.55)' : 'rgba(30,40,70,0.55)');
  haloGrd.addColorStop(0.5, isHyper ? 'rgba(50,10,90,0.25)'  : 'rgba(20,30,55,0.25)');
  haloGrd.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = haloGrd;
  ctx.fillRect(sx - TW * 3.5, sy - TH - 60, TW * 7, TH + 80);

  // ── 2. Massive storm cloud base ───────────────────────────
  ctx.globalAlpha = a * 0.90;
  for (let cl = 0; cl < 5; cl++) {
    const cOff  = Math.sin(ang * 0.6 + cl * 1.3) * TW * 0.55;
    const cOffy = Math.cos(ang * 0.4 + cl * 0.9) * 12;
    const cR    = TW * (1.2 + cl * 0.28);
    const cGrd  = ctx.createRadialGradient(sx + cOff, sy - TH + cOffy, 0, sx + cOff, sy - TH + cOffy, cR);
    cGrd.addColorStop(0,   isHyper ? 'rgba(40,10,70,0.88)' : 'rgba(28,36,52,0.88)');
    cGrd.addColorStop(0.45, isHyper ? 'rgba(30,8,58,0.60)' : 'rgba(20,28,44,0.60)');
    cGrd.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = cGrd;
    ctx.beginPath();
    ctx.ellipse(sx + cOff, sy - TH + cOffy, cR, 44 * tScale + cl * 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── 3. Outer funnel wall — thick layered stripes ──────────
  ctx.lineCap = 'round';
  for (let band = 0; band < 28; band++) {
    const t     = band / 27;
    const bandY = sy - TH + t * TH;
    const bandW = TW * (1 - t) + BW * t;
    const twist = ang * 2.2 + t * Math.PI * 7;
    const swayX = Math.sin(twist) * bandW * 0.32;
    const swayX2= Math.sin(twist + 0.9) * bandW * 0.18;

    // Shadow stripe (wide, dark)
    ctx.globalAlpha = a * (0.12 + (1 - t) * 0.22);
    ctx.strokeStyle = isHyper
      ? `rgba(${(20 + t*30)|0},${(5 + t*10)|0},${(40 + t*20)|0},0.9)`
      : `rgba(${(30 + t*40)|0},${(40 + t*35)|0},${(60 + t*30)|0},0.9)`;
    ctx.lineWidth = (3.5 + (1 - t) * 5) * tScale;
    ctx.beginPath();
    ctx.ellipse(sx + swayX, bandY, bandW, bandW * 0.13, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Highlight stripe (thin, lighter)
    ctx.globalAlpha = a * (0.08 + (1 - t) * 0.14);
    ctx.strokeStyle = isHyper
      ? `rgba(180,80,255,0.7)`
      : `rgba(140,170,210,0.7)`;
    ctx.lineWidth = (0.8 + (1 - t) * 1.4) * tScale;
    ctx.beginPath();
    ctx.ellipse(sx + swayX2, bandY, bandW * 0.7, bandW * 0.09, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // ── 4. Inner condensation funnel (bright core) ────────────
  ctx.globalAlpha = a * 0.28;
  const innerW = TW * 0.42, innerBW = BW * 0.6;
  const coneGrd = ctx.createLinearGradient(sx, sy - TH, sx, sy);
  if (isHyper) {
    coneGrd.addColorStop(0,   'rgba(140,40,220,0.85)');
    coneGrd.addColorStop(0.35,'rgba(100,20,180,0.65)');
    coneGrd.addColorStop(0.72,'rgba(70,10,130,0.40)');
    coneGrd.addColorStop(1,   'rgba(40,5,80,0.15)');
  } else {
    coneGrd.addColorStop(0,   'rgba(160,185,220,0.85)');
    coneGrd.addColorStop(0.35,'rgba(110,140,190,0.65)');
    coneGrd.addColorStop(0.72,'rgba(70,100,155,0.40)');
    coneGrd.addColorStop(1,   'rgba(40,65,110,0.15)');
  }
  ctx.fillStyle = coneGrd;
  const ctrl = Math.sin(ang * 1.1) * 28 * tScale;
  ctx.beginPath();
  ctx.moveTo(sx - innerW, sy - TH);
  ctx.quadraticCurveTo(sx + ctrl, sy - TH * 0.48, sx, sy);
  ctx.quadraticCurveTo(sx - ctrl, sy - TH * 0.48, sx + innerW, sy - TH);
  ctx.closePath();
  ctx.fill();

  // ── 5. Spiral rope lines along the funnel ─────────────────
  ctx.lineCap = 'round';
  for (let rope = 0; rope < 4; rope++) {
    const ropeOff = (rope / 4) * Math.PI * 2;
    ctx.globalAlpha = a * 0.30;
    ctx.strokeStyle = isHyper ? 'rgba(200,100,255,0.65)' : 'rgba(180,205,240,0.55)';
    ctx.lineWidth = 1.4 * tScale;
    ctx.beginPath();
    for (let i = 0; i <= 24; i++) {
      const t     = i / 24;
      const bandW = TW * (1 - t) + BW * t;
      const spiralAng = ang * 2.5 + ropeOff + t * Math.PI * 6;
      const rx = sx + Math.cos(spiralAng) * bandW * 0.88;
      const ry = sy - TH + t * TH + Math.sin(spiralAng * 0.7) * 5 * tScale;
      i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
    }
    ctx.stroke();
  }

  // ── 6. Ground contact zone — dust & dirt layers ───────────
  // Outer kicked-up dust ring
  ctx.globalAlpha = a * 0.38;
  const dustR = 110 * tScale;
  const dustGrd = ctx.createRadialGradient(sx, sy, 0, sx, sy, dustR);
  dustGrd.addColorStop(0,   isHyper ? 'rgba(100,30,160,0.70)' : 'rgba(100,80,50,0.70)');
  dustGrd.addColorStop(0.40, isHyper ? 'rgba(70,15,110,0.45)' : 'rgba(80,60,35,0.45)');
  dustGrd.addColorStop(0.75,'rgba(50,40,25,0.20)');
  dustGrd.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = dustGrd;
  ctx.beginPath();
  ctx.ellipse(sx, sy, dustR, 26 * tScale, 0, 0, Math.PI * 2);
  ctx.fill();

  // Spinning dust streaks at the base
  ctx.globalAlpha = a * 0.45;
  ctx.strokeStyle = isHyper ? 'rgba(160,60,255,0.55)' : 'rgba(140,110,70,0.55)';
  ctx.lineWidth = 2 * tScale;
  for (let ds = 0; ds < 10; ds++) {
    const da = ang * 3.5 + (ds / 10) * Math.PI * 2;
    const dr1 = dustR * 0.22, dr2 = dustR * (0.55 + (ds % 3) * 0.15);
    ctx.beginPath();
    ctx.moveTo(sx + Math.cos(da) * dr1, sy + Math.sin(da) * dr1 * 0.22);
    ctx.lineTo(sx + Math.cos(da) * dr2, sy + Math.sin(da) * dr2 * 0.22);
    ctx.stroke();
  }

  // Inner vortex glow at tip
  ctx.globalAlpha = a * 0.55;
  const tipGrd = ctx.createRadialGradient(sx, sy, 0, sx, sy, 30 * tScale);
  tipGrd.addColorStop(0, isHyper ? 'rgba(220,130,255,0.90)' : 'rgba(200,220,255,0.90)');
  tipGrd.addColorStop(0.5, isHyper ? 'rgba(140,50,220,0.55)' : 'rgba(140,170,220,0.55)');
  tipGrd.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = tipGrd;
  ctx.beginPath();
  ctx.ellipse(sx, sy, 30 * tScale, 9 * tScale, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── 7. Rain curtain around the tornado ───────────────────
  ctx.globalAlpha = a * 0.18;
  ctx.strokeStyle = isHyper ? 'rgba(180,100,255,0.55)' : 'rgba(160,200,240,0.55)';
  ctx.lineWidth = 0.8;
  for (let ri = 0; ri < 22; ri++) {
    const ra = (ri / 22) * Math.PI * 2 + ang * 0.4;
    const rDist = TW * (1.15 + (ri % 3) * 0.22);
    const rx = sx + Math.cos(ra) * rDist;
    const ry = sy - TH * (0.15 + (ri % 4) * 0.18);
    const rLen = 18 + (ri % 5) * 12;
    ctx.beginPath();
    ctx.moveTo(rx, ry);
    ctx.lineTo(rx + Math.cos(ang + ri) * 4, ry + rLen);
    ctx.stroke();
  }

  // ── 8. Debris (larger, with shadow) ──────────────────────
  ctx.globalAlpha = a;
  for (const d of tornado.debris) {
    const dx = d.x - cam.x, dy = d.y - cam.y;
    if (dx < -40 || dx > W + 40 || dy < -40 || dy > H + 40) continue;
    ctx.save();
    ctx.translate(dx, dy);
    ctx.rotate(ang * d.rotSpeed);
    // Shadow
    ctx.globalAlpha = a * 0.30;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(-d.w / 2 + 2, -d.h / 2 + 2, d.w, d.h);
    // Piece
    ctx.globalAlpha = a;
    ctx.fillStyle = d.color;
    ctx.fillRect(-d.w / 2, -d.h / 2, d.w, d.h);
    // Highlight edge
    ctx.globalAlpha = a * 0.40;
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 0.6;
    ctx.strokeRect(-d.w / 2, -d.h / 2, d.w, d.h);
    ctx.restore();
  }

  // ── 9. Electric inner glow (hypercane only) ───────────────
  if (isHyper) {
    for (let vein = 0; vein < 6; vein++) {
      const vA = ang * 4 + (vein / 6) * Math.PI * 2;
      const vT = (Math.sin(ang * 8 + vein * 2.1) + 1) / 2; // 0-1 flicker
      ctx.globalAlpha = a * vT * 0.45;
      ctx.strokeStyle = 'rgba(220,160,255,0.90)';
      ctx.lineWidth = 0.9;
      const vR1 = BW * 0.5, vR2 = TW * (0.3 + vT * 0.4);
      const vFrac = 0.2 + vT * 0.5;
      const vx1 = sx + Math.cos(vA) * vR1, vy1 = sy - TH * 0.05;
      const vx2 = sx + Math.cos(vA + 0.5) * vR2, vy2 = sy - TH * vFrac;
      ctx.beginPath(); ctx.moveTo(vx1, vy1); ctx.lineTo(vx2, vy2); ctx.stroke();
    }
  }

  ctx.restore();
}

// ── Draw: HUD ─────────────────────────────────────────────
function drawHUD() {
  const wi = windInfo(), f = wind.force, mx = W / 2;

  // Wind pill (top center)
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.50)';
  rrect(mx - 165, 10, 330, 40, 7); ctx.fill();

  const barW = 210, barH = 6, bx = mx - barW/2, by = 34;
  ctx.fillStyle = 'rgba(255,255,255,0.07)'; ctx.fillRect(bx, by, barW, barH);
  ctx.fillStyle = 'rgba(255,255,255,0.30)'; ctx.fillRect(mx-1, by-3, 2, barH+6);

  const fillW = Math.min(barW/2, Math.abs(f)/0.90 * (barW/2));
  if (Math.abs(f) > 0.03) {
    const wCol = f > 0.04 ? '#e8c84a'
               : wi.lvl>=5 ? '#cc44ff'
               : wi.lvl>=3 ? '#e84040'
               : wi.lvl>=2 ? '#e8902a' : '#5dade2';
    ctx.fillStyle = wCol;
    if (f < 0) ctx.fillRect(mx - fillW, by, fillW, barH);
    else        ctx.fillRect(mx, by, Math.min(fillW, barW/2), barH);
  }

  ctx.font = '10px Courier New';
  ctx.fillStyle = f < -0.04 ? '#5dade2' : 'rgba(255,255,255,0.2)';
  ctx.textAlign = 'left';  ctx.fillText('◄', bx-14, by+7);
  ctx.fillStyle = f >  0.04 ? '#e8c84a' : 'rgba(255,255,255,0.2)';
  ctx.textAlign = 'right'; ctx.fillText('►', bx+barW+14, by+7);

  const lblCol = wi.lvl>=5?'#cc44ff':wi.lvl>=3?'#ff5c5c':wi.lvl>=2?'#ffaa44':C.text;
  ctx.fillStyle = lblCol; ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'center'; ctx.fillText(wi.label, mx, 29);
  ctx.restore();

  // Score + tier (top left)
  const score = Math.floor(maxReach / 12);
  const tier  = getWindTier();
  const tierC = ['#5dade2','#6bcb77','#e8c84a','#e8902a','#e84040','#cc2020','#cc44ff'][tier] || '#cc44ff';

  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.48)'; rrect(14,10,164,40,5); ctx.fill();

  ctx.fillStyle = C.dim; ctx.font = '9px Courier New'; ctx.textAlign = 'left';
  ctx.fillText('DISTANCE', 21, 22);
  ctx.fillStyle = C.text; ctx.font = 'bold 16px Courier New';
  ctx.fillText(score + 'm', 21, 40);

  ctx.fillStyle = tierC; ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'right';
  ctx.fillText('TIER ' + tier, 170, 22);
  if (tier < 6) {
    ctx.fillStyle = C.dim; ctx.font = '9px Courier New';
    ctx.fillText((tier === 5 ? 1500 : (tier+1)*200) + 'm', 170, 40);
  } else {
    ctx.fillStyle = tierC; ctx.font = '9px Courier New'; ctx.fillText('MAX', 170, 40);
  }

  if (bestScore > 0) {
    ctx.fillStyle = 'rgba(200,228,245,0.20)'; ctx.font = '8px Courier New';
    ctx.textAlign = 'center'; ctx.fillText('BEST ' + bestScore + 'm', 97, 53);
  }
  ctx.restore();
}

// ── Draw: Freeze meter (top right) ───────────────────────
function drawFreezeMeter() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.48)';
  rrect(W - 178, 10, 164, 40, 5); ctx.fill();

  ctx.fillStyle = C.dim; ctx.font = '9px Courier New'; ctx.textAlign = 'left';
  ctx.fillText('COLD', W - 171, 22);
  if (player.inHouse) {
    const isMetal = player.inHouse.type === 'metal';
    ctx.fillStyle = isMetal ? '#8ac8e8' : '#ffaa44';
    ctx.font = 'bold 9px Courier New'; ctx.textAlign = 'right';
    ctx.fillText(isMetal ? '● BUNKER' : '● SHELTERED', W - 20, 22);
  }

  const barW = 140, barH = 6, bx = W - 171, by = 28;
  ctx.fillStyle = 'rgba(255,255,255,0.07)'; ctx.fillRect(bx, by, barW, barH);

  // Color: pale blue → deep icy blue → bright white-blue at max
  const t = freezing;
  const r = Math.round(t < 0.5 ? 80 + t * 2 * 60  : 140 - (t-0.5)*2*120);
  const g = Math.round(t < 0.5 ? 160 + t * 2 * 40  : 200 - (t-0.5)*2*150);
  const b = Math.round(t < 0.5 ? 220               : 220 + (t-0.5)*2*35);

  // Pulse rapidly when nearly frozen
  const pulse = freezing > 0.80 ? 0.55 + 0.45 * Math.sin(frame * 0.35) : 1;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(bx, by, barW * freezing, barH);
  ctx.globalAlpha = 1;

  const pct = Math.round(freezing * 100);
  ctx.fillStyle = freezing > 0.75 ? '#aaddff' : C.dim;
  ctx.font = 'bold 9px Courier New'; ctx.textAlign = 'right';
  ctx.fillText(pct + '%', W - 20, 38);
  ctx.restore();
}

// ── Draw: Stamina bar (bottom center) ────────────────────
function drawStaminaBar() {
  if (gState !== 'playing') return;
  const barW = 190, barH = 7;
  const bx = W / 2 - barW / 2, by = H - 26;

  ctx.save();

  // Pill background
  ctx.fillStyle = 'rgba(0,0,0,0.50)';
  rrect(bx - 12, by - 14, barW + 24, 24, 5); ctx.fill();

  // Track
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fillRect(bx, by, barW, barH);

  if (staminaDepleted) {
    // Cooldown countdown shown as a dimming bar
    const coolPct = staminaCooldown / 120;
    ctx.fillStyle = `rgba(210,70,40,${0.30 + 0.20 * Math.sin(frame * 0.22)})`;
    ctx.fillRect(bx, by, barW * coolPct, barH);

    // "RECHARGING" label
    const pulse = 0.55 + 0.45 * Math.abs(Math.sin(frame * 0.15));
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#e06040'; ctx.font = 'bold 9px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('RECHARGING…', W / 2, by - 2);
    ctx.globalAlpha = 1;
  } else {
    // Stamina fill — green → yellow → orange as it drains
    const t = stamina;
    const r = t > 0.6 ? 52  : t > 0.3 ? 230 : 232;
    const g = t > 0.6 ? 215 : t > 0.3 ? 205 : 130;
    const b = t > 0.6 ? 140 : t > 0.3 ?  55 :  28;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(bx, by, barW * t, barH);

    // Labels
    ctx.font = '9px Courier New'; ctx.textAlign = 'left';
    ctx.fillStyle = C.dim;
    ctx.fillText('STAMINA', bx, by - 2);

    const running = keys['ShiftLeft'] && player.onGround && stamina > 0;
    ctx.textAlign = 'right';
    ctx.fillStyle = running ? `rgb(${r},${g},${b})` : C.dim;
    ctx.fillText('SHIFT', bx + barW, by - 2);
  }

  ctx.restore();
}

// ── Draw: Overlay ────────────────────────────────────────
function drawOverlay() {
  if (gState === 'playing') return;
  ctx.fillStyle = 'rgba(5,10,20,0.80)'; ctx.fillRect(0,0,W,H);
  const score = Math.floor(maxReach / 12);
  ctx.textAlign = 'center';
  ctx.fillStyle = deathReason === 'tornado' ? '#cc44ff' : '#7aaccc';
  ctx.font = 'bold 52px Courier New';
  const dMsg = deathReason === 'freeze' ? 'FROZEN SOLID'
             : deathReason === 'tornado' ? 'SWEPT AWAY'
             : 'FALLEN';
  ctx.fillText(dMsg, W/2, H/2 - 28);
  ctx.fillStyle = C.text; ctx.font = 'bold 22px Courier New';
  ctx.fillText(score + 'm', W/2, H/2 + 14);
  if (bestScore > 0) {
    const isNew = score >= bestScore;
    ctx.fillStyle = isNew ? '#e8c84a' : C.dim; ctx.font = '13px Courier New';
    ctx.fillText(isNew ? 'new best!' : 'best: ' + bestScore + 'm', W/2, H/2 + 38);
  }
  ctx.fillStyle = C.text; ctx.font = 'bold 12px Courier New';
  ctx.fillText('PRESS R TO TRY AGAIN', W/2, H/2 + 72);
}

// ── Draw: Vignette + frost overlay ───────────────────────
function drawVignette() {
  // Edge darkening — thickens in heavy storms
  const grd = ctx.createRadialGradient(W/2, H/2, H*0.26, W/2, H/2, H*0.92);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, `rgba(0,4,12,${(0.32 + wind.strength * 0.18).toFixed(3)})`);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Frost vignette — appears at high freeze
  if (freezing > 0.55) {
    const ft = (freezing - 0.55) / 0.45; // 0→1 as freeze goes 55%→100%
    const fg = ctx.createRadialGradient(W/2, H/2, H*0.18, W/2, H/2, H*0.78);
    fg.addColorStop(0, 'rgba(160,210,240,0)');
    fg.addColorStop(0.7, `rgba(160,210,240,${(ft*0.10).toFixed(3)})`);
    fg.addColorStop(1,   `rgba(180,225,250,${(ft*0.45).toFixed(3)})`);
    ctx.fillStyle = fg;
    ctx.fillRect(0, 0, W, H);

    // Ice crystal dendrites at screen corners when nearly frozen
    if (ft > 0.45) {
      const ict = (ft - 0.45) / 0.55;
      ctx.save();
      ctx.globalAlpha = ict * 0.65;
      ctx.strokeStyle = 'rgba(195,230,250,0.80)';
      ctx.lineCap = 'round';
      const corners = [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]];
      for (const [ox, oy, dx, dy] of corners) {
        const arms = 5, spread = ict * 80;
        for (let a = 0; a < arms; a++) {
          const angle = (a / arms) * Math.PI * 0.5 + Math.atan2(dy, dx);
          const len   = spread * (0.55 + (a % 2) * 0.45);
          ctx.lineWidth = 1.2 - a * 0.15;
          ctx.beginPath();
          ctx.moveTo(ox, oy);
          ctx.lineTo(ox + Math.cos(angle)*len*dx, oy + Math.sin(angle)*len*dy);
          ctx.stroke();
        }
      }
      ctx.restore();
    }
  }
}

// ── Loop ──────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  // Subtle camera shake in heavy storms
  const shakeStr = Math.max(0, wind.strength - 0.60) * 2.2
                 + (tornado && tornado.alpha > 0.5 ? tornado.alpha * 1.8 : 0);
  if (shakeStr > 0.05) {
    const sx = Math.sin(frame * 13.7) * shakeStr;
    const sy = Math.sin(frame * 9.3 + 1.2) * shakeStr * 0.5;
    ctx.translate(sx, sy);
  }
  drawSky();
  drawClouds();
  drawMountains();
  drawAtmosphere();
  drawSnow();
  drawGroundDrift();
  drawParticles();
  platforms.forEach(drawPlatform);
  houses.forEach(drawHouse);
  drawLightning();
  drawTornado();
  drawStickman();
  drawVignette();
  ctx.restore();
  drawHUD();
  drawFreezeMeter();
  drawStaminaBar();
  drawChallenge();
  drawOverlay();
}

// ── Audio System ──────────────────────────────────────────
const WindAudio = (() => {
  let ac = null;
  let master, windGain, windLP, gustGain, rumbleGain, droneGain, torGain, iceGain;
  let started = false, prevLightning = false;

  // Pink-ish noise (gentler than brown)
  function mkNoise(color = 0.995) {
    const n = ac.sampleRate * 4;
    const buf = ac.createBuffer(1, n, ac.sampleRate);
    const d = buf.getChannelData(0);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;
    for (let i = 0; i < n; i++) {
      const w = Math.random() * 2 - 1;
      b0=color*b0+w*0.0555179; b1=color*b1+w*0.0750759;
      b2=color*b2+w*0.1538520; b3=color*b3+w*0.3104856;
      b4=color*b4+w*0.5329522; b5=color*b5+w*0.0168980;
      d[i] = Math.max(-1, Math.min(1, (b0+b1+b2+b3+b4+b5+w*0.115926) * 0.11));
    }
    const s = ac.createBufferSource(); s.buffer = buf; s.loop = true; return s;
  }

  function mkOsc(type, freq) {
    const o = ac.createOscillator(); o.type = type; o.frequency.value = freq; o.start(); return o;
  }
  function mkLFO(freq) { return mkOsc('sine', freq); }

  function init() {
    if (started) return;
    started = true;
    ac = new (window.AudioContext || window.webkitAudioContext)();
    ac.resume();
    master = ac.createGain(); master.gain.value = 0.85; master.connect(ac.destination);

    // ── Layer 1: main wind rush — pink noise → smooth lowpass ──
    // No aggressive filter modulation; cutoff just rises with wind strength
    const w1 = mkNoise();
    windLP = ac.createBiquadFilter(); windLP.type = 'lowpass'; windLP.Q.value = 0.4;
    windLP.frequency.value = 600;
    const wHP = ac.createBiquadFilter(); wHP.type = 'highpass'; wHP.frequency.value = 80;
    windGain = ac.createGain(); windGain.gain.value = 0.0;
    w1.connect(windLP); windLP.connect(wHP); wHP.connect(windGain);
    windGain.connect(master); w1.start();

    // ── Layer 2: slow gusting — second noise source with very slow LFO on gain ──
    // Creates gentle "gust" swells without wobbly filter artifacts
    const w2 = mkNoise(0.990);
    const gLP = ac.createBiquadFilter(); gLP.type = 'lowpass'; gLP.frequency.value = 320; gLP.Q.value = 0.3;
    gustGain = ac.createGain(); gustGain.gain.value = 0.0;
    const gustLFO = ac.createGain(); gustLFO.gain.value = 0.10;
    mkLFO(0.055).connect(gustLFO); gustLFO.connect(gustGain.gain);
    w2.connect(gLP); gLP.connect(gustGain); gustGain.connect(master); w2.start();

    // ── Layer 3: deep low rumble — very low noise for "air pressure" feeling ──
    const w3 = mkNoise(0.999);
    const rLP = ac.createBiquadFilter(); rLP.type = 'lowpass'; rLP.frequency.value = 55; rLP.Q.value = 0.5;
    rumbleGain = ac.createGain(); rumbleGain.gain.value = 0.0;
    w3.connect(rLP); rLP.connect(rumbleGain); rumbleGain.connect(master); w3.start();

    // ── Layer 4: storm drone — two detuned sub-bass sines, very subtle ──
    const d1 = mkOsc('sine', 48), d2 = mkOsc('sine', 51.5);
    const dMix = ac.createGain(); dMix.gain.value = 0.18;
    const dLP = ac.createBiquadFilter(); dLP.type = 'lowpass'; dLP.frequency.value = 220; dLP.Q.value = 1.0;
