      ctx.lineTo(sx2 + 7, wallTop + 34);
      ctx.lineTo(sx2 - 7, wallTop + 34);
      ctx.closePath(); ctx.fill();
      // Iron bar cross
      ctx.strokeStyle = '#302820'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(sx2, wallTop + 12); ctx.lineTo(sx2, wallTop + 34); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx2 - 4, wallTop + 23); ctx.lineTo(sx2 + 4, wallTop + 23); ctx.stroke();
    }

    // Lower row — narrow firing slits (4x)
    const lowerSlits = [-hw + 46, -hw * 0.2, hw * 0.2, hw - 46];
    for (const sx2 of lowerSlits) {
      ctx.fillStyle = '#090706';
      ctx.fillRect(sx2 - 4, wallTop + 52, 8, 22);
      ctx.fillStyle = warm ? '#aa7818' : '#080604';
      ctx.fillRect(sx2 - 2, wallTop + 54, 4, 18);
      // Single vertical bar
      ctx.strokeStyle = '#282018'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(sx2, wallTop + 54); ctx.lineTo(sx2, wallTop + 72); ctx.stroke();
    }

    // Warm light glow from all slits
    if (warm) {
      for (const sx2 of [...upperSlits, ...lowerSlits]) {
        const wg = ctx.createRadialGradient(sx2, wallTop + 28, 0, sx2, wallTop + 28, 38);
        wg.addColorStop(0, 'rgba(255,170,30,0.22)'); wg.addColorStop(1, 'rgba(255,170,30,0)');
        ctx.fillStyle = wg; ctx.fillRect(sx2 - 38, wallTop, 76, BH);
      }
    }

    // ═══════════════════════════════════════════════════
    // LAYER 9 — SANDBAGS + BARBED WIRE
    // ═══════════════════════════════════════════════════

    // Three rows of sandbags at the base
    const sbW = 16, sbH = 9;
    for (let row = 0; row < 3; row++) {
      const rowY = wallBot - 6 - row * (sbH - 2);
      const offset = (row % 2) * (sbW / 2);
      const count = Math.ceil(h.w / sbW) + 2;
      for (let sb = 0; sb < count; sb++) {
        const sbX = -hw - 4 + sb * sbW - offset;
        if (sbX + sbW < -hw - 4 || sbX > hw + 4) continue;
        const shade = row === 0 ? (sb%2===0 ? '#6e5e32' : '#5e5028') :
                      row === 1 ? (sb%2===0 ? '#62542c' : '#524824') :
                                  (sb%2===0 ? '#584c28' : '#4a4020');
        ctx.fillStyle = shade;
        ctx.beginPath();
        ctx.ellipse(sbX + sbW/2, rowY + sbH/2, sbW/2 - 0.5, sbH/2 - 0.5, 0, 0, Math.PI*2);
        ctx.fill();
        // Highlight on top
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.beginPath();
        ctx.ellipse(sbX + sbW/2, rowY + sbH * 0.3, sbW/2 - 2, sbH * 0.22, 0, 0, Math.PI*2);
        ctx.fill();
        // Seam line
        ctx.strokeStyle = 'rgba(0,0,0,0.28)'; ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.moveTo(sbX + 2, rowY + sbH/2); ctx.lineTo(sbX + sbW - 2, rowY + sbH/2); ctx.stroke();
      }
    }

    // Barbed wire on top of sandbags (2 strands)
    for (let strand = 0; strand < 2; strand++) {
      const wireY = wallBot - 30 - strand * 7;
      ctx.strokeStyle = 'rgba(160,150,120,0.65)'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      for (let wx3 = -hw - 4; wx3 <= hw + 4; wx3 += 3) {
        ctx.lineTo(wx3, wireY + Math.sin(wx3 * 0.35) * 1.5);
      }
      ctx.stroke();
      // Barb spikes every 12px
      ctx.strokeStyle = 'rgba(140,130,100,0.70)'; ctx.lineWidth = 0.7;
      for (let bx3 = -hw; bx3 < hw; bx3 += 12) {
        const by4 = wireY + Math.sin(bx3 * 0.35) * 1.5;
        ctx.beginPath(); ctx.moveTo(bx3 - 3, by4 - 2.5); ctx.lineTo(bx3 + 3, by4 + 2.5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx3 + 3, by4 - 2.5); ctx.lineTo(bx3 - 3, by4 + 2.5); ctx.stroke();
      }
    }

    // ── Arrow-slit glow already handled above ────────

  } else if (isMetal) {
    // ══════════════════════════════════════════════════
    // ── METAL BUNKER ──────────────────────────────────
    // ══════════════════════════════════════════════════

    // Occupied cold glow
    if (warm) {
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, hw * 2.0);
      grd.addColorStop(0, 'rgba(140,200,240,0.20)');
      grd.addColorStop(1, 'rgba(140,200,240,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(-hw * 2.2, -RH - BH, hw * 4.4, RH + BH * 2);
    }

    // ── Foundation ────────────────────────────────────
    ctx.fillStyle = '#1e2428';
    ctx.fillRect(-hw - 4, BH/2, h.w + 8, 8);

    // ── Low-pitch angular roof ────────────────────────
    const roofPeak = -(RH * 0.5 + BH/2);
    ctx.fillStyle = '#1a2430';
    ctx.beginPath();
    ctx.moveTo(-hw - 4, -BH/2);
    ctx.lineTo(-hw * 0.25, roofPeak);
    ctx.lineTo( hw * 0.25, roofPeak);
    ctx.lineTo( hw + 4, -BH/2);
    ctx.closePath(); ctx.fill();
    // Roof panels (corrugated ridgelines)
    ctx.strokeStyle = 'rgba(180,220,255,0.09)'; ctx.lineWidth = 1;
    for (let rp = 1; rp < 4; rp++) {
      const t2 = rp / 4;
      const rx1 = -hw - 4 + t2 * (hw + 4 - hw * 0.25);
      const ry1 = -BH/2 + t2 * (roofPeak - (-BH/2));
      const rx2 =  hw + 4 - t2 * (hw + 4 - hw * 0.25);
      ctx.beginPath(); ctx.moveTo(rx1, ry1); ctx.lineTo(rx2, ry1); ctx.stroke();
    }
    // Roof edge lip / gutter
    ctx.strokeStyle = '#2e4050'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(-hw - 4, -BH/2); ctx.lineTo(hw + 4, -BH/2); ctx.stroke();
    // Snow drifted on roof (more on left side, wind-deposited)
    ctx.fillStyle = 'rgba(215,238,255,0.58)';
    ctx.fillRect(-hw - 4, -BH/2 - 4, h.w + 8, 5);
    // Icicles hanging from roof edge
    for (let ic = 0; ic < 7; ic++) {
      const ix = -hw + 6 + ic * (h.w - 6) / 6;
      const ilen = 6 + Math.abs(Math.sin(ic * 2.1)) * 12;
      const ig = ctx.createLinearGradient(ix, -BH/2, ix, -BH/2 + ilen);
      ig.addColorStop(0,   'rgba(190,230,255,0.85)');
      ig.addColorStop(0.6, 'rgba(210,240,255,0.50)');
      ig.addColorStop(1,   'rgba(220,245,255,0)');
      ctx.fillStyle = ig;
      ctx.beginPath();
      ctx.moveTo(ix - 2, -BH/2);
      ctx.lineTo(ix + 2, -BH/2);
      ctx.lineTo(ix, -BH/2 + ilen);
      ctx.closePath(); ctx.fill();
    }

    // ── Body — corrugated steel panels ───────────────
    ctx.fillStyle = '#2a3a4a';
    ctx.fillRect(-hw, -BH/2, h.w, BH);

    // Corrugated horizontal ridges (pressed steel look)
    for (let rl = 0; rl < 7; rl++) {
      const ry = -BH/2 + (rl + 0.5) * (BH / 7);
      // Light top edge of ridge
      ctx.strokeStyle = 'rgba(220,240,255,0.11)'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(-hw, ry - 0.5); ctx.lineTo(hw, ry - 0.5); ctx.stroke();
      // Dark bottom edge of ridge
      ctx.strokeStyle = 'rgba(0,0,0,0.22)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(-hw, ry + 1.5); ctx.lineTo(hw, ry + 1.5); ctx.stroke();
    }

    // Panel seams (vertical, 3 panels)
    ctx.strokeStyle = 'rgba(0,0,0,0.32)'; ctx.lineWidth = 1.5;
    for (const px2 of [-hw * 0.3, hw * 0.3]) {
      ctx.beginPath(); ctx.moveTo(px2, -BH/2); ctx.lineTo(px2, BH/2); ctx.stroke();
    }

    // Rivet rows (left and right edge columns, plus panel joins)
    ctx.fillStyle = 'rgba(120,160,195,0.60)';
    for (const rvx of [-hw + 5, hw - 5, -hw * 0.3 - 1, hw * 0.3 + 1]) {
      for (let rvy = -BH/2 + 7; rvy < BH/2; rvy += 13) {
        ctx.beginPath(); ctx.arc(rvx, rvy, 2, 0, Math.PI*2); ctx.fill();
        // Rivet shadow
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath(); ctx.arc(rvx + 0.5, rvy + 0.5, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(120,160,195,0.60)';
      }
    }

    // Rust streaks (diagonal stains running down from rivets)
    ctx.strokeStyle = 'rgba(110,55,20,0.28)'; ctx.lineWidth = 1.2;
    for (const rx2 of [-hw + 5, hw * 0.3 + 1]) {
      ctx.beginPath(); ctx.moveTo(rx2, -BH/2 + 18); ctx.lineTo(rx2 + 3, -BH/2 + 38); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rx2, -BH/2 + 44); ctx.lineTo(rx2 + 2, -BH/2 + 60); ctx.stroke();
    }

    // Metallic sheen — left face lighter
    ctx.fillStyle = 'rgba(180,218,248,0.07)';
    ctx.fillRect(-hw, -BH/2, 9, BH);
    // Right face darker
    ctx.fillStyle = 'rgba(0,0,0,0.20)';
    ctx.fillRect(hw - 14, -BH/2, 14, BH);

    // ── Reinforcement brackets at corners ─────────────
    ctx.strokeStyle = '#3a5060'; ctx.lineWidth = 2;
    for (const side of [-1, 1]) {
      const bx = side * hw;
      ctx.beginPath(); ctx.moveTo(bx, -BH/2 + 4); ctx.lineTo(bx + side * -10, -BH/2 + 4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx, -BH/2 + 4); ctx.lineTo(bx, -BH/2 + 14); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx, BH/2 - 4); ctx.lineTo(bx + side * -10, BH/2 - 4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx, BH/2 - 4); ctx.lineTo(bx, BH/2 - 14); ctx.stroke();
    }

    // ── Heavy steel door (reinforced, center) ─────────
    const dw = 24, dh = 40;
    const dTop = BH/2 - dh;
    // Door recess shadow
    ctx.fillStyle = '#0e161e';
    ctx.fillRect(-dw/2 - 3, dTop - 3, dw + 6, dh + 3);
    // Door face with gradient
    const dGrd = ctx.createLinearGradient(-dw/2, dTop, dw/2, dTop);
    dGrd.addColorStop(0,   '#1e2c38'); dGrd.addColorStop(0.4, '#253444'); dGrd.addColorStop(1, '#161e28');
    ctx.fillStyle = dGrd; ctx.fillRect(-dw/2, dTop, dw, dh);
    ctx.strokeStyle = '#304050'; ctx.lineWidth = 2;
    ctx.strokeRect(-dw/2, dTop, dw, dh);
    // Inner reinforcement plate
    ctx.strokeStyle = '#253040'; ctx.lineWidth = 1;
    ctx.strokeRect(-dw/2 + 4, dTop + 4, dw - 8, dh - 8);
    // Warning stripe at bottom of door
    ctx.save();
    ctx.beginPath(); ctx.rect(-dw/2, dTop + dh - 9, dw, 9); ctx.clip();
    const stripeW = 5;
    for (let si = 0; si < 8; si++) {
      ctx.fillStyle = si % 2 === 0 ? 'rgba(220,160,20,0.55)' : 'rgba(20,30,40,0.55)';
      ctx.fillRect(-dw/2 + si * stripeW - 2, dTop + dh - 9, stripeW, 9);
    }
    ctx.restore();
    // Door hinges (left side, 2x)
    ctx.fillStyle = '#507090';
    ctx.fillRect(-dw/2 + 1, dTop + 6, 5, 7);
    ctx.fillRect(-dw/2 + 1, dTop + dh - 13, 5, 7);
    // Wheel-lock handle
    ctx.strokeStyle = '#6090a8'; ctx.lineWidth = 2;
    const wlx = dw/2 - 7, wly = dTop + dh/2;
    ctx.beginPath(); ctx.arc(wlx, wly, 6, 0, Math.PI*2); ctx.stroke();
    ctx.lineWidth = 1.5;
    for (let sp = 0; sp < 4; sp++) {
      const ang = sp * Math.PI / 2;
      ctx.beginPath(); ctx.moveTo(wlx, wly); ctx.lineTo(wlx + Math.cos(ang)*6, wly + Math.sin(ang)*6); ctx.stroke();
    }

    // ── Slot windows (bulletproof, 2x) ───────────────
    for (const wx3 of [-hw + 10, hw - 34]) {
      // Recess
      ctx.fillStyle = '#0a1218';
      ctx.fillRect(wx3 - 2, -BH/2 + 12, 26, 12);
      // Glass
      ctx.fillStyle = warm ? '#5ab0d8' : '#0c1a24';
      ctx.fillRect(wx3, -BH/2 + 14, 22, 8);
      // Frame
      ctx.strokeStyle = '#304858'; ctx.lineWidth = 1.5;
      ctx.strokeRect(wx3, -BH/2 + 14, 22, 8);
      // Vertical divider bar
      ctx.strokeStyle = '#284050'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(wx3 + 11, -BH/2 + 14); ctx.lineTo(wx3 + 11, -BH/2 + 22); ctx.stroke();
      // Glare
      ctx.fillStyle = 'rgba(200,240,255,0.12)';
      ctx.fillRect(wx3 + 1, -BH/2 + 15, 8, 2);
      // Warm light spill
      if (warm) {
        const wg = ctx.createRadialGradient(wx3 + 11, -BH/2 + 18, 0, wx3 + 11, -BH/2 + 18, 28);
        wg.addColorStop(0, 'rgba(100,200,255,0.20)'); wg.addColorStop(1, 'rgba(100,200,255,0)');
        ctx.fillStyle = wg; ctx.fillRect(wx3 - 28, -BH/2, 80, 40);
      }
    }

    // ── Vent pipe (roof, left of center) ─────────────
    ctx.fillStyle = '#243040';
    ctx.fillRect(-hw * 0.4 - 4, roofPeak - 12, 8, 16);
    // Vent cap
    ctx.fillStyle = '#18242e';
    ctx.fillRect(-hw * 0.4 - 7, roofPeak - 17, 14, 7);
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(-hw * 0.4 - 7, roofPeak - 17, 5, 7);

  } else {
    // ══════════════════════════════════════════════════
    // ── NORMAL WOODEN HOUSE ───────────────────────────
    // ══════════════════════════════════════════════════

    // Occupied warm glow
    if (warm) {
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, hw * 2.4);
      grd.addColorStop(0, 'rgba(255,160,40,0.30)');
      grd.addColorStop(1, 'rgba(255,160,40,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(-hw * 2.4, -RH - BH, hw * 4.8, RH + BH * 2);
    }

    // ── Stone foundation ──────────────────────────────
    ctx.fillStyle = '#2e2820';
    ctx.fillRect(-hw - 2, BH/2 - 6, h.w + 4, 10);
    ctx.strokeStyle = 'rgba(0,0,0,0.30)'; ctx.lineWidth = 1;
    for (let fi = 1; fi < 4; fi++) {
      ctx.beginPath(); ctx.moveTo(-hw + fi * (h.w / 4), BH/2 - 6); ctx.lineTo(-hw + fi * (h.w / 4), BH/2 + 4); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(-hw - 2, BH/2 - 1); ctx.lineTo(hw + 2, BH/2 - 1); ctx.stroke();

    // ── Chimney (behind roof, drawn first) ────────────
    const chimneyX = hw * 0.28;
    // Stone chimney body
    ctx.fillStyle = '#3e2e1e';
    ctx.fillRect(chimneyX, -(RH * 0.85 + BH/2) - 22, 14, RH * 0.7 + 6);
    // Chimney mortar lines
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 0.8;
    for (let cm = 0; cm < 4; cm++) {
      const cy2 = -(RH * 0.85 + BH/2) - 22 + cm * 7;
      ctx.beginPath(); ctx.moveTo(chimneyX, cy2); ctx.lineTo(chimneyX + 14, cy2); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(chimneyX + 7, -(RH * 0.85 + BH/2) - 22); ctx.lineTo(chimneyX + 7, -(RH * 0.15 + BH/2)); ctx.stroke();
    // Chimney cap
    ctx.fillStyle = '#2a1e10';
    ctx.fillRect(chimneyX - 2, -(RH * 0.85 + BH/2) - 25, 18, 5);

    // ── Roof ──────────────────────────────────────────
    const roofPeakY = -(RH + BH/2);
    // Roof underside (dark shadow)
    ctx.fillStyle = '#1e1408';
    ctx.beginPath();
    ctx.moveTo(-hw - 8, -BH/2 + 2); ctx.lineTo(0, roofPeakY + 3); ctx.lineTo(hw + 8, -BH/2 + 2);
    ctx.closePath(); ctx.fill();
    // Main roof shingles base
    ctx.fillStyle = '#2e2010';
    ctx.beginPath();
    ctx.moveTo(-hw - 8, -BH/2); ctx.lineTo(0, roofPeakY); ctx.lineTo(hw + 8, -BH/2);
    ctx.closePath(); ctx.fill();
    // Shingle rows (horizontal lines across the slope)
    const roofSlope = Math.sqrt((hw + 8) * (hw + 8) + RH * RH);
    ctx.strokeStyle = 'rgba(0,0,0,0.22)'; ctx.lineWidth = 1;
    ctx.lineCap = 'round';
    for (let sh = 1; sh < 5; sh++) {
      const t2 = sh / 5;
      const ly  = -BH/2 + t2 * (roofPeakY - (-BH/2));
      const lxw = (hw + 8) * (1 - t2);
      ctx.beginPath(); ctx.moveTo(-lxw, ly); ctx.lineTo(lxw, ly); ctx.stroke();
    }
    // Ridge cap
    ctx.strokeStyle = '#4a3018'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-4, roofPeakY + 2); ctx.lineTo(4, roofPeakY + 2); ctx.stroke();

    // Snow on roof (thick layer, lumpy)
    ctx.fillStyle = '#ddeeff';
    ctx.beginPath();
    ctx.moveTo(-hw - 8, -BH/2);
    ctx.lineTo(-hw * 0.6, -BH/2 - 4 + Math.sin(1.2) * 3);
    ctx.lineTo(-hw * 0.1, roofPeakY + 5);
    ctx.lineTo(0,         roofPeakY + 2);
    ctx.lineTo(hw * 0.1,  roofPeakY + 5);
    ctx.lineTo(hw * 0.55, -BH/2 - 3 + Math.sin(2.1) * 2);
    ctx.lineTo(hw + 8,    -BH/2);
    ctx.lineTo(hw + 8,    -BH/2 + 8);
    ctx.lineTo(-hw - 8,   -BH/2 + 8);
    ctx.closePath(); ctx.fill();
    // Snow drip edge — slight icicle hints
    for (let ic = 0; ic < 6; ic++) {
      const ix = -hw - 4 + ic * (h.w + 12) / 5;
      const ilen = 5 + Math.abs(Math.sin(ic * 1.7 + 0.5)) * 10;
      const ig = ctx.createLinearGradient(ix, -BH/2 + 8, ix, -BH/2 + 8 + ilen);
      ig.addColorStop(0,   'rgba(210,238,255,0.88)');
      ig.addColorStop(0.7, 'rgba(220,242,255,0.44)');
      ig.addColorStop(1,   'rgba(230,248,255,0)');
      ctx.fillStyle = ig;
      ctx.beginPath();
      ctx.moveTo(ix - 2.5, -BH/2 + 8);
      ctx.lineTo(ix + 2.5, -BH/2 + 8);
      ctx.lineTo(ix, -BH/2 + 8 + ilen);
      ctx.closePath(); ctx.fill();
    }

    // ── Wall body — wood planks ───────────────────────
    // Base wall fill
    const wallGrd2 = ctx.createLinearGradient(-hw, 0, hw, 0);
    wallGrd2.addColorStop(0,    '#5a4030');
    wallGrd2.addColorStop(0.07, '#4e3828');
    wallGrd2.addColorStop(0.93, '#4a3424');
    wallGrd2.addColorStop(1,    '#3a2818');
    ctx.fillStyle = wallGrd2;
    ctx.fillRect(-hw, -BH/2, h.w, BH - 6);

    // Horizontal plank lines (wood siding)
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1;
    const plankH = 8;
    for (let pl = 1; pl * plankH < BH - 6; pl++) {
      const py2 = -BH/2 + pl * plankH;
      ctx.beginPath(); ctx.moveTo(-hw, py2); ctx.lineTo(hw, py2); ctx.stroke();
    }
    // Plank top highlight (grain)
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 0.8;
    for (let pl = 0; pl * plankH < BH - 6; pl++) {
      const py2 = -BH/2 + pl * plankH + 1;
      ctx.beginPath(); ctx.moveTo(-hw + 4, py2); ctx.lineTo(hw - 4, py2); ctx.stroke();
    }
    // Left wall lit face
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(-hw, -BH/2, 7, BH - 6);
    // Right wall shadow
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.fillRect(hw - 12, -BH/2, 12, BH - 6);

    // Corner trim boards
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(-hw - 2, -BH/2, 6, BH - 6);
    ctx.fillRect(hw - 4, -BH/2, 6, BH - 6);

    // ── Windows (2x, with shutters) ──────────────────
    const winPositions = [{ x: -hw + 10, w: 20, h: 18 }, { x: hw - 30, w: 20, h: 18 }];
    for (const wp of winPositions) {
      // Window recess shadow
      ctx.fillStyle = '#1a100a';
      ctx.fillRect(wp.x - 2, -BH/2 + 12, wp.w + 4, wp.h + 4);
      // Window frame
      ctx.fillStyle = '#3a2010';
      ctx.fillRect(wp.x, -BH/2 + 14, wp.w, wp.h);
      // Glass panes (2×2)
      ctx.fillStyle = warm ? '#ffcc44' : '#1a2e48';
      ctx.fillRect(wp.x + 2, -BH/2 + 16, (wp.w - 5) / 2, (wp.h - 5) / 2);
      ctx.fillRect(wp.x + 2 + (wp.w - 5) / 2 + 2, -BH/2 + 16, (wp.w - 5) / 2, (wp.h - 5) / 2);
      ctx.fillRect(wp.x + 2, -BH/2 + 16 + (wp.h - 5) / 2 + 2, (wp.w - 5) / 2, (wp.h - 5) / 2);
      ctx.fillRect(wp.x + 2 + (wp.w - 5) / 2 + 2, -BH/2 + 16 + (wp.h - 5) / 2 + 2, (wp.w - 5) / 2, (wp.h - 5) / 2);
      // Muntins (window frame dividers)
      ctx.strokeStyle = '#3a2010'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(wp.x + wp.w/2, -BH/2 + 14); ctx.lineTo(wp.x + wp.w/2, -BH/2 + 14 + wp.h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(wp.x, -BH/2 + 14 + wp.h/2); ctx.lineTo(wp.x + wp.w, -BH/2 + 14 + wp.h/2); ctx.stroke();
      // Glass glare
      ctx.fillStyle = 'rgba(200,235,255,0.14)';
      ctx.fillRect(wp.x + 2, -BH/2 + 16, 5, 2);
      // Shutters (small planked panels on sides)
      const shutW = 6;
      for (const side of [-1, 1]) {
        const shx = side > 0 ? wp.x + wp.w + 1 : wp.x - shutW - 1;
        ctx.fillStyle = '#2a1808';
        ctx.fillRect(shx, -BH/2 + 14, shutW, wp.h);
        ctx.strokeStyle = 'rgba(0,0,0,0.30)'; ctx.lineWidth = 0.8;
        for (let sl2 = 1; sl2 < 4; sl2++) {
          ctx.beginPath(); ctx.moveTo(shx, -BH/2 + 14 + sl2 * (wp.h / 4)); ctx.lineTo(shx + shutW, -BH/2 + 14 + sl2 * (wp.h / 4)); ctx.stroke();
        }
      }
      // Warm window glow spillout
      if (warm) {
        const wg = ctx.createRadialGradient(wp.x + wp.w/2, -BH/2 + 22, 0, wp.x + wp.w/2, -BH/2 + 22, 36);
        wg.addColorStop(0, 'rgba(255,200,60,0.32)'); wg.addColorStop(1, 'rgba(255,200,60,0)');
        ctx.fillStyle = wg; ctx.fillRect(wp.x - 36, -BH/2, wp.w + 72, BH);
      }
    }

    // ── Door ─────────────────────────────────────────
    const dw = 22, dh = 36;
    const dTop = BH/2 - dh - 6;
    // Door frame
    ctx.fillStyle = '#2a1a0c';
    ctx.fillRect(-dw/2 - 3, dTop - 2, dw + 6, dh + 8);
    // Door planks
    ctx.fillStyle = '#1e1008';
    ctx.fillRect(-dw/2, dTop, dw, dh);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 0.8;
    for (let dp = 1; dp < 4; dp++) {
      ctx.beginPath(); ctx.moveTo(-dw/2 + 2, dTop + dp * (dh/4)); ctx.lineTo(dw/2 - 2, dTop + dp * (dh/4)); ctx.stroke();
    }
    // Door hinge
    ctx.fillStyle = '#8a6828';
    ctx.fillRect(-dw/2 + 2, dTop + 6, 5, 4);
    ctx.fillRect(-dw/2 + 2, dTop + dh - 10, 5, 4);
    // Door knob
    ctx.fillStyle = '#c8a050';
    ctx.beginPath(); ctx.arc(dw/2 - 5, dTop + dh/2, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.20)';
    ctx.beginPath(); ctx.arc(dw/2 - 6, dTop + dh/2 - 1, 1.5, 0, Math.PI*2); ctx.fill();

    // ── Entry step ───────────────────────────────────
    ctx.fillStyle = '#2e2218';
    ctx.fillRect(-dw/2 - 4, BH/2 - 6, dw + 8, 6);
    ctx.fillStyle = 'rgba(0,0,0,0.20)';
    ctx.fillRect(-dw/2 - 4, BH/2 + 1, dw + 8, 2);

    // ── Chimney smoke ─────────────────────────────────
    const smokeDir = wind.force * -18;
    ctx.globalAlpha = h.alpha;
    for (let i = 0; i < 6; i++) {
      const t2 = ((frame * 0.011 + i * 0.20) % 1);
      const drift = smokeDir * t2;
      const wobble = Math.sin(t2 * 5.0 + i * 1.3) * 4;
      ctx.globalAlpha = h.alpha * (0.42 - t2 * 0.42);
      ctx.fillStyle = t2 < 0.35 ? '#c0b8b0' : '#909090';
      ctx.beginPath();
      ctx.arc(chimneyX + 7 + drift + wobble, -(RH * 0.85 + BH/2) - 22 - t2 * 50,
              3.5 + t2 * 10, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = h.alpha;
  }

  ctx.restore();
  ctx.globalAlpha = 1;

  // E-key prompts (screen-space, outside rotation/alpha)
  const promptX = h.x - cam.x + h.w / 2;
  const promptY = h.y - cam.y - 18;
  if (promptX > -60 && promptX < W + 60 && h.alpha > 0.5) {
    if (warm) {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.60)';
      rrect(promptX - 42, promptY - 15, 84, 19, 4); ctx.fill();
      ctx.fillStyle = isBunker ? '#ffd700' : isMetal ? '#8ac8e8' : '#c8e4f5';
      ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('[ E ]  EXIT', promptX, promptY); ctx.restore();
    } else if (!player.inHouse && nearHouse(h)) {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.60)';
      const label = isBunker ? '[ E ]  FORTRESS' : isMetal ? '[ E ]  BUNKER' : '[ E ]  SHELTER';
      const pColor = isBunker ? '#ffd700' : isMetal ? '#8ac8e8' : '#e8c84a';
      rrect(promptX - 52, promptY - 15, 104, 19, 4); ctx.fill();
      ctx.fillStyle = pColor; ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'center';
      ctx.fillText(label, promptX, promptY); ctx.restore();
    }
  }
}

// ── Draw: Lightning (during tornado) ─────────────────────
// Multiple independent flash timers so strikes overlap
const _ltimers = [
  { period: 38, dur: 12 },
  { period: 55, dur: 10 },
  { period: 71, dur: 9  },
  { period: 47, dur: 8  },
  { period: 29, dur: 7  },
];

function drawBolt(tx, ty, seed, glowColor, isHyper) {
  const steps = 8 + (seed % 4);
  ctx.lineCap = 'round';
  // Glow pass
  ctx.strokeStyle = glowColor;
  ctx.lineWidth = isHyper ? 9 : 6;
  ctx.beginPath();
  let bx = tx + Math.sin(seed * 1.7) * 40, by = 0;
  ctx.moveTo(bx, by);
  for (let i = 1; i <= steps; i++) {
    bx += Math.sin(seed * 3.1 + i * 2.3) * 28;
    by  = (i / steps) * (ty - 30);
    ctx.lineTo(bx, by);
  }
  ctx.stroke();
  // Bright core
  bx = tx + Math.sin(seed * 1.7) * 40; by = 0;
  ctx.strokeStyle = isHyper ? '#f0d0ff' : '#eef6ff';
  ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(bx, by);
  for (let i = 1; i <= steps; i++) {
    bx += Math.sin(seed * 3.1 + i * 2.3) * 28;
    by  = (i / steps) * (ty - 30);
    ctx.lineTo(bx, by);
  }
  ctx.stroke();
  // Branch off mid-bolt
  const branchStart = Math.floor(steps * 0.4);
  bx = tx + Math.sin(seed * 1.7) * 40; by = 0;
  for (let i = 1; i <= branchStart; i++) {
    bx += Math.sin(seed * 3.1 + i * 2.3) * 28;
    by  = (i / steps) * (ty - 30);
  }
  ctx.strokeStyle = isHyper ? 'rgba(220,140,255,0.55)' : 'rgba(160,200,255,0.45)';
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(bx, by);
  let bbx = bx, bby = by;
  for (let i = 0; i < 4; i++) {
    bbx += Math.sin(seed * 7.1 + i * 3.3) * 20;
    bby += (ty - 30) / steps * 1.4;
    ctx.lineTo(bbx, bby);
  }
  ctx.stroke();
}

function drawLightning() {
  if (!tornado || tornado.alpha < 0.55) return;
  const tScale = tornado.scale || 1.0;
  const isHyper = tScale > 1.2;
  const tx = tornado.x - cam.x;
  const ty = tornado.y - cam.y;
  const glowColor = isHyper ? 'rgba(200,120,255,0.55)' : 'rgba(160,200,255,0.50)';

  ctx.save();
  let anyFlash = false;

  for (let ti = 0; ti < _ltimers.length; ti++) {
    const { period, dur } = _ltimers[ti];
    const fp = frame % period;
    if (fp >= dur) continue;
    const t = Math.max(0, 1 - fp / dur);
    anyFlash = true;

    // Screen flash (each timer adds its own flash)
    ctx.globalAlpha = t * tornado.alpha * 0.09;
    ctx.fillStyle = isHyper ? '#d0a0ff' : '#c4dcff';
    ctx.fillRect(0, 0, W, H);

    // Draw 1-2 bolts per active timer
    const boltCount = (ti % 2 === 0) ? 2 : 1;
    for (let b = 0; b < boltCount; b++) {
      ctx.globalAlpha = t * tornado.alpha * (b === 0 ? 0.90 : 0.55);
      const seed = frame * 0.7 + ti * 13.7 + b * 7.3;
      const boltX = tx + (b === 0 ? 0 : (Math.random() < 0.5 ? -1 : 1) * (40 + Math.random() * 80));
      drawBolt(boltX, ty, seed, glowColor, isHyper);
    }
  }

  ctx.restore();
}

// ── Draw: Tornado ─────────────────────────────────────────
function drawTornado() {
  if (!tornado || tornado.alpha < 0.01) return;
  const sx = tornado.x - cam.x;
  const sy = tornado.y - cam.y;
  if (sx < -400 || sx > W + 400) return;

  const tScale = tornado.scale || 1.0;
  const isVoid  = tScale > 3.0;
  const isHyper = tScale > 1.2;
  const TH = 185 * tScale, TW = 100 * tScale, BW = 10 * tScale;
  const a  = tornado.alpha;
  const ang = tornado.angle;

  ctx.save();

  // ── 1. Outer storm halo ───────────────────────────────────
  ctx.globalAlpha = a * 0.22;
  const haloGrd = ctx.createRadialGradient(sx, sy - TH * 0.5, 0, sx, sy - TH * 0.5, TW * 3.2);
  haloGrd.addColorStop(0,   isVoid ? 'rgba(10,10,10,0.60)' : isHyper ? 'rgba(80,20,120,0.55)' : 'rgba(30,40,70,0.55)');
  haloGrd.addColorStop(0.5, isVoid ? 'rgba(5,5,5,0.28)'    : isHyper ? 'rgba(50,10,90,0.25)'  : 'rgba(20,30,55,0.25)');
  haloGrd.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = haloGrd;
  ctx.fillRect(sx - TW * 3.5, sy - TH - 60, TW * 7, TH + 80);

  // ── 2. Massive storm cloud base ───────────────────────────
  ctx.globalAlpha = a * 0.90;
  for (let cl = 0; cl < 5; cl++) {
    const cOff  = Math.sin(ang * 0.6 + cl * 1.3) * TW * 0.55;
    const cOffy = Math.cos(ang * 0.4 + cl * 0.9) * 12;
    const cR    = TW * (1.2 + cl * 0.28);
    const cGrd  = ctx.createRadialGradient(sx + cOff, sy - TH + cOffy, 0, sx + cOff, sy - TH + cOffy, cR);
    cGrd.addColorStop(0,   isVoid ? 'rgba(8,8,8,0.92)'     : isHyper ? 'rgba(40,10,70,0.88)' : 'rgba(28,36,52,0.88)');
    cGrd.addColorStop(0.45, isVoid ? 'rgba(5,5,5,0.65)'    : isHyper ? 'rgba(30,8,58,0.60)'  : 'rgba(20,28,44,0.60)');
    cGrd.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = cGrd;
    ctx.beginPath();
    ctx.ellipse(sx + cOff, sy - TH + cOffy, cR, 44 * tScale + cl * 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── 2b. Wall cloud — dense rotating cap above funnel top ────
  ctx.globalAlpha = a * 0.78;
  const wcY = sy - TH + 10;
  for (let wc = 0; wc < 3; wc++) {
    const wcOff = Math.sin(ang * 1.9 + wc * 2.09) * TW * 0.40;
    const wcR   = TW * (0.72 + wc * 0.14);
    const wcGrd = ctx.createRadialGradient(sx + wcOff, wcY, 0, sx + wcOff, wcY, wcR);
    wcGrd.addColorStop(0,   isVoid ? 'rgba(6,6,6,0.96)'    : isHyper ? 'rgba(22,5,48,0.93)'  : 'rgba(16,20,36,0.90)');
    wcGrd.addColorStop(0.55, isVoid ? 'rgba(4,4,4,0.52)'   : isHyper ? 'rgba(16,4,36,0.50)'  : 'rgba(12,16,30,0.50)');
    wcGrd.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = wcGrd;
    ctx.beginPath();
    ctx.ellipse(sx + wcOff, wcY, wcR, (30 + wc * 5) * tScale, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── 2c. Lightning inside storm cloud ─────────────────────────
  {
    const lFlash = Math.sin(ang * 13.7 + 1.4) > 0.80;
    const lSeed  = Math.floor(ang * 4.1) % 9;
    if (lFlash) {
      const lx0 = sx + Math.sin(lSeed * 1.5) * TW * 0.62;
      const ly0 = sy - TH + 18;
      // Glow bloom first
      ctx.globalAlpha = a * 0.09;
      const flGrd = ctx.createRadialGradient(lx0, ly0, 0, lx0, ly0, TW * 0.9);
      flGrd.addColorStop(0, isVoid ? 'rgba(160,215,255,0.9)' : isHyper ? 'rgba(220,140,255,0.8)' : 'rgba(255,255,255,0.75)');
      flGrd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = flGrd; ctx.fillRect(sx - TW * 2, sy - TH - 50, TW * 4, TH * 0.65);
      // Main bolt stroke
      ctx.globalAlpha = a * (0.60 + Math.sin(ang * 28) * 0.32);
      ctx.strokeStyle = isVoid ? 'rgba(180,225,255,0.95)' : isHyper ? 'rgba(240,175,255,0.92)' : 'rgba(255,255,255,0.90)';
      ctx.lineWidth = (1.6 + Math.sin(ang * 35) * 0.6) * tScale;
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(lx0, ly0);
      let lx = lx0, ly = ly0;
      for (let ls = 0; ls < 5; ls++) {
        lx += Math.sin(lSeed * 2.3 + ls * 2.1) * 20 * tScale;
        ly += (TH * 0.52) / 5;
        ctx.lineTo(lx, ly);
      }
      ctx.stroke();
      // Branch fork
      ctx.globalAlpha = a * 0.38;
      ctx.lineWidth = 0.9 * tScale;
      ctx.beginPath(); ctx.moveTo(lx - 10, ly - TH*0.08);
      ctx.lineTo(lx - 10 + 16*tScale, ly - TH*0.08 + 24*tScale);
      ctx.lineTo(lx - 10 + 9*tScale,  ly - TH*0.08 + 40*tScale);
      ctx.stroke();
      // Wide soft glow on bolt
      ctx.globalAlpha = a * 0.10;
      ctx.strokeStyle = isVoid ? 'rgba(100,180,255,1)' : isHyper ? 'rgba(200,100,255,1)' : 'rgba(200,220,255,1)';
      ctx.lineWidth = 8 * tScale;
      ctx.beginPath(); ctx.moveTo(lx0, ly0); ctx.lineTo(lx, ly); ctx.stroke();
    }
    // Constant dim inner electric glow inside cloud
    ctx.globalAlpha = a * (0.04 + Math.abs(Math.sin(ang * 9.3)) * 0.055);
    const igGrd = ctx.createRadialGradient(sx, sy - TH * 0.82, 0, sx, sy - TH * 0.82, TW * 1.5);
    igGrd.addColorStop(0, isVoid ? 'rgba(140,200,255,0.45)' : isHyper ? 'rgba(200,110,255,0.40)' : 'rgba(255,255,200,0.38)');
    igGrd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = igGrd; ctx.fillRect(sx - TW * 2, sy - TH - 20, TW * 4, TH * 0.72);
  }

  // ── 2d. Mammatus pouches (hypercane / void) ───────────────────
  if (isHyper) {
    ctx.globalAlpha = a * 0.55;
    const mamY   = sy - TH + 42;
    const mamCnt = isVoid ? 8 : 5;
    for (let mm = 0; mm < mamCnt; mm++) {
      const mOff = Math.sin(ang * 0.9 + mm * (Math.PI*2/mamCnt)) * TW * 0.68;
      const mGrd = ctx.createRadialGradient(sx + mOff, mamY + 14, 0, sx + mOff, mamY, 24 * tScale);
      mGrd.addColorStop(0,   isVoid ? 'rgba(8,8,8,0.82)'    : 'rgba(28,6,55,0.78)');
      mGrd.addColorStop(0.55, isVoid ? 'rgba(5,5,5,0.42)'   : 'rgba(18,4,40,0.40)');
      mGrd.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = mGrd;
      ctx.beginPath();
      ctx.ellipse(sx + mOff, mamY + 14, 20 * tScale, 15 * tScale, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // ── 3. Outer funnel wall — thick layered stripes ──────────
  ctx.lineCap = 'round';
  for (let band = 0; band < 28; band++) {
    const t     = band / 27;
    const bandY = sy - TH + t * TH;
    const bandW = TW * (1 - t) + BW * t;
    const twist = ang * 2.2 + t * Math.PI * 7;
    const swayX = Math.sin(twist) * bandW * 0.32;
    const swayX2= Math.sin(twist + 0.9) * bandW * 0.18;

    // Shadow stripe (wide, dark)
    ctx.globalAlpha = a * (0.12 + (1 - t) * 0.22);
    ctx.strokeStyle = isVoid
      ? `rgba(${(10 + t*20)|0},${(10 + t*20)|0},${(10 + t*20)|0},0.9)`
      : isHyper
        ? `rgba(${(20 + t*30)|0},${(5 + t*10)|0},${(40 + t*20)|0},0.9)`
        : `rgba(${(30 + t*40)|0},${(40 + t*35)|0},${(60 + t*30)|0},0.9)`;
    ctx.lineWidth = (3.5 + (1 - t) * 5) * tScale;
    ctx.beginPath();
    ctx.ellipse(sx + swayX, bandY, bandW, bandW * 0.13, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Highlight stripe (thin, lighter)
    ctx.globalAlpha = a * (0.08 + (1 - t) * 0.14);
    ctx.strokeStyle = isVoid
      ? `rgba(230,230,230,0.75)`
      : isHyper ? `rgba(180,80,255,0.7)` : `rgba(140,170,210,0.7)`;
    ctx.lineWidth = (0.8 + (1 - t) * 1.4) * tScale;
    ctx.beginPath();
    ctx.ellipse(sx + swayX2, bandY, bandW * 0.7, bandW * 0.09, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // ── 4. Inner condensation funnel (bright core) ────────────
  ctx.globalAlpha = a * 0.28;
  const innerW = TW * 0.42, innerBW = BW * 0.6;
  const coneGrd = ctx.createLinearGradient(sx, sy - TH, sx, sy);
  if (isVoid) {
    coneGrd.addColorStop(0,   'rgba(220,220,220,0.80)');
    coneGrd.addColorStop(0.35,'rgba(140,140,140,0.58)');
    coneGrd.addColorStop(0.72,'rgba(60,60,60,0.35)');
    coneGrd.addColorStop(1,   'rgba(10,10,10,0.12)');
  } else if (isHyper) {
    coneGrd.addColorStop(0,   'rgba(140,40,220,0.85)');
    coneGrd.addColorStop(0.35,'rgba(100,20,180,0.65)');
    coneGrd.addColorStop(0.72,'rgba(70,10,130,0.40)');
    coneGrd.addColorStop(1,   'rgba(40,5,80,0.15)');
  } else {
    coneGrd.addColorStop(0,   'rgba(160,185,220,0.85)');
    coneGrd.addColorStop(0.35,'rgba(110,140,190,0.65)');
    coneGrd.addColorStop(0.72,'rgba(70,100,155,0.40)');
    coneGrd.addColorStop(1,   'rgba(40,65,110,0.15)');
  }
  ctx.fillStyle = coneGrd;
  const ctrl = Math.sin(ang * 1.1) * 28 * tScale;
  ctx.beginPath();
  ctx.moveTo(sx - innerW, sy - TH);
  ctx.quadraticCurveTo(sx + ctrl, sy - TH * 0.48, sx, sy);
  ctx.quadraticCurveTo(sx - ctrl, sy - TH * 0.48, sx + innerW, sy - TH);
  ctx.closePath();
  ctx.fill();

  // ── 5. Spiral rope lines along the funnel ─────────────────
  ctx.lineCap = 'round';
  for (let rope = 0; rope < 4; rope++) {
    const ropeOff = (rope / 4) * Math.PI * 2;
    ctx.globalAlpha = a * 0.30;
    ctx.strokeStyle = isVoid ? 'rgba(245,245,245,0.70)' : isHyper ? 'rgba(200,100,255,0.65)' : 'rgba(180,205,240,0.55)';
    ctx.lineWidth = 1.4 * tScale;
    ctx.beginPath();
    for (let i = 0; i <= 24; i++) {
      const t     = i / 24;
      const bandW = TW * (1 - t) + BW * t;
      const spiralAng = ang * 2.5 + ropeOff + t * Math.PI * 6;
      const rx = sx + Math.cos(spiralAng) * bandW * 0.88;
      const ry = sy - TH + t * TH + Math.sin(spiralAng * 0.7) * 5 * tScale;
      i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
    }
    ctx.stroke();
  }

  // ── 5b. Sub-vortices (satellite mini-funnels) ────────────────
  {
    const svCount = isVoid ? 3 : isHyper ? 2 : 1;
    for (let sv = 0; sv < svCount; sv++) {
      const svAng   = ang * 2.9 + sv * (Math.PI * 2 / svCount);
      const svOrbit = TW * 0.54;
      const svX     = sx + Math.cos(svAng) * svOrbit;
      const svY     = sy - TH * 0.12 + Math.sin(svAng) * svOrbit * 0.24;
      const svTH    = TH * (isVoid ? 0.54 : isHyper ? 0.40 : 0.30);
      const svTW    = TW * (isVoid ? 0.19 : isHyper ? 0.14 : 0.10);
      const svBW    = BW * 0.40;
      for (let sb = 0; sb < 13; sb++) {
        const st2    = sb / 12;
        const sBandY = svY - svTH + st2 * svTH;
        const sBandW = svTW * (1 - st2) + svBW * st2;
        const sTwist = ang * 3.8 + st2 * Math.PI * 5.5 + sv * 1.2;
        const sSway  = Math.sin(sTwist) * sBandW * 0.32;
        ctx.globalAlpha = a * (0.16 + (1 - st2) * 0.26);
        ctx.strokeStyle = isVoid
          ? `rgba(${(135+st2*60)|0},${(135+st2*60)|0},${(135+st2*60)|0},0.85)`
          : isHyper
            ? `rgba(${(80+st2*55)|0},${(18+st2*38)|0},${(155+st2*55)|0},0.85)`
            : `rgba(${(75+st2*55)|0},${(100+st2*48)|0},${(145+st2*38)|0},0.85)`;
        ctx.lineWidth = (1.4 + (1 - st2) * 2.2) * tScale;
        ctx.beginPath();
        ctx.ellipse(svX + sSway, sBandY, sBandW, sBandW * 0.15, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
      // Sub-vortex touchdown glint
      ctx.globalAlpha = a * 0.42;
      const svTG = ctx.createRadialGradient(svX, svY, 0, svX, svY, 14 * tScale);
      svTG.addColorStop(0, isVoid ? 'rgba(255,255,255,0.88)' : isHyper ? 'rgba(200,100,255,0.82)' : 'rgba(180,210,242,0.78)');
      svTG.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = svTG;
      ctx.beginPath(); ctx.ellipse(svX, svY, 14*tScale, 4*tScale, 0, 0, Math.PI*2); ctx.fill();
    }
  }

  // ── 6. Ground contact zone — dust & dirt layers ───────────
  // Outer kicked-up dust ring
  ctx.globalAlpha = a * 0.38;
  const dustR = 110 * tScale;
  const dustGrd = ctx.createRadialGradient(sx, sy, 0, sx, sy, dustR);
  dustGrd.addColorStop(0,   isVoid ? 'rgba(20,20,20,0.75)'    : isHyper ? 'rgba(100,30,160,0.70)' : 'rgba(100,80,50,0.70)');
  dustGrd.addColorStop(0.40, isVoid ? 'rgba(10,10,10,0.48)'   : isHyper ? 'rgba(70,15,110,0.45)'  : 'rgba(80,60,35,0.45)');
  dustGrd.addColorStop(0.75,'rgba(50,40,25,0.20)');
  dustGrd.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = dustGrd;
  ctx.beginPath();
  ctx.ellipse(sx, sy, dustR, 26 * tScale, 0, 0, Math.PI * 2);
  ctx.fill();

  // Spinning dust streaks at the base
  ctx.globalAlpha = a * 0.45;
  ctx.strokeStyle = isVoid ? 'rgba(200,200,200,0.60)' : isHyper ? 'rgba(160,60,255,0.55)' : 'rgba(140,110,70,0.55)';
  ctx.lineWidth = 2 * tScale;
  for (let ds = 0; ds < 10; ds++) {
    const da = ang * 3.5 + (ds / 10) * Math.PI * 2;
    const dr1 = dustR * 0.22, dr2 = dustR * (0.55 + (ds % 3) * 0.15);
    ctx.beginPath();
    ctx.moveTo(sx + Math.cos(da) * dr1, sy + Math.sin(da) * dr1 * 0.22);
    ctx.lineTo(sx + Math.cos(da) * dr2, sy + Math.sin(da) * dr2 * 0.22);
    ctx.stroke();
  }

  // ── 6b. Ground scour marks ────────────────────────────────────
  {
    const scW = dustR * 0.62;
    ctx.globalAlpha = a * 0.28;
    ctx.fillStyle = isVoid ? 'rgba(8,8,8,0.60)' : isHyper ? 'rgba(18,5,38,0.55)' : 'rgba(20,14,6,0.55)';
    ctx.beginPath(); ctx.ellipse(sx, sy, scW, 7 * tScale, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = isVoid ? 'rgba(12,12,12,0.48)' : isHyper ? 'rgba(48,10,80,0.42)' : 'rgba(32,20,4,0.42)';
    ctx.lineWidth = 1.8 * tScale;
    for (let sc = 0; sc < 9; sc++) {
      const sca = ang * 4.2 + sc * (Math.PI / 4.5);
      ctx.beginPath();
      ctx.moveTo(sx + Math.cos(sca) * 7 * tScale,    sy + Math.sin(sca) * 2.5 * tScale);
      ctx.lineTo(sx + Math.cos(sca) * scW * 0.82,    sy + Math.sin(sca) * scW * 0.82 * 0.20);
      ctx.stroke();
    }
  }

  // ── 6c. Flying ice/snow particle shower ──────────────────────
  ctx.fillStyle = isVoid ? 'rgba(180,192,205,0.72)' : isHyper ? 'rgba(200,125,255,0.68)' : 'rgba(200,218,255,0.68)';
  for (let fp = 0; fp < 34; fp++) {
    const fpA    = ang * 5.2 + fp * (Math.PI * 2 / 34);
    const fpFrac = ((fp * 0.13 + ang * 0.38) % 1);
    const fpRad  = BW * 0.9 + (TW - BW) * fpFrac;
    const fpY    = sy - TH * fpFrac;
    const fpX    = sx + Math.cos(fpA + fpFrac * Math.PI * 4) * fpRad;
    const fps    = (0.7 + (fp % 5) * 0.35) * tScale;
    ctx.globalAlpha = a * (0.18 + (1 - fpFrac) * 0.28);
    ctx.beginPath(); ctx.arc(fpX, fpY, fps, 0, Math.PI * 2); ctx.fill();
  }

  // Inner vortex glow at tip
  ctx.globalAlpha = a * 0.55;
  const tipGrd = ctx.createRadialGradient(sx, sy, 0, sx, sy, 30 * tScale);
  tipGrd.addColorStop(0, isVoid ? 'rgba(255,255,255,0.95)' : isHyper ? 'rgba(220,130,255,0.90)' : 'rgba(200,220,255,0.90)');
  tipGrd.addColorStop(0.5, isVoid ? 'rgba(180,180,180,0.55)' : isHyper ? 'rgba(140,50,220,0.55)' : 'rgba(140,170,220,0.55)');
  tipGrd.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = tipGrd;
  ctx.beginPath();
  ctx.ellipse(sx, sy, 30 * tScale, 9 * tScale, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── 6d. Inflow bands sweeping into the funnel ────────────────
  ctx.lineCap = 'round';
  ctx.setLineDash([]);
  for (let ib = 0; ib < 3; ib++) {
    const ibA  = ang * 0.55 + ib * (Math.PI * 2 / 3);
    const ibR  = TW * 2.5;
    ctx.globalAlpha = a * 0.13;
    ctx.strokeStyle = isVoid ? 'rgba(200,205,215,0.55)' : isHyper ? 'rgba(165,80,225,0.52)' : 'rgba(140,162,205,0.52)';
    ctx.lineWidth = 5.5 * tScale;
    ctx.beginPath();
    ctx.moveTo(sx + Math.cos(ibA) * ibR, sy - TH * 0.38 + Math.sin(ibA) * ibR * 0.28);
    ctx.quadraticCurveTo(
      sx + Math.cos(ibA + 0.68) * TW * 1.25, sy - TH * 0.28 + Math.sin(ibA + 0.68) * TW * 0.38,
      sx + Math.cos(ibA + 1.22) * TW * 0.58, sy - TH * 0.16 + Math.sin(ibA + 1.22) * TW * 0.20
    );
    ctx.stroke();
  }

  // ── 6e. Mid-funnel pressure condensation rings ────────────────
  {
    const prY  = sy - TH * 0.44;
    const prW  = TW * 0.80;
    const prSw = Math.sin(ang * 1.9) * 16 * tScale;
    ctx.globalAlpha = a * 0.18;
    ctx.strokeStyle = isVoid ? 'rgba(218,228,255,0.72)' : isHyper ? 'rgba(200,115,255,0.68)' : 'rgba(175,210,242,0.68)';
    ctx.lineWidth = 3.5 * tScale;
    ctx.beginPath(); ctx.ellipse(sx + prSw, prY, prW, prW * 0.11, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = a * 0.10;
    ctx.beginPath(); ctx.ellipse(sx + prSw * 0.65, prY - 16*tScale, prW * 0.70, prW * 0.09, 0, 0, Math.PI * 2); ctx.stroke();
  }

  // ── 7. Rain curtain around the tornado ───────────────────
  ctx.globalAlpha = a * 0.18;
  ctx.strokeStyle = isVoid ? 'rgba(210,210,210,0.50)' : isHyper ? 'rgba(180,100,255,0.55)' : 'rgba(160,200,240,0.55)';
  ctx.lineWidth = 0.8;
  for (let ri = 0; ri < 22; ri++) {
    const ra = (ri / 22) * Math.PI * 2 + ang * 0.4;
    const rDist = TW * (1.15 + (ri % 3) * 0.22);
    const rx = sx + Math.cos(ra) * rDist;
    const ry = sy - TH * (0.15 + (ri % 4) * 0.18);
    const rLen = 18 + (ri % 5) * 12;
    ctx.beginPath();
    ctx.moveTo(rx, ry);
    ctx.lineTo(rx + Math.cos(ang + ri) * 4, ry + rLen);
    ctx.stroke();
  }

  // ── 8. Debris objects ────────────────────────────────────
  for (const d of tornado.debris) {
    const dx = d.x - cam.x, dy = d.y - cam.y;
    if (dx < -80 || dx > W + 80 || dy < -80 || dy > H + 80) continue;
    const rot = ang * d.rotSpeed;
    ctx.save();
    ctx.translate(dx, dy);
    ctx.rotate(rot);
    ctx.globalAlpha = a * 0.28;
    ctx.fillStyle = '#000';
    ctx.fillRect(3, 3, 22, 10); // generic shadow placeholder replaced per-type below
    ctx.restore();

    ctx.save();
    ctx.translate(dx, dy);
    ctx.rotate(rot);
    ctx.globalAlpha = a;

    if (d.kind === 'car') {
      // Body
      ctx.fillStyle = '#7a3a2a';
      ctx.fillRect(-14, -5, 28, 9);
      // Roof cabin
      ctx.fillStyle = '#5a2a1a';
      ctx.fillRect(-8, -11, 16, 7);
      // Wheels
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(-9, 4, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc( 9, 4, 3, 0, Math.PI*2); ctx.fill();
      // Window glint
      ctx.globalAlpha = a * 0.5;
      ctx.fillStyle = '#aaddff';
      ctx.fillRect(-6, -10, 5, 4);
      ctx.fillRect( 1, -10, 5, 4);

    } else if (d.kind === 'truck') {
      // Cab
      ctx.fillStyle = '#4a5a3a';
      ctx.fillRect(-20, -7, 14, 11);
      // Cargo box
      ctx.fillStyle = '#3a4a2a';
      ctx.fillRect(-6, -9, 26, 13);
      // Wheels
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(-13, 5, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc( 10, 5, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc( 18, 5, 4, 0, Math.PI*2); ctx.fill();

    } else if (d.kind === 'rock') {
      const sz = 5 + (d.fracH * 6)|0;
      ctx.fillStyle = '#7a7060';
      ctx.beginPath();
      ctx.moveTo(-sz, sz*0.4);
      ctx.lineTo(-sz*0.5, -sz);
      ctx.lineTo(sz*0.6, -sz*0.7);
      ctx.lineTo(sz, sz*0.3);
      ctx.lineTo(sz*0.3, sz);
      ctx.closePath(); ctx.fill();
      ctx.globalAlpha = a * 0.4;
      ctx.fillStyle = '#b0a890';
      ctx.beginPath(); ctx.ellipse(-sz*0.2, -sz*0.3, sz*0.3, sz*0.15, -0.5, 0, Math.PI*2); ctx.fill();

    } else if (d.kind === 'roof') {
      // Triangular roof chunk
      ctx.fillStyle = '#8b3a2a';
      ctx.beginPath();
      ctx.moveTo(0, -12); ctx.lineTo(-18, 6); ctx.lineTo(18, 6);
      ctx.closePath(); ctx.fill();
      // Ridge tiles
      ctx.strokeStyle = '#5a1a0a'; ctx.lineWidth = 1.2;
      for (let ti = -14; ti < 14; ti += 5) {
        ctx.beginPath();
        const ty = 6 - (Math.abs(ti)/18)*18;
        ctx.moveTo(ti, ty); ctx.lineTo(ti+3, ty - 4);
        ctx.stroke();
      }

    } else if (d.kind === 'tree') {
      // Trunk
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(-3, 0, 6, 14);
      // Foliage (two ovals)
      ctx.fillStyle = '#2a5a1a';
      ctx.beginPath(); ctx.ellipse(0, -4, 10, 8, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1a4a0a';
      ctx.beginPath(); ctx.ellipse(0, -10, 7, 6, 0, 0, Math.PI*2); ctx.fill();

    } else if (d.kind === 'barrel') {
      ctx.fillStyle = '#6a4a1a';
      ctx.beginPath(); ctx.ellipse(0, -5, 7, 3, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(-7, -5, 14, 11);
      ctx.beginPath(); ctx.ellipse(0, 6, 7, 3, 0, 0, Math.PI*2); ctx.fill();
      // Hoops
      ctx.strokeStyle = '#3a2a0a'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.ellipse(0, -2, 7.5, 2.5, 0, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(0,  3, 7.5, 2.5, 0, 0, Math.PI*2); ctx.stroke();

    } else { // plank / generic
      ctx.fillStyle = '#8a6a3a';
      ctx.fillRect(-18, -3, 36, 6);
      ctx.strokeStyle = '#5a3a0a'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(-14, -3); ctx.lineTo(-14, 3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo( 14, -3); ctx.lineTo( 14, 3); ctx.stroke();
    }
    ctx.restore();
  }

  // ── 9. Electric inner glow (hypercane only) ───────────────
  if (isHyper) {
    for (let vein = 0; vein < 6; vein++) {
      const vA = ang * 4 + (vein / 6) * Math.PI * 2;
      const vT = (Math.sin(ang * 8 + vein * 2.1) + 1) / 2;
      ctx.globalAlpha = a * vT * 0.45;
      ctx.strokeStyle = 'rgba(220,160,255,0.90)';
      ctx.lineWidth = 0.9;
      const vR1 = BW * 0.5, vR2 = TW * (0.3 + vT * 0.4);
      const vFrac = 0.2 + vT * 0.5;
      const vx1 = sx + Math.cos(vA) * vR1, vy1 = sy - TH * 0.05;
      const vx2 = sx + Math.cos(vA + 0.5) * vR2, vy2 = sy - TH * vFrac;
      ctx.beginPath(); ctx.moveTo(vx1, vy1); ctx.lineTo(vx2, vy2); ctx.stroke();
    }
    // Hypercane: extra crackling arcs between rope anchors
    ctx.lineWidth = 0.7;
    for (let arc = 0; arc < 4; arc++) {
      const arcFlick = Math.sin(ang * 14 + arc * 3.3);
      if (arcFlick < 0.55) continue;
      ctx.globalAlpha = a * (arcFlick - 0.55) * 0.70;
      ctx.strokeStyle = 'rgba(240,180,255,0.88)';
      const a0  = ang * 3.1 + arc * 1.57;
      const a1  = a0 + 0.72;
      const r0  = TW * (0.25 + arc * 0.12);
      const r1  = TW * (0.30 + arc * 0.10);
      const h0  = sy - TH * (0.15 + arc * 0.16);
      const h1  = sy - TH * (0.22 + arc * 0.14);
      ctx.beginPath();
      ctx.moveTo(sx + Math.cos(a0) * r0, h0);
      ctx.lineTo(sx + Math.cos(a1) * r1, h1);
      ctx.stroke();
    }
  }

  // ── 10. Void plasma column + ground pool (void only) ─────────
  if (isVoid) {
    // Core energy pillar running up the funnel interior
    ctx.globalAlpha = a * (0.11 + Math.sin(ang * 19) * 0.07);
    const plGrd = ctx.createLinearGradient(sx, sy, sx, sy - TH);
    plGrd.addColorStop(0,   'rgba(90,170,255,0.65)');
    plGrd.addColorStop(0.28,'rgba(45,105,225,0.35)');
    plGrd.addColorStop(0.68,'rgba(22,65,185,0.16)');
    plGrd.addColorStop(1,   'rgba(0,22,105,0.05)');
    ctx.fillStyle = plGrd;
    const plW = BW * 2.0;
    ctx.beginPath();
    ctx.moveTo(sx - plW, sy); ctx.lineTo(sx + plW, sy);
    ctx.lineTo(sx + TW * 0.18, sy - TH);
    ctx.lineTo(sx - TW * 0.18, sy - TH);
    ctx.closePath(); ctx.fill();
    // Crackling void tendrils lashing outward
    ctx.lineWidth = 1.6;
    for (let vt = 0; vt < 6; vt++) {
      const vtFlick = Math.sin(ang * 22 + vt * 2.18);
      if (vtFlick < 0.40) continue;
      ctx.globalAlpha = a * (vtFlick - 0.40) * 0.58;
      ctx.strokeStyle = `rgba(65,145,255,${0.38+vtFlick*0.28})`;
      const vtA  = ang * 9.2 + vt * 1.047;
      const vtT  = ((vt * 0.17 + ang * 0.28) % 1);
      const vtW  = BW + (TW - BW) * vtT;
      const vtY  = sy - TH * vtT;
      ctx.beginPath();
      ctx.moveTo(sx + Math.cos(vtA) * vtW * 0.38, vtY);
      ctx.lineTo(sx + Math.cos(vtA) * vtW * (0.72 + Math.sin(ang * 16 + vt) * 0.28), vtY - 20 * tScale);
      ctx.stroke();
    }
    // Ground plasma pool glow
    ctx.globalAlpha = a * (0.28 + Math.sin(ang * 6.5) * 0.14);
    const ppGrd = ctx.createRadialGradient(sx, sy, 0, sx, sy, BW * 3.2);
    ppGrd.addColorStop(0,   'rgba(110,190,255,0.68)');
    ppGrd.addColorStop(0.45,'rgba(42,105,225,0.32)');
    ppGrd.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = ppGrd;
    ctx.beginPath(); ctx.ellipse(sx, sy, BW * 3.2, BW * 1.1, 0, 0, Math.PI * 2); ctx.fill();
    // Void: extra wide lightning bolt from cloud to ground
    const vLFlash = Math.sin(ang * 8.4 + 2.7) > 0.82;
    if (vLFlash) {
      ctx.globalAlpha = a * 0.55;
      ctx.strokeStyle = 'rgba(190,225,255,0.95)';
      ctx.lineWidth = (2.2 + Math.sin(ang * 40) * 0.8) * tScale;
      ctx.lineCap = 'round';
      const vlx0 = sx + Math.sin(ang * 3.7) * TW * 0.20;
      ctx.beginPath(); ctx.moveTo(vlx0, sy - TH + 22);
      let vlx = vlx0, vly = sy - TH + 22;
      for (let vs = 0; vs < 7; vs++) {
        vlx += Math.sin(ang * 7 + vs * 2.4) * 14 * tScale;
        vly += (TH * 0.90) / 7;
        ctx.lineTo(vlx, vly);
      }
      ctx.stroke();
      // Glow
      ctx.globalAlpha = a * 0.10;
      ctx.strokeStyle = 'rgba(100,180,255,1)';
      ctx.lineWidth = 12 * tScale;
      ctx.beginPath(); ctx.moveTo(vlx0, sy - TH + 22); ctx.lineTo(vlx, vly); ctx.stroke();
    }
  }

  ctx.restore();
}

// ── Draw: HUD ─────────────────────────────────────────────
function drawHUD() {
  const wi = windInfo(), f = wind.force, mx = W / 2;

  // Wind pill (top center)
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.50)';
  rrect(mx - 165, 10, 330, 40, 7); ctx.fill();

  const barW = 210, barH = 6, bx = mx - barW/2, by = 34;
  ctx.fillStyle = 'rgba(255,255,255,0.07)'; ctx.fillRect(bx, by, barW, barH);
  ctx.fillStyle = 'rgba(255,255,255,0.30)'; ctx.fillRect(mx-1, by-3, 2, barH+6);

  const fillW = Math.min(barW/2, Math.abs(f)/0.90 * (barW/2));
  if (Math.abs(f) > 0.03) {
    const wCol = f > 0.04 ? '#e8c84a'
               : wi.lvl>=7 ? '#cc44ff'
               : wi.lvl>=5 ? '#cc44ff'
               : wi.lvl>=3 ? '#e84040'
               : wi.lvl>=2 ? '#e8902a' : '#5dade2';
    ctx.fillStyle = wCol;
    if (f < 0) ctx.fillRect(mx - fillW, by, fillW, barH);
    else        ctx.fillRect(mx, by, Math.min(fillW, barW/2), barH);
  }

  ctx.font = '10px Courier New';
  ctx.fillStyle = f < -0.04 ? '#5dade2' : 'rgba(255,255,255,0.2)';
  ctx.textAlign = 'left';  ctx.fillText('◄', bx-14, by+7);
  ctx.fillStyle = f >  0.04 ? '#e8c84a' : 'rgba(255,255,255,0.2)';
  ctx.textAlign = 'right'; ctx.fillText('►', bx+barW+14, by+7);

  const lblCol = wi.lvl>=7?'#cc44ff':wi.lvl>=5?'#cc44ff':wi.lvl>=3?'#ff5c5c':wi.lvl>=2?'#ffaa44':C.text;
  ctx.fillStyle = lblCol; ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'center'; ctx.fillText(wi.label, mx, 29);
  ctx.restore();

  // Score + tier (top left) — shows current position; maxReach tracks best
  const score = Math.floor(player.x / 12);
  const tier  = getWindTier();
  const tierC = ['#5dade2','#6bcb77','#e8c84a','#e8902a','#e84040','#cc2020','#cc44ff','#cc44ff'][tier] || '#cc44ff';

  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.48)'; rrect(14,10,164,40,5); ctx.fill();

  ctx.fillStyle = C.dim; ctx.font = '9px Courier New'; ctx.textAlign = 'left';
  ctx.fillText('DISTANCE', 21, 22);
  ctx.fillStyle = C.text; ctx.font = 'bold 16px Courier New';
  ctx.fillText(score + 'm', 21, 40);

  ctx.fillStyle = tierC; ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'right';
  ctx.fillText(tier >= 7 ? '??? VOID' : 'TIER ' + tier, 170, 22);
  if (tier < 6) {
    ctx.fillStyle = C.dim; ctx.font = '9px Courier New';
    ctx.fillText((tier === 5 ? 1500 : (tier+1)*200) + 'm', 170, 40);
  } else if (tier === 6) {
    ctx.fillStyle = C.dim; ctx.font = '9px Courier New'; ctx.fillText('2500m', 170, 40);
  } else {
    ctx.fillStyle = tierC; ctx.font = '9px Courier New'; ctx.fillText('BEYOND', 170, 40);
  }

  // Mute button — sits just below the tier pill
  {
    const mbX = 14, mbY = 55, mbW = 164, mbH = 22;
    const mLabel = audioMuted ? '🔇  MUTED' : '🔊  SOUND ON';
    ctx.fillStyle = audioMuted ? 'rgba(180,40,40,0.40)' : 'rgba(0,0,0,0.38)';
    rrect(mbX, mbY, mbW, mbH, 4); ctx.fill();
    ctx.strokeStyle = audioMuted ? 'rgba(255,80,80,0.50)' : 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 1;
    rrect(mbX, mbY, mbW, mbH, 4); ctx.stroke();
    ctx.font = '9px Courier New'; ctx.textAlign = 'left';
    ctx.fillStyle = audioMuted ? '#ff9090' : 'rgba(190,215,240,0.70)';
    ctx.fillText(mLabel, mbX + 10, mbY + 14);
    ctx.fillStyle = 'rgba(160,190,210,0.35)';
    ctx.font = '7px Courier New'; ctx.textAlign = 'right';
    ctx.fillText('[M]', mbX + mbW - 6, mbY + 14);
  }

  if (bestScore > 0) {
    ctx.fillStyle = 'rgba(200,228,245,0.20)'; ctx.font = '8px Courier New';
    ctx.textAlign = 'center'; ctx.fillText('BEST ' + bestScore + 'm', 97, 53);
  }
  ctx.restore();

  // Secret tier unlock flash — full-screen dramatic reveal
  if (secretTierTimer > 0) {
    const t = secretTierTimer / 280;   // 1→0 as it fades
    const alpha = t < 0.15 ? t / 0.15 : t > 0.6 ? (t - 0.6) / 0.4 * (t > 0.85 ? (t - 0.85) / 0.15 : 1) : 1;
    ctx.save();
    // Black full-screen veil
    ctx.globalAlpha = Math.min(0.92, t * 1.4);
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);
    // Pulsing white edge glow
    ctx.globalAlpha = Math.min(0.55, t) * (0.5 + 0.5 * Math.sin(frame * 0.18));
    const eg = ctx.createRadialGradient(W/2, H/2, H * 0.2, W/2, H/2, H);
    eg.addColorStop(0, 'rgba(255,255,255,0)'); eg.addColorStop(1, 'rgba(200,200,200,0.65)');
    ctx.fillStyle = eg; ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = Math.min(1, t * 1.6);
    ctx.textAlign = 'center';
    // Warning line
    ctx.font = 'bold 11px Courier New'; ctx.fillStyle = 'rgba(180,100,255,0.85)';
    ctx.fillText('— SECRET TIER UNLOCKED —', W/2, H/2 - 44);
    // Main title
    ctx.font = 'bold 32px Courier New'; ctx.fillStyle = '#cc44ff';
    ctx.fillText('VOID STORM', W/2, H/2 - 4);
    // Subtitle
    ctx.font = '11px Courier New'; ctx.fillStyle = 'rgba(200,140,255,0.90)';
    ctx.fillText('NO SHELTER EXISTS AT THIS DEPTH', W/2, H/2 + 24);
    ctx.font = '9px Courier New'; ctx.fillStyle = 'rgba(160,80,220,0.80)';
    ctx.fillText('2500m — BEYOND THE KNOWN', W/2, H/2 + 44);
    ctx.restore();
  }
}

// ── Draw: Freeze meter (top right) ───────────────────────
function drawFreezeMeter() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.48)';
  rrect(W - 178, 10, 164, 40, 5); ctx.fill();

  ctx.fillStyle = C.dim; ctx.font = '9px Courier New'; ctx.textAlign = 'left';
  ctx.fillText('COLD', W - 171, 22);
  if (player.inHouse) {
    const isMetal = player.inHouse.type === 'metal';
    ctx.fillStyle = isMetal ? '#8ac8e8' : '#ffaa44';
    ctx.font = 'bold 9px Courier New'; ctx.textAlign = 'right';
    ctx.fillText(isMetal ? '● BUNKER' : '● SHELTERED', W - 20, 22);
  }

  const barW = 140, barH = 6, bx = W - 171, by = 28;
  ctx.fillStyle = 'rgba(255,255,255,0.07)'; ctx.fillRect(bx, by, barW, barH);

  // Color: pale blue → deep icy blue → bright white-blue at max
  const t = freezing;
  const r = Math.round(t < 0.5 ? 80 + t * 2 * 60  : 140 - (t-0.5)*2*120);
  const g = Math.round(t < 0.5 ? 160 + t * 2 * 40  : 200 - (t-0.5)*2*150);
  const b = Math.round(t < 0.5 ? 220               : 220 + (t-0.5)*2*35);

  // Pulse rapidly when nearly frozen
  const pulse = freezing > 0.80 ? 0.55 + 0.45 * Math.sin(frame * 0.35) : 1;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(bx, by, barW * freezing, barH);
  ctx.globalAlpha = 1;

  const pct = Math.round(freezing * 100);
  ctx.fillStyle = freezing > 0.75 ? '#aaddff' : C.dim;
  ctx.font = 'bold 9px Courier New'; ctx.textAlign = 'right';
  ctx.fillText(pct + '%', W - 20, 38);
  ctx.restore();
}

// ── Draw: Stamina bar (bottom center) ────────────────────
function drawStaminaBar() {
  if (gState !== 'playing') return;
  const barW = 190, barH = 7;
  const bx = W / 2 - barW / 2, by = H - 26;

  ctx.save();

  // Pill background
  ctx.fillStyle = 'rgba(0,0,0,0.50)';
  rrect(bx - 12, by - 14, barW + 24, 24, 5); ctx.fill();

  // Track
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fillRect(bx, by, barW, barH);

  if (staminaDepleted) {
    // Cooldown countdown shown as a dimming bar
    const coolPct = staminaCooldown / 120;
    ctx.fillStyle = `rgba(210,70,40,${0.30 + 0.20 * Math.sin(frame * 0.22)})`;
    ctx.fillRect(bx, by, barW * coolPct, barH);

    // "RECHARGING" label
    const pulse = 0.55 + 0.45 * Math.abs(Math.sin(frame * 0.15));
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#e06040'; ctx.font = 'bold 9px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('RECHARGING…', W / 2, by - 2);
    ctx.globalAlpha = 1;
  } else {
    // Stamina fill — green → yellow → orange as it drains
    const t = stamina;
    const r = t > 0.6 ? 52  : t > 0.3 ? 230 : 232;
    const g = t > 0.6 ? 215 : t > 0.3 ? 205 : 130;
    const b = t > 0.6 ? 140 : t > 0.3 ?  55 :  28;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(bx, by, barW * t, barH);

    // Labels
    ctx.font = '9px Courier New'; ctx.textAlign = 'left';
    ctx.fillStyle = C.dim;
    ctx.fillText('STAMINA', bx, by - 2);

    const running = keys['ShiftLeft'] && player.onGround && stamina > 0;
    ctx.textAlign = 'right';
    ctx.fillStyle = running ? `rgb(${r},${g},${b})` : C.dim;
    ctx.fillText('SHIFT', bx + barW, by - 2);
  }

  ctx.restore();
}

// ── Draw: Overlay ────────────────────────────────────────
function drawOverlay() {
  if (gState === 'playing') return;
  ctx.fillStyle = 'rgba(5,10,20,0.80)'; ctx.fillRect(0,0,W,H);
  const score = Math.floor(maxReach / 12);
  ctx.textAlign = 'center';
  ctx.fillStyle = deathReason === 'tornado' ? '#cc44ff' : '#7aaccc';
  ctx.font = 'bold 52px Courier New';
  const dMsg = deathReason === 'freeze' ? 'FROZEN SOLID'
             : deathReason === 'tornado' ? 'SWEPT AWAY'
             : 'FALLEN';
  ctx.fillText(dMsg, W/2, H/2 - 28);
  ctx.fillStyle = C.text; ctx.font = 'bold 22px Courier New';
  ctx.fillText(score + 'm', W/2, H/2 + 14);
  if (bestScore > 0) {
    const isNew = score >= bestScore;
    ctx.fillStyle = isNew ? '#e8c84a' : C.dim; ctx.font = '13px Courier New';
    ctx.fillText(isNew ? 'new best!' : 'best: ' + bestScore + 'm', W/2, H/2 + 38);
  }
  ctx.fillStyle = C.text; ctx.font = 'bold 12px Courier New';
  ctx.fillText('PRESS R TO TRY AGAIN', W/2, H/2 + 72);
  // Hint about the research base
  ctx.fillStyle = 'rgba(80,180,255,0.70)'; ctx.font = '10px Courier New';
  ctx.fillText('maybe researchers will help you', W/2, H/2 + 90);
}

// ── Draw: Vignette + frost overlay ───────────────────────
function drawVignette() {
  // Edge darkening — thickens in heavy storms
  const grd = ctx.createRadialGradient(W/2, H/2, H*0.26, W/2, H/2, H*0.92);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, `rgba(0,4,12,${(0.32 + wind.strength * 0.18).toFixed(3)})`);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Frost vignette — appears at high freeze
  if (freezing > 0.55) {
    const ft = (freezing - 0.55) / 0.45; // 0→1 as freeze goes 55%→100%
    const fg = ctx.createRadialGradient(W/2, H/2, H*0.18, W/2, H/2, H*0.78);
    fg.addColorStop(0, 'rgba(160,210,240,0)');
    fg.addColorStop(0.7, `rgba(160,210,240,${(ft*0.10).toFixed(3)})`);
    fg.addColorStop(1,   `rgba(180,225,250,${(ft*0.45).toFixed(3)})`);
    ctx.fillStyle = fg;
    ctx.fillRect(0, 0, W, H);

    // Ice crystal dendrites at screen corners when nearly frozen
    if (ft > 0.45) {
      const ict = (ft - 0.45) / 0.55;
      ctx.save();
      ctx.globalAlpha = ict * 0.65;
      ctx.strokeStyle = 'rgba(195,230,250,0.80)';
      ctx.lineCap = 'round';
      const corners = [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]];
      for (const [ox, oy, dx, dy] of corners) {
        const arms = 5, spread = ict * 80;
        for (let a = 0; a < arms; a++) {
          const angle = (a / arms) * Math.PI * 0.5 + Math.atan2(dy, dx);
          const len   = spread * (0.55 + (a % 2) * 0.45);
          ctx.lineWidth = 1.2 - a * 0.15;
          ctx.beginPath();
          ctx.moveTo(ox, oy);
          ctx.lineTo(ox + Math.cos(angle)*len*dx, oy + Math.sin(angle)*len*dy);
          ctx.stroke();
        }
      }
      ctx.restore();
    }
  }
}

// ── Loop ──────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  // Subtle camera shake in heavy storms
  const shakeStr = Math.max(0, wind.strength - 0.60) * 2.2
                 + (tornado && tornado.alpha > 0.5 ? tornado.alpha * 1.8 : 0);
  if (shakeStr > 0.05) {
    const sx = Math.sin(frame * 13.7) * shakeStr;
    const sy = Math.sin(frame * 9.3 + 1.2) * shakeStr * 0.5;
    ctx.translate(sx, sy);
  }
  drawSky();
  drawAurora();
  drawClouds();
  drawMountains();
  drawBgForest();
  drawDistantTrees();
  drawBgPineTrees();
  drawBgTornados();
  drawAtmosphere();
  drawFog();
  drawSnow();
  drawWindDebris();
  drawGroundDrift();
  drawParticles();
  drawTerrain();
  drawCraters();
  platforms.filter(p => p.h <= 20).forEach(drawPlatform);
  drawDecorations();
  houses.forEach(drawHouse);
  drawLightning();
  drawTornado();
  drawStickman();
  drawVignette();
  ctx.restore();
  const inResearch = player.inHouse && player.inHouse.type === 'research';
  const _ab = document.getElementById('anim-btn'); if (_ab) _ab.style.display = inResearch ? 'block' : 'none';
  if (!inResearch) animPicker.open = false;
  if (inResearch) drawResearchInterior();
  if (inResearch && animPicker.open) drawAnimPicker();
  drawHUD();
  drawFreezeMeter();
  drawStaminaBar();
  drawChallenge();
  drawOverlay();
}

// ── Audio System ──────────────────────────────────────────
const WindAudio = (() => {
  let ac = null;
  let master, windGain, windLP, gustGain, rumbleGain, droneGain, torGain, iceGain, voidAlarmGain, voidAlarmOsc, voidAlarmLFO, baseMusic;
  let started = false, prevLightning = false;

  // Pink-ish noise (gentler than brown)
  function mkNoise(color = 0.995) {
    const n = ac.sampleRate * 4;
    const buf = ac.createBuffer(1, n, ac.sampleRate);
    const d = buf.getChannelData(0);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;
    for (let i = 0; i < n; i++) {
      const w = Math.random() * 2 - 1;
      b0=color*b0+w*0.0555179; b1=color*b1+w*0.0750759;
      b2=color*b2+w*0.1538520; b3=color*b3+w*0.3104856;
      b4=color*b4+w*0.5329522; b5=color*b5+w*0.0168980;
      d[i] = Math.max(-1, Math.min(1, (b0+b1+b2+b3+b4+b5+w*0.115926) * 0.11));
    }
    const s = ac.createBufferSource(); s.buffer = buf; s.loop = true; return s;
  }

  function mkOsc(type, freq) {
    const o = ac.createOscillator(); o.type = type; o.frequency.value = freq; o.start(); return o;
  }
  function mkLFO(freq) { return mkOsc('sine', freq); }

  function init() {
    if (started) return;
    started = true;
    ac = new (window.AudioContext || window.webkitAudioContext)();
    ac.resume();
    master = ac.createGain(); master.gain.value = 0.85; master.connect(ac.destination);

    // ── Layer 1: main wind rush — pink noise → smooth lowpass ──
    // No aggressive filter modulation; cutoff just rises with wind strength
    const w1 = mkNoise();
    windLP = ac.createBiquadFilter(); windLP.type = 'lowpass'; windLP.Q.value = 0.4;
    windLP.frequency.value = 600;
    const wHP = ac.createBiquadFilter(); wHP.type = 'highpass'; wHP.frequency.value = 80;
    windGain = ac.createGain(); windGain.gain.value = 0.0;
    w1.connect(windLP); windLP.connect(wHP); wHP.connect(windGain);
    windGain.connect(master); w1.start();

    // ── Layer 2: slow gusting — second noise source with very slow LFO on gain ──
    // Creates gentle "gust" swells without wobbly filter artifacts
    const w2 = mkNoise(0.990);
    const gLP = ac.createBiquadFilter(); gLP.type = 'lowpass'; gLP.frequency.value = 320; gLP.Q.value = 0.3;
    gustGain = ac.createGain(); gustGain.gain.value = 0.0;
    const gustLFO = ac.createGain(); gustLFO.gain.value = 0.10;
    mkLFO(0.055).connect(gustLFO); gustLFO.connect(gustGain.gain);
    w2.connect(gLP); gLP.connect(gustGain); gustGain.connect(master); w2.start();

    // ── Layer 3: deep low rumble — very low noise for "air pressure" feeling ──
    const w3 = mkNoise(0.999);
    const rLP = ac.createBiquadFilter(); rLP.type = 'lowpass'; rLP.frequency.value = 55; rLP.Q.value = 0.5;
    rumbleGain = ac.createGain(); rumbleGain.gain.value = 0.0;
    w3.connect(rLP); rLP.connect(rumbleGain); rumbleGain.connect(master); w3.start();

    // ── Layer 4: storm drone — two detuned sub-bass sines, very subtle ──
    const d1 = mkOsc('sine', 48), d2 = mkOsc('sine', 51.5);
    const dMix = ac.createGain(); dMix.gain.value = 0.18;
    const dLP = ac.createBiquadFilter(); dLP.type = 'lowpass'; dLP.frequency.value = 220; dLP.Q.value = 1.0;
    droneGain = ac.createGain(); droneGain.gain.value = 0.0;
    d1.connect(dMix); d2.connect(dMix);
    dMix.connect(dLP); dLP.connect(droneGain); droneGain.connect(master);

    // ── Layer 5: tornado — roaring noise band that swells ──
    const t1 = mkNoise(0.992);
    const tLP = ac.createBiquadFilter(); tLP.type = 'lowpass'; tLP.frequency.value = 900; tLP.Q.value = 0.6;
    const tHP = ac.createBiquadFilter(); tHP.type = 'highpass'; tHP.frequency.value = 140;
    // Gentle rotational swell — slow and deep, not radio-like
    const tLFO = ac.createGain(); tLFO.gain.value = 0.12;
    mkLFO(0.38).connect(tLFO); tLFO.connect(tLP.frequency);
    torGain = ac.createGain(); torGain.gain.value = 0.0;
    t1.connect(tLP); tLP.connect(tHP); tHP.connect(torGain); torGain.connect(master); t1.start();

    // ── Layer 6: freeze shimmer — very soft high-frequency whisper ──
    const i1 = mkOsc('sine', 1800), i2 = mkOsc('sine', 2100);
    const iMix = ac.createGain(); iMix.gain.value = 0.08;
    const iLP = ac.createBiquadFilter(); iLP.type = 'lowpass'; iLP.frequency.value = 3000;
    iceGain = ac.createGain(); iceGain.gain.value = 0.0;
    i1.connect(iMix); i2.connect(iMix); iMix.connect(iLP); iLP.connect(iceGain); iceGain.connect(master);

    // ── Layer 7: void storm alarm — slow two-tone siren ──────────
    // LFO sweeps frequency between 440 and 600 Hz at 0.4 Hz (slow wail)
    voidAlarmOsc = ac.createOscillator(); voidAlarmOsc.type = 'sine';
    voidAlarmOsc.frequency.value = 500;
    voidAlarmLFO = ac.createOscillator(); voidAlarmLFO.type = 'sine';
    voidAlarmLFO.frequency.value = 0.35; // one sweep per ~2.8 seconds
    const alarmLFOGain = ac.createGain(); alarmLFOGain.gain.value = 80; // ±80 Hz sweep
    voidAlarmLFO.connect(alarmLFOGain); alarmLFOGain.connect(voidAlarmOsc.frequency);
    // Soft bandpass to keep it muffled (indoor alarm through walls)
    const alarmBP = ac.createBiquadFilter(); alarmBP.type = 'bandpass';
    alarmBP.frequency.value = 520; alarmBP.Q.value = 3.0;
    voidAlarmGain = ac.createGain(); voidAlarmGain.gain.value = 0.0;
    voidAlarmOsc.connect(alarmBP); alarmBP.connect(voidAlarmGain);
    voidAlarmGain.connect(master);
    voidAlarmOsc.start(); voidAlarmLFO.start();

    // ── Layer 8: research base ambient music ──────────────────
    // Soft generative pad: two detuned sine oscillators + a slow melody oscillator
    baseMusic = (() => {
      const g = ac.createGain(); g.gain.value = 0.0; g.connect(master);

      // Warm pad — two oscillators slightly detuned
      const pad1 = ac.createOscillator(); pad1.type = 'sine'; pad1.frequency.value = 220;
      const pad2 = ac.createOscillator(); pad2.type = 'sine'; pad2.frequency.value = 221.4; // slight detune
      const pad3 = ac.createOscillator(); pad3.type = 'triangle'; pad3.frequency.value = 330;

      const padLP = ac.createBiquadFilter(); padLP.type = 'lowpass'; padLP.frequency.value = 900; padLP.Q.value = 0.5;

      const g1 = ac.createGain(); g1.gain.value = 0.18;
      const g2 = ac.createGain(); g2.gain.value = 0.14;
      const g3 = ac.createGain(); g3.gain.value = 0.07;

      pad1.connect(g1); pad2.connect(g2); pad3.connect(g3);
      g1.connect(padLP); g2.connect(padLP); g3.connect(padLP);
      padLP.connect(g);

      // Slow breathing LFO on the pad volume
      const breathLFO = ac.createOscillator(); breathLFO.type = 'sine'; breathLFO.frequency.value = 0.07;
      const breathGain = ac.createGain(); breathGain.gain.value = 0.06;
      breathLFO.connect(breathGain); breathGain.connect(g1.gain); breathGain.connect(g2.gain);

      // Gentle melody — slow pentatonic sequence (A minor pentatonic: A3 C4 D4 E4 G4)
      const melNotes = [220, 262, 294, 330, 392, 330, 262, 294];
      let melIdx = 0;
      const mel = ac.createOscillator(); mel.type = 'sine'; mel.frequency.value = melNotes[0];
      const melEnv = ac.createGain(); melEnv.gain.value = 0.0;
      const melLP = ac.createBiquadFilter(); melLP.type = 'lowpass'; melLP.frequency.value = 1200;
      mel.connect(melLP); melLP.connect(melEnv); melEnv.connect(g);

      // Step melody every ~2.8 seconds
      const melStep = () => {
        if (!ac) return;
        const now = ac.currentTime;
        melIdx = (melIdx + 1) % melNotes.length;
        mel.frequency.setTargetAtTime(melNotes[melIdx], now, 0.04);
        melEnv.gain.cancelScheduledValues(now);
        melEnv.gain.setValueAtTime(0.0, now);
        melEnv.gain.linearRampToValueAtTime(0.09, now + 0.15);
        melEnv.gain.setTargetAtTime(0.0, now + 0.9, 0.4);
        setTimeout(melStep, 2800 + Math.random() * 600);
      };
      setTimeout(melStep, 1200);

      pad1.start(); pad2.start(); pad3.start(); breathLFO.start(); mel.start();

      return g; // expose only the gain node
    })();
  }

  function jump() {
    if (!ac) return;
    const t = ac.currentTime;
    // Classic platformer jump blip: square wave with a quick upward pitch slide.
    const o = ac.createOscillator(); o.type = 'square';
    o.frequency.setValueAtTime(340, t);
    o.frequency.exponentialRampToValueAtTime(880, t + 0.11);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.28, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.20);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.22);
  }

  function footstep(running) {
    if (!ac) return;
    const t  = ac.currentTime;
    const sr = ac.sampleRate;
    // Slight randomness per step so no two sound identical
    const rv = () => 0.82 + Math.random() * 0.36;

    function noise(len) {
      const b = ac.createBuffer(1, len, sr);
      const d = b.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      return b;
    }
    function play(buf, nodes, gain, when) {
      const s = ac.createBufferSource(); s.buffer = buf;
      let n = s;
      for (const f of nodes) { n.connect(f); n = f; }
      const g = ac.createGain(); g.gain.value = gain;
      n.connect(g); g.connect(master); s.start(when);
    }
    function bpf(freq, q) {
      const f = ac.createBiquadFilter(); f.type = 'bandpass';
      f.frequency.value = freq; f.Q.value = q; return f;
    }
    function lpf(freq) {
      const f = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = freq; return f;
    }
    function hpf(freq) {
      const f = ac.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = freq; return f;
    }

    if (!running) {
      // ── Walking on snow: three layered components ───────────

      // 1. Soft body impact — low thud as weight transfers onto foot
      const impLen = Math.floor(sr * 0.10);
      const impBuf = ac.createBuffer(1, impLen, sr);
      const impD   = impBuf.getChannelData(0);
      for (let i = 0; i < impLen; i++) {
        const p  = i / impLen;
        const env = Math.pow(1 - p, 2.2) * Math.min(1, p / 0.015);
        // Pitched thud: sine drops from ~70 to 28 Hz
        const freq = 70 - p * 42;
        impD[i] = Math.sin(2 * Math.PI * freq * i / sr) * env * 0.7
                + (Math.random() * 2 - 1) * env * 0.3;
      }
      play(impBuf, [lpf(220)], 0.18 * rv(), t);

      // 2. Snow compression crunch — mid-freq noise with resonant peak
      //    Sounds like ice crystals fracturing under slow weight
      const crLen = Math.floor(sr * 0.13);
      const crBuf = ac.createBuffer(1, crLen, sr);
      const crD   = crBuf.getChannelData(0);
      for (let i = 0; i < crLen; i++) {
        const p   = i / crLen;
        const env = Math.pow(1 - p, 1.6) * Math.min(1, p / 0.02);
        crD[i] = (Math.random() * 2 - 1) * env;
      }
      const crBP = bpf(700 * rv(), 1.8);
      play(crBuf, [hpf(260), crBP, lpf(2200)], 0.14, t + 0.005);

      // 3. Surface squeak — compressed snow singing under the boot
      //    Short tonal burst that slides up slightly in pitch
      const sqLen = Math.floor(sr * 0.07);
      const sqBuf = ac.createBuffer(1, sqLen, sr);
      const sqD   = sqBuf.getChannelData(0);
      const sqBase = 380 + Math.random() * 120;
      let sqPhase = 0;
      for (let i = 0; i < sqLen; i++) {
        const p   = i / sqLen;
        const env = Math.pow(1 - p, 3.5) * Math.min(1, p / 0.04);
        const freq = sqBase + p * 90;
        sqPhase  += (2 * Math.PI * freq) / sr;
        sqD[i]    = Math.sin(sqPhase) * env * 0.55
                  + (Math.random() * 2 - 1) * env * 0.15;
      }
      const sqBP = bpf(sqBase, 4.5);
      play(sqBuf, [sqBP], 0.045 * rv(), t + 0.008);

    } else {
      // ── Sprinting on snow: four layered components ──────────

      // 1. Hard boot thud — sharp pitch-drop sine, heavy impact
      const thLen = Math.floor(sr * 0.16);
      const thBuf = ac.createBuffer(1, thLen, sr);
      const thD   = thBuf.getChannelData(0);
      let thPhase = 0;
      for (let i = 0; i < thLen; i++) {
        const p   = i / thLen;
        const env = Math.pow(1 - p, 1.1) * Math.min(1, p / 0.008);
        const freq = 130 - p * 100; // 130→30 Hz hard drop
        thPhase  += (2 * Math.PI * Math.max(20, freq)) / sr;
        thD[i]    = Math.sin(thPhase) * env * 0.75
                  + (Math.random() * 2 - 1) * env * 0.25;
      }
      play(thBuf, [lpf(300)], 0.48 * rv(), t);

      // 2. Aggressive ice-crystal crunch — fast transient burst
      //    Snow shattering under fast heavy impact
      const icLen = Math.floor(sr * 0.055);
      const icBuf = noise(icLen);
      const icD   = icBuf.getChannelData(0);
      for (let i = 0; i < icLen; i++) {
        const p   = i / icLen;
        const env = Math.pow(1 - p, 4.0) * Math.min(1, p / 0.01);
        icD[i]   *= env;
      }
      play(icBuf, [hpf(1200), bpf(2400 * rv(), 0.9), lpf(7000)], 0.30, t + 0.002);

      // 3. Mid crunch body — the main snow texture, between thud and crunch
      const mcLen = Math.floor(sr * 0.09);
      const mcBuf = noise(mcLen);
      const mcD   = mcBuf.getChannelData(0);
      for (let i = 0; i < mcLen; i++) {
        const p   = i / mcLen;
        const env = Math.pow(1 - p, 2.0) * Math.min(1, p / 0.012);
        mcD[i]   *= env;
      }
      play(mcBuf, [bpf(650 * rv(), 1.4), lpf(2800)], 0.22, t + 0.004);

      // 4. Ejected snow scatter — tiny high flutter as snow sprays out
      //    Delayed slightly, sounds like chunks scattering away from boot
      const scLen = Math.floor(sr * 0.11);
      const scBuf = noise(scLen);
      const scD   = scBuf.getChannelData(0);
      for (let i = 0; i < scLen; i++) {
        const p   = i / scLen;
        const env = Math.pow(1 - p, 1.3) * Math.min(1, p / 0.03) * (p < 0.25 ? 0 : 1);
        scD[i]   *= env;
      }
      play(scBuf, [hpf(2800), lpf(9000)], 0.10 * rv(), t + 0.018);
    }
  }

  function thunder() {
    if (!ac) return;
    const t = ac.currentTime;
    const buf = ac.createBuffer(1, ac.sampleRate * 2, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(Math.max(0, 1 - i / d.length), 1.2);
    const s  = ac.createBufferSource(); s.buffer = buf;
    const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 140;
    const g  = ac.createGain();
    g.gain.setValueAtTime(1.0, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 2.2);
    s.connect(lp); lp.connect(g); g.connect(master); s.start();
  }

  function update(wStr, wForce, torAlpha, freeze, lightning, voidStorm, inBase) {
    if (!ac) return;
    if (ac.state === 'suspended') ac.resume();
    const t = ac.currentTime, sm = 0.18;

    // Main rush: louder and brighter as wind strengthens
    windGain.gain.setTargetAtTime(Math.min(0.72, wStr * 0.80), t, sm);
    windLP.frequency.setTargetAtTime(300 + wStr * 1400, t, sm);

    // Gust swell: appears in moderate+ wind
    gustGain.gain.setTargetAtTime(Math.max(0, wStr - 0.15) * 0.22, t, sm);

    // Low rumble: grows in storms
    rumbleGain.gain.setTargetAtTime(Math.max(0, wStr - 0.40) * 0.55, t, sm);

    // Sub-bass drone: only in heavy wind
    droneGain.gain.setTargetAtTime(Math.max(0, wStr - 0.55) * 0.40, t, sm);

    // Tornado roar
    torGain.gain.setTargetAtTime(torAlpha * 0.75, t, 0.08);

    // Freeze whisper
    iceGain.gain.setTargetAtTime(Math.max(0, freeze - 0.35) * 0.28, t, sm);

    // Void storm alarm — quiet indoor wail, fades in/out smoothly
    if (voidAlarmGain) voidAlarmGain.gain.setTargetAtTime(voidStorm ? 0.07 : 0.0, t, 0.8);

    // Base ambient music — plays in research base, stops during void storm alarm
    if (baseMusic) baseMusic.gain.setTargetAtTime((inBase && !voidStorm) ? 0.55 : 0.0, t, 1.2);

    if (lightning && !prevLightning) thunder();
    prevLightning = lightning;
  }

  function setMute(muted) {
    if (!master) return;
    master.gain.setTargetAtTime(muted ? 0 : 0.85, ac.currentTime, 0.05);
  }

  return { init, update, footstep, jump, setMute };
})();

// ── Wind Challenge minigame ───────────────────────────────
let challenge = null;
const CHAL_POOL   = ['KeyW','KeyA','KeyS','KeyD'];
const CHAL_LABELS = { KeyW:'W', KeyA:'A', KeyS:'S', KeyD:'D' };

function spawnChallenge() {
  const wi = windInfo();
  if (wi.lvl < 3) return;
  if (player.inHouse && (player.inHouse.type === 'bunker' || player.inHouse.type === 'research')) return;
  const count = Math.min(5, wi.lvl);
  const seq = [];
  for (let i = 0; i < count; i++)
    seq.push(CHAL_POOL[Math.floor(Math.random() * CHAL_POOL.length)]);
  const maxTimer = Math.max(180, 480 - wi.lvl * 30);
  challenge = { seq, idx: 0, timer: maxTimer, maxTimer, result: null, cooldown: 0, isTornadoEscape: false };
}

function spawnTornadoChallenge() {
  if (player.inHouse && (player.inHouse.type === 'bunker' || player.inHouse.type === 'research')) return;
  // Harder than normal: 4–5 keys, tight timer
  const count = 3 + Math.floor(Math.random() * 2);
  const seq = [];
  for (let i = 0; i < count; i++)
    seq.push(CHAL_POOL[Math.floor(Math.random() * CHAL_POOL.length)]);
  challenge = { seq, idx: 0, timer: 300, maxTimer: 300, result: null, cooldown: 60, isTornadoEscape: true };
}

function handleChallengeKey(code) {
  if (!challenge || challenge.result !== null) return;
  if (!CHAL_LABELS[code]) return;
  if (challenge.seq[challenge.idx] === code) {
    challenge.idx++;
    if (challenge.idx >= challenge.seq.length) {
      challenge.result = 'win';
      challenge.cooldown = 80;
      freezing = Math.max(0, freezing - 0.20);
      // Calm winds and dismiss tornado on any win
      wind.force = 0; wind.target = 0;
      wind.timer = 0; wind.duration = 600;
      if (tornado) tornado.alpha = 0;
    }
  } else {
    challenge.result = 'fail';
    challenge.cooldown = 80;
    freezing = Math.min(1, freezing + 0.18);
  }
}

function updateChallenge() {
  if (!challenge) {
    return;
  }
  if (challenge.result !== null) {
    if (--challenge.cooldown <= 0) challenge = null;
    return;
  }
  if (--challenge.timer <= 0) {
    challenge.result = 'fail';
    challenge.cooldown = 80;
    freezing = Math.min(1, freezing + 0.18);
  }
}

function drawChallenge() {
  if (!challenge) return;
  const wi = windInfo();
  if (wi.lvl < 3) return;

  const cx = W / 2, cy = H - 90;
  const isWin  = challenge.result === 'win';
  const isFail = challenge.result === 'fail';
  const pw = challenge.seq.length * 46 + 28;

  ctx.save();

  // Pill background
