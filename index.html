<title>WINDCHILL</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060c18;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
  }
  #wrapper {
    position: relative;
    isolation: isolate;
    width: 900px;
    transform-origin: center center;
    flex-shrink: 0;
  }
  #game-title { display: none; }
  canvas {
    display: block;
    width: 900px;
    height: 520px;
  }
  #hint {
    margin-top: 6px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(180,215,240,0.20);
    text-align: center;
    text-transform: uppercase;
  }
</style>

<div id="wrapper">
  <div id="game-title">Windchill</div>
  <canvas id="game" width="900" height="520"></canvas>
  <div id="hint">Arrow keys / WASD &nbsp;·&nbsp; Space to jump &nbsp;·&nbsp; Left Shift to sprint &nbsp;·&nbsp; E to enter/exit house &nbsp;·&nbsp; R to restart</div>
</div>

<style>
#test-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  font-family: 'Courier New', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  padding: 4px 10px;
  background: rgba(0,0,0,0.55);
  color: rgba(180,215,240,0.70);
  border: 1px solid rgba(180,215,240,0.22);
  border-radius: 4px;
  cursor: pointer;
  z-index: 10;
}
#test-btn:hover { background: rgba(0,0,0,0.75); }
#test-menu {
  display: none;
  position: absolute;
  top: 34px;
  right: 10px;
  background: rgba(6,12,24,0.92);
  border: 1px solid rgba(180,215,240,0.18);
  border-radius: 5px;

}

  display: block;
  width: 100%;
  font-family: 'Courier New', monospace;

</style>

<div id="test-btn" onclick="toggleTestMenu()">⚡ WIND</div>
<div id="test-menu">
  <button onclick="forceWind(0);closeTestMenu()">CALM</button>
  <button onclick="forceWind(5);closeTestMenu()">TAILWIND</button>
  <button onclick="forceWind(8);closeTestMenu()">STRONG TAILWIND</button>
  <button onclick="forceWind(9);closeTestMenu()">TAILWIND TORNADO</button>
  <button onclick="forceWind(1);closeTestMenu()">LIGHT HEADWIND</button>
  <button onclick="forceWind(2);closeTestMenu()">STRONG HEADWIND</button>
  <button onclick="forceWind(3);closeTestMenu()">GALE FORCE</button>
  <button onclick="forceWind(4);closeTestMenu()">STORM</button>
  <button onclick="forceWind(6);closeTestMenu()">TORNADO</button>
  <button class="hyper" onclick="forceWind(7);closeTestMenu()">HYPERCANE</button>
  <button class="void" onclick="forceWind(10);closeTestMenu()">VOID STORM</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = 900, H = 520;

// ── Palette ──────────────────────────────────────────────
// Arrays for lrp(); strings for direct fillStyle use
const C = {
  skyTop:    [8,  14, 28],
  skyStorm:  [5,   8, 16],
  skyTail:   [12, 22, 42],
  skyVoid:   [ 4,  4,  4],   // near-black — void storm sky top
  horizCalm: [45, 82,118],
  horizStorm:[18, 30, 44],
  horizTail: [55, 98,140],
  horizVoid: [30, 30, 30],   // dark grey horizon under void storm

  mtFar:  'rgba(100,138,172,0.27)',
  mtMid:  'rgba(58,90,130,0.52)',
  mtNear: 'rgba(28,52,84,0.84)',

  windC: 'rgba(205,230,252,0.72)',
  windW: 'rgba(238,212,138,0.65)',
  snow:  '#ddeeff',
  text:  '#c8e4f5',
  dim:   'rgba(200,228,245,0.38)',
  skin:  '#d4907a',
};

// ── Wind states ───────────────────────────────────────────
const WIND_STATES = [
  { tgt:  0.00, label:'CALM',            lvl:0, dMin:140, dMax:260 },  // [0]
  { tgt: -0.20, label:'LIGHT HEADWIND',  lvl:1, dMin:110, dMax:200 },  // [1]
  { tgt: -0.40, label:'STRONG HEADWIND', lvl:2, dMin: 90, dMax:170 },  // [2]
  { tgt: -0.65, label:'GALE FORCE',      lvl:3, dMin: 70, dMax:130 },  // [3]
  { tgt: -0.90, label:'STORM',           lvl:4, dMin: 55, dMax: 95 },  // [4]
  { tgt:  0.28, label:'TAILWIND',         lvl:1, dMin:100, dMax:180 },  // [5]
  { tgt: -1.40, label:'TORNADO',          lvl:5, dMin: 70, dMax:110 },  // [6]
  { tgt: -2.00, label:'HYPERCANE',        lvl:6, dMin:220, dMax:380 },  // [7]
  { tgt:  0.65, label:'STRONG TAILWIND',  lvl:3, dMin: 80, dMax:150 },  // [8]
  { tgt:  1.40, label:'TAILWIND TORNADO', lvl:5, dMin: 70, dMax:110 },  // [9]
  { tgt: -4.20, label:'VOID STORM',       lvl:7, dMin:300, dMax:520 },  // [10] — secret tier 7
];

function getWindTier() {
  const m = Math.floor(maxReach / 12);
  if (m >= 2500) return 7; // secret tier — VOID STORM
  if (m >= 1500) return 6;
  return Math.min(5, Math.floor(maxReach / (12 * 200)));
}

function pickWindState() {
  const tier = getWindTier(), r = Math.random();
  if (tier === 0) {
    // calm + a little tailwind only
    if (r < 0.72) return WIND_STATES[0];   // CALM
    return WIND_STATES[5];                  // TAILWIND
  }
  if (tier === 1) {
    // mostly calm, some tailwind, occasional light headwind
    if (r < 0.50) return WIND_STATES[0];   // CALM
    if (r < 0.82) return WIND_STATES[5];   // TAILWIND
    return WIND_STATES[1];                  // LIGHT HEADWIND
  }
  if (tier === 2) {
    // strong tailwind dominates, some calm, tiny headwind
    if (r < 0.55) return WIND_STATES[8];   // STRONG TAILWIND
    if (r < 0.78) return WIND_STATES[5];   // TAILWIND
    if (r < 0.90) return WIND_STATES[0];   // CALM
    return WIND_STATES[1];                  // LIGHT HEADWIND
  }
  if (tier === 3) {
    // gale force is the norm, rare storm
    if (r < 0.62) return WIND_STATES[3];   // GALE FORCE
    if (r < 0.82) return WIND_STATES[2];   // STRONG HEADWIND
    if (r < 0.92) return WIND_STATES[8];   // STRONG TAILWIND (break)
    return WIND_STATES[4];                  // STORM (rare)
  }
  if (tier === 4) {
    // constant storm and strong tailwind
    if (r < 0.55) return WIND_STATES[4];   // STORM
    if (r < 0.85) return WIND_STATES[8];   // STRONG TAILWIND
    return WIND_STATES[3];                  // GALE FORCE (brief relief)
  }
  if (tier === 5) {
    // tornados and storms only
    if (r < 0.55) return WIND_STATES[6];   // TORNADO
    return WIND_STATES[4];                  // STORM
  }
  if (tier === 6) {
    // mostly hypercane, sometimes tailwind tornado
    if (r < 0.60) return WIND_STATES[7];   // HYPERCANE
    if (r < 0.88) return WIND_STATES[9];   // TAILWIND TORNADO
    return WIND_STATES[6];                  // TORNADO (rare break)
  }
  // tier 7 — VOID STORM only
  return WIND_STATES[10];
}

function windInfo() {
  const f = wind.force;
  if (Math.abs(f) < 0.04) return WIND_STATES[0];
  if (f < -2.60)           return WIND_STATES[10]; // VOID STORM
  if (f < -1.80)           return WIND_STATES[7];  // HYPERCANE
  if (f < -1.00)           return WIND_STATES[6];  // TORNADO
  if (f < -0.72)           return WIND_STATES[4]; // STORM
  if (f < -0.48)           return WIND_STATES[3]; // GALE
  if (f < -0.26)           return WIND_STATES[2];
  if (f < -0.08)           return WIND_STATES[1];
  if (f >  1.00)           return WIND_STATES[9]; // TAILWIND TORNADO
  if (f >  0.44)           return WIND_STATES[8]; // STRONG TAILWIND
  return WIND_STATES[5];
}

// ── Terrain ──────────────────────────────────────────────
let terrainSeed = 0; // re-rolled on every init() for a fresh path each run

function baseGroundY(wx) {
  const s = terrainSeed;

  // Start zone is always flat — drama fades in over first ~500px regardless of tier
  const startFlat = Math.min(1, Math.max(0, (wx - 300) / 500));

  // terrainDrama (0–1+) is driven by tier; multiply amplitudes so tier 0 = gentle,
  // tier 5 = up to ~60° slopes, tier 6/7 = brutal mountain terrain
  const d = startFlat * Math.max(0, terrainDrama);

  // Mountains only unlock after some distance AND at higher tiers
  const mtRamp = Math.min(1, Math.max(0, (wx - 2800) / 3500)) * Math.max(0, (terrainDrama - 0.5) * 2);

  // Broad undulation
  const longWave = Math.sin(wx * 0.00019 + s * 0.0013 + 1.0) * 130 * d;

  // Rolling hills — scale up with drama so tier 3+ has proper rolling terrain
  const hill1 = Math.sin(wx * 0.0015 + s * 0.0031 + 0.3) * 50 * d;
  const hill2 = Math.sin(wx * 0.0050 + s * 0.0072 + 2.1) * 35 * d;

  // Steep ridges — cubic spike; at drama≈1 (tier 5) amplitude ≈ 200 → ~60° slopes
  const ridgeAmp = 55 + 145 * Math.min(1, d);
  const ridge = Math.pow(Math.max(0, Math.sin(wx * 0.0009 + s * 0.0021 + 0.7)), 3) * ridgeAmp * d;

  // Surface ripple (always present, mild)
  const ripple = Math.sin(wx * 0.022 + s * 0.011) * 5;

  // Big mountains — only at high drama (tier 4+)
  const bigMt1 = Math.pow(Math.max(0, Math.sin(wx * 0.000086 + s * 0.00052 + 1.4)), 7) * 255 * mtRamp;
  const bigMt2 = Math.pow(Math.max(0, Math.sin(wx * 0.000053 + s * 0.00083 + 4.1)), 9) * 295 * mtRamp;

  return Math.min(460, Math.max(55, 420 + longWave + hill1 + hill2 - ridge + ripple - bigMt1 - bigMt2));
}

// ── Global state ─────────────────────────────────────────
let gState, player, wind, cam, particles, snowflakes, frame;
let secretTierTimer = 0;   // frames to show the secret tier unlock message
let terrainDrama = 0;      // 0–1+ smoothly tracks tier; controls slope steepness
let windDebris = [];
let platforms = [];
let genFrontier = 0;
let maxReach    = 0;
let bestScore   = 0;
let freezing    = 0;   // 0–1
let deathReason = '';
let houses      = [];
let decorations = [];
let tornado     = null;
let stamina          = 1;    // 0–1
let staminaDepleted  = false;
let staminaCooldown  = 0;    // frames remaining before regen starts
let craters          = [];
let craterParticles  = [];

// ── Platform generation ───────────────────────────────────
function initPlatforms() {
  platforms    = [];
  decorations  = [];
  genFrontier  = 0;
  maxReach     = 0;

  platforms.push({ x: 0,   y: 420, w: 680, h: 500 }); // starting ground

  genFrontier = 680;
}

function extendMap() {
  while (genFrontier < player.x + W + 600) {
    const diff    = Math.min(1, player.x / 7000);
    const chunkW  = Math.max(110, (290 - diff * 140) + Math.random() * Math.max(50, 190 - diff * 140));
    const chunkX  = genFrontier;
    const groundY = baseGroundY(chunkX + chunkW * 0.4);

    // Subdivide chunk into narrow steps that follow baseGroundY, creating walkable slopes
    const stepW = 5;
    const steps = Math.ceil(chunkW / stepW);
    for (let si = 0; si < steps; si++) {
      const sx = chunkX + si * stepW;
      const sw = (si === steps - 1) ? chunkW - si * stepW : stepW;
      const sy = baseGroundY(sx + sw * 0.5);
      platforms.push({ x: sx, y: sy, w: sw, h: 500 });
    }

    // Maybe place a house on this chunk — metal bunker chance rises 20% per tier
    if (chunkW > 120 && Math.random() < 0.50) {
      const hx    = chunkX + 18 + Math.random() * Math.max(0, chunkW - 120);
      const tier  = getWindTier();
      const researchChance = tier === 7 ? 0.40 : 0.005;
      const bunkerChance   = tier >= 6 ? 0.30 : 0.01;
      const metalChance    = Math.min(1, 0.10 + tier * 0.20);
      const r = Math.random();
      const type = r < researchChance ? 'research'
                 : r < researchChance + bunkerChance ? 'bunker'
                 : r < researchChance + bunkerChance + metalChance ? 'metal'
                 : 'normal';
      const isBunker   = type === 'bunker';
      const isResearch = type === 'research';
      const hw2      = isResearch ? 160 : isBunker ? 90 : 55;
      const hYOffset = isResearch ? 240 : isBunker ? 175 : 120;
      const bx = hx;
      const hGroundY = baseGroundY(bx + hw2);
      houses.push({ x:bx, y:hGroundY - hYOffset, w:isResearch?320:isBunker?180:110,
                    type,
                    flying:false, flyTimer: 40 + Math.floor(Math.random() * 160),
                    flyDelay: 40 + Math.floor(Math.random() * 160),
                    vy:0, vx:0, angle:0, alpha:1 });
    }

    // Maybe place a decoration (snowman or pine tree)
    if (chunkW > 60 && Math.random() < 0.45) {
      const dx = chunkX + 20 + Math.random() * Math.max(0, chunkW - 40);
      decorations.push({ x: dx, y: baseGroundY(dx), type: Math.random() < 0.5 ? 'snowman' : 'pinetree',
                         vx: 0, vy: 0, angle: 0, flying: false, alpha: 1 });
    }

    genFrontier = chunkX + chunkW;
  }
}

function trimPlatforms() {
  const cut = player.x - 6000;  // keep terrain far behind so backtracking works
  platforms    = platforms.filter(p => p.x + p.w >= cut);
  houses       = houses.filter(h => h.alpha > 0.02 && h.x + h.w >= cut - 400);
  decorations  = decorations.filter(d => d.alpha > 0.02 && d.x >= cut - 100);
  craters      = craters.filter(cr => cr.wx + cr.radius >= cut);
}

// ── Init ─────────────────────────────────────────────────
function init() {
  gState = 'playing';
  frame  = 0;

  player = { x:80, y:376, vx:0, vy:0, w:26, h:44,
             onGround:false, facing:1, walkF:0, walkT:0, inHouse:null };

  wind = { force:0, target:0, timer:0, duration:200, strength:0 };

  // Initialize camera so player appears at 60% down immediately
  cam = { x: 0, y: 376 - H * 0.60 };

  terrainSeed      = Math.random() * 9999;
  terrainDrama     = 0;
  secretTierTimer  = 0;
  freezing         = 0;
  deathReason      = '';
  houses           = [];
  particles        = [];
  snowflakes       = [];
  windDebris       = [];
  tornado          = null;
  challenge        = null;
  stamina          = 1;
  staminaDepleted  = false;
  staminaCooldown  = 0;
  craters          = [];
  craterParticles  = [];
  initPlatforms();
}

// ── Input ─────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  WindAudio.init();
  keys[e.code] = true;
  if (e.code === 'KeyR') init();
  if (e.code === 'KeyE' && gState === 'playing' && !e.repeat) handleEnterExit();
  if (gState === 'playing' && !e.repeat) handleChallengeKey(e.code);
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))
    e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('click', () => WindAudio.init(), { once: true });
const goLeft  = () => keys['ArrowLeft']  || keys['KeyA'];
const goRight = () => keys['ArrowRight'] || keys['KeyD'];
const doJump  = () => keys['ArrowUp']    || keys['KeyW'] || keys['Space'];

// ── Wind update ───────────────────────────────────────────
function updateWind() {
  if (++wind.timer >= wind.duration) {
    wind.timer = 0;
    const ws      = pickWindState();
    wind.target   = ws.tgt + (Math.random() - 0.5) * 0.05;
    wind.duration = ws.dMin + Math.floor(Math.random() * (ws.dMax - ws.dMin));
  }
  wind.force    += (wind.target - wind.force) * 0.022;
  wind.strength  = Math.min(1, Math.abs(wind.force) / 0.90);
}

// ── Player update ─────────────────────────────────────────
function updatePlayer() {
  const chalActive = challenge && challenge.result === null;

  // When sheltered: hold position in the house, skip all physics
  if (player.inHouse) {
    if (player.inHouse.flying || player.inHouse.alpha < 0.5) {
      player.inHouse = null; // ejected by storm — fall through
    } else {
      player.vx = 0; player.vy = 0;
      player.x = player.inHouse.x + player.inHouse.w / 2 - player.w / 2;
      const hFloor = player.inHouse.type === 'research' ? player.inHouse.y + 240 : player.inHouse.type === 'bunker' ? player.inHouse.y + 175 : player.inHouse.y + 120;
      player.y = hFloor - player.h;
      player.onGround = true;
      cam.x += (player.x - W * 0.35 - cam.x) * 0.11;
      if (cam.x < 0) cam.x = 0;
      cam.y += (player.y - H * 0.60 - cam.y) * 0.09;
      if (player.x > maxReach) maxReach = player.x;
      // Regen stamina while sheltered in a house
      player.sprinting = false;
      if (staminaDepleted) {
        if (--staminaCooldown <= 0) { staminaDepleted = false; staminaCooldown = 0; }
      } else {
        stamina = Math.min(1, stamina + 0.0018);
      }
      return;
    }
  }
  // sprintKey known early — needed for movement multipliers
  const sprintKey = !chalActive && keys['ShiftLeft'] && !staminaDepleted && stamina > 0;
  // Use previous-frame onGround for movement so downhill steps feel smooth
  const sprintingMove = sprintKey && player.onGround;
  player.sprinting = sprintingMove;
  const sm    = sprintingMove ? 1.65 : 1;
  const smCap = sprintKey     ? 1.65 : 1;

  if (!chalActive && goLeft())  { player.vx -= 0.90 * sm; player.facing = -1; }
  if (!chalActive && goRight()) { player.vx += 0.90 * sm; player.facing =  1; }
  if (chalActive || (!goLeft() && !goRight())) player.vx *= 0.76;

  // Cap wind pull so hypercane doesn't instantly drag the player
  const cappedForce = Math.max(-0.90, Math.min(0.90, wind.force));
  if (!chalActive) player.vx += cappedForce * (player.onGround ? 0.75 : 1.5);
  player.vx  = Math.max(-5.5 * smCap, Math.min(5.5 * smCap, player.vx));

  if (!chalActive && doJump() && player.onGround) { player.vy = -12.5; player.onGround = false; }

  if (chalActive) { player.vx = 0; player.vy = 0; }
  player.vy = Math.min(player.vy + (chalActive ? 0 : 0.50), 14);
  player.x += player.vx;
  player.y += player.vy;

  // Ground collision — continuous baseGroundY sample, exact match to visual terrain
  const wasOnGround = player.onGround;
  player.onGround = false;
  {
    const pcx = player.x + player.w * 0.5;

    // Compute the actual surface Y the player stands on (ground + optional crater dip)
    let surfaceY = baseGroundY(pcx);
    for (const cr of craters) {
      const dx = pcx - cr.wx;
      if (Math.abs(dx) < cr.radius) {
        const t   = Math.min(1, cr.age / 60);
        const dip = Math.pow(1 - (dx * dx) / (cr.radius * cr.radius), 1.5) * cr.depth * t;
        surfaceY += dip;
      }
    }

    const currBot = player.y + player.h;
    const prevBot = currBot - player.vy;
    // When already grounded use a big step-down tolerance so slopes are followed smoothly
    const snapTol = wasOnGround ? 48 : (Math.abs(player.vx) > 1 ? 18 : 5);
    if (currBot >= surfaceY && prevBot <= surfaceY + snapTol && player.vy >= 0) {
      player.y    = surfaceY - player.h;
      player.vy   = 0;
      player.onGround = true;
    }

    // Ledge platforms (h <= 20) — keep discrete collision for special surfaces
    for (const p of platforms) {
      if (p.h > 20) continue;
      const pCurrBot = player.y + player.h;
      const pPrevBot = pCurrBot - player.vy;
      const pSnap    = Math.abs(player.vx) > 1 ? 18 : 5;
      if (player.x + player.w > p.x && player.x < p.x + p.w &&
          pCurrBot >= p.y && pPrevBot <= p.y + pSnap && player.vy >= 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  // Crack collapse trigger — land on a crack tile, maybe collapse it
  if (player.onGround) {
    const tier = getWindTier();
    if (tier >= 3) {
      const CRACK_TILE = 32;
      const cwx = Math.floor((player.x + player.w * 0.5) / CRACK_TILE) * CRACK_TILE;
      const hv  = Math.abs(Math.sin(cwx * 0.017 + 1 * 2.718));
      const sizeRoll = Math.abs(Math.sin(cwx * 0.017 + 1 * 2.718));
      const alreadyCrater = craters.some(cr => Math.abs(cr.wx - cwx) < cr.radius * 2 + 80);
      const collapseChance = (tier - 2) * 0.003 * (sizeRoll > 0.85 ? 2 : 1);
      if (!alreadyCrater && Math.random() < collapseChance) {
        spawnCrater(cwx + CRACK_TILE * 0.5);
      }
    }
  }

  // Stamina — drain while shift held (ground or air); regen only when grounded and not sprinting
  const sprinting = sprintKey && player.onGround;
  player.sprinting = sprinting;
  if (sprintKey) {
    // drain whether on ground or airborne — holding shift always costs stamina
    stamina = Math.max(0, stamina - 0.0038);
    if (stamina <= 0) { stamina = 0; staminaDepleted = true; staminaCooldown = 120; }
  } else if (player.onGround) {
    // regen only when standing still or walking (not holding shift) on the ground
    if (staminaDepleted) {
      if (--staminaCooldown <= 0) { staminaDepleted = false; staminaCooldown = 0; }
    } else {
      stamina = Math.min(1, stamina + 0.0018);
    }
  }
  // airborne + no shift = stamina frozen (no regen, no drain)

  const walkStep = sprinting ? 8 : 9;                   // frames between footstep sfx
  if (Math.abs(player.vx) > 0.5 && player.onGround) {
    if (++player.walkT >= walkStep) {
      player.walkT = 0; player.walkF = (player.walkF + 1) % 6;
    }
  } else if (player.onGround) { player.walkF = 0; }

  if (player.x < 0) { player.x = 0; player.vx = 0; } // don't go left of start
  const prevReach = maxReach;
  if (player.x > maxReach) maxReach = player.x;
  // Secret tier unlock at 2500m — show dramatic message once
  if (Math.floor(prevReach / 12) < 2500 && Math.floor(maxReach / 12) >= 2500)
    secretTierTimer = 280;
  if (secretTierTimer > 0) secretTierTimer--;

  // Camera — follow both X and Y smoothly
  cam.x += (player.x - W * 0.35 - cam.x) * 0.11;
  if (cam.x < 0) cam.x = 0;
  cam.y += (player.y - H * 0.60 - cam.y) * 0.09;

  // Death: player fell far below the current mountain slope (world-space check,
  // so the camera chasing them doesn't keep pushing the threshold out of reach)
  if (player.y + player.h > baseGroundY(player.x) + 400) {
    const s = Math.floor(maxReach / 12);
    if (s > bestScore) bestScore = s;
    deathReason = 'fall';
    gState = 'dead';
  }
}

// ── House helpers ─────────────────────────────────────────
// True when player is standing close enough to the door to press E
function nearHouse(h) {
  if (h.flying || h.alpha < 0.5) return false;
  const hCx = h.x + h.w / 2, pCx = player.x + player.w / 2;
  const hH = h.type === 'research' ? 240 : h.type === 'bunker' ? 180 : 120;
  const hBottom = h.y + hH, pBottom = player.y + player.h;
  const reach = h.type === 'research' ? 160 : h.type === 'bunker' ? 100 : 68;
  return Math.abs(pCx - hCx) < reach && pBottom < hBottom + 38 && pBottom > hBottom - 70;
}

function handleEnterExit() {
  if (player.inHouse) {
    player.inHouse = null;
  } else {
    for (const h of houses) {
      if (nearHouse(h)) {
        player.inHouse = h;
        if (h.type === 'bunker' || h.type === 'research') challenge = null;
        if (h.type === 'research') freezing = 0;
        break;
      }
    }
  }
}

function updateDecorations() {
  const isTornado = wind.force < -1.00 || wind.force > 1.00;
  const isHypercane = wind.force < -1.80;
  const liftMult = isHypercane ? 3.5 : 1.8;
  for (const d of decorations) {
    if (d.flying) {
      d.vy = Math.max(-22, d.vy - 0.55 * liftMult);
      d.vx = Math.max(-28, d.vx + wind.force * 0.9 * liftMult);
      d.x += d.vx;
      d.y += d.vy;
      d.angle += d.vx * 0.025;
      if (d.y - cam.y < -120) d.alpha -= 0.04;
    } else if (isTornado) {
      d.flying = true;
    } else {
      // Snap to current terrain including crater dips
      let dy = baseGroundY(d.x);
      for (const cr of craters) {
        const dx = d.x - cr.wx;
        if (Math.abs(dx) < cr.radius) {
          const t   = Math.min(1, cr.age / 60);
          dy += Math.pow(1 - (dx * dx) / (cr.radius * cr.radius), 1.5) * cr.depth * t;
        }
      }
      d.y = dy;
    }
  }
}

function updateHouses() {
  const isStorm     = wind.force < -0.68;
  const isTornado   = wind.force < -1.00 || wind.force > 1.00;
  const isHypercane = wind.force < -1.80;
  const isVoidStorm = wind.force < -2.60; // VOID STORM — fortress bunkers also torn apart
  const liftMult    = isVoidStorm ? 8.0 : isHypercane ? 2.8 : isTornado ? 1.6 : 1.0;
  for (const h of houses) {
    if (h.flying) {
      h.vy  = Math.max(-28, h.vy  - 0.30 * liftMult);
      h.vx  = Math.max(-32, h.vx  + wind.force * 0.6 * liftMult);
      h.x  += h.vx;
      h.y  += h.vy;
      h.angle += h.vx * 0.015;
      if (h.y - cam.y < -80) h.alpha -= 0.025;
    } else if (h.type !== 'research' && (isVoidStorm ||
               (isHypercane && h.type === 'metal') ||
               (isStorm && h.type !== 'metal' && h.type !== 'bunker'))) {
      h.flyTimer--;
      if (h.flyTimer <= 0) {
        h.flying = true;
        if (player.inHouse === h) player.inHouse = null;
      }
    } else if (h.type === 'research' || !isStorm || (h.type !== 'normal' && !isHypercane) || (h.type === 'bunker' && !isVoidStorm)) {
      h.flyTimer = h.flyDelay;
      // Snap to current terrain (including crater dips) so houses fall into craters
      const hw2 = h.type === 'research' ? 160 : h.type === 'bunker' ? 90 : 55;
      const hYOffset = h.type === 'research' ? 240 : h.type === 'bunker' ? 175 : 120;
      const hcx = h.x + hw2;
      let hGroundY = baseGroundY(hcx);
      for (const cr of craters) {
        const dx = hcx - cr.wx;
        if (Math.abs(dx) < cr.radius) {
          const t   = Math.min(1, cr.age / 60);
          const dip = Math.pow(1 - (dx * dx) / (cr.radius * cr.radius), 1.5) * cr.depth * t;
          hGroundY += dip;
        }
      }
      h.y = hGroundY - hYOffset;
    }
  }
}

// ── Tornado update ────────────────────────────────────────
function updateTornado() {
  const isTornado   = wind.force < -1.00 || wind.force > 1.00;
  const isHypercane = wind.force < -1.80;
  const isVoidStorm = wind.force < -2.60;
  const torScale    = isVoidStorm ? 4.50 : isHypercane ? 1.85 : 1.0;

  if (isTornado && !tornado) {
    const side = wind.force > 0 ? -1 : 1;
    const spawnX = player.x + side * 900;
    const spawnY = baseGroundY(spawnX);
    const debrisTypes = ['car','car','rock','rock','rock','roof','roof','tree','barrel','plank','plank','rock'];
    if (isHypercane) debrisTypes.push('car','truck','rock','rock','roof','tree','barrel','plank');
    if (isVoidStorm) debrisTypes.push('car','truck','car','truck','rock','rock','roof','roof','tree','barrel','plank','rock');
    const debris = [];
    const debrisCount = isVoidStorm ? 38 : isHypercane ? 14 : 8;
    for (let i = 0; i < debrisCount; i++) {
      const kind = debrisTypes[i % debrisTypes.length];
      debris.push({
        angle:    Math.random() * Math.PI * 2,
        fracH:    0.05 + Math.random() * 0.88,
        speed:    (0.030 + Math.random() * 0.060) * (isVoidStorm ? 3.2 : isHypercane ? 1.5 : 1),
        rotSpeed: (Math.random() < 0.5 ? 1 : -1) * (0.8 + Math.random() * 2.2),
        kind,
        x: spawnX, y: spawnY,
      });
    }
    const startAngle = side > 0 ? 0 : Math.PI;
    tornado = { x: spawnX, y: spawnY, angle: 0, alpha: 0, debris, scale: torScale,
                orbitAngle: startAngle, orbitDir: Math.random() < 0.5 ? 1 : -1 };
  }

  if (!tornado) return;

  // Grow/shrink tornado scale dynamically as wind changes
  const targetScale = isVoidStorm ? 4.50 : isHypercane ? 1.85 : 1.0;
  tornado.scale = (tornado.scale || 1.0) + (targetScale - (tornado.scale || 1.0)) * 0.025;

  const tScale = tornado.scale;
  tornado.angle += isVoidStorm ? 0.28 : isHypercane ? 0.12 : 0.07;

  if (isTornado) {
    tornado.alpha = Math.min(1, tornado.alpha + (isVoidStorm ? 0.055 : isHypercane ? 0.028 : 0.016));

    const orbitSpeed = (isVoidStorm ? 0.034 : isHypercane ? 0.012 : 0.007) * (tornado.orbitDir || 1);
    tornado.orbitAngle = (tornado.orbitAngle || 0) + orbitSpeed;
    const baseRadius  = isVoidStorm ? 120 : tScale > 1.2 ? 260 : 340;
    const orbitRadius = baseRadius + Math.sin(tornado.orbitAngle * 1.7) * (isVoidStorm ? 80 : 120);
    const targetX = player.x + Math.cos(tornado.orbitAngle) * orbitRadius;
    const chaseSpeed = isVoidStorm ? 0.072 : tScale > 1.2 ? 0.030 : 0.018;
    tornado.x += (targetX - tornado.x) * chaseSpeed;
    tornado.y  = baseGroundY(tornado.x);
    for (const cr of craters) {
      const dx = tornado.x - cr.wx;
      if (Math.abs(dx) < cr.radius) {
        const t   = Math.min(1, cr.age / 60);
        tornado.y += Math.pow(1 - (dx * dx) / (cr.radius * cr.radius), 1.5) * cr.depth * t;
      }
    }
  } else {
    tornado.alpha = Math.max(0, tornado.alpha - 0.013);
    tornado.x += wind.force * 10;
    tornado.y  = baseGroundY(tornado.x);
    for (const cr of craters) {
      const dx = tornado.x - cr.wx;
      if (Math.abs(dx) < cr.radius) {
        const t   = Math.min(1, cr.age / 60);
        tornado.y += Math.pow(1 - (dx * dx) / (cr.radius * cr.radius), 1.5) * cr.depth * t;
      }
    }
  }

  // Update orbiting debris
  const TW_d = 100 * tScale, BW_d = 10 * tScale, TH_d = 185 * tScale;
  for (const d of tornado.debris) {
    d.angle += d.speed;
    const bandW = TW_d * (1 - d.fracH) + BW_d * d.fracH;
    d.x = tornado.x + Math.cos(d.angle) * bandW;
    d.y = tornado.y - TH_d * d.fracH + Math.sin(d.angle * 1.4) * 14 * tScale;
  }

  // Proximity kill — void storm kills through everything, no shelter
  const killRadius = 58 * tScale;
  const sheltered  = player.inHouse && (player.inHouse.type === 'research' || (!isVoidStorm && (player.inHouse.type === 'bunker' || !isHypercane)));
  if (tornado.alpha > 0.75 && !sheltered) {
    const dist = Math.abs((player.x + player.w / 2) - tornado.x);
    const dangerRadius = killRadius * 2.8;

    if (dist < killRadius) {
      // Only die if the tornado challenge was failed or not triggered
      if (!challenge || challenge.result === 'fail') {
        const s = Math.floor(maxReach / 12);
        if (s > bestScore) bestScore = s;
        deathReason = 'tornado';
        gState = 'dead';
      }
    } else if (dist < dangerRadius && !challenge) {
      // Proximity — spawn escape challenge
      spawnTornadoChallenge();
    }

    // Win: blast player away from tornado
    if (challenge && challenge.result === 'win' && challenge.isTornadoEscape) {
      const escapeDir = (player.x + player.w / 2) < tornado.x ? -1 : 1;
      player.vx += escapeDir * 8;
      // Tornado briefly retreats
      const retreatAngle = tornado.orbitAngle + Math.PI;
      tornado.orbitAngle = retreatAngle;
    }
  }

  if (tornado.alpha <= 0) tornado = null;
}

// ── Freeze update ────────────────────────────────────────
// Rate scales with wind strength — calm is nearly safe, storm is lethal over time.
// Being inside a house warms the player.
function updateFreezing() {
  if (challenge && challenge.result === null) return;
  if (player.inHouse) {
    if (player.inHouse.type === 'research') { freezing = 0; return; }
    const warmRate = player.inHouse.type === 'metal' ? 0.0010 : 0.0045;
    freezing = Math.max(0, freezing - warmRate);
    return;
  }
  const tornadoBonus = wind.force < -2.60 ? 0.0085 : wind.force < -1.80 ? 0.00130 : (wind.force < -1.00 || wind.force > 1.00) ? 0.00045 : 0;
  const rate = 0.00008 + wind.strength * 0.00055 + tornadoBonus;
  freezing = Math.min(1, freezing + rate);
  if (freezing >= 1) {
    const s = Math.floor(maxReach / 12);
    if (s > bestScore) bestScore = s;
    deathReason = 'freeze';
    gState = 'dead';
  }
}

// ── Snow update ───────────────────────────────────────────
function updateSnow() {
  const rate = 0.30 + getWindTier() * 0.08 + wind.strength * 0.35;
  if (Math.random() < rate) {
    const size = 0.8 + Math.random() * 2.2;
    snowflakes.push({
      x: cam.x + Math.random() * (W + 60) - 30,
      y: cam.y - 10 + Math.random() * 20,
      vx: wind.force * (1.5 + Math.random() * 2),
      vy: 0.6 + size * 0.45 + Math.random() * 0.7,
      size, alpha: 0.35 + Math.random() * 0.55,
      life: 1, decay: 0.0022 + Math.random() * 0.004,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.022,
    });
  }
  snowflakes = snowflakes.filter(s => {
    s.vx += (wind.force * 3 - s.vx) * 0.04;
    s.x  += s.vx; s.y += s.vy; s.life -= s.decay;
    s.rot = (s.rot || 0) + (s.rotV || 0);
    return s.life > 0 && s.y - cam.y < H + 20;
  });
}

function updateWindDebris() {
  const f = wind.force;
  const str = wind.strength;
  const active = Math.abs(f) >= 0.44 || f <= -0.48;
  if (!active) { windDebris = []; return; }

  const KINDS = ['rock','plank','plank','barrel','roof'];
  const spd = Math.abs(f);
  if (windDebris.length < 10 && Math.random() < 0.10 * str) {
    const fromLeft = f > 0;
    const kind = KINDS[Math.floor(Math.random() * KINDS.length)];
    const spawnX = fromLeft ? cam.x - 80 : cam.x + W + 80;
    const gy = baseGroundY(spawnX);
    // Spawn across a wide vertical range — some near ground, some mid-air, some high
    const heightFrac = Math.random();
    const spawnY = gy - 30 - heightFrac * (H * 0.75);
    // Fast horizontal speed; slight upward kick so they arc, not drop immediately
    const vx = (fromLeft ? 1 : -1) * (spd * 8 + Math.random() * spd * 6);
    const vy = -spd * (1.5 + Math.random() * 3); // launched upward
    windDebris.push({
      x: spawnX, y: spawnY,
      vx, vy,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() < 0.5 ? 1 : -1) * (0.10 + Math.random() * 0.22),
      kind,
      alpha: 0,
    });
  }

  windDebris = windDebris.filter(d => {
    d.vx  += (f * 1.2 - d.vx) * 0.04; // accelerate toward wind speed
    d.vy  += 0.09;                      // very light gravity — stays airborne
    d.x   += d.vx;
    d.y   += d.vy;
    d.rot += d.rotV;
    d.alpha = Math.min(1, d.alpha + 0.08);
    const sx = d.x - cam.x, sy = d.y - cam.y;
    return sx > -140 && sx < W + 140 && sy < H + 80;
  });
}

// ── Crater system ─────────────────────────────────────────
function spawnCrater(wx) {
  const tier   = getWindTier();
  const radius = 60 + tier * 40 + Math.random() * 25;
  const depth  = 18 + tier * 18 + Math.random() * 14;
  craters.push({ wx, radius, depth, age: 0 });

  // If player is standing over the crater, launch them upward
  const playerCx = player.x + player.w * 0.5;
  if (Math.abs(playerCx - wx) < radius) {
    player.vy = -6;
    player.vx += (playerCx < wx ? -2.5 : 2.5);
    player.onGround = false;
  }

  // Debris particles fly outward
  const count = 8 + tier * 2;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 5 + tier;
    craterParticles.push({
      x: wx, y: baseGroundY(wx) - 4,
      vx: Math.cos(angle) * speed,
      vy: -4 - Math.random() * 5,
      size: 2 + Math.random() * 4,
      life: 1, decay: 0.012 + Math.random() * 0.015,
    });
  }
}

function updateCraters() {
  for (const cr of craters) cr.age++;
  for (const p of craterParticles) {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.35;
    p.life -= p.decay;
  }
  craterParticles = craterParticles.filter(p => p.life > 0);
}

function drawCraters() {
  for (const cr of craters) {
    const t   = Math.min(1, cr.age / 60);
    const sx  = cr.wx - cam.x;
    const sy  = baseGroundY(cr.wx) - cam.y;
    const rx  = cr.radius * t;
    const ry  = (cr.depth * 0.45) * t;
    if (rx < 2) continue;

    ctx.save();
    // Rim highlight arc
    ctx.beginPath();
    ctx.ellipse(sx, sy - ry * 0.15, rx * 1.04, ry * 0.35, 0, Math.PI, Math.PI * 2);
    ctx.strokeStyle = `rgba(160,200,230,${0.35 * t})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Radiating cracks from rim
    const hh = (n) => Math.abs(Math.sin(cr.wx * 0.019 + n * 2.1));
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2 + hh(i) * 0.8;
      const ex = sx + Math.cos(a) * rx * (1.2 + hh(i + 5) * 0.5);
      const ey = sy + Math.sin(a) * ry * (1.0 + hh(i + 5) * 0.4);
      ctx.beginPath();
      ctx.moveTo(sx + Math.cos(a) * rx * 0.8, sy + Math.sin(a) * ry * 0.8);
      ctx.lineTo(ex, ey);
      ctx.strokeStyle = `rgba(0,0,0,${0.55 * t})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    ctx.restore();
  }

  // Debris
  for (const p of craterParticles) {
    const sx = p.x - cam.x;
    const sy = p.y - cam.y;
    ctx.save();
    ctx.globalAlpha = p.life * 0.9;
    ctx.fillStyle = '#2a3a4a';
    ctx.beginPath();
    ctx.arc(sx, sy, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── Main update ───────────────────────────────────────────
function update() {
  frame++;
  const _lf = tornado && tornado.alpha > 0.60 && (frame % 38 === 0 || frame % 55 === 0 || frame % 71 === 0);
  WindAudio.update(wind.strength, wind.force, tornado ? tornado.alpha : 0, freezing, _lf);
  if (gState !== 'playing') return;
  updateWind();
  updatePlayer();
  // terrainDrama: 0 at tier 0, 1.0 at tier 5, 1.4 at tier 7; smoothly interpolated
  const dramaTarget = getWindTier() / 5;
  terrainDrama += (dramaTarget - terrainDrama) * 0.0015;
  extendMap();
  trimPlatforms();
  updateSnow();
  updateWindDebris();
  updateHouses();
  updateDecorations();
  updateTornado();
  updateFreezing();
  updateChallenge();
  updateCraters();

  // Wind streak particles (blizzard streaks in strong wind)
  if (Math.abs(wind.force) > 0.20 && Math.random() < Math.abs(wind.force) * 3) {
    const toLeft = wind.force < 0;
    particles.push({
      x:    toLeft ? cam.x + W + 40 : cam.x - 40,
      y:    cam.y + 30 + Math.random() * (H - 60),
      vx:   (toLeft ? -1 : 1) * (4 + Math.random() * 5) * Math.abs(wind.force) * 2.5,
      vy:   (Math.random() - 0.5) * 0.6,
      len:  18 + Math.random() * 65,
      a:    0.08 + Math.random() * 0.38,
      life: 1, decay: 0.005 + Math.random() * 0.007,
    });
  }
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    const sx = p.x - cam.x;
    return p.life > 0 && sx > -80 && sx < W + 80;
  });
}

// ── Draw helpers ──────────────────────────────────────────
function lrp(a, b, t) {
  t = Math.max(0, Math.min(1, t));
  return [a[0]+(b[0]-a[0])*t|0, a[1]+(b[1]-a[1])*t|0, a[2]+(b[2]-a[2])*t|0];
}
function rgb(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

// ── Draw: Winter sky ──────────────────────────────────────
function drawSky() {
  const s = wind.strength, f = wind.force;
  const isVoid = f < -2.60;
  const voidT  = isVoid ? Math.min(1, (-f - 2.60) / 0.60) : 0;
  let top, bot;
  if (f > 0.04) {
    top = lrp(C.skyTop,   C.skyTail,   f * 3);
    bot = lrp(C.horizCalm,C.horizTail, f * 3);
  } else {
    top = lrp(C.skyTop,   C.skyStorm,  s * 0.8);
    bot = lrp(C.horizCalm,C.horizStorm,s);
  }
  if (voidT > 0) {
    top = lrp(top, C.skyVoid,  voidT);
    bot = lrp(bot, C.horizVoid, voidT);
  }
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0,    rgb(top));
  g.addColorStop(0.40, rgb(lrp(top, bot, 0.3)));
  g.addColorStop(0.72, rgb(lrp(top, bot, 0.7)));
  g.addColorStop(0.90, rgb(bot));
  g.addColorStop(1,    rgb(lrp(bot, isVoid ? C.skyVoid : C.skyStorm, 0.4)));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Void storm veil
  if (voidT > 0) {
    const pulse = 0.5 + 0.5 * Math.sin(frame * 0.06);
    ctx.save();
    ctx.globalAlpha = voidT * (0.18 + pulse * 0.10);
    ctx.fillStyle = 'rgba(255,255,255,1)';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = voidT * (0.22 + pulse * 0.12);
    const vg = ctx.createLinearGradient(0, H * 0.55, 0, H);
    vg.addColorStop(0, 'rgba(200,200,200,0)');
    vg.addColorStop(1, 'rgba(240,240,240,0.55)');
    ctx.fillStyle = vg; ctx.fillRect(0, H * 0.55, W, H * 0.45);
    ctx.restore();
  }

  const starFade = Math.max(0, 1 - s * 1.2 - (f > 0.04 ? f * 4 : 0));
  if (starFade > 0.02) {
    ctx.save();

    // Milky Way — faint diagonal band of denser stars
    const mwg = ctx.createLinearGradient(0, H * 0.05, W, H * 0.55);
    mwg.addColorStop(0,   'rgba(180,200,240,0)');
    mwg.addColorStop(0.3, `rgba(180,200,240,${(starFade * 0.06).toFixed(3)})`);
    mwg.addColorStop(0.5, `rgba(200,215,255,${(starFade * 0.09).toFixed(3)})`);
    mwg.addColorStop(0.7, `rgba(180,200,240,${(starFade * 0.06).toFixed(3)})`);
    mwg.addColorStop(1,   'rgba(180,200,240,0)');
    ctx.fillStyle = mwg;
    ctx.fillRect(0, 0, W, H * 0.65);

    // Dense star field — 220 stars, varied size + warm/cool tones
    for (let i = 0; i < 220; i++) {
      const px = (i * 6271 + 1483) % W;
      const py = (i * 3833 +  617) % (H * 0.68);
      const sz = i % 12 === 0 ? 1.6 + (i % 3) * 0.3      // big stars
               : i % 5  === 0 ? 1.0 + (i % 2) * 0.25     // medium
               :                0.4 + (i % 3) * 0.15;     // tiny
      const twinkleRate = 0.012 + (i % 7) * 0.005;
      const twinkle = 0.38 + 0.42 * Math.sin(frame * twinkleRate + i * 1.73);
      ctx.globalAlpha = twinkle * starFade * (sz > 1.2 ? 0.85 : sz > 0.8 ? 0.65 : 0.45);
      const col = i % 11 === 0 ? '#ffe0a0' : i % 7 === 0 ? '#ffd0d0' : i % 5 === 0 ? '#c0d8ff' : '#ddeeff';
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(px, py, sz, 0, Math.PI * 2); ctx.fill();
      // Cross sparkle on brightest stars
      if (sz > 1.4 && twinkle > 0.7) {
        ctx.globalAlpha = (twinkle - 0.7) * starFade * 0.5;
        ctx.strokeStyle = col; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(px - sz*3, py); ctx.lineTo(px + sz*3, py); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px, py - sz*3); ctx.lineTo(px, py + sz*3); ctx.stroke();
      }
    }

    // Shooting star — every 500 frames, lasts 45 frames
    const shotPhase = frame % 500;
    if (shotPhase < 45) {
      const t = shotPhase / 45;
      const sx = W * 0.75 - 220 * t, sy = H * 0.04 + 90 * t;
      const fade = t < 0.6 ? t / 0.6 : (1 - t) / 0.4;
      ctx.globalAlpha = fade * starFade * 0.95;
      const trailLen = 60 + t * 40;
      const ssg = ctx.createLinearGradient(sx, sy, sx + trailLen * 0.7, sy - trailLen * 0.4);
      ssg.addColorStop(0, 'rgba(255,255,255,1)');
      ssg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.strokeStyle = ssg; ctx.lineWidth = 1.8; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + trailLen * 0.7, sy - trailLen * 0.4); ctx.stroke();
      ctx.globalAlpha = fade * starFade * 0.6;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, Math.PI*2); ctx.fill();
    }

    ctx.restore();
  }

  // Moon — crescent with craters and soft glow
  const moonFade = Math.max(0, 0.72 - s * 0.55 - (f > 0.04 ? f * 3 : 0));
  if (moonFade > 0.04) {
    const mx = W * 0.82, my = H * 0.11;
    ctx.save();
    ctx.globalAlpha = moonFade;
    // Outer glow
    const mgrd = ctx.createRadialGradient(mx, my, 8, mx, my, 55);
    mgrd.addColorStop(0, 'rgba(220,228,200,0.18)');
    mgrd.addColorStop(0.5, 'rgba(210,220,188,0.07)');
    mgrd.addColorStop(1, 'rgba(210,218,188,0)');
    ctx.fillStyle = mgrd;
    ctx.beginPath(); ctx.arc(mx, my, 55, 0, Math.PI*2); ctx.fill();
    // Moon disc
    ctx.fillStyle = '#dedad0';
    ctx.beginPath(); ctx.arc(mx, my, 14, 0, Math.PI*2); ctx.fill();
    // Subtle craters
    ctx.fillStyle = 'rgba(160,155,140,0.35)';
    ctx.beginPath(); ctx.arc(mx - 4, my + 3, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx + 5, my - 4, 2.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx + 2, my + 6, 1.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx - 7, my - 2, 1.4, 0, Math.PI*2); ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,240,0.25)';
    ctx.beginPath(); ctx.arc(mx - 3, my - 4, 6, 0, Math.PI*2); ctx.fill();
    // Crescent shadow
    ctx.fillStyle = `rgba(${top[0]},${top[1]},${top[2]},0.84)`;
    ctx.beginPath(); ctx.arc(mx + 6, my - 1, 11, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawAurora() {
  const auroraAlpha = Math.max(0.55, 1 - wind.strength * 0.4);
  ctx.save();
  ctx.globalCompositeOperation = 'screen';

  // Many more bands, finer x sampling, multi-layer shimmer per band
  const bands = [
    { baseY: H*0.06, freq:0.0040, freq2:0.0091, speed:0.0055, speed2:0.0031, color:[0,255,120],   width:130, amp:55, amp2:28 },
    { baseY: H*0.13, freq:0.0070, freq2:0.0150, speed:0.0080, speed2:0.0045, color:[0,230,255],   width:100, amp:48, amp2:22 },
    { baseY: H*0.20, freq:0.0055, freq2:0.0120, speed:0.0065, speed2:0.0038, color:[60,255,180],  width: 80, amp:40, amp2:18 },
    { baseY: H*0.28, freq:0.0090, freq2:0.0180, speed:0.0050, speed2:0.0070, color:[150,60,255],  width: 90, amp:50, amp2:25 },
    { baseY: H*0.36, freq:0.0045, freq2:0.0095, speed:0.0095, speed2:0.0030, color:[255,40,180],  width: 70, amp:38, amp2:16 },
    { baseY: H*0.42, freq:0.0075, freq2:0.0160, speed:0.0040, speed2:0.0055, color:[0,180,255],   width: 60, amp:32, amp2:14 },
    { baseY: H*0.10, freq:0.0030, freq2:0.0070, speed:0.0035, speed2:0.0018, color:[80,255,200],  width:150, amp:60, amp2:30 },
    { baseY: H*0.25, freq:0.0110, freq2:0.0220, speed:0.0110, speed2:0.0060, color:[200,100,255], width: 55, amp:35, amp2:12 },
  ];

  const STEP = 4; // finer x step for smoother curtains

  for (const band of bands) {
    const pulse   = 0.55 + 0.45 * Math.sin(frame * 0.013 + band.baseY * 0.04);
    const pulse2  = 0.60 + 0.40 * Math.sin(frame * 0.021 + band.baseY * 0.02 + 1.4);
    const [r, g, b] = band.color;

    // Build curtain top/bottom edge path using 3 layered sine waves
    const wave = (x, offset) =>
      band.baseY
      + Math.sin(x * band.freq  + frame * band.speed  + offset) * band.amp
      + Math.sin(x * band.freq2 + frame * band.speed2 + offset + 0.7) * band.amp2
      + Math.sin(x * band.freq  * 0.47 + frame * band.speed * 1.3 + offset + 2.1) * band.amp * 0.3;

    // Primary soft curtain
    for (let x = -STEP; x < W + STEP; x += STEP) {
      const cy1 = wave(x,        0);
      const cy2 = wave(x + STEP, 0);
      const hw  = (band.width / 2) * pulse;
      const sg  = ctx.createLinearGradient(0, cy1 - hw, 0, cy1 + hw);
      const pk  = (auroraAlpha * pulse * 0.55).toFixed(3);
      sg.addColorStop(0,    `rgba(${r},${g},${b},0)`);
      sg.addColorStop(0.20, `rgba(${r},${g},${b},${pk})`);
      sg.addColorStop(0.50, `rgba(${r},${g},${b},${(auroraAlpha * pulse * 0.75).toFixed(3)})`);
      sg.addColorStop(0.80, `rgba(${r},${g},${b},${pk})`);
      sg.addColorStop(1,    `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.moveTo(x,        cy1 - hw); ctx.lineTo(x + STEP, cy2 - hw);
      ctx.lineTo(x + STEP, cy2 + hw); ctx.lineTo(x,        cy1 + hw);
      ctx.closePath(); ctx.fill();
    }

    // Bright inner core streak — thin, high-alpha centre line
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let x = -STEP; x <= W + STEP; x += STEP) {
      const cy = wave(x, 0.4);
      x === -STEP ? ctx.moveTo(x, cy) : ctx.lineTo(x, cy);
    }
    ctx.strokeStyle = `rgba(${r},${g},${b},${(auroraAlpha * pulse2 * 0.55).toFixed(3)})`;
    ctx.stroke();

    // Shimmer layer — offset phase creates rippling sub-curtain
    for (let x = -STEP; x < W + STEP; x += STEP) {
      const cy1 = wave(x,        1.9);
      const cy2 = wave(x + STEP, 1.9);
      const hw2 = (band.width * 0.30) * pulse2;
      const sg2 = ctx.createLinearGradient(0, cy1 - hw2, 0, cy1 + hw2);
      const pk2 = (auroraAlpha * pulse2 * 0.30).toFixed(3);
      sg2.addColorStop(0,    `rgba(${r},${g},${b},0)`);
      sg2.addColorStop(0.45, `rgba(${r},${g},${b},${pk2})`);
      sg2.addColorStop(1,    `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = sg2;
      ctx.beginPath();
      ctx.moveTo(x,        cy1 - hw2); ctx.lineTo(x + STEP, cy2 - hw2);
      ctx.lineTo(x + STEP, cy2 + hw2); ctx.lineTo(x,        cy1 + hw2);
      ctx.closePath(); ctx.fill();
    }
  }

  // Vertical streaks — fine luminous rays hanging down from band peaks
  ctx.lineWidth = 0.8;
  const rayColors = [[0,255,140],[0,210,255],[160,70,255],[255,50,170]];
  for (let i = 0; i < 38; i++) {
    const hs = (n) => Math.abs(Math.sin(i * 3.7 + n * 1.618));
    const rx = hs(1) * W;
    const ry = H * (0.06 + hs(2) * 0.38);
    const rlen = 30 + hs(3) * 90;
    const [rr,rg,rb] = rayColors[i % rayColors.length];
    const pulse3 = 0.4 + 0.6 * Math.sin(frame * 0.018 + i * 0.9);
    const rayG = ctx.createLinearGradient(0, ry, 0, ry + rlen);
    rayG.addColorStop(0,   `rgba(${rr},${rg},${rb},${(auroraAlpha * pulse3 * 0.55).toFixed(3)})`);
    rayG.addColorStop(1,   `rgba(${rr},${rg},${rb},0)`);
    ctx.strokeStyle = rayG;
    ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx + hs(4)*6 - 3, ry + rlen); ctx.stroke();
  }

  ctx.restore();
}

function drawBgForest() {
  // Three dense forest silhouette layers at different parallax depths
  const layers = [
    { px: 0.05, py: 0.04, baseY: H * 0.72, color: 'rgba(12,22,40,0.55)', treeH: 40, tipH: 18, step: 9  },
    { px: 0.14, py: 0.12, baseY: H * 0.80, color: 'rgba(9,17,33,0.70)',  treeH: 34, tipH: 15, step: 7  },
    { px: 0.30, py: 0.22, baseY: H * 0.87, color: 'rgba(6,13,26,0.85)',  treeH: 26, tipH: 11, step: 6  },
    { px: 0.52, py: 0.36, baseY: H * 0.92, color: 'rgba(5,10,22,0.92)',  treeH: 18, tipH:  8, step: 5  },
  ];
  for (const l of layers) {
    const offX = cam.x * l.px, offY = cam.y * l.py;
    const by = l.baseY + offY;
    ctx.fillStyle = l.color;
    ctx.beginPath();
    ctx.moveTo(-10, H + 10);
    for (let sx = -20; sx <= W + 20; sx += l.step) {
      const wx = sx + offX;
      const base = l.treeH * (0.55 + 0.45 * Math.abs(Math.sin(wx * 0.029 + 1.3)));
      const mid  = l.treeH * 0.28 * Math.abs(Math.sin(wx * 0.074 + 2.9));
      const tip  = l.tipH  * Math.pow(Math.max(0, Math.sin(wx * 0.44 + 0.6)), 3);
      ctx.lineTo(sx, by - base - mid - tip);
    }
    ctx.lineTo(W + 10, H + 10);
    ctx.closePath();
    ctx.fill();
    // Snow dusting on tips
    const sg = ctx.createLinearGradient(0, by - l.treeH - l.tipH, 0, by - l.treeH * 0.6);
    sg.addColorStop(0, `rgba(200,228,252,${(0.12 - l.px * 0.1).toFixed(3)})`);
    sg.addColorStop(1, 'rgba(200,228,252,0)');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.moveTo(-10, H + 10);
    for (let sx = -20; sx <= W + 20; sx += l.step) {
      const wx = sx + offX;
      const base = l.treeH * (0.55 + 0.45 * Math.abs(Math.sin(wx * 0.029 + 1.3)));
      const mid  = l.treeH * 0.28 * Math.abs(Math.sin(wx * 0.074 + 2.9));
      const tip  = l.tipH  * Math.pow(Math.max(0, Math.sin(wx * 0.44 + 0.6)), 3);
      ctx.lineTo(sx, by - base - mid - tip);
    }
    ctx.lineTo(W + 10, H + 10);
    ctx.closePath();
    ctx.fill();
  }
}

function drawBgTornados() {
  const defs = [
    { wx:  900, px: 0.06, groundY: 0.92, scale: 0.28, seed: 1.2 },
    { wx: 2400, px: 0.10, groundY: 0.90, scale: 0.40, seed: 2.7 },
    { wx: 4100, px: 0.07, groundY: 0.93, scale: 0.22, seed: 0.5 },
    { wx: 5800, px: 0.13, groundY: 0.91, scale: 0.50, seed: 3.8 },
    { wx: 7200, px: 0.05, groundY: 0.94, scale: 0.20, seed: 1.9 },
    { wx: 3300, px: 0.09, groundY: 0.89, scale: 0.34, seed: 4.1 },
  ];
  for (const def of defs) {
    const sx = def.wx - cam.x * def.px;
    if (sx < -300 || sx > W + 300) continue;
    const sy = H * def.groundY;
    const ang = frame * 0.025 + def.seed;
    const tScale = def.scale;
    const a = 0.42;
    const TH = 185 * tScale, TW = 100 * tScale, BW = 10 * tScale;

    ctx.save();

    // Storm halo
    ctx.globalAlpha = a * 0.20;
    const haloGrd = ctx.createRadialGradient(sx, sy - TH * 0.5, 0, sx, sy - TH * 0.5, TW * 3.2);
    haloGrd.addColorStop(0,   'rgba(30,40,70,0.55)');
    haloGrd.addColorStop(0.5, 'rgba(20,30,55,0.22)');
    haloGrd.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = haloGrd;
    ctx.fillRect(sx - TW * 3.5, sy - TH - 50, TW * 7, TH + 70);

    // Storm cloud base
    ctx.globalAlpha = a * 0.88;
    for (let cl = 0; cl < 4; cl++) {
      const cOff  = Math.sin(ang * 0.6 + cl * 1.3) * TW * 0.55;
      const cOffy = Math.cos(ang * 0.4 + cl * 0.9) * 10;
      const cR    = TW * (1.2 + cl * 0.28);
      const cGrd  = ctx.createRadialGradient(sx + cOff, sy - TH + cOffy, 0, sx + cOff, sy - TH + cOffy, cR);
      cGrd.addColorStop(0,    'rgba(28,36,52,0.88)');
      cGrd.addColorStop(0.45, 'rgba(20,28,44,0.58)');
      cGrd.addColorStop(1,    'rgba(0,0,0,0)');
      ctx.fillStyle = cGrd;
      ctx.beginPath();
      ctx.ellipse(sx + cOff, sy - TH + cOffy, cR, 44 * tScale + cl * 6, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Funnel bands (same technique as real tornado)
    ctx.lineCap = 'round';
    for (let band = 0; band < 24; band++) {
      const t     = band / 23;
      const bandY = sy - TH + t * TH;
      const bandW = TW * (1 - t) + BW * t;
      const twist = ang * 2.2 + t * Math.PI * 7;
      const swayX  = Math.sin(twist)       * bandW * 0.32;
      const swayX2 = Math.sin(twist + 0.9) * bandW * 0.18;

      ctx.globalAlpha = a * (0.10 + (1 - t) * 0.20);
      ctx.strokeStyle = `rgba(${(30 + t*40)|0},${(40 + t*35)|0},${(60 + t*30)|0},0.9)`;
      ctx.lineWidth   = (3.5 + (1 - t) * 5) * tScale;
      ctx.beginPath();
      ctx.ellipse(sx + swayX, bandY, bandW, bandW * 0.13, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.globalAlpha = a * (0.06 + (1 - t) * 0.12);
      ctx.strokeStyle = 'rgba(140,170,210,0.7)';
      ctx.lineWidth   = (0.8 + (1 - t) * 1.4) * tScale;
      ctx.beginPath();
      ctx.ellipse(sx + swayX2, bandY, bandW * 0.7, bandW * 0.09, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Inner condensation funnel
    ctx.globalAlpha = a * 0.24;
    const coneGrd = ctx.createLinearGradient(sx, sy - TH, sx, sy);
    coneGrd.addColorStop(0,    'rgba(160,185,220,0.85)');
    coneGrd.addColorStop(0.35, 'rgba(110,140,190,0.60)');
    coneGrd.addColorStop(0.72, 'rgba(70,100,155,0.35)');
    coneGrd.addColorStop(1,    'rgba(40,65,110,0.10)');
    ctx.fillStyle = coneGrd;
    const ctrl   = Math.sin(ang * 1.1) * 28 * tScale;
    const innerW = TW * 0.42;
    ctx.beginPath();
    ctx.moveTo(sx - innerW, sy - TH);
    ctx.quadraticCurveTo(sx + ctrl,  sy - TH * 0.48, sx, sy);
    ctx.quadraticCurveTo(sx - ctrl,  sy - TH * 0.48, sx + innerW, sy - TH);
    ctx.closePath();
    ctx.fill();

    // Spiral ropes
    for (let rope = 0; rope < 3; rope++) {
      const ropeOff = (rope / 3) * Math.PI * 2;
      ctx.globalAlpha = a * 0.24;
      ctx.strokeStyle = 'rgba(180,205,240,0.55)';
      ctx.lineWidth   = 1.2 * tScale;
      ctx.beginPath();
      for (let i = 0; i <= 22; i++) {
        const t2    = i / 22;
        const bW    = TW * (1 - t2) + BW * t2;
        const spAng = ang * 2.5 + ropeOff + t2 * Math.PI * 6;
        const rx    = sx + Math.cos(spAng) * bW * 0.88;
        const ry    = sy - TH + t2 * TH + Math.sin(spAng * 0.7) * 4 * tScale;
        i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
      }
      ctx.stroke();
    }

    // Ground dust + tip glow
    const dustR = 80 * tScale;
    ctx.globalAlpha = a * 0.30;
    const dustGrd = ctx.createRadialGradient(sx, sy, 0, sx, sy, dustR);
    dustGrd.addColorStop(0,    'rgba(100,80,50,0.70)');
    dustGrd.addColorStop(0.5,  'rgba(60,50,30,0.35)');
    dustGrd.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = dustGrd;
    ctx.beginPath();
    ctx.ellipse(sx, sy, dustR, 18 * tScale, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = a * 0.48;
    const tipGrd = ctx.createRadialGradient(sx, sy, 0, sx, sy, 24 * tScale);
    tipGrd.addColorStop(0, 'rgba(200,220,255,0.90)');
    tipGrd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = tipGrd;
    ctx.beginPath();
    ctx.ellipse(sx, sy, 24 * tScale, 8 * tScale, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

function drawBgTree(x, y, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.fillStyle = '#3a2510';
  ctx.fillRect(-2, -12, 4, 12);
  const layers = [
    { y: -10, hw: 13, h: 10 },
    { y: -18, hw: 10, h:  9 },
    { y: -25, hw:  7, h:  8 },
    { y: -31, hw:  4, h:  7 },
  ];
  for (const l of layers) {
    ctx.fillStyle = '#1a3018';
    ctx.beginPath(); ctx.moveTo(0, l.y - l.h); ctx.lineTo(-l.hw, l.y); ctx.lineTo(l.hw, l.y); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#243c22';
    ctx.beginPath(); ctx.moveTo(0, l.y - l.h + 2); ctx.lineTo(-l.hw + 2, l.y); ctx.lineTo(l.hw - 2, l.y); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(210,232,252,0.88)';
    ctx.beginPath(); ctx.moveTo(0, l.y - l.h); ctx.lineTo(-l.hw * 0.42, l.y - l.h * 0.42); ctx.lineTo(l.hw * 0.42, l.y - l.h * 0.42); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawBgPineTrees() {
  const treeLayers = [
    { px: 0.16, py: 0.13, baseY: H * 0.875, scaleBase: 0.38, spacing: 52 },
    { px: 0.24, py: 0.19, baseY: H * 0.900, scaleBase: 0.52, spacing: 40 },
    { px: 0.42, py: 0.32, baseY: H * 0.920, scaleBase: 0.68, spacing: 30 },
  ];
  for (const layer of treeLayers) {
    const offX = cam.x * layer.px;
    const offY = cam.y * layer.py;
    const by   = layer.baseY + offY;
    const wl   = offX - 80;
    const wr   = offX + W + 80;
    const first = Math.floor(wl / layer.spacing) * layer.spacing;
    for (let wx = first; wx < wr; wx += layer.spacing) {
      const jitter = Math.sin(wx * 0.137 + layer.px * 17) * layer.spacing * 0.38;
      const sx = wx + jitter - offX;
      if (sx < -60 || sx > W + 60) continue;
      const sc = layer.scaleBase * (0.72 + Math.abs(Math.sin(wx * 0.21)) * 0.56);
      const ty = by + Math.sin(wx * 0.079) * 4;
      drawBgTree(sx, ty, sc);
    }
  }
}

function drawDistantTrees() {
  // Pine tree silhouette layer between near mountains and terrain
  const offX = cam.x * 0.38;
  const offY = cam.y * 0.32;
  const baseY = H * 0.91 + offY;
  const col = 'rgba(8,18,32,0.82)';
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(-5, H + 10);
  for (let sx = -5; sx <= W + 30; sx += 10) {
    const wx = sx + offX;
    // Combine two frequencies to get irregular tree-line height
    const treeH = 14 + 9 * Math.abs(Math.sin(wx * 0.028 + 1.1))
                     + 6 * Math.abs(Math.sin(wx * 0.071 + 3.3))
                     + 4 * Math.abs(Math.sin(wx * 0.19  + 0.7));
    // Pointy top every ~18px to simulate individual trees
    const tipSharp = Math.pow(Math.max(0, Math.sin(wx * 0.35 + 0.5)), 3) * 9;
    ctx.lineTo(sx, baseY - treeH - tipSharp);
  }
  ctx.lineTo(W + 5, H + 10);
  ctx.closePath();
  ctx.fill();

  // Subtle snow on top of tree silhouette
  const snowG = ctx.createLinearGradient(0, baseY - 35, 0, baseY - 10);
  snowG.addColorStop(0, 'rgba(200,230,255,0.18)');
  snowG.addColorStop(1, 'rgba(200,230,255,0)');
  ctx.fillStyle = snowG;
  ctx.beginPath();
  ctx.moveTo(-5, H + 10);
  for (let sx = -5; sx <= W + 30; sx += 10) {
    const wx = sx + offX;
    const treeH = 14 + 9 * Math.abs(Math.sin(wx * 0.028 + 1.1))
                     + 6 * Math.abs(Math.sin(wx * 0.071 + 3.3))
                     + 4 * Math.abs(Math.sin(wx * 0.19  + 0.7));
    const tipSharp = Math.pow(Math.max(0, Math.sin(wx * 0.35 + 0.5)), 3) * 9;
    ctx.lineTo(sx, baseY - treeH - tipSharp);
  }
  ctx.lineTo(W + 5, H + 10); ctx.closePath(); ctx.fill();
}

function drawFog() {
  const offY = cam.y * 0.10;
  // Low-lying ground mist — denser in calm weather
  const fogAlpha = 0.04 + Math.max(0, 0.18 - wind.strength * 0.15);
  const fogY = H * 0.82 + offY;

  // Main fog band
  const fg = ctx.createLinearGradient(0, fogY, 0, fogY + 80);
  fg.addColorStop(0,   `rgba(160,200,240,0)`);
  fg.addColorStop(0.25,`rgba(160,200,240,${(fogAlpha * 0.7).toFixed(3)})`);
  fg.addColorStop(0.55,`rgba(140,185,225,${fogAlpha.toFixed(3)})`);
  fg.addColorStop(1,   `rgba(120,170,215,${(fogAlpha * 0.3).toFixed(3)})`);
  ctx.fillStyle = fg;
  ctx.fillRect(0, fogY, W, 80);

  // Wispy upper edge — rolling fog wisps
  ctx.save();
  ctx.globalAlpha = fogAlpha * 0.55;
  for (let i = 0; i < 6; i++) {
    const wx = ((i * 180 + frame * 0.18 + cam.x * 0.05) % (W + 200) + W + 200) % (W + 200) - 100;
    const wy = fogY - 4 + Math.sin(frame * 0.009 + i * 1.4) * 6;
    const wg = ctx.createRadialGradient(wx, wy, 0, wx, wy, 90 + i * 15);
    wg.addColorStop(0, 'rgba(180,215,245,0.40)');
    wg.addColorStop(1, 'rgba(180,215,245,0)');
    ctx.fillStyle = wg;
    ctx.beginPath(); ctx.ellipse(wx, wy, 90 + i * 15, 22 + i * 4, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ── Draw: Mountain silhouette layers ─────────────────────
// Three parallax layers — abs(sin) creates natural peak shapes
function mountainSample(wx, seed) {
  return (
    0.52 * Math.abs(Math.sin(wx * 0.00046 + seed))        +
    0.30 * Math.abs(Math.sin(wx * 0.00098 + seed * 2.1))  +
    0.18 * Math.abs(Math.sin(wx * 0.0022  + seed * 3.8))
  );
}

function drawMountainLayer(px, py, color, amp, baseY, seed) {
  const offX = cam.x * px;
  const offY = cam.y * py;

  // Silhouette fill
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(-5, H + 10);
  for (let sx = -5; sx <= W + 5; sx += 7) {
    const h = mountainSample(sx + offX, seed);
    ctx.lineTo(sx, baseY + offY - h * amp);
  }
  ctx.lineTo(W + 5, H + 10);
  ctx.closePath();
  ctx.fill();

  // Snow cap: gradient overlay whiting out the top 38% of each peak
  const capTop = baseY + offY - amp;
  const capBot = baseY + offY - amp * 0.62;
  const snowG = ctx.createLinearGradient(0, capTop, 0, capBot);
  snowG.addColorStop(0, 'rgba(218,238,255,0.48)');
  snowG.addColorStop(1, 'rgba(218,238,255,0)');
  ctx.fillStyle = snowG;
  ctx.beginPath();
  ctx.moveTo(-5, H + 10);
  for (let sx = -5; sx <= W + 5; sx += 7) {
    const h = mountainSample(sx + offX, seed);
    ctx.lineTo(sx, baseY + offY - h * amp);
  }
  ctx.lineTo(W + 5, H + 10);
  ctx.closePath();
  ctx.fill();
}

function drawMountains() {
  drawMountainLayer(0.01, 0.02, 'rgba(18,28,48,0.35)',  310, H * 0.48, 7.3); // ultra-far ghost range
  drawMountainLayer(0.04, 0.06, C.mtFar,                235, H * 0.60, 0.0);
  drawMountainLayer(0.13, 0.14, C.mtMid,                178, H * 0.72, 1.6);
  drawMountainLayer(0.26, 0.28, C.mtNear,               130, H * 0.86, 3.3);
  drawMountainLayer(0.42, 0.44, 'rgba(14,28,50,0.72)',   80, H * 0.93, 5.1);
}

// ── Draw: Storm clouds ────────────────────────────────────
function drawClouds() {
  const s = wind.strength;
  if (s < 0.18) return;
  const alpha = Math.min(1, (s - 0.18) / 0.52);
  ctx.save();
  // Clouds drift slowly with wind direction
  const scroll = ((frame * 0.22 + cam.x * 0.038) % (W + 280) + W + 280) % (W + 280);
  const clouds = [
    { ox: 0,   y: 40,  rx: 135, ry: 56 },
    { ox: 210, y: 24,  rx: 108, ry: 46 },
    { ox: 390, y: 46,  rx: 148, ry: 66 },
    { ox: 590, y: 30,  rx: 118, ry: 52 },
    { ox: 765, y: 44,  rx: 130, ry: 58 },
    { ox: 130, y: 74,  rx:  98, ry: 40 },
    { ox: 460, y: 70,  rx: 112, ry: 44 },
    { ox: 690, y: 76,  rx: 104, ry: 42 },
  ];
  for (const c of clouds) {
    const cx = ((c.ox - scroll) % (W + 280) + W + 280) % (W + 280) - 100;
    const cg = ctx.createRadialGradient(cx, c.y, 0, cx, c.y, c.rx);
    cg.addColorStop(0,    `rgba(10,16,30,${(alpha*0.82).toFixed(3)})`);
    cg.addColorStop(0.40, `rgba(14,22,40,${(alpha*0.52).toFixed(3)})`);
    cg.addColorStop(0.72, `rgba(8,14,28,${(alpha*0.20).toFixed(3)})`);
    cg.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(cx, c.y, c.rx, c.ry, 0, 0, Math.PI * 2);
    ctx.fill();
    // Wrap to fill gap at the seam
    if (cx < c.rx) {
      ctx.beginPath();
      ctx.ellipse(cx + W + 280, c.y, c.rx, c.ry, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

// ── Draw: Atmospheric haze band ───────────────────────────
function drawAtmosphere() {
  const offY = cam.y * 0.30;
  const hazeY = H * 0.79 + offY;
  const ha = 0.06 + wind.strength * 0.10;
  const hg = ctx.createLinearGradient(0, hazeY - 18, 0, hazeY + 52);
  hg.addColorStop(0,   'rgba(115,162,208,0)');
  hg.addColorStop(0.35,`rgba(115,162,208,${ha.toFixed(3)})`);
  hg.addColorStop(0.62,`rgba(95,140,192,${(ha*0.5).toFixed(3)})`);
  hg.addColorStop(1,   'rgba(75,118,178,0)');
  ctx.fillStyle = hg;
  ctx.fillRect(0, hazeY - 18, W, 70);
}

// ── Draw: Snow ────────────────────────────────────────────
function drawSnow() {
  ctx.save();
  for (const s of snowflakes) {
    const sx = s.x - cam.x, sy = s.y - cam.y;
    if (sx < -14 || sx > W + 14 || sy < -14 || sy > H + 14) continue;
    const alpha = s.alpha * s.life;

    if (wind.strength > 0.45) {
      // Driven snow — angled dash
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = C.snow;
      ctx.lineWidth   = s.size * 0.65;
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + wind.force * -10 * s.size, sy - s.size);
      ctx.stroke();
    } else if (s.size > 1.5) {
      // Large calm flake — 6-arm crystal
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(sx, sy);
      ctx.rotate(s.rot || 0);
      ctx.strokeStyle = 'rgba(220,240,255,0.88)';
      ctx.lineWidth = 0.7; ctx.lineCap = 'round';
      const r = s.size * 2.7;
      for (let arm = 0; arm < 6; arm++) {
        ctx.save(); ctx.rotate(arm * Math.PI / 3);
        ctx.beginPath(); ctx.moveTo(0, 0);    ctx.lineTo(0, -r);        ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -r*0.42); ctx.lineTo(-r*0.28, -r*0.66); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -r*0.42); ctx.lineTo( r*0.28, -r*0.66); ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    } else if (s.size > 0.9) {
      // Medium flake — 4-arm cross
      ctx.save();
      ctx.globalAlpha = alpha * 0.82;
      ctx.translate(sx, sy); ctx.rotate(s.rot || 0);
      ctx.strokeStyle = 'rgba(210,235,255,0.80)';
      ctx.lineWidth = 0.7; ctx.lineCap = 'round';
      const r = s.size * 1.9;
      for (let arm = 0; arm < 4; arm++) {
        ctx.save(); ctx.rotate(arm * Math.PI / 2);
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -r); ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    } else {
      // Tiny — soft dot
      ctx.globalAlpha = alpha;
      ctx.fillStyle = C.snow;
      ctx.beginPath();
      ctx.arc(sx, sy, s.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

function drawWindDebris() {
  if (!windDebris.length) return;
  ctx.save();
  for (const d of windDebris) {
    const dx = d.x - cam.x, dy = d.y - cam.y;
    ctx.save();
    ctx.translate(dx, dy);
    ctx.rotate(d.rot);
    ctx.globalAlpha = d.alpha * 0.88;

    if (d.kind === 'rock') {
      ctx.fillStyle = '#7a7060';
      ctx.beginPath();
      ctx.moveTo(-7, 4); ctx.lineTo(-5, -8); ctx.lineTo(6, -7);
      ctx.lineTo(8, 3);  ctx.lineTo(3, 8);
      ctx.closePath(); ctx.fill();
      ctx.globalAlpha = d.alpha * 0.35;
      ctx.fillStyle = '#b0a890';
      ctx.beginPath(); ctx.ellipse(-2, -3, 3, 1.5, -0.4, 0, Math.PI*2); ctx.fill();

    } else if (d.kind === 'plank') {
      ctx.fillStyle = '#8a6a3a';
      ctx.fillRect(-20, -3, 40, 6);
      ctx.strokeStyle = '#5a3a0a'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(-14,-3); ctx.lineTo(-14,3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo( 14,-3); ctx.lineTo( 14,3); ctx.stroke();

    } else if (d.kind === 'barrel') {
      ctx.fillStyle = '#6a4a1a';
      ctx.beginPath(); ctx.ellipse(0,-5,6,2.5,0,0,Math.PI*2); ctx.fill();
      ctx.fillRect(-6,-5,12,10);
      ctx.beginPath(); ctx.ellipse(0,5,6,2.5,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#3a2a0a'; ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.ellipse(0,-2,6.5,2,0,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(0, 2,6.5,2,0,0,Math.PI*2); ctx.stroke();

    } else if (d.kind === 'roof') {
      ctx.fillStyle = '#8b3a2a';
      ctx.beginPath();
      ctx.moveTo(0,-10); ctx.lineTo(-16,5); ctx.lineTo(16,5);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#5a1a0a'; ctx.lineWidth = 1;
      for (let ti = -12; ti < 12; ti += 5) {
        ctx.beginPath();
        const ty = 5 - (Math.abs(ti)/16)*15;
        ctx.moveTo(ti, ty); ctx.lineTo(ti+3, ty-4); ctx.stroke();
      }
    }
    ctx.restore();
  }
  ctx.restore();
}

// ── Draw: Ground snow drift ───────────────────────────────
function drawGroundDrift() {
  if (wind.force >= -0.28) return;
  const driftStr = Math.min(1, (-wind.force - 0.28) / 0.62);
  ctx.save();
  ctx.lineCap = 'round';
  for (const p of platforms) {
    const psx = p.x - cam.x, psy = p.y - cam.y;
    if (psx + p.w < -10 || psx > W + 10 || psy < -8 || psy > H + 8) continue;
    const cnt = Math.floor(p.w / 13) + 1;
    for (let d = 0; d < cnt; d++) {
      const spd = 2.2 + (d % 3) * 0.9;
      const phase = (frame * spd + d * 97 + p.x * 0.1) % (p.w + 55);
      const dx = psx + p.w + 28 - phase;
      if (dx < psx - 28 || dx > psx + p.w + 28) continue;
      const dy = psy + (d % 2) * 1.5;
      const len = 7 + (d % 4) * 3;
      ctx.globalAlpha = driftStr * (0.22 + (d % 3) * 0.10);
      ctx.strokeStyle = '#ddeeff';
      ctx.lineWidth = 0.5 + (d % 2) * 0.25;
      ctx.beginPath();
      ctx.moveTo(Math.min(dx, psx + p.w), dy);
      ctx.lineTo(Math.max(dx - len, psx), dy);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ── Draw: Wind streaks ────────────────────────────────────
function drawParticles() {
  const toLeft = wind.force < 0;
  const col = toLeft ? [205,230,252] : [238,212,138];
  for (const p of particles) {
    const sx = p.x - cam.x, sy = p.y - cam.y;
    const ex = sx + p.len * (toLeft ? -1 : 1), ey = sy + p.vy * 9;
    ctx.save();
    const grd = ctx.createLinearGradient(sx, sy, ex, ey);
    const a = p.a * p.life;
    grd.addColorStop(0,    `rgba(${col[0]},${col[1]},${col[2]},0)`);
    grd.addColorStop(0.22, `rgba(${col[0]},${col[1]},${col[2]},${a.toFixed(3)})`);
    grd.addColorStop(0.80, `rgba(${col[0]},${col[1]},${col[2]},${(a*0.35).toFixed(3)})`);
    grd.addColorStop(1,    `rgba(${col[0]},${col[1]},${col[2]},0)`);
    ctx.strokeStyle = grd;
    ctx.lineWidth = 0.9 + wind.strength * 0.8;
    ctx.lineCap = 'butt';
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.restore();
  }
}

// ── Draw: Platforms (snowy rock) ──────────────────────────
function drawTerrain() {
  const bot = H + 22;
  const STEP = 3;

  // Sample baseGroundY directly at screen pixel intervals — smooth path, no staircase flicker
  const pts = [];
  for (let sx = -STEP; sx <= W + STEP * 2; sx += STEP) {
    const wx  = cam.x + sx;
    let   gy  = baseGroundY(wx) - cam.y;
    // Dip terrain at active craters
    for (const cr of craters) {
      const t  = Math.min(1, cr.age / 60);
      const dx = wx - cr.wx;
      if (Math.abs(dx) < cr.radius) {
        const dip = Math.pow(1 - (dx * dx) / (cr.radius * cr.radius), 1.5) * cr.depth * t;
        gy += dip;
      }
    }
    pts.push({ x: sx, y: gy });
  }

  const screenL  = pts[0].x;   // always -STEP, constant
  const screenR  = pts[pts.length - 1].x;
  const segW     = screenR - screenL;
  const wx0      = cam.x + screenL;  // world x of left edge
  // Use terrain height at screen centre for gradient — never chases mountain peaks
  const midGroundY = baseGroundY(cam.x + W * 0.5) - cam.y;

  // Smooth color variation by world position (no snapping)
  const cvf = Math.sin(cam.x * 0.0008) * 2.5;
  const cv  = cvf | 0;
  const r0 = 26 + cv * 2, g0 = 42 + cv, b0 = 54 + cv;

  ctx.save();

  // ── Rock body ─────────────────────────────────────────────
  ctx.beginPath();
  ctx.moveTo(pts[0].x, bot);
  ctx.lineTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.lineTo(pts[pts.length - 1].x, bot);
  ctx.closePath();

  const bg = ctx.createLinearGradient(0, midGroundY, 0, bot);
  bg.addColorStop(0,    `rgb(${r0},${g0},${b0})`);
  bg.addColorStop(0.10, `rgb(${r0 - 8},${g0 - 10},${b0 - 6})`);
  bg.addColorStop(1,    `rgb(${8 + cv},${14 + cv},${22 + cv})`);
  ctx.fillStyle = bg;
  ctx.fill();
  ctx.restore();

  // ── Cracks — dense, highly detailed, world-space stable ──
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0].x, bot);
  ctx.lineTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.lineTo(pts[pts.length - 1].x, bot);
  ctx.closePath();
  ctx.clip();
  ctx.lineCap = 'round';

  // Draws one crack recursively: origin (ox,oy), direction angle, remaining depth, scale
  function drawCrack(ox, oy, angle, depth, scale, alpha, seed) {
    if (depth <= 0 || scale < 0.08) return;
    const hh = (n) => Math.abs(Math.sin(seed * 0.031 + n * 1.618 + depth * 0.9));
    const len = (12 + hh(1) * 22) * scale;
    const wobble = (hh(2) - 0.5) * 0.55; // slight direction drift
    const ex = ox + Math.cos(angle + wobble) * len;
    const ey = oy + Math.sin(angle + wobble) * len;

    // Draw segmented line with micro-jitter for rough rock feel
    const segs = 3 + Math.floor(hh(3) * 3);
    ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
    ctx.lineWidth = Math.max(0.3, scale * 1.1);
    ctx.beginPath(); ctx.moveTo(ox, oy);
    for (let s = 1; s <= segs; s++) {
      const t = s / segs;
      const jx = ox + (ex - ox) * t + (hh(s * 3 + 4) - 0.5) * 4 * scale;
      const jy = oy + (ey - oy) * t + (hh(s * 3 + 5) - 0.5) * 4 * scale;
      ctx.lineTo(jx, jy);
    }
    ctx.stroke();

    // Highlight crack edge (bright side)
    ctx.strokeStyle = `rgba(140,180,210,${alpha * 0.25})`;
    ctx.lineWidth = Math.max(0.2, scale * 0.5);
    ctx.beginPath(); ctx.moveTo(ox + 0.8, oy - 0.8); ctx.lineTo(ex + 0.8, ey - 0.8); ctx.stroke();

    // Recurse — continue main crack
    drawCrack(ex, ey, angle + wobble, depth - 1, scale * (0.72 + hh(6) * 0.18), alpha * 0.88, seed + depth * 7.3);

    // Branch 1 — always splits at some point
    if (depth >= 2) {
      const branchAngle = angle + (hh(7) > 0.5 ? 1 : -1) * (0.4 + hh(8) * 0.6);
      drawCrack(ox + (ex - ox) * (0.3 + hh(9) * 0.5),
                oy + (ey - oy) * (0.3 + hh(9) * 0.5),
                branchAngle, depth - 2, scale * (0.45 + hh(10) * 0.25), alpha * 0.65, seed + 31.1);
    }
    // Branch 2 — occasional extra fork
    if (depth >= 3 && hh(11) > 0.55) {
      const branchAngle2 = angle + (hh(12) > 0.5 ? -1 : 1) * (0.3 + hh(13) * 0.5);
      drawCrack(ox + (ex - ox) * (0.5 + hh(14) * 0.4),
                oy + (ey - oy) * (0.5 + hh(14) * 0.4),
                branchAngle2, depth - 3, scale * (0.30 + hh(15) * 0.20), alpha * 0.50, seed + 53.7);
    }
  }

  // Dense tiling — small tile for lots of cracks
  const CRACK_TILE = 32;
  const tier = getWindTier();
  // Tier 0 → ~0.08×, tier 7 → ~1.6×
  const tierMult = Math.max(0.08, tier * 0.22 + 0.08);
  for (let cwx = Math.floor(wx0 / CRACK_TILE) * CRACK_TILE; cwx < wx0 + segW; cwx += CRACK_TILE) {
    const h = (n) => Math.abs(Math.sin(cwx * 0.017 + n * 2.718));
    if (h(0) < 0.12) continue; // ~12% skip keeps it from being wall-to-wall

    const sizeRoll = h(1);
    const baseScale = sizeRoll > 0.85 ? 2.8 + h(2) * 3.5   // giant crack
                    : sizeRoll < 0.18 ? 0.18 + h(2) * 0.22  // hairline
                    :                   0.55 + h(2) * 1.1;   // mid
    const scale = baseScale * tierMult;

    const depth = sizeRoll > 0.85 ? 5
                : sizeRoll < 0.18 ? 2
                :                   3 + Math.floor(h(3) * 2);

    const ox = cwx - cam.x + (h(4) - 0.5) * CRACK_TILE * 0.8;
    const oy = baseGroundY(cwx) - cam.y + 5 + h(5) * 70 * scale;
    const angle = (h(6) - 0.5) * Math.PI * 0.8 + Math.PI * 0.5; // mostly downward
    const alpha = 0.22 + h(7) * 0.30;

    drawCrack(ox, oy, angle, depth, scale, alpha, cwx);

    // Extra micro-cracks radiating from large cracks
    if (sizeRoll > 0.70) {
      for (let mc = 0; mc < 3; mc++) {
        const mh = (n) => Math.abs(Math.sin(cwx * 0.023 + mc * 5.1 + n * 1.9));
        drawCrack(
          ox + (mh(1) - 0.5) * 30 * scale,
          oy + (mh(2) - 0.5) * 20 * scale,
          angle + (mh(3) - 0.5) * Math.PI,
          2, scale * (0.20 + mh(4) * 0.25), alpha * 0.55, cwx + mc * 17.3
        );
      }
    }
  }
  ctx.restore();

  // ── Snow cap ──────────────────────────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.strokeStyle = '#d8eef8'; ctx.lineWidth = 5; ctx.stroke();

  const sfg = ctx.createLinearGradient(0, midGroundY, 0, midGroundY + 18);
  sfg.addColorStop(0, 'rgba(210,235,250,0.50)'); sfg.addColorStop(1, 'rgba(210,235,250,0)');
  ctx.strokeStyle = sfg; ctx.lineWidth = 14; ctx.stroke();

  // Sparkles — tiled in world space
  ctx.fillStyle = 'rgba(255,255,255,0.90)';
  const SPARK_TILE = 35;
  for (let swx = Math.floor(wx0 / SPARK_TILE) * SPARK_TILE; swx < wx0 + segW; swx += SPARK_TILE) {
    const sr  = (n) => Math.abs(Math.sin(swx * 0.031 + n * 2.718));
    const sx2 = swx - cam.x + sr(1) * SPARK_TILE;
    if (sx2 < screenL || sx2 > screenR) continue;
    const sy2 = baseGroundY(swx + sr(1) * SPARK_TILE) - cam.y - sr(2) * 3;
    ctx.beginPath(); ctx.arc(sx2, sy2, 0.5 + sr(3) * 0.9, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawSnowman(x, y, angle) {
  const lean = angle !== undefined ? angle : Math.max(-0.32, Math.min(0.32, wind.force * 0.15));
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(lean);
  ctx.scale(1.9, 1.9);

  // Shadow on ground
  ctx.save();
  ctx.scale(1, 0.22);
  const shg = ctx.createRadialGradient(0, 0, 1, 0, 0, 9);
  shg.addColorStop(0, 'rgba(0,0,0,0.28)'); shg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = shg;
  ctx.beginPath(); ctx.ellipse(0, 0, 9, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ── Bottom ball ──────────────────────────────────────────
  const bgrad = ctx.createRadialGradient(-2, -10, 1, 0, -7, 8);
  bgrad.addColorStop(0, '#f4faff'); bgrad.addColorStop(0.6, '#ddeef8'); bgrad.addColorStop(1, '#b8d8ee');
  ctx.fillStyle = bgrad;
  ctx.beginPath(); ctx.arc(0, -7, 8, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(100,160,200,0.35)'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.arc(0, -7, 8, 0, Math.PI*2); ctx.stroke();
  // Bottom ball surface dimples
  ctx.strokeStyle = 'rgba(140,190,220,0.25)'; ctx.lineWidth = 0.4;
  for (let i = 0; i < 5; i++) {
    const a = i * 1.26, r = 3 + i * 0.9;
    ctx.beginPath(); ctx.arc(Math.cos(a)*r*0.5, -7 + Math.sin(a)*r*0.4, 1.1+i*0.2, 0, Math.PI*2); ctx.stroke();
  }

  // ── Middle ball ──────────────────────────────────────────
  const mgrad = ctx.createRadialGradient(-1.5, -20, 0.5, 0, -18, 6);
  mgrad.addColorStop(0, '#f4faff'); mgrad.addColorStop(0.6, '#ddeef8'); mgrad.addColorStop(1, '#b8d8ee');
  ctx.fillStyle = mgrad;
  ctx.beginPath(); ctx.arc(0, -18, 5.8, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(100,160,200,0.35)'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.arc(0, -18, 5.8, 0, Math.PI*2); ctx.stroke();

  // Buttons — shiny black with highlight
  for (let b = 0; b < 3; b++) {
    const by = -21.5 + b * 2.8;
    ctx.fillStyle = '#0e1c28';
    ctx.beginPath(); ctx.arc(0, by, 0.75, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.arc(-0.25, by - 0.25, 0.28, 0, Math.PI*2); ctx.fill();
  }

  // ── Head ─────────────────────────────────────────────────
  const hgrad = ctx.createRadialGradient(-1.2, -29, 0.5, 0, -27.5, 5);
  hgrad.addColorStop(0, '#f8fbff'); hgrad.addColorStop(0.7, '#ddeef8'); hgrad.addColorStop(1, '#b0d0e8');
  ctx.fillStyle = hgrad;
  ctx.beginPath(); ctx.arc(0, -27.5, 4.4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(100,160,200,0.35)'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.arc(0, -27.5, 4.4, 0, Math.PI*2); ctx.stroke();

  // Eyes — detailed with pupil + shine
  for (const ex of [-1.6, 1.6]) {
    ctx.fillStyle = '#0a1520';
    ctx.beginPath(); ctx.arc(ex, -28.8, 0.85, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a3a55';
    ctx.beginPath(); ctx.arc(ex, -28.8, 0.55, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.arc(ex - 0.3, -29.1, 0.28, 0, Math.PI*2); ctx.fill();
  }

  // Eyebrows
  ctx.strokeStyle = '#0e1c28'; ctx.lineWidth = 0.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-2.4, -30.2); ctx.quadraticCurveTo(-1.6, -30.7, -0.8, -30.2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0.8,  -30.2); ctx.quadraticCurveTo( 1.6, -30.7,  2.4, -30.2); ctx.stroke();

  // Carrot nose — tapered with ridge detail
  ctx.fillStyle = '#e06010';
  ctx.beginPath();
  ctx.moveTo(0, -28.1); ctx.lineTo(0, -27.0);
  ctx.lineTo(4.2, -27.55); ctx.closePath(); ctx.fill();
