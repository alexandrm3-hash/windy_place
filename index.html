  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  rrect(cx - pw / 2, cy - 38, pw, 60, 8);
  ctx.fill();
  ctx.strokeStyle = isWin ? 'rgba(107,203,119,0.55)' : isFail ? 'rgba(232,64,64,0.55)' : 'rgba(180,215,240,0.20)';
  ctx.lineWidth = 1.2;
  rrect(cx - pw / 2, cy - 38, pw, 60, 8);
  ctx.stroke();

  // Label
  ctx.font = 'bold 9px Courier New';
  ctx.textAlign = 'center';
  ctx.fillStyle = isWin ? '#6bcb77' : isFail ? '#e84040' : '#c8e4f5';
  const activeLabel = challenge.isTornadoEscape ? 'ESCAPE THE TORNADO!' : 'BRACE YOURSELF!';
  ctx.fillText(isWin ? '✓ SURVIVED!' : isFail ? '✗ OVERWHELMED' : activeLabel, cx, cy - 22);

  // Timer bar
  if (!isWin && !isFail) {
    const bw = pw - 20, bt = challenge.timer / challenge.maxTimer;
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.fillRect(cx - bw / 2, cy - 14, bw, 3);
    ctx.fillStyle = bt > 0.5 ? '#6bcb77' : bt > 0.25 ? '#e8c84a' : '#e84040';
    ctx.fillRect(cx - bw / 2, cy - 14, bw * bt, 3);
  }

  // Key boxes
  const startX = cx - (challenge.seq.length * 46) / 2 + 23;
  for (let i = 0; i < challenge.seq.length; i++) {
    const kx = startX + i * 46;
    const done   = i < challenge.idx;
    const active = i === challenge.idx && !isWin && !isFail;

    const bx = active ? kx - 22 : kx - 15;
    const bw = active ? 44 : 30;
    const bh = active ? 44 : 28;
    const by2 = active ? cy - 16 : cy - 8;

    ctx.fillStyle = done   ? 'rgba(107,203,119,0.25)'
                  : active ? 'rgba(200,228,245,0.18)'
                  :          'rgba(255,255,255,0.04)';
    rrect(bx, by2, bw, bh, 6);
    ctx.fill();
    ctx.strokeStyle = done   ? '#6bcb77'
                    : active ? '#ffffff'
                    :          'rgba(180,215,240,0.22)';
    ctx.lineWidth = active ? 2.5 : 1.2;
    rrect(bx, by2, bw, bh, 6);
    ctx.stroke();

    ctx.font = `bold ${active ? 26 : 12}px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillStyle = done   ? '#6bcb77'
                  : active ? '#ffffff'
                  :          'rgba(180,215,240,0.38)';
    ctx.fillText(CHAL_LABELS[challenge.seq[i]], kx, active ? cy + 13 : cy + 13);
  }

  ctx.restore();
}

// ── Test panel ────────────────────────────────────────────
function toggleTestMenu() {
  document.getElementById('test-menu').classList.toggle('open');
}
function closeTestMenu() {
  document.getElementById('test-menu').classList.remove('open');
}
function toggleSpawnMenu() {
  document.getElementById('spawn-menu').classList.toggle('open');
}
function closeSpawnMenu() {
  document.getElementById('spawn-menu').classList.remove('open');
}
function spawnHouseType(type) {
  if (gState !== 'playing') init();
  const isResearch = type === 'research';
  const isBunker   = type === 'bunker';
  const hw2      = isResearch ? 160 : isBunker ? 90 : 55;
  const hYOffset = isResearch ? 240 : isBunker ? 175 : 120;
  const hWidth   = isResearch ? 320 : isBunker ? 180 : 110;
  // Place it just ahead of the player (about 200px in front)
  const bx = player.x + player.w / 2 + 200;
  const gy = baseGroundY(bx + hw2);
  houses.push({
    x: bx, y: gy - hYOffset, w: hWidth,
    type,
    flying: false, flyTimer: 80, flyDelay: 80,
    vy: 0, vx: 0, angle: 0, alpha: 1,
  });
}
document.addEventListener('click', e => {
  if (!e.target.closest('#test-btn') && !e.target.closest('#test-menu'))
    closeTestMenu();
  if (!e.target.closest('#spawn-btn') && !e.target.closest('#spawn-menu'))
    closeSpawnMenu();
});

function forceWind(stateIndex) {
  if (gState !== 'playing') init();
  const ws = WIND_STATES[stateIndex];
  wind.target   = ws.tgt;
  wind.force    = ws.tgt;   // snap instantly — no lerp wait
  wind.timer    = 0;
  wind.duration = ws.dMax;
  // Force tier high enough to sustain hypercane/tornado probabilities
  if (stateIndex >= 6) maxReach = Math.max(maxReach, 1500 * 12);
}

function applyScale() {
  const scale = Math.min(window.innerWidth / 900, window.innerHeight / 534);
  document.getElementById('wrapper').style.transform = `scale(${scale})`;
  // Render at native pixel density so the CSS/transform upscale above
  // doesn't blur/pixelate a fixed 900x520 backing buffer. Cap the ratio —
  // going full devicePixelRatio*scale on hi-DPI/large screens can multiply
  // the pixel count (and per-frame draw cost) by 8-16x and tanks framerate.
  const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
  const ratio = Math.min(2, Math.max(1, dpr * scale));
  const bw = Math.round(900 * ratio), bh = Math.round(520 * ratio);
  if (canvas.width !== bw || canvas.height !== bh) {
    canvas.width = bw;
    canvas.height = bh;
  }
  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
}
window.addEventListener('resize', applyScale);
applyScale();

let _slowFrame = 0;
function loop() {
  // Slow-motion during active challenge: run physics every 8th render frame (~7fps)
  const slo = challenge && challenge.result === null;
  if (!slo || (++_slowFrame % 8 === 0)) update();
  draw();
  requestAnimationFrame(loop);
}
init(); loop();
</script>
