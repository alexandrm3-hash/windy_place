  const tierMult = Math.max(0.08, tier * 0.22 + 0.08);
  for (let cwx = Math.floor(wx0 / CRACK_TILE) * CRACK_TILE; cwx < wx0 + segW; cwx += CRACK_TILE) {
    const h = (n) => Math.abs(Math.sin(cwx * 0.017 + n * 2.718));
    if (h(0) < 0.12) continue; // ~12% skip keeps it from being wall-to-wall

    const sizeRoll = h(1);
    const baseScale = sizeRoll > 0.85 ? 2.8 + h(2) * 3.5   // giant crack
                    : sizeRoll < 0.18 ? 0.18 + h(2) * 0.22  // hairline
                    :                   0.55 + h(2) * 1.1;   // mid
    const scale = baseScale * tierMult;

    const depth = sizeRoll > 0.85 ? 5
                : sizeRoll < 0.18 ? 2
                :                   3 + Math.floor(h(3) * 2);

    const ox = cwx - cam.x + (h(4) - 0.5) * CRACK_TILE * 0.8;
    const oy = baseGroundY(cwx) - cam.y + 5 + h(5) * 70 * scale;
    const angle = (h(6) - 0.5) * Math.PI * 0.8 + Math.PI * 0.5; // mostly downward
    const alpha = 0.22 + h(7) * 0.30;

    drawCrack(ox, oy, angle, depth, scale, alpha, cwx);

    // Extra micro-cracks radiating from large cracks
    if (sizeRoll > 0.70) {
      for (let mc = 0; mc < 3; mc++) {
        const mh = (n) => Math.abs(Math.sin(cwx * 0.023 + mc * 5.1 + n * 1.9));
        drawCrack(
          ox + (mh(1) - 0.5) * 30 * scale,
          oy + (mh(2) - 0.5) * 20 * scale,
          angle + (mh(3) - 0.5) * Math.PI,
          2, scale * (0.20 + mh(4) * 0.25), alpha * 0.55, cwx + mc * 17.3
        );
      }
    }
  }
  ctx.restore();

  // ── Snow cap ──────────────────────────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.strokeStyle = '#d8eef8'; ctx.lineWidth = 5; ctx.stroke();

  const sfg = ctx.createLinearGradient(0, midGroundY, 0, midGroundY + 18);
  sfg.addColorStop(0, 'rgba(210,235,250,0.50)'); sfg.addColorStop(1, 'rgba(210,235,250,0)');
  ctx.strokeStyle = sfg; ctx.lineWidth = 14; ctx.stroke();

  // Sparkles — tiled in world space
  ctx.fillStyle = 'rgba(255,255,255,0.90)';
  const SPARK_TILE = 35;
  for (let swx = Math.floor(wx0 / SPARK_TILE) * SPARK_TILE; swx < wx0 + segW; swx += SPARK_TILE) {
    const sr  = (n) => Math.abs(Math.sin(swx * 0.031 + n * 2.718));
    const sx2 = swx - cam.x + sr(1) * SPARK_TILE;
    if (sx2 < screenL || sx2 > screenR) continue;
    const sy2 = baseGroundY(swx + sr(1) * SPARK_TILE) - cam.y - sr(2) * 3;
    ctx.beginPath(); ctx.arc(sx2, sy2, 0.5 + sr(3) * 0.9, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawSnowman(x, y, angle) {
  const lean = angle !== undefined ? angle : Math.max(-0.32, Math.min(0.32, wind.force * 0.15));
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(lean);
  ctx.scale(1.9, 1.9);

  // Shadow on ground
  ctx.save();
  ctx.scale(1, 0.22);
  const shg = ctx.createRadialGradient(0, 0, 1, 0, 0, 9);
  shg.addColorStop(0, 'rgba(0,0,0,0.28)'); shg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = shg;
  ctx.beginPath(); ctx.ellipse(0, 0, 9, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ── Bottom ball ──────────────────────────────────────────
  const bgrad = ctx.createRadialGradient(-2, -10, 1, 0, -7, 8);
  bgrad.addColorStop(0, '#f4faff'); bgrad.addColorStop(0.6, '#ddeef8'); bgrad.addColorStop(1, '#b8d8ee');
  ctx.fillStyle = bgrad;
  ctx.beginPath(); ctx.arc(0, -7, 8, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(100,160,200,0.35)'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.arc(0, -7, 8, 0, Math.PI*2); ctx.stroke();
  // Bottom ball surface dimples
  ctx.strokeStyle = 'rgba(140,190,220,0.25)'; ctx.lineWidth = 0.4;
  for (let i = 0; i < 5; i++) {
    const a = i * 1.26, r = 3 + i * 0.9;
    ctx.beginPath(); ctx.arc(Math.cos(a)*r*0.5, -7 + Math.sin(a)*r*0.4, 1.1+i*0.2, 0, Math.PI*2); ctx.stroke();
  }

  // ── Middle ball ──────────────────────────────────────────
  const mgrad = ctx.createRadialGradient(-1.5, -20, 0.5, 0, -18, 6);
  mgrad.addColorStop(0, '#f4faff'); mgrad.addColorStop(0.6, '#ddeef8'); mgrad.addColorStop(1, '#b8d8ee');
  ctx.fillStyle = mgrad;
  ctx.beginPath(); ctx.arc(0, -18, 5.8, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(100,160,200,0.35)'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.arc(0, -18, 5.8, 0, Math.PI*2); ctx.stroke();

  // Buttons — shiny black with highlight
  for (let b = 0; b < 3; b++) {
    const by = -21.5 + b * 2.8;
    ctx.fillStyle = '#0e1c28';
    ctx.beginPath(); ctx.arc(0, by, 0.75, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.arc(-0.25, by - 0.25, 0.28, 0, Math.PI*2); ctx.fill();
  }

  // ── Head ─────────────────────────────────────────────────
  const hgrad = ctx.createRadialGradient(-1.2, -29, 0.5, 0, -27.5, 5);
  hgrad.addColorStop(0, '#f8fbff'); hgrad.addColorStop(0.7, '#ddeef8'); hgrad.addColorStop(1, '#b0d0e8');
  ctx.fillStyle = hgrad;
  ctx.beginPath(); ctx.arc(0, -27.5, 4.4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(100,160,200,0.35)'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.arc(0, -27.5, 4.4, 0, Math.PI*2); ctx.stroke();

  // Eyes — detailed with pupil + shine
  for (const ex of [-1.6, 1.6]) {
    ctx.fillStyle = '#0a1520';
    ctx.beginPath(); ctx.arc(ex, -28.8, 0.85, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a3a55';
    ctx.beginPath(); ctx.arc(ex, -28.8, 0.55, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.arc(ex - 0.3, -29.1, 0.28, 0, Math.PI*2); ctx.fill();
  }

  // Eyebrows
  ctx.strokeStyle = '#0e1c28'; ctx.lineWidth = 0.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-2.4, -30.2); ctx.quadraticCurveTo(-1.6, -30.7, -0.8, -30.2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0.8,  -30.2); ctx.quadraticCurveTo( 1.6, -30.7,  2.4, -30.2); ctx.stroke();

  // Carrot nose — tapered with ridge detail
  ctx.fillStyle = '#e06010';
  ctx.beginPath();
  ctx.moveTo(0, -28.1); ctx.lineTo(0, -27.0);
  ctx.lineTo(4.2, -27.55); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#b04408'; ctx.lineWidth = 0.3;
  ctx.beginPath(); ctx.moveTo(1.2, -27.9); ctx.lineTo(3.5, -27.6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2.2, -27.65); ctx.lineTo(4.0, -27.55); ctx.stroke();

  // Mouth — curved smile with 5 dots
  for (let m = -2; m <= 2; m++) {
    const mx = m * 1.0, my = -25.5 + (m*m) * 0.22;
    ctx.fillStyle = '#0e1c28';
    ctx.beginPath(); ctx.arc(mx, my, 0.42, 0, Math.PI*2); ctx.fill();
  }

  // Cheeks — rosy blush
  for (const cx2 of [-2.8, 2.8]) {
    const cg = ctx.createRadialGradient(cx2, -27, 0, cx2, -27, 1.6);
    cg.addColorStop(0, 'rgba(255,140,140,0.35)'); cg.addColorStop(1, 'rgba(255,140,140,0)');
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(cx2, -27, 1.6, 0, Math.PI*2); ctx.fill();
  }

  // ── Hat ──────────────────────────────────────────────────
  // Brim
  ctx.fillStyle = '#0e1c28';
  ctx.beginPath(); ctx.ellipse(0, -31.4, 6.5, 1.4, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#1a2e40'; ctx.lineWidth = 0.4;
  ctx.beginPath(); ctx.ellipse(0, -31.4, 6.5, 1.4, 0, 0, Math.PI*2); ctx.stroke();
  // Crown
  ctx.fillStyle = '#0e1c28';
  ctx.fillRect(-4.2, -40, 8.4, 8.8);
  ctx.strokeStyle = '#1a2e40'; ctx.lineWidth = 0.3;
  ctx.strokeRect(-4.2, -40, 8.4, 8.8);
  // Hat band
  const hbg = ctx.createLinearGradient(-4.2, 0, 4.2, 0);
  hbg.addColorStop(0, '#8b1a1a'); hbg.addColorStop(0.5, '#cc2828'); hbg.addColorStop(1, '#8b1a1a');
  ctx.fillStyle = hbg;
  ctx.fillRect(-4.2, -33.0, 8.4, 1.8);
  // Hat buckle
  ctx.fillStyle = '#d4a820';
  ctx.fillRect(-1.1, -33.2, 2.2, 2.0);
  ctx.fillStyle = '#0e1c28';
  ctx.fillRect(-0.5, -32.9, 1.0, 1.4);
  // Hat top highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(-4.2, -40, 8.4, 2.5);
  // Snow on hat brim
  ctx.fillStyle = 'rgba(230,246,255,0.88)';
  ctx.beginPath(); ctx.ellipse(0, -31.0, 5.2, 0.8, 0, 0, Math.PI*2); ctx.fill();

  // ── Stick arms — detailed branches ───────────────────────
  ctx.strokeStyle = '#4a2e10'; ctx.lineCap = 'round';
  const drawBranch = (x1,y1,x2,y2,w) => {
    ctx.lineWidth = w;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  };
  // Left arm
  drawBranch(-5.8,-19,-13,-13.5,1.4);
  drawBranch(-13,-13.5,-15.5,-11,0.8);
  drawBranch(-13,-13.5,-15,-15.5,0.8);
  drawBranch(-13,-13.5,-14,-10,0.6);
  drawBranch(-10,-15,-12,-12.5,0.7);
  // Right arm
  drawBranch(5.8,-19,13,-13.5,1.4);
  drawBranch(13,-13.5,15.5,-11,0.8);
  drawBranch(13,-13.5,15,-15.5,0.8);
  drawBranch(13,-13.5,14,-10,0.6);
  drawBranch(10,-15,12,-12.5,0.7);

  // ── Scarf ─────────────────────────────────────────────────
  // Main wrap
  ctx.strokeStyle = '#cc2828'; ctx.lineWidth = 2.6; ctx.lineCap = 'butt';
  ctx.beginPath(); ctx.arc(0, -22.5, 5.6, -0.6, Math.PI + 0.6); ctx.stroke();
  // Stripe
  ctx.strokeStyle = '#ff6060'; ctx.lineWidth = 0.7;
  ctx.beginPath(); ctx.arc(0, -22.5, 5.6, -0.6, Math.PI + 0.6); ctx.stroke();
  // Second wrap loop
  ctx.strokeStyle = '#aa2020'; ctx.lineWidth = 2.0; ctx.lineCap = 'butt';
  ctx.beginPath(); ctx.arc(0, -21.0, 5.4, -0.4, Math.PI * 0.55); ctx.stroke();
  // Tail hanging
  ctx.fillStyle = '#cc2828';
  ctx.beginPath();
  ctx.moveTo(4.5, -22.8); ctx.lineTo(5.5, -22.8);
  ctx.lineTo(5.8, -17.0); ctx.lineTo(4.2, -17.0); ctx.closePath(); ctx.fill();
  // Fringe on tail
  ctx.strokeStyle = '#cc2828'; ctx.lineWidth = 0.5; ctx.lineCap = 'round';
  for (let f = 0; f < 4; f++) {
    const fx = 4.2 + f * 0.45;
    ctx.beginPath(); ctx.moveTo(fx, -17.0); ctx.lineTo(fx - 0.2, -15.8); ctx.stroke();
  }

  // ── Snow patches on body ──────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath(); ctx.ellipse(-2, -3.5, 3.5, 1.2, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-1.5,-15.8, 2.5, 0.9, -0.2, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawPineTree(x, y, angle) {
  const swing = angle !== undefined ? angle
    : wind.force * 0.09 + Math.sin(frame * (0.03 + wind.strength * 0.05)) * wind.strength * 0.18;
  const lean = Math.max(-0.55, Math.min(0.55, swing));

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(6.5, 6.5);

  // Trunk — very tall, fixed
  ctx.fillStyle = '#4a2e10';
  ctx.fillRect(-2.5, -28, 5, 28);

  // Seven layered triangles — each swings progressively more at top
  const layers = [
    { y: -8,  hw: 18, h: 13, swingFrac: 0.03 },
    { y: -19, hw: 15, h: 13, swingFrac: 0.12 },
    { y: -30, hw: 12, h: 13, swingFrac: 0.28 },
    { y: -40, hw:  9, h: 12, swingFrac: 0.48 },
    { y: -49, hw:  7, h: 11, swingFrac: 0.65 },
    { y: -57, hw:  5, h: 10, swingFrac: 0.82 },
    { y: -64, hw:  3, h:  9, swingFrac: 1.00 },
  ];
  for (const l of layers) {
    ctx.save();
    ctx.translate(0, l.y);
    ctx.rotate(lean * l.swingFrac);
    ctx.translate(0, -l.y);

    ctx.fillStyle = '#183018';
    ctx.beginPath(); ctx.moveTo(0, l.y - l.h); ctx.lineTo(-l.hw, l.y); ctx.lineTo(l.hw, l.y); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#285028';
    ctx.beginPath(); ctx.moveTo(0, l.y - l.h + 2); ctx.lineTo(-l.hw + 3, l.y); ctx.lineTo(l.hw - 3, l.y); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(216,238,252,0.82)';
    ctx.beginPath(); ctx.moveTo(0, l.y - l.h); ctx.lineTo(-l.hw * 0.45, l.y - l.h * 0.45); ctx.lineTo(l.hw * 0.45, l.y - l.h * 0.45); ctx.closePath(); ctx.fill();

    ctx.restore();
  }
  ctx.restore();
}

function drawDecorations() {
  for (const d of decorations) {
    const sx = d.x - cam.x, sy = d.y - cam.y;
    if (sx < -160 || sx > W + 160 || sy > H + 20) continue;
    ctx.save();
    ctx.globalAlpha = d.alpha;
    if (d.type === 'snowman') drawSnowman(sx, sy, d.flying ? d.angle : undefined);
    else drawPineTree(sx, sy, d.flying ? d.angle : undefined);
    ctx.restore();
  }
}

function drawPlatform(p) {
  const sx = p.x - cam.x, sy = p.y - cam.y;
  if (sx + p.w < -4 || sx > W + 4 || sy > H + 4) return;
  const ground = p.h > 20;
  const drawH  = Math.min(p.h, Math.max(4, H - sy + 20));

  // Per-chunk color variation keeps adjacent platforms visually distinct
  const cv = ((p.x * 17 + 137) % 7) - 3;   // −3..+3
  const r0 = 26 + cv * 2, g0 = 42 + cv, b0 = 54 + cv;

  // Rock body
  const bg = ctx.createLinearGradient(0, sy, 0, sy + drawH);
  if (ground) {
    bg.addColorStop(0,    `rgb(${r0},${g0},${b0})`);
    bg.addColorStop(0.12, `rgb(${r0-8},${g0-10},${b0-6})`);
    bg.addColorStop(1,    `rgb(${8+cv},${14+cv},${22+cv})`);
  } else {
    bg.addColorStop(0, `rgb(${34+cv*2},${56+cv},${74+cv})`);
    bg.addColorStop(1, '#0f1e2c');
  }
  ctx.fillStyle = bg;
  ctx.fillRect(sx, sy, p.w, drawH);

  // Rock strata — wavy geological layer lines
  ctx.save();
  const sv = (n) => Math.abs(Math.sin((p.x * 7 + p.y * 3) * 0.005 + n * 1.618));
  const nStrata = Math.min(3, Math.floor(drawH / 28));
  for (let s = 0; s < nStrata; s++) {
    const stY = sy + 18 + sv(s * 3) * Math.min(drawH - 26, 70);
    ctx.strokeStyle = `rgba(0,0,0,${0.09 + sv(s*3+1)*0.09})`; ctx.lineWidth = 1 + sv(s*3+2);
    ctx.beginPath(); ctx.moveTo(sx, stY);
    for (let bx = 0; bx <= p.w; bx += 10)
      ctx.lineTo(sx + bx, stY + Math.sin((p.x + bx) * 0.09 + s) * 2.5);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(100,160,200,0.07)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(sx, stY - 1);
    for (let bx = 0; bx <= p.w; bx += 10)
      ctx.lineTo(sx + bx, stY - 1 + Math.sin((p.x + bx) * 0.09 + s) * 2.5);
    ctx.stroke();
  }
  ctx.restore();

  // Rock crack texture — more cracks with deeper branching
  ctx.save();
  ctx.lineCap = 'round';
  const crR = (n) => Math.abs(Math.sin((p.x * 13 + p.y * 7) * 0.008 + n * 2.399));
  const nc = Math.min(9, Math.floor(p.w / 28) + 2);
  for (let c = 0; c < nc; c++) {
    const alpha = 0.12 + crR(c*9+8) * 0.12;
    ctx.strokeStyle = `rgba(0,0,0,${alpha})`; ctx.lineWidth = 0.7;
    const cx  = sx + crR(c*9+1) * p.w;
    const cy  = sy + 7 + crR(c*9+2) * Math.min(drawH - 10, 85);
    const cx2 = cx + crR(c*9+3) * 24 - 12;
    const cy2 = cy + crR(c*9+4) * 11 - 2;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx2, cy2); ctx.stroke();
    if (crR(c*9+5) > 0.30) {
      const cx3 = cx2 + crR(c*9+6)*15 - 7.5;
      const cy3 = cy2 + crR(c*9+7)*8;
      ctx.beginPath(); ctx.moveTo(cx2, cy2); ctx.lineTo(cx3, cy3); ctx.stroke();
      if (crR(c*9+9) > 0.50) {
        ctx.lineWidth = 0.45;
        ctx.beginPath(); ctx.moveTo(cx3, cy3);
        ctx.lineTo(cx3 + crR(c*9+10)*9 - 4.5, cy3 + crR(c*9+11)*5); ctx.stroke();
      }
    }
  }
  ctx.restore();

  // Embedded pebbles/stones
  ctx.save();
  const pr = (n) => Math.abs(Math.sin((p.x * 19 + p.y * 11) * 0.009 + n * 1.732));
  const np = Math.min(14, Math.floor(p.w / 22));
  for (let i = 0; i < np; i++) {
    const px2 = sx + 3 + pr(i*5) * (p.w - 6);
    const py2 = sy + 12 + pr(i*5+1) * Math.min(drawH - 16, 75);
    const pr2 = 1.2 + pr(i*5+2) * 2.8;
    const pa  = pr(i*5+3);
    ctx.fillStyle = `rgba(${pa > 0.5 ? 55 : 12},${pa > 0.5 ? 85 : 22},${pa > 0.5 ? 105 : 32},0.30)`;
    ctx.beginPath();
    ctx.ellipse(px2, py2, pr2, pr2 * (0.55 + pr(i*5+4)*0.5), pr(i*5+4)*Math.PI, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(140,200,240,0.13)'; ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  ctx.restore();

  // Snow cap — bumpy surface
  const snowH = ground ? 5 : 4;
  const bumpSeed = (p.x * 23 + 41) * 0.007;
  ctx.save();
  ctx.fillStyle = ground ? '#d8eef8' : '#e4f4ff';
  ctx.beginPath();
  ctx.moveTo(sx, sy + snowH);
  for (let bx = 0; bx <= p.w; bx += 5)
    ctx.lineTo(sx + bx, sy + Math.abs(Math.sin(bumpSeed + bx * 0.20)) * 2.8);
  ctx.lineTo(sx + p.w, sy + snowH);
  ctx.closePath(); ctx.fill();

  // Snow sparkles
  ctx.fillStyle = 'rgba(255,255,255,0.90)';
  const ns = Math.min(7, Math.floor(p.w / 35));
  const sr = (n) => Math.abs(Math.sin((p.x * 31 + p.y * 5) * 0.011 + n * 2.718));
  for (let i = 0; i < ns; i++) {
    ctx.beginPath();
    ctx.arc(sx + 4 + sr(i*3)*(p.w-8), sy + sr(i*3+1)*2.5, 0.5 + sr(i*3+2)*0.9, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // Snow depth fade
  const sg = ctx.createLinearGradient(0, sy + snowH, 0, sy + snowH + 14);
  sg.addColorStop(0, 'rgba(210,235,250,0.50)');
  sg.addColorStop(1, 'rgba(210,235,250,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(sx, sy + snowH, p.w, 14);

  // Lit left face
  ctx.fillStyle = 'rgba(140,200,240,0.09)';
  ctx.fillRect(sx, sy + snowH, 3, drawH - snowH);

  if (ground) {
    // Right cliff-face shadow — the key visual separator between chunks
    const cg = ctx.createLinearGradient(sx + p.w - 20, sy, sx + p.w, sy);
    cg.addColorStop(0, 'rgba(0,0,0,0)');
    cg.addColorStop(1, 'rgba(0,0,0,0.58)');
    ctx.fillStyle = cg;
    ctx.fillRect(sx + p.w - 20, sy + snowH, 20, drawH - snowH);
    // Hard pixel edge
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(sx + p.w - 2, sy, 2, drawH);

    // Vertical rock striations near cliff edge
    ctx.save();
    const vseed = (p.x * 41 + 7) * 0.003;
    const nv = Math.min(5, Math.floor(p.w / 70));
    for (let v = 0; v < nv; v++) {
      const vx = sx + Math.abs(Math.sin(vseed + v * 2.1)) * p.w;
      const vy1 = sy + snowH + 4;
      const vy2 = vy1 + 14 + Math.abs(Math.sin(vseed + v * 3.3)) * 28;
      const vg = ctx.createLinearGradient(vx - 2, 0, vx + 3, 0);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(0.5, 'rgba(0,0,0,0.13)');
      vg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = vg;
      ctx.fillRect(vx - 2, vy1, 5, vy2 - vy1);
    }
    ctx.restore();
  } else {
    // Icicles on floating platforms
    const irR = (n) => Math.abs(Math.sin((p.x * 17 + p.y * 11) * 0.006 + n * 3.141));
    const cnt = Math.floor((p.w - 8) / 9);
    for (let i = 0; i < cnt; i++) {
      const ix = sx + 4 + i * 9 + irR(i*4) * 5;
      if (ix < sx || ix > sx + p.w || ix < -4 || ix > W + 4) continue;
      const ilen = 4 + irR(i*4+1) * 10;
      const iw   = 1.4 + irR(i*4+2) * 1.8;
      const ig   = ctx.createLinearGradient(ix, sy + drawH, ix, sy + drawH + ilen);
      ig.addColorStop(0,   'rgba(185,228,248,0.88)');
      ig.addColorStop(0.7, 'rgba(200,238,255,0.55)');
      ig.addColorStop(1,   'rgba(215,245,255,0)');
      ctx.fillStyle = ig;
      ctx.beginPath();
      ctx.moveTo(ix - iw, sy + drawH);
      ctx.lineTo(ix + iw, sy + drawH);
      ctx.lineTo(ix, sy + drawH + ilen);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(240,252,255,0.58)';
      ctx.fillRect(ix - 0.4, sy + drawH, 0.8, ilen * 0.44);
    }
  }
}

// ── Draw: Stickman in window (when sheltered) ────────────
function drawStickmanInWindow() {
  const h = player.inHouse;
  if (!h || h.flying || h.alpha < 0.05) return;

  const hw = h.w / 2; // 55
  const BH = 72;
  const cx = h.x - cam.x + hw;
  const cy = h.y - cam.y + 84;

  // Window bounds depend on house type
  // Normal: fillRect(-hw+10, -BH/2+14, 20, 16)  → screen (cx-45, cy-22, 20, 16)
  // Metal : fillRect(-hw+10, -BH/2+14, 22,  8)  → screen (cx-45, cy-22, 22,  8)
  const isMetal = h.type === 'metal';
  const winX = cx - hw + 10;
  const winY = cy - BH / 2 + 14;
  const winW = isMetal ? 22 : 20;
  const winH = isMetal ? 8  : 16;

  if (winX + winW < 0 || winX > W || winY + winH < 0 || winY > H) return;

  ctx.save();
  ctx.beginPath();
  ctx.rect(winX, winY, winW, winH);
  ctx.clip();

  const ox = winX + winW / 2;
  const oy = winY + winH;          // feet at window sill
  const bob = Math.sin(frame * 0.05) * 0.6;

  ctx.globalAlpha = h.alpha;
  ctx.strokeStyle = '#3a1204';
  ctx.fillStyle   = '#3a1204';
  ctx.lineWidth   = 1.8;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  // Legs
  ctx.beginPath(); ctx.moveTo(ox, oy - 5 + bob); ctx.lineTo(ox - 3, oy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox, oy - 5 + bob); ctx.lineTo(ox + 3, oy); ctx.stroke();
  // Body
  ctx.beginPath(); ctx.moveTo(ox, oy - 12 + bob); ctx.lineTo(ox, oy - 5 + bob); ctx.stroke();
  // Arms (relaxed, hanging)
  const armSway = Math.sin(frame * 0.04) * 0.15;
  ctx.save(); ctx.translate(ox, oy - 10 + bob); ctx.rotate(-0.35 + armSway);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-5, 4); ctx.stroke(); ctx.restore();
  ctx.save(); ctx.translate(ox, oy - 10 + bob); ctx.rotate(0.35 - armSway);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(5, 4); ctx.stroke(); ctx.restore();
  // Head
  ctx.beginPath(); ctx.arc(ox, oy - 15.5 + bob, 3.2, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

    ctx.closePath(); ctx.fill();

    // ── Animated researcher stickman ─────────────────────────

        else if (sc < 7240)  act = 'nodoff';               // head drooping (4 s)
        else if (sc < 14400) act = 'sleep';                // sleeping (~2 min)
        else                 act = 'wakeup';               // jerk awake (10 s)
      }
      else               act = cyc<560?'type':cyc<692?'read':'type';

      // ── Pose parameters ──────────────────────────────────────
      let lArmA=-0.85, rArmA=-0.85, lForeA=0, rForeA=0;
      let lHandY=0, rHandY=0;
      let hTilt=0.10, bHunch=0.12*fac;
      let mouth=0, showPhone=false, showPad=false;

      if (act==='type') {
        lHandY = Math.sin(sT*0.42)*3.4;
        rHandY = Math.sin(sT*0.42+Math.PI)*3.4;
        hTilt  = 0.12 + ((sT%180)<16?0.14:0);   // periodic screen-glance nod
      } else if (act==='read') {
        lArmA=-0.52; rArmA=-0.60;
        rHandY=Math.sin(sT*0.11)*2;              // mouse scroll
        hTilt=0.04; bHunch=0.05*fac;
      } else if (act==='ring') {
        hTilt = -0.14 + Math.sin(sT*0.38)*0.09; // startled — looks up
        bHunch=0.06*fac;
      } else if (act==='talk') {
        rArmA=-1.88; rForeA=1.18;               // arm raised to ear
        lArmA=-0.72; lHandY=Math.sin(sT*0.19)*1.8;  // scribbling notes
        hTilt=0.22*fac;                           // head tilted to shoulder
        mouth=Math.max(0,Math.sin(sT*0.33));
        showPhone=true;
      } else if (act==='hangup') {
        const ht=(cyc-490)/58;
        rArmA=-1.88*(1-ht)-0.85*ht; rForeA=1.18*(1-ht);
        hTilt=0.22*fac*(1-ht)+0.10*ht;
        showPhone=ht<0.65;
      } else if (act==='stretch') {
        const sw=Math.sin((cyc-480)/114*Math.PI); // 0→1→0 envelope
        lArmA=-0.85-sw*1.22; rArmA=-0.85-sw*1.22;
        lForeA=-sw*0.58;     rForeA=-sw*0.58;
        bHunch=-0.20*sw*fac; hTilt=-0.24*sw;
      } else if (act==='write') {
        lArmA=-0.80; rArmA=-0.56;
        rHandY=Math.sin(sT*0.23)*2.4;
        hTilt=0.30; bHunch=0.15*fac;
        showPad=true;
      } else if (act==='nodoff') {
        // Gradually drooping — t goes 0→1 over 240 frames
        const nd = Math.min(1, (sT%15000-7000)/240);
        lHandY = Math.sin(sT*0.42)*3.4*(1-nd);  // typing slows and stops
        rHandY = Math.sin(sT*0.42+Math.PI)*3.4*(1-nd);
        lArmA  = -0.85 + nd*0.30;               // arms relax and lower slightly
        rArmA  = -0.85 + nd*0.30;
        hTilt  = 0.12 + nd*0.80;                // head droops forward
        bHunch = (0.12 + nd*0.10)*fac;
      } else if (act==='sleep') {
        // Fully slumped — forearms flat on desk, head resting on them
        lArmA=-0.45; rArmA=-0.45;
        lForeA=0.55; rForeA=0.55;               // forearms flattened toward desk
        hTilt=0.95;                              // head almost fully forward
        bHunch=0.22*fac;
        lHandY=5; rHandY=5;                      // hands resting low on desk surface
      } else if (act==='wakeup') {
        const wu = Math.min(1, (sT%15000-14400)/140);
        // Sharp head-snap upright with slight overshoot
        const snap = wu<0.25 ? wu/0.25 : 1-(wu-0.25)/0.75*0.15; // quick up, gentle settle
        lArmA=-0.45+snap*0.40; rArmA=-0.45+snap*0.40;
        lForeA=0.55*(1-snap);  rForeA=0.55*(1-snap);
        hTilt=0.95*(1-snap)-0.12*Math.sin(snap*Math.PI); // snaps up then slight back-tilt
        bHunch=(0.22*(1-snap)+0.12*snap)*fac;
        lHandY=5*(1-snap); rHandY=5*(1-snap);
      }

      // ── Chair ────────────────────────────────────────────────
      ctx.fillStyle='#1e2230';
      ctx.fillRect(stX-11, stY+9,  22, 4);              // seat pan
      ctx.fillRect(stX-2,  stY+5,  4,  6);              // post
      ctx.fillRect(stX-fac*14, stY-7, 3, 18);           // back rest
      ctx.fillStyle='rgba(0,0,0,0.20)';
      ctx.beginPath(); ctx.ellipse(stX,stY+14,13,3.5,0,0,Math.PI*2); ctx.fill();

      // ── Common stroke style ───────────────────────────────────
      ctx.strokeStyle='#b8cce0'; ctx.fillStyle='#b8cce0';
      ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round';

      // ── Legs (seated) ─────────────────────────────────────────
      ctx.beginPath(); ctx.moveTo(stX,stY+9); ctx.lineTo(stX-9,stY+9); ctx.stroke(); // L thigh
      ctx.beginPath(); ctx.moveTo(stX,stY+9); ctx.lineTo(stX+9,stY+9); ctx.stroke(); // R thigh
      ctx.beginPath(); ctx.moveTo(stX-9,stY+9); ctx.lineTo(stX-9,stY+20); ctx.stroke(); // L shin
      ctx.beginPath(); ctx.moveTo(stX+9,stY+9); ctx.lineTo(stX+9,stY+20); ctx.stroke(); // R shin
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(stX-9,stY+20); ctx.lineTo(stX-9-fac*4,stY+20); ctx.stroke(); // L foot
      ctx.beginPath(); ctx.moveTo(stX+9,stY+20); ctx.lineTo(stX+9-fac*3,stY+20); ctx.stroke(); // R foot

      // ── Torso ─────────────────────────────────────────────────
      ctx.lineWidth=2.8;
      const torX = stX + bHunch*8;
      const torY = stY - 8 + bob;
      ctx.beginPath(); ctx.moveTo(stX,stY+9); ctx.lineTo(torX,torY); ctx.stroke();
      const shX=torX, shY=torY;

      // ── Arms + forearms ───────────────────────────────────────
      const aL=12, fL=9;
      ctx.lineWidth=2.2;

      const lax=shX+Math.cos(lArmA-0.40)*aL, lay=shY+Math.sin(lArmA-0.40)*aL;
      ctx.beginPath(); ctx.moveTo(shX,shY); ctx.lineTo(lax,lay); ctx.stroke();
      const lex=lax+Math.cos(lArmA-0.40+lForeA)*fL, ley=lay+Math.sin(lArmA-0.40+lForeA)*fL+lHandY;
      ctx.beginPath(); ctx.moveTo(lax,lay); ctx.lineTo(lex,ley); ctx.stroke();

      const rax=shX+Math.cos(rArmA+0.40)*aL, ray=shY+Math.sin(rArmA+0.40)*aL;
      ctx.beginPath(); ctx.moveTo(shX,shY); ctx.lineTo(rax,ray); ctx.stroke();
      const rex=rax+Math.cos(rArmA+0.40+rForeA)*fL, rey=ray+Math.sin(rArmA+0.40+rForeA)*fL+rHandY;
      ctx.beginPath(); ctx.moveTo(rax,ray); ctx.lineTo(rex,rey); ctx.stroke();

      // Typing flash under fingers
      if (act==='type') {
        if (lHandY<-1.8) { ctx.fillStyle='rgba(70,170,255,0.28)'; ctx.beginPath(); ctx.arc(lex,ley+3,5,0,Math.PI*2); ctx.fill(); }
        if (rHandY<-1.8) { ctx.fillStyle='rgba(70,170,255,0.28)'; ctx.beginPath(); ctx.arc(rex,rey+3,5,0,Math.PI*2); ctx.fill(); }
      }

      // ── Phone handset ─────────────────────────────────────────
      if (showPhone) {
        ctx.save();
        ctx.translate(rex, rey-1);
        ctx.rotate(-1.1*fac);
        ctx.fillStyle='#252538'; ctx.fillRect(-2,-10,5,16);
        ctx.fillStyle='#353555';
        ctx.fillRect(-1,-9,3,3);  // earpiece block
        ctx.fillRect(-1, 3,3,3);  // mouthpiece block
        ctx.restore();
      }

      // ── Notepad + pen ─────────────────────────────────────────
      if (showPad) {
        const px=rex+fac*6, py=rey+4;
        ctx.fillStyle='#e8dfc0'; ctx.fillRect(px-7,py-5,14,11);
        ctx.strokeStyle='#b8a870'; ctx.lineWidth=0.6; ctx.strokeRect(px-7,py-5,14,11);
        ctx.strokeStyle='#9a9060';
        for (let nl=0;nl<3;nl++) { ctx.beginPath(); ctx.moveTo(px-5,py-2+nl*3.2); ctx.lineTo(px+5,py-2+nl*3.2); ctx.stroke(); }
        // Pen body
        ctx.strokeStyle='#282828'; ctx.lineWidth=1.6;
        const pt=rex+fac*5+rHandY*0.5;
        ctx.beginPath(); ctx.moveTo(pt-1,rey-1); ctx.lineTo(pt+7,rey-7); ctx.stroke();
        ctx.fillStyle='#cc1111'; ctx.beginPath(); ctx.arc(pt+7,rey-7,1.5,0,Math.PI*2); ctx.fill();
      }

      // ── Head ──────────────────────────────────────────────────
      const hx=shX+hTilt*5, hy=shY-12+bob;
      // Neck
      ctx.strokeStyle='#b8cce0'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(shX,shY-1); ctx.lineTo(hx,hy+7.5); ctx.stroke();
      // Skull
      ctx.fillStyle='#c8d8e8';
      ctx.beginPath(); ctx.arc(hx,hy,7.5,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#9ab0c4'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(hx,hy,7.5,0,Math.PI*2); ctx.stroke();
      // Hair
      ctx.strokeStyle='#5e70a8'; ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.arc(hx,hy,7.5,Math.PI*1.07,Math.PI*1.93); ctx.stroke();
      // Eyes
      ctx.fillStyle='#080c18';
      ctx.beginPath(); ctx.arc(hx+fac*2.5,hy-1.5,1.3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(hx+fac*0.3,hy-1.5,1.3,0,Math.PI*2); ctx.fill();
      // Eye glints
      ctx.fillStyle='rgba(255,255,255,0.62)';
      ctx.beginPath(); ctx.arc(hx+fac*2.9,hy-2.1,0.55,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(hx+fac*0.7,hy-2.1,0.55,0,Math.PI*2); ctx.fill();
      // Mouth (phone call only)
      if (mouth>0.05) {
        ctx.strokeStyle='#080c18'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.arc(hx+fac*1.2,hy+2.8,2.4*mouth,0.1,Math.PI-0.1); ctx.stroke();
      }

      // ── Anim-picker selection arrow ───────────────────────────
      if (animPicker.open && animPicker.desk === si) {
        const arrowX = stX + (stX + hx - stX) * 0; // above head
        const arrowTip = hy - 18 + Math.sin(frame * 0.12) * 3; // gentle bob
        ctx.fillStyle = 'rgba(100,230,180,0.92)';
        ctx.beginPath();
        ctx.moveTo(stX,       arrowTip);
        ctx.lineTo(stX - 6,   arrowTip - 10);
        ctx.lineTo(stX + 6,   arrowTip - 10);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = 'rgba(60,200,150,0.70)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(stX, arrowTip);
        ctx.lineTo(stX - 6, arrowTip - 10);
        ctx.lineTo(stX + 6, arrowTip - 10);
        ctx.closePath();
        ctx.stroke();
      }

      // ── ZZZ sleep bubbles ─────────────────────────────────────
      if (act==='sleep' || act==='nodoff' || act==='wakeup') {
        const sleepAlpha = act==='sleep' ? 1
                         : act==='nodoff' ? Math.min(1,(sT%15000-7000)/240)
                         : Math.max(0,1-(sT%15000-14400)/100);
        if (sleepAlpha > 0.05) {
          const zx = stX + fac*18, zy = stY - 38;
          const sizes = [5, 7, 9];
          for (let zi=0; zi<3; zi++) {
            // Each Z rises and fades on a staggered offset
            const zPhase = ((sT*0.018 + zi*0.55) % 1);  // 0→1 loop
            const zOff   = zPhase * 22;                   // float upward
            const zFade  = sleepAlpha * Math.min(1, Math.sin(zPhase * Math.PI)) * 0.85;
            const sz     = sizes[zi];
            ctx.globalAlpha = zFade;
            ctx.fillStyle   = '#aaccff';
            ctx.font        = `bold ${sz}px Courier New`;
            ctx.textAlign   = 'center';
            ctx.fillText('Z', zx + zi*6*fac, zy - zOff - zi*8);
          }
          ctx.globalAlpha = 1;
          ctx.textAlign   = 'left';
        }
      }

      // ── Phone-ringing notification icon ───────────────────────
      if (act==='ring') {
        const rb=Math.sin(sT*2.0)*2.8;
        const rix=stX+fac*24, riy=stY-36+rb;
        // Green pill
        ctx.fillStyle=`rgba(30,195,75,${0.78+Math.sin(sT*2.0)*0.18})`;
        ctx.fillRect(rix-6,riy-7,12,14);
        // Phone icon (simple drawn handset)
        ctx.strokeStyle='#fff'; ctx.lineWidth=1.2;
        ctx.beginPath();
        ctx.moveTo(rix-3,riy+3); ctx.quadraticCurveTo(rix-3,riy-4,rix,riy-5);
        ctx.quadraticCurveTo(rix+3,riy-4,rix+3,riy+3); ctx.stroke();
        // Vibration arcs
        ctx.strokeStyle=`rgba(40,200,80,${0.40+Math.sin(sT*2.0)*0.28})`;
        ctx.lineWidth=1;
        for (let ra=1;ra<=2;ra++) {
          ctx.beginPath(); ctx.arc(rix,riy,7+ra*6+Math.sin(sT*2.0)*1.5,-0.75,0.75); ctx.stroke();
        }
      }
    }

  }

  // ── Coffee mug on one desk ───────────────────────────────
  ctx.fillStyle = '#332211';
  ctx.fillRect(deskDefs[2].x + 66, IH - 122, 9, 11);
  ctx.fillStyle = '#221100';
  ctx.fillRect(deskDefs[2].x + 68, IH - 121, 5, 2); // coffee
  ctx.strokeStyle = '#443322'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(deskDefs[2].x + 78, IH - 118, 4, -0.8, 0.8); ctx.stroke(); // handle

  // ── Filing cabinet ────────────────────────────────────────
  ctx.fillStyle = '#1a1d26';
  ctx.fillRect(IW - 60, IH - 150, 44, 70);
  ctx.strokeStyle = '#22263a'; ctx.lineWidth = 1;
  ctx.strokeRect(IW - 60, IH - 150, 44, 70);
  // Drawers
  for (let dr = 0; dr < 3; dr++) {
    ctx.fillStyle = '#161822';
    ctx.fillRect(IW - 56, IH - 144 + dr*22, 36, 18);
    ctx.strokeStyle = '#1e2230'; ctx.lineWidth = 1;
    ctx.strokeRect(IW - 56, IH - 144 + dr*22, 36, 18);
    // Drawer handle
    ctx.fillStyle = '#3a3e50';
    ctx.fillRect(IW - 44, IH - 137 + dr*22, 12, 4);
  }

  // ── Server rack ───────────────────────────────────────────
  ctx.fillStyle = '#101318';
  ctx.fillRect(14, IH - 200, 38, 120);
  ctx.strokeStyle = '#1a1e28'; ctx.lineWidth = 1.5;
  ctx.strokeRect(14, IH - 200, 38, 120);
  // Server units
  for (let srv = 0; srv < 8; srv++) {
    ctx.fillStyle = srv % 3 === 0 ? '#0e1520' : '#131820';
    ctx.fillRect(16, IH - 196 + srv*14, 34, 12);
    ctx.strokeStyle = '#222840'; ctx.lineWidth = 0.8;
    ctx.strokeRect(16, IH - 196 + srv*14, 34, 12);
    // Status light per server
    const srvLit = (frame + srv * 23) % 60 > 10;
    ctx.fillStyle = srvLit ? '#22ff88' : '#0a2018';
    ctx.beginPath(); ctx.arc(44, IH - 190 + srv*14, 2.5, 0, Math.PI*2); ctx.fill();
    // Activity blink
    if ((frame + srv*11) % 30 < 6) {
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath(); ctx.arc(38, IH - 190 + srv*14, 2, 0, Math.PI*2); ctx.fill();
    }
  }
  // Rack label
  ctx.fillStyle = '#445566'; ctx.font = '6px Courier New'; ctx.textAlign = 'center';
  ctx.fillText('SRV', 33, IH - 86);

  // ── Large screen / projector display on back wall ────────
  const mainScrX = 220, mainScrY = 60, mainScrW = 360, mainScrH = 200;
  ctx.fillStyle = '#0a0c14';
  ctx.fillRect(mainScrX - 6, mainScrY - 6, mainScrW + 12, mainScrH + 12);
  ctx.strokeStyle = '#2a2e3c'; ctx.lineWidth = 2;
  ctx.strokeRect(mainScrX - 6, mainScrY - 6, mainScrW + 12, mainScrH + 12);
  ctx.fillStyle = '#030608';
  ctx.fillRect(mainScrX, mainScrY, mainScrW, mainScrH);

  // World map wireframe on main screen
  ctx.strokeStyle = 'rgba(40,120,200,0.4)'; ctx.lineWidth = 0.8;
  // Grid lines
  for (let ml = 0; ml < 8; ml++) {
    ctx.beginPath(); ctx.moveTo(mainScrX, mainScrY + ml*(mainScrH/7)); ctx.lineTo(mainScrX+mainScrW, mainScrY+ml*(mainScrH/7)); ctx.stroke();
  }
  for (let ml2 = 0; ml2 < 12; ml2++) {
    ctx.beginPath(); ctx.moveTo(mainScrX+ml2*(mainScrW/11), mainScrY); ctx.lineTo(mainScrX+ml2*(mainScrW/11), mainScrY+mainScrH); ctx.stroke();
  }
  // Continent blobs (rough shapes)
  ctx.strokeStyle = 'rgba(60,160,255,0.6)'; ctx.lineWidth = 1.5;
  const continents = [
    [60,60, 80,50, 110,55, 130,80, 100,100, 70,90],
    [150,40, 190,38, 210,60, 200,90, 170,95, 148,70],
    [230,80, 260,70, 280,90, 270,120, 240,118],
    [60,130, 100,120, 120,140, 105,165, 70,160],
    [300,50, 340,44, 355,80, 330,100, 300,88],
  ];
  for (const cont of continents) {
    ctx.beginPath();
    for (let ci3 = 0; ci3 < cont.length; ci3 += 2) {
      const px4 = mainScrX + 4 + cont[ci3] * (mainScrW-8) / 360;
      const py4 = mainScrY + 4 + cont[ci3+1] * (mainScrH-8) / 180;
      ci3 === 0 ? ctx.moveTo(px4, py4) : ctx.lineTo(px4, py4);
    }
    ctx.closePath(); ctx.stroke();
  }
  // Player position blip on map
  const mapPlayerX = mainScrX + 4 + (maxReach / 120000) * (mainScrW - 8);
  const mapPlayerY = mainScrY + mainScrH / 2;
  ctx.fillStyle = `rgba(255,80,80,${0.7 + Math.sin(frame*0.12)*0.3})`;
  ctx.beginPath(); ctx.arc(Math.min(mainScrX + mainScrW - 10, mapPlayerX), mapPlayerY, 4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,80,80,0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(Math.min(mainScrX + mainScrW - 10, mapPlayerX), mapPlayerY, 9, 0, Math.PI*2); ctx.stroke();
  // Storm indicator
  const isVoidNow = wind.force < -2.60;
  ctx.fillStyle = isVoidNow ? 'rgba(80,120,255,0.5)' : 'rgba(80,180,255,0.2)';
  ctx.beginPath();
  ctx.arc(Math.min(mainScrX + mainScrW - 10, mapPlayerX), mapPlayerY, 30 + Math.sin(frame*0.06)*5, 0, Math.PI*2);
  ctx.fill();
  // Screen label
  ctx.fillStyle = 'rgba(80,160,255,0.8)'; ctx.font = 'bold 8px Courier New'; ctx.textAlign = 'center';
  ctx.fillText('GLOBAL STORM TRACKING SYSTEM  —  LIVE', mainScrX + mainScrW/2, mainScrY + mainScrH - 6);
  // Screen corner labels
  ctx.fillStyle = 'rgba(60,140,220,0.7)'; ctx.font = '7px Courier New'; ctx.textAlign = 'left';
  ctx.fillText('A.R.S.-7 STATION', mainScrX + 4, mainScrY + 12);
  ctx.textAlign = 'right';
  ctx.fillText('TIER: ' + getWindTier() + '  |  ' + Math.floor(maxReach/12) + 'm', mainScrX + mainScrW - 4, mainScrY + 12);
  ctx.textAlign = 'left';

  // ── Player stickman inside ───────────────────────────────
  // Position mirrors the actual player world position mapped into interior screen space
  const hcx2 = player.inHouse.x + player.inHouse.w / 2;
  const psx = IW / 2 + (player.x + player.w / 2 - hcx2);
  const psy = IH - 72;
  const pMoving = Math.abs(player.vx) > 0.3;
  const pPhase  = pMoving ? (player.walkF / 6) * Math.PI * 2 : 0;
  const pf = player.facing;
  const sc2 = '#d8eeff';
  ctx.save();
  ctx.translate(psx, psy);
  if (pf < 0) ctx.scale(-1, 1);
  ctx.strokeStyle = sc2; ctx.fillStyle = sc2;
  ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  // Legs
  const lSwing = pMoving ? Math.sin(pPhase) * 0.45 : 0.04;
  ctx.beginPath(); ctx.moveTo(0, -4); ctx.lineTo(Math.sin(lSwing)*8-3, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -4); ctx.lineTo(Math.sin(lSwing+Math.PI)*8+3, 0); ctx.stroke();
  // Body
  ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(0, -4); ctx.stroke();
  // Arms
  const aSwing = pMoving ? Math.sin(pPhase + Math.PI) * 0.35 : -0.15;
  ctx.beginPath(); ctx.moveTo(0, -14); ctx.lineTo(Math.sin(aSwing)*9-7, -9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -14); ctx.lineTo(Math.sin(aSwing+Math.PI)*9+7, -9); ctx.stroke();
  // Torus head
  ctx.fillStyle = sc2;
  ctx.beginPath();
  ctx.arc(0, -26, 8, 0, Math.PI*2, false);
  ctx.arc(0, -26, 5, 0, Math.PI*2, true);
  ctx.fill('evenodd');
  ctx.strokeStyle = sc2; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.arc(0, -26, 8, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, -26, 5, 0, Math.PI*2); ctx.stroke();
  ctx.restore();

  // ── Top-left corner HUD-like panel ──────────────────────
  ctx.fillStyle = 'rgba(10,20,40,0.85)';
  rrect(10, 42, 170, 90, 4); ctx.fill();
  ctx.strokeStyle = '#1a3a5a'; ctx.lineWidth = 1;
  rrect(10, 42, 170, 90, 4); ctx.stroke();
  ctx.fillStyle = '#55aacc'; ctx.font = 'bold 8px Courier New'; ctx.textAlign = 'left';
  ctx.fillText('STATION STATUS', 18, 56);
  // Stats
  const statLines = [
    ['TEMPERATURE', (-38 + Math.sin(frame*0.02)*3).toFixed(1) + ' °C'],
    ['WIND TIER',    'T' + getWindTier() + (getWindTier()===7?' — VOID':'')],
    ['WIND FORCE',  wind.force.toFixed(2) + ' u/s'],
    ['DISTANCE',    Math.floor(maxReach/12) + ' m'],
    ['COLD STATUS', '0%  ✓ WARM'],
    ['POWER',       '98.4 %'],
  ];
  for (let li = 0; li < statLines.length; li++) {
    const [label, val] = statLines[li];
    ctx.fillStyle = 'rgba(100,160,200,0.8)'; ctx.font = '7px Courier New';
    ctx.fillText(label, 18, 68 + li * 11);
    ctx.fillStyle = li === 4 ? '#44ff88' : '#aaddff';
    ctx.textAlign = 'right';
    ctx.fillText(val, 174, 68 + li * 11);
    ctx.textAlign = 'left';
  }
}

// ── Draw: Research Base Interior ─────────────────────────
// ── Anim Picker overlay (drawn on top of research interior) ──
function drawAnimPicker() {
  const pw = 240, ph = 36 + ANIM_LIST.length * 18 + 32;
  const px = (W - pw) / 2, py = H / 2 - ph / 2;

  // Panel background
  ctx.fillStyle = 'rgba(4,10,22,0.92)';
  rrect(px, py, pw, ph, 6); ctx.fill();
  ctx.strokeStyle = 'rgba(100,220,180,0.35)'; ctx.lineWidth = 1.5;
  rrect(px, py, pw, ph, 6); ctx.stroke();

  // Title bar
  ctx.fillStyle = 'rgba(20,60,50,0.80)';
  rrect(px, py, pw, 22, 6); ctx.fill();
  ctx.fillStyle = 'rgba(100,230,180,0.90)'; ctx.font = 'bold 9px Courier New'; ctx.textAlign = 'center';
  ctx.fillText('🎬  ANIMATION TEST', px + pw / 2, py + 14);

  // Desk selector row
  const deskNames = ['DESK 1','DESK 2','DESK 3','DESK 4','DESK 5'];
  const cellW = pw / 5;
  for (let d = 0; d < 5; d++) {
    const cx = px + d * cellW + cellW / 2;
    const cy = py + 33;
    const sel = d === animPicker.desk;
    ctx.fillStyle = sel ? 'rgba(80,200,160,0.28)' : 'rgba(255,255,255,0.04)';
    rrect(px + d * cellW + 2, py + 24, cellW - 4, 18, 3); ctx.fill();
    if (sel) {
      ctx.strokeStyle = 'rgba(100,230,180,0.60)'; ctx.lineWidth = 1;
      rrect(px + d * cellW + 2, py + 24, cellW - 4, 18, 3); ctx.stroke();
    }
    ctx.fillStyle = sel ? 'rgba(140,255,200,0.95)' : 'rgba(120,160,150,0.65)';
    ctx.font = sel ? 'bold 7px Courier New' : '7px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(deskNames[d], cx, cy);
    // forced-anim indicator dot
    if (animPicker.forced[d]) {
      ctx.fillStyle = 'rgba(100,255,180,0.80)';
      ctx.beginPath(); ctx.arc(cx, cy + 6, 2.5, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Separator
  ctx.strokeStyle = 'rgba(100,220,180,0.18)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px + 8, py + 44); ctx.lineTo(px + pw - 8, py + 44); ctx.stroke();

  // Animation list
  for (let ai = 0; ai < ANIM_LIST.length; ai++) {
    const ly = py + 52 + ai * 18;
    const sel = ai === animPicker.anim;
    if (sel) {
      ctx.fillStyle = 'rgba(80,200,160,0.22)';
      rrect(px + 6, ly - 11, pw - 12, 16, 3); ctx.fill();
      ctx.strokeStyle = 'rgba(100,230,180,0.45)'; ctx.lineWidth = 1;
      rrect(px + 6, ly - 11, pw - 12, 16, 3); ctx.stroke();
    }
    // Arrow cursor
    ctx.fillStyle = sel ? 'rgba(120,255,200,0.95)' : 'rgba(80,120,110,0.50)';
    ctx.font = sel ? 'bold 9px Courier New' : '9px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(sel ? '▶' : ' ', px + 12, ly);
    ctx.font = sel ? 'bold 9px Courier New' : '9px Courier New';
    ctx.fillText(ANIM_LABELS[ai], px + 26, ly);
    // Show if currently forced on selected desk
    if (animPicker.forced[animPicker.desk] === ANIM_LIST[ai]) {
      ctx.fillStyle = 'rgba(100,255,180,0.70)';
      ctx.font = '7px Courier New'; ctx.textAlign = 'right';
      ctx.fillText('● ACTIVE', px + pw - 10, ly);
    }
  }

  // Footer hints
  const fy = py + ph - 14;
  ctx.fillStyle = 'rgba(80,140,120,0.60)'; ctx.font = '7px Courier New'; ctx.textAlign = 'center';
  ctx.fillText('← → desk   ↑ ↓ anim   ENTER apply   C clear   ESC close', px + pw / 2, fy);

  ctx.textAlign = 'left';
}

function drawResearchInterior() {
  const IW = W, IH = H;
  const isVoidNow = wind.force < -2.60;
  const f = frame;

  // Per-base color seed — each research base (unique x) gets its own palette offsets
  const _baseSeed = player.inHouse ? Math.abs(Math.round(player.inHouse.x / 10)) : 0;

  // ── helper: animated seated researcher ──────────────────
  function researcher(rx, ry, fac, sd, bobOffset, variant, deskIndex) {
    const sT   = f + deskIndex * 173;
    const bob  = Math.sin(sT * 0.038) * 0.7;
    const cyc  = sT % 720;
    const type = variant % 4;

    // Activity state machine (same logic as before)
    let act;
    if (animPicker.forced[deskIndex]) {
      act = animPicker.forced[deskIndex];
    } else if (deskIndex === 2) {
      act = cyc<150?'type':cyc<250?'ring':cyc<490?'talk':cyc<548?'hangup':'type';
    } else if (deskIndex === 3) {
      act = cyc<480?'type':cyc<594?'stretch':'type';
    } else if (deskIndex === 1) {
      act = cyc<360?'type':cyc<540?'write':'read';
    } else if (deskIndex === 0) {
      const sc2 = sT % 15000;
      act = sc2<7000?(cyc<560?'type':'read'):sc2<7240?'nodoff':sc2<14400?'sleep':'wakeup';
    } else if (deskIndex === 4) {
      act = cyc<400?'type':cyc<560?'write':'read';
    } else if (deskIndex === 5) {
      act = cyc<200?'type':cyc<340?'ring':cyc<540?'talk':cyc<610?'hangup':'type';
    } else if (deskIndex === 6) {
      act = cyc<460?'type':cyc<580?'stretch':'read';
    } else if (deskIndex === 7) {
      const sc2 = sT % 12000;
      act = sc2<5500?(cyc<520?'type':'read'):sc2<5700?'nodoff':sc2<11200?'sleep':'wakeup';
    } else {
      act = cyc<560?'type':cyc<692?'read':'type';
    }

    // ── Draw with local coordinates: origin = (rx, ry), y<0 = upward ──
    // All researchers face LEFT (toward keyboard at local x≈-13).
    // fac only affects chair-back side (cosmetic), not body direction.
    const RESEARCHER_COLORS = ['#e87060','#60c8e8','#70e898','#e8c840','#c078e8','#e8884a','#60e8d0','#e860a8','#f0f060','#80e860','#e860d0','#40d0f8','#f8a030','#a0f040','#f06090','#50f0c0','#d0a0f8','#f8d060','#60a8f8','#f87840'];
    const SCARF_COLORS = ['#ff4444','#ff9900','#ffdd00','#44dd44','#4499ff','#cc44ff','#ff44aa','#44ffee','#ff6622','#aaffaa','#ffaaff','#22ccff'];
    const hasScarf = true;
    const scarfColor = SCARF_COLORS[(deskIndex * 5 + variant * 11 + _baseSeed) % SCARF_COLORS.length];
    const sc = RESEARCHER_COLORS[(deskIndex + _baseSeed) % RESEARCHER_COLORS.length];
    ctx.save();
    ctx.translate(rx, ry + 7);
    ctx.strokeStyle = sc; ctx.fillStyle = sc;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';

    // Local Y landmarks (negative = above floor):
    //   floor = 0,  foot = -5,  knee = -28,  hip = -28,
    //   kbd surface = -34,  shoulder = -52,  head = -64
    // Thighs are HORIZONTAL (knee at same Y as hip = seated pose).
    // Keyboard is at local x≈-13 (always to the left for a left-facing pose).

    const HIP = -22 + bob;   // hip Y (on chair seat)
    const SHO = -40 + bob;   // shoulder Y
    const KBDY = -28;         // keyboard surface Y
    const KBDX = -12;         // keyboard centre X (global: rx-12 ≈ dx+34, on keyboard)

    // Pose-specific overrides
    let lhx = KBDX-3, lhy = KBDY;  // left hand
    let rhx = KBDX+3, rhy = KBDY;  // right hand
    let headTiltX = -3;             // head leans left (toward screen on left)
    let headDroop = 0;              // extra Y for sleep
    let mouth = 0, showPhone = false, showPad = false;

    if (act==='type') {
      lhy = KBDY - Math.max(0, Math.sin(sT*0.42))   * 3;
      rhy = KBDY - Math.max(0, Math.sin(sT*0.42+Math.PI)) * 3;
      if ((sT%180)<16) headTiltX -= 2;  // glance at screen
    } else if (act==='read') {
      lhx=KBDX-5; rhx=KBDX+5;
      rhy = KBDY - Math.abs(Math.sin(sT*0.10))*2;
      headTiltX = -2;
    } else if (act==='ring') {
      headTiltX = -2;
    } else if (act==='talk') {
      rhx=-6; rhy=SHO-6+Math.sin(sT*0.19)*1.5;  // right hand up to ear
      lhx=KBDX; lhy=KBDY+Math.sin(sT*0.19)*1.5;
      headTiltX=-6; mouth=Math.max(0,Math.sin(sT*0.33)); showPhone=true;
    } else if (act==='hangup') {
      const ht=Math.min(1,Math.max(0,(cyc-490)/58));
      rhx=-6+(KBDX+3-(-6))*ht; rhy=(SHO-6)+(KBDY-(SHO-6))*ht;
      lhx=KBDX; lhy=KBDY;
      headTiltX=-6*(1-ht)-3*ht; showPhone=ht<0.65;
    } else if (act==='stretch') {
      const sw=Math.sin(Math.max(0,(cyc-480))/114*Math.PI);
      lhx=-10*sw; lhy=SHO-8*sw;
      rhx=10*sw;  rhy=SHO-8*sw;
      headTiltX=0; headDroop=-2*sw;
    } else if (act==='write') {
      lhx=KBDX-4; lhy=KBDY;
      // Small back-and-forth strokes across the page, with a periodic
      // "lift & shift to next line" pause instead of one continuous scribble.
      const wcyc = sT % 130;
      const lifting = wcyc > 104;
      const strokeT = lifting ? 0 : wcyc / 104;
      const strokeX = Math.sin(strokeT * Math.PI * 6) * 2.6;
      const strokeY = Math.abs(Math.sin(strokeT * Math.PI * 6)) * -0.6;
      rhx = lifting ? KBDX+9 : KBDX+3 + strokeX;
      rhy = (lifting ? KBDY-6 : KBDY-2.5 + strokeY);
      headTiltX = -4 + strokeX*0.3;
      headDroop = 5 - (lifting?1.5:0);
      showPad = true;
    } else if (act==='nodoff') {
      const nd=Math.min(1,Math.max(0,(sT%15000-7000)/240));
      lhx=KBDX-3; lhy=KBDY+nd*3;
      rhx=KBDX+3; rhy=KBDY+nd*3;
      headDroop=nd*12; headTiltX=-3*(1-nd);
    } else if (act==='sleep') {
      lhx=KBDX-5; lhy=KBDY+3; rhx=KBDX+5; rhy=KBDY+3;
      headDroop=12; headTiltX=0;
    } else if (act==='wakeup') {
      const wu=Math.min(1,Math.max(0,(sT%15000-14400)/600));
      lhx=KBDX-5; lhy=KBDY+3*(1-wu);
      rhx=KBDX+5; rhy=KBDY+3*(1-wu);
      headDroop=12*(1-wu);
      headTiltX=-wu*3;
    }

    // ── LEGS (side-view seated: thighs horizontal, shins down) ──
    if (act !== 'sleep') {
      ctx.lineWidth = 2.0;
      // Front thigh: hip → knee (horizontal left = toward desk)
      ctx.beginPath(); ctx.moveTo(0,HIP); ctx.lineTo(-12,HIP); ctx.stroke();
      // Front shin: knee → foot (straight down)
      ctx.lineWidth = 1.8;
      ctx.beginPath(); ctx.moveTo(-12,HIP); ctx.lineTo(-12,-3); ctx.stroke();
      // Front foot
      ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.moveTo(-12,-3); ctx.lineTo(-19,-3); ctx.stroke();
      // Back thigh (slightly offset right, partially behind front)
      ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.moveTo(0,HIP+1); ctx.lineTo(-8,HIP+1); ctx.stroke();
      ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.moveTo(-8,HIP+1); ctx.lineTo(-8,-3); ctx.stroke();
      ctx.lineWidth = 1.1;
      ctx.beginPath(); ctx.moveTo(-8,-3); ctx.lineTo(-14,-3); ctx.stroke();
    }

    // ── TORSO ──────────────────────────────────────────────
    ctx.strokeStyle = sc; ctx.lineWidth = 2.2;
    ctx.beginPath(); ctx.moveTo(0,HIP); ctx.lineTo(-3,SHO); ctx.stroke();

    // ── ARMS ───────────────────────────────────────────────
    ctx.lineWidth = 1.8;
    const shX = -3, shY = SHO;
    // Elbow midpoint curves slightly downward
    const lElbX=(shX+lhx)*0.5, lElbY=(shY+lhy)*0.5+4;
    const rElbX=(shX+rhx)*0.5, rElbY=(shY+rhy)*0.5+(act==='talk'?-4:4);
    ctx.beginPath(); ctx.moveTo(shX,shY); ctx.quadraticCurveTo(lElbX,lElbY,lhx,lhy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(shX,shY); ctx.quadraticCurveTo(rElbX,rElbY,rhx,rhy); ctx.stroke();

    // Key-tap glow
    if (act==='type') {
      if (lhy<KBDY-0.5){ctx.fillStyle='rgba(60,150,255,0.20)';ctx.beginPath();ctx.arc(lhx,KBDY,4,0,Math.PI*2);ctx.fill();}
      if (rhy<KBDY-0.5){ctx.fillStyle='rgba(60,150,255,0.20)';ctx.beginPath();ctx.arc(rhx,KBDY,4,0,Math.PI*2);ctx.fill();}
      ctx.strokeStyle=sc;ctx.fillStyle=sc;
    }

    // Phone handset
    if (showPhone) {
      ctx.save(); ctx.translate(rhx,rhy); ctx.rotate(-0.5);
      ctx.fillStyle='#252538'; ctx.fillRect(-2,-9,4,14);
      ctx.fillStyle='#353555'; ctx.fillRect(-1,-8,2,3); ctx.fillRect(-1,3,2,3);
      ctx.restore(); ctx.strokeStyle=sc;
    }

    // Notepad
    if (showPad) {
      ctx.fillStyle='#e8dfc0'; ctx.fillRect(KBDX+8,KBDY-4,12,9);
      ctx.strokeStyle='#b8a870'; ctx.lineWidth=0.6; ctx.strokeRect(KBDX+8,KBDY-4,12,9);
      ctx.strokeStyle='#9a9060';
      for(let nl=0;nl<3;nl++){ctx.beginPath();ctx.moveTo(KBDX+10,KBDY-2+nl*2.8);ctx.lineTo(KBDX+18,KBDY-2+nl*2.8);ctx.stroke();}

      if (act==='write') {
        // Ink already written: full lines fill up before the current one,
        // cycling every ~3 lines so the page keeps looking "in progress".
        const wcyc = sT % 130;
        const lifting = wcyc > 104;
        const lineIdx = Math.floor(sT/130) % 3;
        const lineProg = lifting ? 1 : Math.min(1, wcyc/104);
        ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=0.7; ctx.lineCap='round';
        for (let li=0; li<lineIdx; li++) {
          const ly=KBDY-2.6+li*2.8;
          ctx.beginPath();
          for (let s=0;s<=8;s++){ const px=KBDX+10+s; const py=ly+Math.sin(s*1.7+li)*0.35; s===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
          ctx.stroke();
        }
        // Current line, drawn segment by segment as the pen progresses.
        const ly=KBDY-2.6+lineIdx*2.8;
        const segs=Math.round(lineProg*8);
        if (segs>0) {
          ctx.beginPath();
          for (let s=0;s<=segs;s++){ const px=KBDX+10+s; const py=ly+Math.sin(s*1.7+lineIdx)*0.35; s===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
          ctx.stroke();
        }
      }

      ctx.strokeStyle='#282828';ctx.lineWidth=1.4;
      ctx.beginPath();ctx.moveTo(rhx,rhy);ctx.lineTo(rhx+6,rhy-5);ctx.stroke();
      ctx.fillStyle='#cc1111';ctx.beginPath();ctx.arc(rhx+6,rhy-5,1.2,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=sc;
    }

    // ── HEAD ───────────────────────────────────────────────
    const hx = shX+headTiltX, hy = shY-9+headDroop;
    ctx.strokeStyle=sc; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.moveTo(shX,shY); ctx.lineTo(hx,hy+5); ctx.stroke(); // neck

    // ── SCARF ──────────────────────────────────────────────
    if (hasScarf) {
      const neckMidX = (shX+hx)*0.5, neckMidY = (shY + hy+5)*0.5;
      ctx.fillStyle = scarfColor;
      // Main wrap: small filled ellipse around neck
      ctx.beginPath();
      ctx.ellipse(neckMidX, neckMidY, 4.5, 2.5, -0.3, 0, Math.PI*2);
      ctx.fill();
      // Left tail hanging down-left
      ctx.beginPath();
      ctx.moveTo(neckMidX-2, neckMidY+1);
      ctx.lineTo(neckMidX-5, neckMidY+7);
      ctx.lineTo(neckMidX-2, neckMidY+8);
      ctx.lineTo(neckMidX+1, neckMidY+3);
      ctx.closePath(); ctx.fill();
      // Right tail (shorter, tucked)
      ctx.fillStyle = scarfColor + 'cc';
      ctx.beginPath();
      ctx.moveTo(neckMidX+1, neckMidY+1);
      ctx.lineTo(neckMidX+4, neckMidY+5);
      ctx.lineTo(neckMidX+2, neckMidY+6);
      ctx.lineTo(neckMidX-1, neckMidY+2);
      ctx.closePath(); ctx.fill();
      // Highlight stripe on wrap
      ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.ellipse(neckMidX-0.5, neckMidY-0.5, 3, 1.5, -0.3, Math.PI*1.1, Math.PI*1.9);
      ctx.stroke();
      ctx.strokeStyle = sc;
    }
    ctx.fillStyle=sc;
    ctx.beginPath();
    ctx.arc(hx,hy,5,0,Math.PI*2,false);
    ctx.arc(hx,hy,3,0,Math.PI*2,true);
    ctx.fill('evenodd');
    ctx.strokeStyle=sc; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.arc(hx,hy,5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(hx,hy,3,0,Math.PI*2); ctx.stroke();

    // Accessories
    if (type===1) {  // beanie
      const CAP_COLORS = ['#3355aa','#aa3333','#33aa55','#aa8833','#8833aa','#33aaaa','#aa3388','#556633','#334488','#aa5533'];
      const capColor = CAP_COLORS[(deskIndex * 13 + variant * 7 + _baseSeed) % CAP_COLORS.length];
      // Dome
      ctx.fillStyle=capColor;
      ctx.beginPath(); ctx.arc(hx,hy-1,5,Math.PI,0); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=0.6;
      ctx.beginPath(); ctx.arc(hx,hy-1,5,Math.PI,0); ctx.stroke();
      // Knit rib lines running up the dome
      ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=0.5;
      for (let ki=-1; ki<=1; ki++) {
        ctx.beginPath();
        ctx.moveTo(hx+ki*2.4, hy-3);
        ctx.quadraticCurveTo(hx+ki*3.2, hy-4.3, hx+ki*1.6, hy-5.6);
        ctx.stroke();
      }
      // Folded brim (slightly darker band)
      ctx.fillStyle='rgba(0,0,0,0.22)';
      ctx.fillRect(hx-5,hy-3,10,2.5);
      ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=0.5;
      ctx.beginPath(); ctx.moveTo(hx-5,hy-3); ctx.lineTo(hx+5,hy-3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(hx-5,hy-0.6); ctx.lineTo(hx+5,hy-0.6); ctx.stroke();
      // Top pompom
      ctx.fillStyle='#f0f0f0';
      ctx.beginPath(); ctx.arc(hx,hy-6,1.4,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.4;
      ctx.beginPath(); ctx.arc(hx,hy-6,1.4,0,Math.PI*2); ctx.stroke();
    }

    // Mouth
    if (mouth>0.05) {
      ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=0.9;
      ctx.beginPath(); ctx.arc(hx-1,hy+2,2*mouth,0.1,Math.PI-0.1); ctx.stroke();
    }

    // ZZZ bubbles
    if (act==='sleep'||act==='nodoff'||act==='wakeup') {
      const sa=act==='sleep'?1:act==='nodoff'?Math.min(1,(sT%15000-7000)/240):Math.max(0,1-(sT%15000-14400)/100);
      if (sa>0.05) {
        for(let zi=0;zi<3;zi++) {
          const zPh=((sT*0.015+zi*0.55)%1);
          ctx.globalAlpha=sa*Math.min(1,Math.sin(zPh*Math.PI))*0.85;
          ctx.fillStyle='#aaccff'; ctx.font=`bold ${5+zi*2}px Courier New`; ctx.textAlign='center';
          ctx.fillText('Z',hx+12+zi*5,hy-10-zi*8-zPh*16);
        }
        ctx.globalAlpha=1; ctx.textAlign='left';
      }
    }

    // Picker arrow
    if (animPicker.open && animPicker.desk===deskIndex) {
      const at=hy-18+Math.sin(f*0.12)*3;
      ctx.fillStyle='rgba(100,230,180,0.92)';
      ctx.beginPath(); ctx.moveTo(0,at); ctx.lineTo(-6,at-10); ctx.lineTo(6,at-10); ctx.closePath(); ctx.fill();
    }

    ctx.restore();

    // Phone ring icon (global coords) — rotates side to side to simulate vibration
    if (act==='ring') {
      const rix=rx+22, riy=ry-60;
      const angle=Math.sin(sT*2.8)*0.35;
      ctx.save();
      ctx.translate(rix, riy);
      ctx.rotate(angle);
      ctx.fillStyle=`rgba(30,195,75,${0.78+Math.sin(sT*2.8)*0.18})`;
      ctx.fillRect(-6,-7,12,14);
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(-3,3); ctx.quadraticCurveTo(-3,-4,0,-5); ctx.quadraticCurveTo(3,-4,3,3); ctx.stroke();
      ctx.strokeStyle=`rgba(40,200,80,${0.40+Math.sin(sT*2.8)*0.28})`; ctx.lineWidth=1;
      for(let ra=1;ra<=2;ra++){ctx.beginPath();ctx.arc(0,0,7+ra*6,-0.75,0.75);ctx.stroke();}
      ctx.restore();
    }
  }

  // ── BACKGROUND: deep room ───────────────────────────────
  // sky-blue tint ceiling gradient
  const bgGrd = ctx.createLinearGradient(0, 0, 0, IH);
  bgGrd.addColorStop(0,   '#080c16');
  bgGrd.addColorStop(0.3, '#0b1020');
  bgGrd.addColorStop(1,   '#0e1318');
  ctx.fillStyle = bgGrd; ctx.fillRect(0,0,IW,IH);

  // ── BACK-WALL WINDOW showing outdoor storm ──────────────
  {
    const winCount = 3;
    const winW = 110, winH = 90;
    const winY  = 58;
    const winGap = (IW - 90 - 88 - winCount * winW) / (winCount + 1);
    const isVoidNow2 = wind.force < -2.60;
    const isHyper2   = wind.force < -1.20;

    for (let wi = 0; wi < winCount; wi++) {
      const wx = 90 + winGap + wi * (winW + winGap);

      // Window frame (thick dark border with inset bevel)
      ctx.fillStyle = '#0c0e18';
      ctx.fillRect(wx - 5, winY - 5, winW + 10, winH + 10);
      ctx.fillStyle = '#181c2c';
      ctx.fillRect(wx - 3, winY - 3, winW + 6, winH + 6);

      // Clip to window glass
      ctx.save();
      ctx.beginPath();
      ctx.rect(wx, winY, winW, winH);
      ctx.clip();

      // Sky gradient (matches outdoor sky tone for current storm tier)
      const skyGrd = ctx.createLinearGradient(wx, winY, wx, winY + winH);
      if (isVoidNow2) {
        skyGrd.addColorStop(0, '#04020a'); skyGrd.addColorStop(1, '#100820');
      } else if (isHyper2) {
        skyGrd.addColorStop(0, '#0d0418'); skyGrd.addColorStop(1, '#1a0830');
      } else {
        skyGrd.addColorStop(0, '#0a1020'); skyGrd.addColorStop(1, '#1a2848');
      }
      ctx.fillStyle = skyGrd; ctx.fillRect(wx, winY, winW, winH);

      // Distant ground strip
      ctx.fillStyle = isVoidNow2 ? '#06040c' : isHyper2 ? '#0c0618' : '#0e1424';
      ctx.fillRect(wx, winY + winH * 0.72, winW, winH * 0.28);
      ctx.fillStyle = isVoidNow2 ? '#080610' : '#101828';
      ctx.fillRect(wx, winY + winH * 0.76, winW, winH * 0.24);

      // Snow / debris particles streaking past
      ctx.fillStyle = isVoidNow2 ? 'rgba(180,100,255,0.55)' : 'rgba(200,220,255,0.45)';
      for (let pi = 0; pi < 18; pi++) {
        const px = wx + ((pi * 61 + f * (3 + pi % 3)) % winW);
        const py = winY + (pi * 43 + f * (1.5 + pi % 5) * 0.7) % winH;
        const ps = 0.5 + (pi % 3) * 0.5;
        ctx.beginPath(); ctx.ellipse(px, py, ps * 3, ps, 0, 0, Math.PI * 2); ctx.fill();
      }

      // Tornado / storm vortex (if active)
      if (tornado && tornado.alpha > 0.05) {
        const tScale2 = tornado.scale || 1;
        const isVoidT = tScale2 > 3.0, isHyperT = tScale2 > 1.2;
        // Map tornado world-x into window space
        const tWorldX = tornado.x - cam.x;
        const tSceneW = W;
        const tWinX   = wx + (tWorldX / tSceneW) * winW;
        const tWinBaseY = winY + winH * 0.76;
        const tH = winH * 0.68 * tScale2, tW = winW * 0.22 * tScale2;
        const ang2 = tornado.angle;
        const ta   = Math.min(tornado.alpha, 1) * 0.85;

        // Halo
        ctx.globalAlpha = ta * 0.3;
        const hg = ctx.createRadialGradient(tWinX, tWinBaseY - tH * 0.4, 0, tWinX, tWinBaseY - tH * 0.4, tW * 2.5);
        hg.addColorStop(0, isVoidT ? 'rgba(80,0,120,0.7)' : isHyperT ? 'rgba(60,10,100,0.5)' : 'rgba(30,50,90,0.5)');
        hg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = hg; ctx.fillRect(wx, winY, winW, winH);
        ctx.globalAlpha = 1;

        // Funnel bands
        for (let band = 0; band < 14; band++) {
          const t2 = band / 13;
          const bandY2 = tWinBaseY - tH * (1 - t2);
          const bandW2 = tW * (1 - t2) * 0.9 + 2;
          const twist2 = ang2 * 2 + t2 * Math.PI * 5;
          const sx2 = Math.sin(twist2) * bandW2 * 0.28;
          ctx.globalAlpha = ta * (0.15 + (1 - t2) * 0.5);
          ctx.strokeStyle = isVoidT
            ? `rgba(${(60 + t2*80)|0},${(0 + t2*20)|0},${(120 + t2*60)|0},0.9)`
            : isHyperT
              ? `rgba(${(30 + t2*40)|0},${(10 + t2*20)|0},${(60 + t2*40)|0},0.9)`
              : `rgba(${(50 + t2*60)|0},${(70 + t2*50)|0},${(100 + t2*40)|0},0.9)`;
          ctx.lineWidth = (1.5 + (1 - t2) * 2.5) * tScale2;
          ctx.beginPath();
          ctx.ellipse(tWinX + sx2, bandY2, bandW2, bandW2 * 0.15, 0, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        // Ground touchdown swirl
        ctx.globalAlpha = ta * 0.6;
        ctx.strokeStyle = isVoidT ? 'rgba(140,0,255,0.7)' : isHyperT ? 'rgba(80,20,160,0.6)' : 'rgba(60,80,140,0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.ellipse(tWinX, tWinBaseY, tW * 0.35, 4, 0, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 1;
      }

      // Window glare / reflections
      ctx.fillStyle = 'rgba(200,220,255,0.04)';
      ctx.beginPath();
      ctx.moveTo(wx, winY); ctx.lineTo(wx + winW * 0.4, winY);
      ctx.lineTo(wx + winW * 0.2, winY + winH * 0.6); ctx.lineTo(wx, winY + winH * 0.6);
      ctx.closePath(); ctx.fill();

      ctx.restore(); // end clip

      // Window cross-bars
      ctx.strokeStyle = '#181c2c'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(wx + winW / 2, winY); ctx.lineTo(wx + winW / 2, winY + winH); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(wx, winY + winH / 2); ctx.lineTo(wx + winW, winY + winH / 2); ctx.stroke();

      // Outer frame bevel highlight
      ctx.strokeStyle = '#22263a'; ctx.lineWidth = 1;
      ctx.strokeRect(wx - 3, winY - 3, winW + 6, winH + 6);
      ctx.strokeStyle = '#0a0c14'; ctx.lineWidth = 1;
      ctx.strokeRect(wx - 5, winY - 5, winW + 10, winH + 10);

      // Condensation frost on cold glass (subtle)
      ctx.fillStyle = 'rgba(160,190,220,0.06)';
      ctx.fillRect(wx, winY + winH - 12, winW, 12);
      ctx.strokeStyle = 'rgba(140,170,210,0.12)'; ctx.lineWidth = 0.5;
      for (let fr = 0; fr < 5; fr++) {
        const fy = winY + winH - 2 - fr * 2.2;
        ctx.beginPath(); ctx.moveTo(wx, fy); ctx.lineTo(wx + winW, fy); ctx.stroke();
      }
    }
  }

  // ── FLOOR ──────────────────────────────────────────────
  const floorY = IH - 72;
  // Floor base
  ctx.fillStyle = '#111420'; ctx.fillRect(0, floorY, IW, 72);
  // Floor tiles (perspective-ish larger near bottom)
  ctx.strokeStyle = '#181c28'; ctx.lineWidth = 1;
  for (let tx = 0; tx < IW; tx += 70) {
    ctx.beginPath(); ctx.moveTo(tx, floorY); ctx.lineTo(tx, IH); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(0, floorY+24); ctx.lineTo(IW, floorY+24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, floorY+48); ctx.lineTo(IW, floorY+48); ctx.stroke();
  // Floor warning strip
  for (let si=0; si<Math.ceil(IW/20); si++) {
    ctx.fillStyle = si%2===0 ? '#442200' : '#111420';
    ctx.fillRect(si*20, floorY-3, 20, 5);
  }
  // Floor reflections from ceiling lights
  const lightXs = [90,200,340,490,640,790,870];
  for (const lx of lightXs) {
    const lr = ctx.createRadialGradient(lx, floorY+5, 0, lx, floorY+5, 50);
    lr.addColorStop(0, 'rgba(100,160,255,0.07)');
    lr.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = lr; ctx.fillRect(lx-50, floorY, 100, 40);
  }


  // ── CEILING ────────────────────────────────────────────
  ctx.fillStyle = '#090c14'; ctx.fillRect(0, 0, IW, 48);
  // Ceiling panels
  ctx.strokeStyle = '#111520'; ctx.lineWidth = 1.5;
  for (let cx2=0; cx2<IW; cx2+=70) {
    ctx.beginPath(); ctx.moveTo(cx2,0); ctx.lineTo(cx2,48); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(0,24); ctx.lineTo(IW,24); ctx.stroke();
  // Conduit pipes along ceiling
  ctx.strokeStyle = '#1e2030'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0,10); ctx.lineTo(IW,10); ctx.stroke();
  ctx.strokeStyle = '#161822'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,14); ctx.lineTo(IW,14); ctx.stroke();
  ctx.strokeStyle = '#1e2030'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0,18); ctx.lineTo(IW,18); ctx.stroke();
  // Conduit clamps
  ctx.fillStyle = '#2a2e3c';
  for (let cx3=40; cx3<IW; cx3+=80) {
    ctx.fillRect(cx3-4, 7, 8, 14);
    ctx.fillStyle = '#1a1e28'; ctx.fillRect(cx3-2, 8, 4, 12); ctx.fillStyle = '#2a2e3c';
  }

  // ── FLUORESCENT LIGHTS ────────────────────────────────
  for (const lx of lightXs) {
    // Housing
    ctx.fillStyle = '#141820'; ctx.fillRect(lx-30, 26, 60, 12);
    ctx.strokeStyle = '#2a3040'; ctx.lineWidth = 1; ctx.strokeRect(lx-30, 26, 60, 12);
    // Tube glow
    const flicker = (lx===490 && (f%180 < 4 || (f%180>7&&f%180<11)));
    ctx.fillStyle = flicker ? 'rgba(255,255,200,0.6)' : '#b8dcf0';
    ctx.fillRect(lx-26, 28, 52, 5);
    // Glow cone down
    const lgrd2 = ctx.createLinearGradient(lx,38,lx,floorY);
    lgrd2.addColorStop(0, flicker ? 'rgba(255,255,180,0.22)' : 'rgba(140,200,255,0.16)');
    lgrd2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = lgrd2; ctx.fillRect(lx-60, 38, 120, floorY-38);
    // Glow spot on floor
    const fgrd = ctx.createRadialGradient(lx, floorY+4, 0, lx, floorY+4, 55);
    fgrd.addColorStop(0, 'rgba(140,200,255,0.09)');
    fgrd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = fgrd; ctx.fillRect(lx-55, floorY, 110, 44);
  }

  // ── BACK WALL ──────────────────────────────────────────
  ctx.fillStyle = '#0f1220';
  ctx.fillRect(0, 48, IW, floorY-48);
  // Wall panel seams
  ctx.strokeStyle = '#161a28'; ctx.lineWidth = 2;
  for (let wp=0; wp<IW; wp+=110) {
    ctx.beginPath(); ctx.moveTo(wp,48); ctx.lineTo(wp,floorY); ctx.stroke();
  }
  // Mid wall rail
  ctx.fillStyle = '#1a1e2c'; ctx.fillRect(0, floorY-130, IW, 8);
  ctx.fillStyle = '#22283a'; ctx.fillRect(0, floorY-132, IW, 3);
  // Bottom wall base
  ctx.fillStyle = '#141826'; ctx.fillRect(0, floorY-24, IW, 24);

  // ── EMERGENCY EXIT SIGNS ──────────────────────────────
  for (const ex of [60, IW-60]) {
    ctx.fillStyle = '#006600';
    ctx.fillRect(ex-18, 52, 36, 16);
    ctx.strokeStyle = '#008800'; ctx.lineWidth = 1;
    ctx.strokeRect(ex-18, 52, 36, 16);
    ctx.fillStyle = '#00ff44'; ctx.font = 'bold 6px Courier New'; ctx.textAlign = 'center';
    ctx.fillText('EXIT', ex, 62);
    // Arrow
    ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1;
    const dir = ex < IW/2 ? -1 : 1;
    ctx.beginPath(); ctx.moveTo(ex,65); ctx.lineTo(ex+dir*6,68); ctx.lineTo(ex,71); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex+dir*6,68); ctx.lineTo(ex-dir*6,68); ctx.stroke();
    // Blink
    if (f%60 < 30) {
      ctx.globalAlpha *= 0.4;
      ctx.fillStyle = 'rgba(0,255,60,0.2)'; ctx.fillRect(ex-18, 52, 36, 16);
      ctx.globalAlpha = 1;
    }
  }

  // ── FIRE SUPPRESSION NOZZLES on ceiling ──────────────
  ctx.fillStyle = '#cc3300';
  for (let fn=120; fn<IW-60; fn+=160) {
    ctx.fillRect(fn-2, 40, 4, 6);
    ctx.beginPath(); ctx.arc(fn, 48, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff5500';
    ctx.beginPath(); ctx.arc(fn, 48, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#cc3300';
    if (isVoidNow && f%40 < 20) {
      ctx.globalAlpha *= 0.5;
      ctx.fillStyle = 'rgba(255,80,0,0.3)'; ctx.beginPath(); ctx.arc(fn, 48, 8, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1; ctx.fillStyle = '#cc3300';
    }
  }

  // ── LARGE MAIN DISPLAY WALL (center back) ─────────────
  const msx=140, msy=56, msw=520, msh=200;
  // Outer bezel
  ctx.fillStyle = '#080c14'; ctx.fillRect(msx-8,msy-8,msw+16,msh+16);
  ctx.strokeStyle = '#2a3050'; ctx.lineWidth = 3; ctx.strokeRect(msx-8,msy-8,msw+16,msh+16);
  // Screen bg
  ctx.fillStyle = '#020508'; ctx.fillRect(msx,msy,msw,msh);
  // Screen: split into 4 quadrants
  const q = [{x:msx,y:msy,w:msw*0.55,h:msh*0.65},{x:msx+msw*0.55,y:msy,w:msw*0.45,h:msh*0.5},
             {x:msx,y:msy+msh*0.65,w:msw*0.3,h:msh*0.35},{x:msx+msw*0.3,y:msy+msh*0.65,w:msw*0.7,h:msh*0.35}];
  // Dividers
  ctx.strokeStyle = '#1a2040'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(msx+msw*0.55,msy); ctx.lineTo(msx+msw*0.55,msy+msh*0.65); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(msx,msy+msh*0.65); ctx.lineTo(msx+msw,msy+msh*0.65); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(msx+msw*0.3,msy+msh*0.65); ctx.lineTo(msx+msw*0.3,msy+msh); ctx.stroke();

  // Q1: World map + storm tracking
  {
    const {x,y,w,h} = q[0];
    ctx.fillStyle = '#020914'; ctx.fillRect(x,y,w,h);
    // Grid lines
    ctx.strokeStyle = 'rgba(30,80,160,0.35)'; ctx.lineWidth = 0.6;
    for (let gl=0;gl<=8;gl++) { ctx.beginPath(); ctx.moveTo(x,y+gl*h/8); ctx.lineTo(x+w,y+gl*h/8); ctx.stroke(); }
    for (let gl=0;gl<=14;gl++) { ctx.beginPath(); ctx.moveTo(x+gl*w/14,y); ctx.lineTo(x+gl*w/14,y+h); ctx.stroke(); }
    // Continent shapes
    ctx.strokeStyle = 'rgba(60,140,255,0.55)'; ctx.lineWidth = 1.5;
    const conts = [[0.06,0.2, 0.18,0.15, 0.28,0.22, 0.26,0.45, 0.14,0.48, 0.06,0.38],
                   [0.34,0.1, 0.5,0.08,  0.56,0.22, 0.52,0.44, 0.40,0.44, 0.34,0.28],
                   [0.60,0.2, 0.72,0.16, 0.80,0.28, 0.76,0.50, 0.64,0.50],
                   [0.12,0.6, 0.30,0.56, 0.38,0.68, 0.28,0.82, 0.14,0.80],
                   [0.44,0.58,0.60,0.54, 0.70,0.72, 0.58,0.86, 0.46,0.78],
                   [0.78,0.62,0.90,0.58, 0.96,0.75, 0.85,0.86, 0.76,0.76]];
    for (const cont of conts) {
      ctx.beginPath();
      for (let ci=0;ci<cont.length;ci+=2) {
        const px=x+cont[ci]*w, py=y+cont[ci+1]*h;
        ci===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
      }
      ctx.closePath(); ctx.stroke();
      ctx.fillStyle = 'rgba(30,70,140,0.15)'; ctx.fill();
    }
    // Player blip
    const bx2 = x + w*0.52 + Math.min(maxReach/200000, 0.4)*w;
    const by2 = y + h*0.38;
    ctx.fillStyle = `rgba(255,60,60,${0.7+Math.sin(f*0.15)*0.3})`;
    ctx.beginPath(); ctx.arc(bx2,by2,4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,60,60,0.4)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(bx2,by2,9,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(bx2,by2,15,0,Math.PI*2); ctx.stroke();
    // Storm swirl
    ctx.fillStyle=isVoidNow?'rgba(60,80,255,0.30)':'rgba(60,140,255,0.14)';
    ctx.beginPath(); ctx.arc(bx2,by2, 25+Math.sin(f*0.06)*4,0,Math.PI*2); ctx.fill();
    // label
    ctx.fillStyle='rgba(80,160,255,0.8)'; ctx.font='bold 7px Courier New'; ctx.textAlign='center';
    ctx.fillText('GLOBAL STORM TRACKING  —  LIVE',x+w/2,y+h-5);
    ctx.textAlign='left'; ctx.fillStyle='rgba(60,140,220,0.7)'; ctx.font='6px Courier New';
    ctx.fillText('A.R.S.-7 STATION',x+4,y+12);
    ctx.textAlign='right';
    ctx.fillText('T'+getWindTier()+'  |  '+Math.floor(maxReach/12)+'m',x+w-4,y+12);
    ctx.textAlign='left';
  }

  // Q2: Wind force multi-graph
  {
    const {x,y,w,h} = q[1];
    ctx.fillStyle='#020a08'; ctx.fillRect(x,y,w,h);
    // Grid
    ctx.strokeStyle='rgba(0,100,50,0.25)'; ctx.lineWidth=0.5;
    for (let gl=0;gl<=5;gl++) { ctx.beginPath(); ctx.moveTo(x,y+gl*h/5); ctx.lineTo(x+w,y+gl*h/5); ctx.stroke(); }
    for (let gl=0;gl<=8;gl++) { ctx.beginPath(); ctx.moveTo(x+gl*w/8,y); ctx.lineTo(x+gl*w/8,y+h); ctx.stroke(); }
    // Three overlapping waveforms
    const waves = [{col:'#22dd88',amp:14,freq:0.18,spd:0.9,phase:0},
                   {col:'#11bb66',amp:8, freq:0.30,spd:0.5,phase:2.1},
                   {col:'rgba(0,200,100,0.4)',amp:18,freq:0.11,spd:1.4,phase:4.2}];
    for (const wv of waves) {
      ctx.strokeStyle=wv.col; ctx.lineWidth=1.2;
      ctx.beginPath();
      for (let gx=0;gx<=w;gx+=2) {
        const gy2=y+h/2+Math.sin((gx+f*wv.spd)*wv.freq+wv.phase)*wv.amp+Math.cos((gx*0.07+f*0.2))*5;
        gx===0?ctx.moveTo(x+gx,gy2):ctx.lineTo(x+gx,gy2);
      }
      ctx.stroke();
    }
    // Zero line
    ctx.strokeStyle='rgba(0,200,80,0.3)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(x,y+h/2); ctx.lineTo(x+w,y+h/2); ctx.stroke();
    // Current value cursor
    const cursorX=x+w-18;
    const cursorVal=y+h/2+Math.sin((w+f*0.9)*0.18)*14;
    ctx.fillStyle='#44ff88'; ctx.beginPath(); ctx.arc(cursorX,cursorVal,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,255,100,0.3)'; ctx.fillRect(cursorX-1,y,2,h);
    ctx.fillStyle='#22dd88'; ctx.font='bold 6px Courier New'; ctx.textAlign='left'; ctx.fillText('WIND ANALYSIS',x+4,y+11);
    ctx.fillStyle='#44ff88'; ctx.textAlign='right';
    ctx.fillText(Math.abs(wind.force).toFixed(2)+' m/s',x+w-4,y+11);
    ctx.textAlign='left';
  }

  // Q3: Temperature gauge
  {
    const {x,y,w,h} = q[2];
    ctx.fillStyle='#060916'; ctx.fillRect(x,y,w,h);
    const tmpC = -38 + Math.sin(f*0.018)*4 + getWindTier()*(-1.2);
    // Big number
    ctx.fillStyle='#3a88ff'; ctx.font='bold 20px Courier New'; ctx.textAlign='center';
    ctx.fillText(tmpC.toFixed(1)+'°', x+w/2, y+h*0.48);
    // Sub-labels
    ctx.fillStyle='rgba(100,160,255,0.7)'; ctx.font='6px Courier New';
    ctx.fillText('TEMP MONITOR', x+w/2, y+12);
    ctx.fillText('°C INTERIOR', x+w/2, y+h-7);
    // Gauge bar
    const gaugeW=w-20, gaugeH=7;
    const gaugeX=x+10, gaugeY=y+h*0.65;
    ctx.fillStyle='#0a1430'; ctx.fillRect(gaugeX,gaugeY,gaugeW,gaugeH);
    const tempFrac=Math.max(0,Math.min(1,(tmpC+60)/80));
    const tCol = tmpC < -30 ? '#2266ff' : tmpC < -10 ? '#22aaff' : '#ff6622';
    ctx.fillStyle=tCol; ctx.fillRect(gaugeX,gaugeY,gaugeW*tempFrac,gaugeH);
    ctx.strokeStyle='#223355'; ctx.lineWidth=1; ctx.strokeRect(gaugeX,gaugeY,gaugeW,gaugeH);
    // Tick marks
    ctx.strokeStyle='#334466'; ctx.lineWidth=0.8;
    for (let t2=0;t2<=4;t2++) { ctx.beginPath(); ctx.moveTo(gaugeX+t2*gaugeW/4,gaugeY+gaugeH); ctx.lineTo(gaugeX+t2*gaugeW/4,gaugeY+gaugeH+4); ctx.stroke(); }
    ctx.textAlign='left';
  }

  // Q4: Live station log
  {
    const {x,y,w,h} = q[3];
    ctx.fillStyle='#060608'; ctx.fillRect(x,y,w,h);
    const allLogs = [
      'WIND FORCE    : '+wind.force.toFixed(3)+' u/s',
      'WIND TIER     : '+getWindTier()+(getWindTier()===7?' [VOID STORM]':''),
      'DISTANCE      : '+Math.floor(maxReach/12)+' m',
      'TEMPERATURE   : '+(-38+Math.sin(f*0.02)*3).toFixed(1)+' C',
      'COLD STATUS   : 0%  [WARM]',
      'POWER GRID    : ONLINE  98.4%',
      'RADAR SWEEP   : ACTIVE',
      'COMMS UPLINK  : NOMINAL',
      'LAB STATUS    : RUNNING',
      'GREENHOUSE    : NOMINAL',
      'VOID RISK     : '+(isVoidNow?'!!HIGH!!':'LOW'),
      'RESEARCHERS   : 8 ON-SITE',
      'LAST BREACH   : NONE',
      'SERVER TEMP   : 38.2 C',
    ];
    ctx.fillStyle='#ffcc22'; ctx.font='bold 6px Courier New'; ctx.textAlign='left';
    ctx.fillText('STATION DATA LOG',x+4,y+11);
    ctx.font='6px Courier New';
    const offset=Math.floor(f*0.025)%allLogs.length;
    const visible=Math.floor(h/11)-1;
    for (let li=0;li<visible;li++) {
      const line=allLogs[(li+offset)%allLogs.length];
      const isAlert=line.includes('!!')|| line.includes('[VOID');

  // ── WORKSTATIONS ─────────────────────────────────────────
  // 8 desks total: front row (close) and back row
  // dy is the floor surface — desks/chairs sit on top of it (floor surface is floorY)
  const deskY = floorY - 2;
  const desks = [

    // Side monitor screen content (simpler version of main)

    // ── KEYBOARD ─────────────────────────────────────────────
    ctx.fillStyle='#111420';
    ctx.beginPath(); ctx.roundRect(dx+10,dy-38,46,10,2); ctx.fill();
    ctx.strokeStyle='#1c2030'; ctx.lineWidth=0.7; ctx.strokeRect(dx+10,dy-38,46,10);

    }

    if (di%2===1) {

      ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=0.5;

    // ── MAIN SCREEN CONTENT ───────────────────────────────────
    const sx3=dx+30, sy3=dy-90, sw=40, sh=44;

    ctx.fillStyle='rgba(10,16,40,0.95)';

    ctx.fillStyle='#cc8800'; ctx.beginPath(); ctx.arc(sx3+10,sy3+4.5,2,0,Math.PI*2); ctx.fill();
